<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>活動大師 PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #e2e8f0; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .nav-btn { @apply flex flex-col items-center gap-1 p-2 transition-all w-full; }
    .nav-active { @apply text-blue-600; }
    .nav-inactive { @apply text-slate-400 hover:text-slate-600; }
    button:active { transform: scale(0.96); }
    .btn-disabled { pointer-events: none; opacity: 0.7; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden">

<div id="app-container" class="w-full max-w-md bg-slate-50 h-full relative shadow-2xl flex flex-col">
  
  <header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white px-4 py-5 flex items-center justify-between shadow-md z-20 shrink-0">
    <div class="flex items-center gap-2">
       <i class="fas fa-crown text-yellow-300 text-2xl"></i>
       <h1 class="text-xl font-black tracking-widest">活動大師</h1>
    </div>
    <div class="flex items-center gap-2">
      <div id="user-profile-badge" class="hidden text-sm font-bold bg-blue-800/40 px-3 py-1.5 rounded-full flex items-center gap-2 border border-blue-400/30">
        <img id="user-avatar" src="" class="w-5 h-5 rounded-full object-cover">
        <span id="user-name-display" class="tracking-wide"></span>
      </div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden text-xs font-bold bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full border border-white/40 transition-colors shadow-sm">
        <i class="fas fa-exchange-alt"></i> 前台
      </button>
    </div>
  </header>

  <main id="main-content" class="flex-1 overflow-y-auto pb-24 relative">
    
    <!-- 載入中 -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
      <p class="text-base text-slate-500 font-bold tracking-widest animate-pulse" id="loading-text">連線驗證中...</p>
    </div>

    <!-- 前台：註冊 -->
    <div id="view-user-register" class="hidden p-6 space-y-6">
      <div class="text-center mt-4">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
          <i class="fas fa-user-edit text-4xl text-blue-500"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-800">建立會員檔案</h2>
        <p class="text-base text-slate-500 font-medium mt-1">填寫一次，未來即可一鍵快速報名</p>
      </div>
      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">真實姓名</label><input type="text" id="reg-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">性別</label><select id="reg-gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">手機號碼</label><input type="tel" id="reg-phone" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="09XX-XXXXXX"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">業種 (行業別)</label><input type="text" id="reg-industry" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <button onclick="submitUserRegistration()" id="btn-submit-user-reg" class="w-full py-4 mt-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 transition-all shadow-xl">完成註冊</button>
      </div>
    </div>

    <!-- 會員：個人資料修改 -->
    <div id="view-user-profile" class="hidden p-6 space-y-6">
      <div class="text-center mt-4 mb-4"><h2 class="text-2xl font-black text-slate-800">會員專區</h2><p class="text-base text-slate-500 font-medium mt-1">您可以隨時更新個人資料</p></div>
      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">真實姓名</label><input type="text" id="edit-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">性別</label><select id="edit-gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">手機號碼</label><input type="tel" id="edit-phone" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">業種 (行業別)</label><input type="text" id="edit-industry" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <button onclick="submitProfileUpdate()" id="btn-submit-profile" class="w-full py-4 mt-4 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl">儲存變更</button>
      </div>
    </div>

    <!-- 會員：活動報名 -->
    <div id="view-user-activities" class="hidden p-4 space-y-4">
      <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden"><div class="relative z-10"><h2 class="text-2xl font-black mb-1">近期活動</h2><p class="text-blue-100 text-base font-medium">點擊下方活動即可一鍵報名</p></div><i class="fas fa-ticket-alt absolute -bottom-4 -right-2 text-7xl text-white opacity-10"></i></div>
      <div id="user-activities-container" class="space-y-4"></div>
    </div>

    <!-- 會員：歷史紀錄 -->
    <div id="view-user-history" class="hidden p-4 space-y-4">
      <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden"><div class="relative z-10"><h2 class="text-2xl font-black mb-1">歷史報名紀錄</h2><p class="text-indigo-100 text-base font-medium">總覽您參與過的所有活動</p></div><i class="fas fa-history absolute -bottom-4 -right-2 text-7xl text-white opacity-10"></i></div>
      <div id="user-history-container" class="space-y-4"></div>
    </div>

    <!-- 後台：活動清單 -->
    <div id="view-admin-activities" class="hidden p-4 space-y-4">
      <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg mb-6 relative overflow-hidden"><div class="relative z-10"><h2 class="text-2xl font-black mb-1">活動與核銷</h2><p class="text-blue-100 text-base font-medium">點擊活動進入簽到與管理名單</p></div><i class="fas fa-calendar-check absolute -bottom-4 -right-4 text-7xl text-white opacity-10"></i></div>
      <div id="admin-activity-list-container" class="space-y-4"></div>
    </div>

    <!-- 後台：單一活動簽到 -->
    <div id="view-admin-checkin" class="hidden h-full flex flex-col bg-slate-50">
      <div class="bg-blue-600 text-white px-4 pt-6 pb-4 sticky top-0 z-20 shadow-md">
        <div class="flex items-center gap-3 mb-4">
          <button onclick="switchView('admin-activities')" class="p-2 bg-blue-500 rounded-full"><i class="fas fa-arrow-left"></i></button>
          <div class="flex-1 overflow-hidden"><p class="text-sm text-blue-200 font-bold mb-1">簽到管理</p><h2 id="checkin-act-name" class="text-xl font-black truncate">載入中...</h2></div>
        </div>
        <div class="relative"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" id="search-checkin" oninput="renderCheckinList()" placeholder="搜尋姓名或後五碼..." class="w-full pl-10 pr-4 py-3 bg-white rounded-2xl text-base font-bold text-slate-700 outline-none shadow-inner"></div>
      </div>
      <div id="checkin-list-container" class="p-4 space-y-4 pb-20"></div>
    </div>

    <!-- 後台：建立活動 -->
    <div id="view-admin-create" class="hidden p-4 space-y-4">
      <div class="text-center mt-2 mb-4"><h2 class="text-2xl font-black text-slate-800">發起新活動</h2></div>
      <div class="flex bg-slate-200/50 p-1.5 rounded-2xl mb-4">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-xl text-base font-black bg-white shadow-sm text-blue-600 transition-all">⚡ 快速匯入名單</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-xl text-base font-black text-slate-500 transition-all">🌟 開放線上報名</button>
      </div>
      <!-- 快速模式 -->
      <div id="form-quick" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">活動名稱</label><input type="text" id="quick-name" class="w-full px-5 py-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">名單 (換行分隔)</label><textarea id="quick-names" class="w-full h-40 p-5 bg-slate-50 border border-slate-100 rounded-2xl font-medium resize-none leading-relaxed" placeholder="王小明&#10;李大華..."></textarea></div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg">快速建立</button>
      </div>
      <!-- 完整模式 (省略部分欄位) -->
      <div id="form-detailed" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
         <div class="space-y-1"><label class="text-sm font-bold text-slate-500">活動名稱</label><input type="text" id="detail-name" class="w-full px-5 py-4 bg-slate-50 rounded-2xl font-bold border border-slate-100 outline-none"></div>
         <div class="space-y-2 pt-2">
            <label class="text-sm font-bold text-slate-500">收費設定</label>
            <div class="flex gap-4">
              <label class="flex items-center gap-2"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput('create')"> <span class="font-bold text-slate-700">免費</span></label>
              <label class="flex items-center gap-2"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput('create')"> <span class="font-bold text-slate-700">收費</span></label>
            </div>
            <input type="number" id="detail-price" class="hidden w-full px-5 py-4 bg-slate-50 rounded-2xl font-bold mt-2 border border-slate-100 outline-none" placeholder="金額 (NT$)">
         </div>
         <div class="grid grid-cols-2 gap-4 border-t pt-4">
            <div class="space-y-1"><label class="text-sm font-bold text-slate-500">開始時間</label><input type="datetime-local" id="detail-start" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
            <div class="space-y-1"><label class="text-sm font-bold text-slate-500">結束時間</label><input type="datetime-local" id="detail-end" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
         </div>
         <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg">發佈報名頁面</button>
      </div>
    </div>

    <!-- 後台：編輯 -->
    <div id="view-admin-edit" class="hidden p-4"></div>

    <!-- 後台：CRM -->
    <div id="view-admin-crm" class="hidden p-4 space-y-4">
      <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden"><h2 class="text-2xl font-black mb-1 relative z-10">CRM 大數據</h2><i class="fas fa-users absolute -bottom-2 -right-2 text-8xl text-white opacity-10"></i></div>
      <div id="crm-list-container" class="space-y-4"></div>
    </div>

    <!-- 後台：參數設定 (核心更新) -->
    <div id="view-admin-settings" class="hidden p-4 space-y-4">
      <div class="bg-slate-800 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden"><h2 class="text-2xl font-black mb-1">參數設定</h2><p class="text-slate-300 text-base font-medium">第三方金鑰與社群連結</p><i class="fas fa-cogs absolute -bottom-2 -right-2 text-8xl text-white opacity-10"></i></div>
      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
        <div class="space-y-1">
          <label class="text-sm font-bold text-slate-500">TG_BOT_TOKEN</label>
          <div class="flex gap-2">
            <input type="text" id="set-tg-token" class="flex-1 px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold border border-slate-100 outline-none" placeholder="Bot Token">
            <button onclick="autoFetchTgChatId()" id="btn-fetch-tg" class="bg-blue-100 text-blue-600 px-4 py-3 rounded-xl text-sm font-bold whitespace-nowrap active:scale-95 shadow-sm"><i class="fas fa-sync-alt"></i> 轉換</button>
          </div>
        </div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">TG_CHAT_ID (自動抓取)</label><input type="text" id="set-tg-chat" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold border border-slate-100 outline-none" placeholder="Chat ID"></div>
        <button onclick="submitSettings()" id="btn-submit-settings" class="w-full py-4 mt-2 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-900 transition-all shadow-xl">儲存設定</button>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-user" class="hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center px-2 py-2 z-50 pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-calendar-alt text-xl"></i></div><span class="text-sm font-black">活動報名</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-history text-xl"></i></div><span class="text-sm font-black">歷史紀錄</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-user-circle text-xl"></i></div><span class="text-sm font-black">會員專區</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center px-1 py-2 z-50 pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
    <button onclick="switchView('admin-create')" id="nav-admin-create" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-plus-circle text-xl"></i></div><span class="text-xs font-black">發起活動</span></button>
    <button onclick="switchView('admin-activities')" id="nav-admin-activities" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-calendar-alt text-xl"></i></div><span class="text-xs font-black">活動核銷</span></button>
    <button onclick="switchView('admin-crm')" id="nav-admin-crm" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-user-check text-xl"></i></div><span class="text-xs font-black">會員CRM</span></button>
    <button onclick="switchView('admin-settings')" id="nav-admin-settings" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-cogs text-xl"></i></div><span class="text-xs font-black">參數設定</span></button>
  </nav>

</div>

<div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-base shadow-2xl opacity-0 transition-all z-[10000] pointer-events-none flex items-center gap-2 font-bold transform -translate-y-4"></div>

<div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity">
  <div class="bg-white w-[85%] max-w-sm rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform text-center relative overflow-hidden">
    <div id="modal-icon" class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-check text-3xl"></i></div>
    <h3 id="modal-title" class="text-xl font-black text-slate-800 mb-2"></h3>
    <p id="modal-desc" class="text-base text-slate-500 font-medium mb-6 leading-relaxed"></p>
    <button onclick="closeModalAndGo()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-md">我知道了</button>
  </div>
</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let currentActivities = [], currentCheckinData = [], currentCrmData = [], activeActivityName = '';

  // ⭐ 除錯版 fetchAPI：如果 JSON 解析失敗，會印出回傳內容前 50 字元以供診斷
  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const text = await response.text();
      try {
        const result = JSON.parse(text);
        if (!result.success) throw new Error(result.error);
        return result.data;
      } catch(e) {
        console.error("JSON Parse Error. Raw response:", text);
        throw new Error(`回傳格式錯誤。伺服器內容：${text.substring(0, 50)}...`);
      }
    } catch (err) {
      showToast("系統連線錯誤: " + err.message, true);
      throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || 'https://via.placeholder.com/150';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) switchView('user-activities');
        else { document.getElementById('reg-name').value = userProfile.displayName; switchView('user-register'); }
      }
    } catch (err) { document.getElementById('loading-text').innerText = 'LIFF 載入失敗，請確認網址與權限設定'; }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('role-switch-btn').innerHTML = isViewModeAdmin ? '<i class="fas fa-exchange-alt"></i> 前台' : '<i class="fas fa-exchange-alt"></i> 後台';
    if (isViewModeAdmin) switchView('admin-activities');
    else { if (isRegistered) switchView('user-activities'); else switchView('user-register'); }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-edit', 'admin-crm', 'admin-settings'].forEach(v => {
      const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden'); navUser.classList.add('hidden');
    if (isAdmin && isViewModeAdmin && view.startsWith('admin') && view !== 'admin-checkin') navAdmin.classList.remove('hidden');
    else if (isRegistered && (!isAdmin || !isViewModeAdmin)) navUser.classList.remove('hidden');
    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-crm') loadCrmData();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  async function submitUserRegistration() {
    const p = { userId: userProfile.userId, name: document.getElementById('reg-name').value.trim(), gender: document.getElementById('reg-gender').value, phone: document.getElementById('reg-phone').value.trim(), industry: document.getElementById('reg-industry').value.trim() };
    if (!p.name || !p.phone) return showToast("⚠️ 請填寫完整", true);
    await fetchAPI('registerUser', p);
    isRegistered = true; registeredInfo = p; switchView('user-activities');
  }

  function populateUserProfile() {
    if (registeredInfo) {
      document.getElementById('edit-name').value = registeredInfo.name;
      document.getElementById('edit-gender').value = registeredInfo.gender;
      document.getElementById('edit-phone').value = registeredInfo.phone;
      document.getElementById('edit-industry').value = registeredInfo.industry;
    }
  }

  async function submitProfileUpdate() {
    const p = { userId: userProfile.userId, name: document.getElementById('edit-name').value.trim(), gender: document.getElementById('edit-gender').value, phone: document.getElementById('edit-phone').value.trim(), industry: document.getElementById('edit-industry').value.trim() };
    await fetchAPI('updateUser', p); registeredInfo = p; showToast("✅ 已儲存");
  }

  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></div>';
    const data = await fetchAPI('getPublicActivities');
    if (data.length === 0) { container.innerHTML = '<div class="text-center py-16 bg-white rounded-3xl"><p class="text-base text-slate-500 font-bold">目前無活動</p></div>'; return; }
    container.innerHTML = data.map(act => `
      <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        ${act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-36 object-cover">` : ''}
        <div class="p-5">
          <div class="flex items-center gap-2 mb-2"><span class="text-xs font-black uppercase text-blue-500 bg-blue-50 px-2 py-1 rounded">${act.type}</span><span class="text-xs font-black text-orange-500">${act.feeType === '收費' ? 'NT$'+act.price : '免費'}</span></div>
          <h3 class="text-xl font-black text-slate-800">${act.name}</h3>
          <p class="text-sm text-slate-400 mt-1">${formatTime(act.startTime)}</p>
          <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-black text-lg active:scale-95 transition-all">一鍵報名</button>
        </div>
      </div>`).join('');
  }

  async function userJoinActivity(btn, name, feeType, price) {
    if (!confirm(`確定報名「${name}」？`)) return;
    btn.classList.add('btn-disabled');
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName: name });
      if (feeType === '收費') showModal("報名資料保留中", `您已成功報名！此為收費活動 <b>(NT$ ${price})</b><br><br>請記得完成匯款後，至「歷史紀錄」補填您的<strong class="text-orange-500">匯款帳號後五碼</strong>！`, "history");
      else showModal("報名成功", `期待您的參與！`, "activities");
    } catch(err) { btn.classList.remove('btn-disabled'); }
  }

  function showModal(title, desc, target) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerHTML = desc;
    modalTargetView = target;
    document.getElementById('custom-modal').classList.remove('hidden');
  }

  function closeModalAndGo() {
    document.getElementById('custom-modal').classList.add('hidden');
    if (modalTargetView === 'history') switchView('user-history');
    else switchView('user-activities');
  }

  async function loadUserHistory() {
    const container = document.getElementById('user-history-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin"></i></div>';
    const history = await fetchAPI('getUserHistory', { userId: userProfile.userId });
    if (history.length === 0) { container.innerHTML = '<div class="text-center py-16 bg-white rounded-3xl"><p class="text-base text-slate-500">尚無報名紀錄</p></div>'; return; }
    container.innerHTML = history.map(item => {
      let payBadge = item.isPaidAct ? (item.payStatus === '已完款' ? '<span class="text-blue-500">已完款</span>' : (item.payStatus === '匯款審核中' ? '<span class="text-purple-500">審核中</span>' : '<span class="text-orange-400">未繳費</span>')) : '';
      return `
      <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-3">
        <div class="flex justify-between items-start">
          <div>
            <div class="flex items-center gap-2 mb-1"><span class="text-xs font-black text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded">${item.type}</span><span class="text-xs">${item.regStatus}</span></div>
            <h4 class="text-lg font-black">${item.name}</h4>
            <p class="text-sm text-slate-400 mt-1">${formatTime(item.startTime)} ${payBadge}</p>
          </div>
          <div class="text-center shrink-0">${item.checkedIn ? '<i class="fas fa-check-circle text-green-500 text-3xl"></i>' : '<i class="fas fa-clock text-slate-300 text-3xl"></i>'}</div>
        </div>
        ${item.isPaidAct && item.regStatus === '正常' ? `
          <div class="mt-4 flex gap-2">
            <input type="text" id="last5-${item.name}" value="${item.last5}" placeholder="補填後五碼" maxlength="5" class="flex-1 bg-slate-50 border p-2 rounded-lg text-sm font-bold outline-none">
            <button onclick="updateUserLast5('${item.name}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">送出</button>
            <button onclick="userCancelRegistration('${item.name}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-sm font-bold">取消</button>
          </div>
        ` : (item.regStatus === '正常' ? `<button onclick="userCancelRegistration('${item.name}')" class="w-full mt-4 bg-red-50 text-red-500 py-2 rounded-lg text-sm font-bold">取消報名</button>` : '')}
      </div>`;
    }).join('');
  }

  async function updateUserLast5(name) {
    const val = document.getElementById(`last5-${name}`).value.trim();
    if(!val) return showToast("⚠️ 請填寫", true);
    await fetchAPI('updateLast5Digits', { userId: userProfile.userId, activityName: name, last5Digits: val });
    showToast("✅ 已送出審核"); loadUserHistory();
  }

  async function userCancelRegistration(name) {
    if (!confirm("確定取消？")) return;
    await fetchAPI('cancelRegistration', { userId: userProfile.userId, activityName: name });
    loadUserHistory();
  }

  // 後台功能
  async function loadAdminActivities() {
    const container = document.getElementById('admin-activity-list-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-500"></i></div>';
    currentActivities = await fetchAPI('getActivityDashboard');
    container.innerHTML = currentActivities.map(act => `
      <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex justify-between"><div><span class="text-xs font-black text-blue-500 bg-blue-50 px-2 py-1 rounded">${act.type}</span><h3 class="text-lg font-black mt-1">${act.name}</h3></div></div>
        <div class="grid grid-cols-4 gap-2 bg-slate-50 rounded-2xl p-3 my-4 text-center">
          <div><p class="text-xs text-slate-400">報名</p><p class="font-black">${act.total}</p></div>
          <div><p class="text-xs text-slate-400 text-green-600">實到</p><p class="font-black">${act.attended}</p></div>
          <div><p class="text-xs text-slate-400 text-orange-500">缺席</p><p class="font-black">${act.total-act.attended}</p></div>
          <div><p class="text-xs text-slate-400">取消</p><p class="font-black">${act.cancelled}</p></div>
        </div>
        <button onclick="openAdminCheckin('${act.name}')" class="w-full py-3 bg-blue-600 text-white rounded-xl font-black mb-3"><i class="fas fa-qrcode"></i> 進入簽到管理</button>
        <div class="flex justify-between"><button onclick="toggleActStatus('${act.name}')" class="text-sm font-bold text-slate-500">${act.status==='下架'?'上架':'下架'}</button><button onclick="deleteAct('${act.name}')" class="text-sm font-bold text-red-500">刪除</button></div>
      </div>`).join('');
  }

  async function openAdminCheckin(name) {
    activeActivityName = name; document.getElementById('checkin-act-name').innerText = name;
    switchView('admin-checkin');
    currentCheckinData = await fetchAPI('getRegistrants', { activityName: name });
    renderCheckinList();
  }

  function renderCheckinList() {
    const term = document.getElementById('search-checkin').value.toLowerCase();
    const filtered = currentCheckinData.filter(r => (r.姓名||'').toLowerCase().includes(term) || (r.last5||'').includes(term));
    const container = document.getElementById('checkin-list-container');
    container.innerHTML = filtered.map(p => `
      <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-3">
          <div><h4 class="text-lg font-black">${p.姓名}</h4><span class="text-xs text-blue-600 font-bold">${p.last5?'後五碼:'+p.last5:''}</span></div>
          <button onclick="toggleCheckin('${p.rowId}', ${p.checkedIn})" class="px-5 py-2 rounded-xl font-black ${p.checkedIn?'bg-green-500 text-white':'bg-slate-100 text-slate-500'}">${p.checkedIn?'已簽到':'未簽到'}</button>
        </div>
        <div class="grid grid-cols-2 gap-2"><select onchange="updateRow('${p.rowId}', '繳費狀態', this.value)" class="text-sm p-2 bg-slate-50 rounded-lg"><option value="未繳費" ${p.payStatus==='未繳費'?'selected':''}>未繳費</option><option value="匯款審核中" ${p.payStatus==='匯款審核中'?'selected':''}>匯款審核中</option><option value="已完款" ${p.payStatus==='已完款'?'selected':''}>已完款</option></select><select onchange="updateRow('${p.rowId}', '報名狀態', this.value)" class="text-sm p-2 bg-slate-50 rounded-lg"><option value="正常" ${p.regStatus==='正常'?'selected':''}>正常</option><option value="已取消" ${p.regStatus==='已取消'?'selected':''}>已取消</option></select></div>
      </div>`).join('');
  }

  async function toggleCheckin(id, status) { await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: id, currentStatus: status }); openAdminCheckin(activeActivityName); }
  async function updateRow(id, col, val) { await fetchAPI('updateCellStatus', { activityName: activeActivityName, rowId: id, colName: col, val: val }); showToast("✅ 已更新"); }

  async function loadAdminSettings() {
    const s = await fetchAPI('getSettings');
    document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN; document.getElementById('set-tg-chat').value = s.TG_CHAT_ID;
  }

  // ⭐ 根據技術文件實作的 Chat ID 轉換按鈕觸發
  async function autoFetchTgChatId() {
    const token = document.getElementById('set-tg-token').value.trim();
    if (!token) return showToast("⚠️ 請先輸入 Token", true);
    const btn = document.getElementById('btn-fetch-tg');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
    try {
      const chatId = await fetchAPI('getTgChatId', { token });
      document.getElementById('set-tg-chat').value = chatId;
      showToast("✅ 成功抓取 Chat ID！請記得存檔");
    } catch(err) { showToast(err.message, true); }
    btn.innerHTML = '<i class="fas fa-sync-alt"></i> 轉換'; btn.disabled = false;
  }

  async function submitSettings() {
    await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value.trim(), TG_CHAT_ID: document.getElementById('set-tg-chat').value.trim() });
    showToast("✅ 儲存成功");
  }

  function formatTime(t) { return t ? new Date(t).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) : ''; }
  function showToast(m, e=false) { const t = document.getElementById('toast'); t.innerHTML = m; t.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-base shadow-2xl transition-all z-[10000] font-bold transform ${e ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 2500); }
</script>
</body>
</html>
