<!-- Version: v1.6.8 (強化管理權限過濾：非管理員不顯示辨識相機與邀請按鈕) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片管理中樞</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; font-size: 15px; color: #333333; font-weight: 400; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-normal text-[16px] active:scale-[0.98] transition-all flex items-center justify-center gap-2; }
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full font-normal; min-width: 48px;}
    .nav-active-btn { @apply text-black font-normal; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #000000; }
  </style>
</head>
<body class="font-sans bg-slate-50">

<div class="w-full max-w-md bg-background h-screen relative flex flex-col overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100 shadow-sm">
    <div class="text-[19px] font-medium text-slate-800 flex items-center gap-2 tracking-tight">
      <div class="w-8 h-8 rounded bg-primary text-white flex items-center justify-center">
        <span class="material-symbols-outlined text-[20px]">recent_patient</span>
      </div>
      名片管理
    </div>
    <div id="user-profile-badge" class="hidden flex items-center gap-2">
      <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border border-slate-100 shadow-sm">
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20">
    
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-500 text-[13px]">權限驗證中</p>
    </div>

    <!-- ⭐ 管理工具：預設 Hidden -->
    <div id="admin-tools-container" class="hidden px-5 pt-4">
      <div class="bg-white rounded-xl shadow-sm p-6 text-center border border-slate-100">
        <h2 class="text-[16px] font-normal text-slate-800 mb-1">AI 智慧名片辨識</h2>
        <div class="flex gap-3 mt-4">
          <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-1">相機辨識</button>
          <button onclick="document.getElementById('card-upload').click()" class="w-1/3 border border-slate-300 rounded-xl text-slate-500">相簿</button>
        </div>
        <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="window.openCropper(this)">
        <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="window.openCropper(this)">
      </div>
      
      <div class="mt-6 relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
        <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="w-full h-[46px] pl-11 pr-4 bg-white border border-slate-200 rounded-lg text-[15px] outline-none focus:border-primary" placeholder="搜尋姓名或公司...">
      </div>
    </div>

    <div id="admin-card-list-container" class="flex flex-col mt-2 px-5"></div>
  </main>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-evenly items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">add_circle</span></div><span class="text-[10px] mt-0.5">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">fact_check</span></div><span class="text-[10px] mt-0.5">核銷</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">groups</span></div><span class="text-[10px] mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn nav-active-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">recent_patient</span></div><span class="text-[10px] mt-0.5 font-normal">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] mt-0.5">參數</span></button>
  </nav>
</div>

<!-- 名片詳情 Modal -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-white flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0 z-[1000]">
  <div class="absolute top-4 right-4 z-50 flex gap-2">
    <!-- ⭐ 編輯按鈕：僅名片主人或 Admin 可見 -->
    <button id="btn-card-edit" onclick="window.openCardEdit()" class="hidden w-9 h-9 bg-white/90 rounded flex items-center justify-center text-primary shadow-sm border border-slate-200"><span class="material-symbols-outlined text-[18px]">edit</span></button>
    <button onclick="window.closeReadOnlyCard()" class="w-9 h-9 bg-black/50 rounded flex items-center justify-center text-white"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="flex-1 overflow-y-auto pb-24" id="card-detail-content"></div>
  <!-- ⭐ 邀請認領按鈕：僅 Admin 可見 -->
  <div id="admin-action-bar" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 p-4 pb-safe flex gap-3">
    <button onclick="window.shareClaimLink()" class="flex-1 py-3.5 border border-slate-300 rounded-xl text-slate-800">邀請認領</button>
    <button onclick="window.openECardGenerator()" class="flex-[1.5] py-3.5 bg-slate-900 text-white rounded-xl">產生數位名片</button>
  </div>
</div>

<script src="card.js"></script>
<script src="card-ecard.js"></script>
</body>
</html>
