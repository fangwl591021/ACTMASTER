<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>報名大師 PRO</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#10b981", "primary-light": "#d1fae5", "primary-dark": "#059669",
            background: "#f8f9fc", "card-bg": "#ffffff", "input-bg": "#f1f5f9",
            "text-main": "#1e293b", "text-muted": "#64748b",
            success: "#10b981", warning: "#f59e0b", error: "#ef4444",
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            body: ["Inter", "Noto Sans TC", "sans-serif"],
          },
          boxShadow: {
            'app-card': '0 8px 30px -6px rgba(0,0,0,0.05)',
            'app-nav': '0 -10px 30px -10px rgba(0,0,0,0.05)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #f8f9fc; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .view-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
    .view-section.active { display: block; opacity: 1; }
    
    /* ⭐ 導覽列優化：保證 6 顆按鈕能縮放自如、不靠邊 */
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; transition: all 0.2s; min-width: 48px; }
    .nav-btn .icon-box { padding: 0.35rem 0.5rem; border-radius: 9999px; transition: all 0.2s; display: flex; justify-content: center; align-items: center; }
    
    .nav-active { color: #10b981; font-weight: 700; }
    .nav-active .icon-box { background-color: #d1fae5; color: #059669; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    
    .nav-admin-active { color: #334155; font-weight: 700; }
    .nav-admin-active .icon-box { background-color: #f1f5f9; color: #0f172a; }
    .nav-admin-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

    .custom-input { @apply w-full py-3.5 px-4 bg-input-bg border-none rounded-xl outline-none focus:ring-2 focus:ring-primary/30 transition-all font-medium text-text-main; }
    .input-label { @apply block text-[13px] font-bold text-text-main mb-1.5 ml-1; }
    .btn-primary { @apply w-full py-4 bg-primary text-white rounded-2xl font-bold text-[17px] shadow-lg shadow-emerald-500/30 active:scale-95 transition-all flex items-center justify-center gap-2; }
    .status-badge { @apply px-3 py-1 text-[11px] font-extrabold rounded-full; }
  </style>
</head>

<!-- Toast 提示 -->
<div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[100] font-bold transform translate-y-0 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  
  let userProfile = null;
  let isAdmin = false;
  let currentActivities = [];
  let currentRegistrants = [];
  let currentTargetActivity = "";
  let html5QrcodeScanner = null;

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      
      const adminList = ["Uac6a8fa0f074d257252277c050dcf6cf"];
      if (adminList.includes(userProfile.userId)) {
        isAdmin = true;
        document.getElementById('btn-admin-switch').classList.remove('hidden');
      }

      if (res.isRegistered) {
        document.getElementById('f-userId').value = userProfile.userId;
        document.getElementById('f-name').value = res.info.name;
        document.getElementById('f-gender').value = res.info.gender;
        document.getElementById('f-phone').value = res.info.phone;
        document.getElementById('f-industry').value = res.info.industry;
        document.getElementById('f-referrer').value = res.info.referrerId || '';
        document.getElementById('f-referrer').disabled = !!res.info.referrerId;
        document.getElementById('profile-name-display').innerText = res.info.name;
        
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view') || 'user-activities';
        switchView(view);
      } else {
        switchView('user-profile');
        showToast("歡迎！請先完成基本資料設定。");
      }
    } catch (err) {
      showToast("系統初始化失敗", true);
    }
  };

  async function fetchAPI(action, payload = {}) {
    const response = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload })
    });
    const result = await response.json();
    if (!result.success) throw new Error(result.error);
    return result.data;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${isError ? 'error' : 'info'}</span> ${msg}`;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[100] font-bold transform translate-y-0 opacity-100 ${isError ? 'bg-error text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`;
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000);
  }

  function toggleAdminMode() {
    const isCurrentlyAdmin = document.getElementById('bottom-nav-admin').style.display === 'flex';
    switchView(isCurrentlyAdmin ? 'user-activities' : 'admin-activities');
  }

  function switchView(viewId) {
    document.getElementById('loading-view').style.display = 'none';
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');

    const isUser = viewId.startsWith('user-');
    document.getElementById('bottom-nav-user').style.display = isUser ? 'flex' : 'none';
    document.getElementById('bottom-nav-admin').style.display = isUser ? 'none' : 'flex';
    
    document.getElementById('app-icon').innerText = isUser ? 'explore' : 'admin_panel_settings';
    document.getElementById('app-title-text').innerText = isUser ? '探索活動' : '管理中心';
    document.getElementById('app-title').className = `text-[20px] font-black flex items-center gap-2 font-headline tracking-tight ${isUser ? 'text-primary' : 'text-slate-800'}`;
    
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active', 'nav-admin-active'));
    
    if (viewId === 'user-activities') {
      document.getElementById('nav-user-activities').classList.add('nav-active');
      loadUserActivities();
    } else if (viewId === 'user-history') {
      document.getElementById('nav-user-history').classList.add('nav-active');
      loadUserHistory();
    } else if (viewId === 'user-profile') {
      document.getElementById('nav-user-profile').classList.add('nav-active');
    } else if (viewId === 'admin-activities') {
      document.getElementById('nav-admin-activities').classList.add('nav-admin-active');
      loadAdminActivities();
    } else if (viewId === 'admin-crm') {
      document.getElementById('nav-admin-crm').classList.add('nav-admin-active');
      loadCRM();
    } else if (viewId === 'admin-settings') {
      document.getElementById('nav-admin-settings').classList.add('nav-admin-active');
      loadAdminSettings();
    }
  }

  // --- User Functions ---
  async function saveProfile() {
    const p = {
      userId: userProfile.userId,
      name: document.getElementById('f-name').value,
      gender: document.getElementById('f-gender').value,
      phone: document.getElementById('f-phone').value,
      industry: document.getElementById('f-industry').value,
      referrerId: document.getElementById('f-referrer').value
    };
    if(!p.name || !p.phone) return showToast("請填寫姓名與電話", true);
    
    try {
      const isNew = !document.getElementById('f-userId').value;
      await fetchAPI(isNew ? 'registerUser' : 'updateUser', p);
      document.getElementById('f-userId').value = p.userId;
      document.getElementById('profile-name-display').innerText = p.name;
      document.getElementById('f-referrer').disabled = true;
      showToast("✅ 資料儲存成功");

  async function toggleCheckIn(rowId, currentStatus) {
    try {
      await fetchAPI('toggleStatus', { activityName: currentTargetActivity, rowId: rowId, currentStatus: currentStatus });
      const reg = currentRegistrants.find(r => r.rowId === rowId);
      if(reg) reg.checkedIn = !currentStatus;
      filterAdminReg();
      if(!currentStatus) navigator.vibrate && navigator.vibrate([100, 50, 100]); 
    } catch(e) { showToast("簽到失敗", true); }
  }

  async function updatePayStatus(rowId, val) {
    try {
      await fetchAPI('updateCellStatus', { activityName: currentTargetActivity, rowId: rowId, colName: '繳費', val: val });
      const reg = currentRegistrants.find(r => r.rowId === rowId);
      if(reg) reg.payStatus = val;
    } catch(e) { showToast("更新失敗", true); }
  }

  // --- QR Scanner ---
  function startScanner() {
    if(html5QrcodeScanner) return;
    html5QrcodeScanner = new Html5Qrcode("qr-reader");
    html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
      async (decodedText) => {
        stopScanner();
        try {
          const uRes = await fetchAPI('checkUser', { userId: decodedText });
          if(!uRes.isRegistered) return showToast("❌ 非本系統會員", true);
          const name = uRes.info.name;
          const reg = currentRegistrants.find(r => r['姓名'] === name);
          if(reg) {
            if(reg.checkedIn) return showToast(`⚠️ ${name} 已經簽到過了`);
            await toggleCheckIn(reg.rowId, false);
            showToast(`✅ ${name} 簽到成功！`);
          } else {
             if(confirm(`找不到 ${name} 的報名紀錄，是否直接現場報名並簽到？`)) {
                await fetchAPI('addWalkIn', { activityName: currentTargetActivity, name: name });
                showToast(`✅ ${name} 現場報名並簽到成功！`);
                openAdminRegistrants(currentTargetActivity);
             }
          }
        } catch(e) { showToast("查驗失敗", true); }
      },
      (errorMessage) => { }
    ).catch(err => { showToast("無法開啟相機", true); stopScanner(); });
  }

  function stopScanner() {
    if(html5QrcodeScanner) {
      html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }).catch(e => console.log(e));
    }
    document.getElementById('qr-scanner-modal').classList.add('hidden');
  }

      document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN || '';
      document.getElementById('set-tg-chat').value = s.TG_CHAT_ID || '';
      document.getElementById('set-line-link').value = s.LINE_LINK || '';
    } catch(e) {}
  }

  async function fetchTgChatId() {
    const token = document.getElementById('set-tg-token').value;
    if(!token) return showToast("請先輸入 Token", true);
    document.getElementById('set-tg-chat').value = "獲取中...";
    try {
      const id = await fetchAPI('getTgChatId', { token: token });
      document.getElementById('set-tg-chat').value = id;
      showToast("✅ 自動獲取成功");
    } catch(e) { 
      document.getElementById('set-tg-chat').value = "";
      showToast("獲取失敗，請在 TG 傳送任意訊息後重試", true); 
    }
  }

  async function saveAdminSettings() {
    const payload = {
      TG_BOT_TOKEN: document.getElementById('set-tg-token').value,
      TG_CHAT_ID: document.getElementById('set-tg-chat').value,
      LINE_LINK: document.getElementById('set-line-link').value
    };
    try {
      showToast("儲存中...", false);
      await fetchAPI('saveSettings', payload);
      showToast("✅ 系統參數已儲存");
    } catch(e) { showToast("儲存失敗", true); }
  }

</script>
</body>
</html>
