<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>報名大師</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0053db",
            "primary-container": "#2563eb",
            "on-primary": "#ffffff",
            "surface-container-low": "#f4f5f9",
            "surface-variant": "#e1e2ed",
            "outline": "#8f92a1",
            "on-surface": "#191b23",
            "on-surface-variant": "#434655",
            "error": "#ba1a1a"
          },
          fontFamily: {
            "headline": ["Manrope", "Noto Sans TC", "sans-serif"],
            "body": ["Inter", "Noto Sans TC", "sans-serif"],
          },
          boxShadow: {
            'app-card': '0 8px 30px rgba(0, 0, 0, 0.04), 0 4px 10px rgba(0, 0, 0, 0.02)',
            'app-nav': '0 -10px 30px rgba(0, 0, 0, 0.05)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    body { background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .btn-disabled { pointer-events: none; opacity: 0.5; filter: grayscale(100%); }
    
    /* 導覽列風格 */
    .nav-btn { @apply flex flex-col items-center gap-1 p-2 transition-all w-full text-outline; }
    .nav-active { @apply text-primary font-bold; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    
    /* 專業 APP 表單元素 */
    .input-label { @apply block text-[13px] font-bold text-on-surface-variant mb-2 ml-2; }
    input, select, textarea { @apply bg-white border border-slate-200/80 rounded-2xl px-5 py-4 outline-none transition-all w-full font-medium appearance-none shadow-sm; }
    input:focus, select:focus, textarea:focus { @apply ring-2 ring-primary/20 border-primary bg-white shadow-md; }
    
    .badge { @apply text-[11px] px-3 py-1.5 rounded-lg font-bold uppercase tracking-wider; }
    button:active { transform: scale(0.97); }
    
    .loading-gif { width: 100px; height: auto; }
    .refresh-spin { animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="font-body text-on-surface min-h-screen flex flex-col items-center">

<div id="app-container" class="w-full max-w-md bg-slate-50 h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <!-- 頂部導覽 (iOS 風格毛玻璃) -->
  <nav class="fixed top-0 w-full max-w-md z-50 bg-white/85 backdrop-blur-xl border-b border-slate-100 px-5 py-4 flex justify-between items-center left-1/2 -translate-x-1/2">
    <div class="text-xl font-black text-primary flex items-center gap-2 font-headline tracking-tight">
      <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">calendar_check</span>
      報名大師
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full">
        <img id="user-avatar" src="" class="w-6 h-6 rounded-full object-cover">
        <span id="user-name-display" class="text-xs font-bold text-slate-700"></span>
      </div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden text-[11px] font-bold bg-primary text-white px-3 py-1.5 rounded-full shadow-sm active:scale-95 transition-all">切換</button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 px-4 space-y-6">
    <!-- View: Loading -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="bg-white p-6 rounded-[2rem] shadow-app-card flex flex-col items-center">
        <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXpzNDRvN3BpNjZhZmZ1djh6ZDV4N2ZucjQ5MHJidjhoOGNrZWp6byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/uOlsQMZSTU6Ff55OnQ/giphy.gif" alt="Loading" class="loading-gif mb-2">
        <p id="loading-text" class="text-primary font-bold tracking-widest animate-pulse text-sm">資料載入中</p>
      </div>
    </div>

    <!-- View: User Register (優化版：獨立列) -->
    <div id="view-user-register" class="hidden animate-in fade-in zoom-in-95 duration-500 pt-6">
      <div class="text-center mb-8 space-y-2">
        <h1 class="text-3xl font-extrabold font-headline text-slate-800 tracking-tight">建立會員檔案</h1>
        <p class="text-slate-500 text-sm font-medium">只需填寫一次，以後一鍵即可報名</p>
      </div>
      <div class="bg-white rounded-[2rem] shadow-app-card p-7 space-y-5">
        <div>
          <label class="input-label">真實姓名</label>
          <div class="relative">
            <input id="reg-name" placeholder="請輸入完整姓名" type="text"/>
            <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">badge</span>
          </div>
        </div>
        
        <!-- 性別獨立一列 -->
        <div>
          <label class="input-label">性別</label>
          <div class="relative">
            <select id="reg-gender">
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
            <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40 pointer-events-none">expand_more</span>
          </div>
        </div>
        
        <!-- 手機獨立一列 -->
        <div>
          <label class="input-label">手機號碼</label>
          <div class="relative">
            <input id="reg-phone" placeholder="09XX-XXX-XXX" type="tel"/>
            <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">smartphone</span>
          </div>
        </div>

        <div>
          <label class="input-label">所屬業種</label>
          <div class="relative">
            <input id="reg-industry" placeholder="例如：科技資訊、餐飲服務" type="text"/>
            <span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">work</span>
          </div>
        </div>
        
        <div>
          <label class="input-label">引薦人 UID (選填)</label>
          <div class="relative">
            <input id="reg-referrer" placeholder="推薦您來的朋友 UID" type="text"/>

          </div>
        </div>
        
        <div class="pt-4">
          <button onclick="submitUserRegistration()" class="w-full py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center justify-center gap-2">

        </div>
      </div>
    </div>

    <!-- View: User Activities -->
    <div id="view-user-activities" class="hidden space-y-6 animate-in fade-in duration-500 pt-4">
      <div class="flex justify-between items-center px-2">
        <div>
          <h2 class="text-3xl font-extrabold font-headline text-slate-800">探索活動</h2>
          <p class="text-slate-500 text-sm font-medium mt-1">為您精選的最新場次</p>
        </div>
        <button onclick="reloadActivities()" id="btn-refresh-activities" class="w-12 h-12 rounded-full bg-white shadow-sm border border-slate-200 flex items-center justify-center text-primary active:scale-90 transition-all">
          <span class="material-symbols-outlined text-xl">refresh</span>
        </button>
      </div>
      <div id="user-activities-container" class="space-y-7"></div>
    </div>

    <!-- View: User History -->
    <div id="view-user-history" class="hidden space-y-4 animate-in fade-in pt-4">
      <h2 class="text-3xl font-extrabold font-headline px-2 mb-4 text-slate-800">報名紀錄</h2>
      <div id="user-history-container" class="space-y-4"></div>
    </div>

    <!-- View: User Profile Edit -->
    <div id="view-user-profile" class="hidden animate-in fade-in pt-4">
      <h2 class="text-3xl font-extrabold font-headline px-2 mb-4 text-slate-800">帳號設定</h2>
      <div class="bg-white rounded-[2rem] shadow-app-card p-7 space-y-5">
        <div><label class="input-label">姓名</label><input type="text" id="edit-name"></div>
        <div><label class="input-label">性別</label><div class="relative"><select id="edit-gender"><option value="男">男</option><option value="女">女</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40 pointer-events-none">expand_more</span></div></div>
        <div><label class="input-label">電話</label><input type="tel" id="edit-phone"></div>
        <div><label class="input-label">業種</label><input type="text" id="edit-industry"></div>
        <div class="pt-4">
          <button onclick="submitProfileUpdate()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">儲存變更</button>
        </div>
      </div>
    </div>

    <!-- View: Admin Activities -->
    <div id="view-admin-activities" class="hidden space-y-5 animate-in fade-in pt-4">
      <h2 class="text-3xl font-extrabold font-headline px-2 mb-4 text-slate-800">管理與核銷</h2>
      <div id="admin-activity-list-container" class="space-y-6"></div>
    </div>

    <!-- View: Admin Settings -->
    <div id="view-admin-settings" class="hidden animate-in fade-in pt-4">
      <h2 class="text-3xl font-extrabold font-headline px-2 mb-4 text-slate-800">系統參數</h2>
      <div class="bg-white rounded-[2rem] shadow-app-card p-7 space-y-6">
        <div>
          <label class="input-label">Telegram Bot Token</label>
          <div class="flex gap-2">
            <input type="text" id="set-tg-token" class="flex-1 font-bold text-slate-600">
            <button onclick="autoFetchTgChatId()" id="btn-fetch-tg" class="bg-primary text-white px-5 rounded-2xl font-bold shadow-md whitespace-nowrap active:scale-95 transition-all">轉換</button>
          </div>
        </div>
        <div><label class="input-label">Telegram Chat ID</label><input type="text" id="set-tg-chat" class="font-bold text-slate-600 bg-slate-50" readonly placeholder="由系統轉換"></div>
        <div><label class="input-label">官方 LINE 加入連結</label><input type="text" id="set-line-link" class="text-slate-600"></div>
        <div class="pt-4">
          <button onclick="submitSettings()" id="btn-submit-settings" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">儲存設定</button>
        </div>
      </div>
    </div>

    <!-- View: Admin Create -->
    <div id="view-admin-create" class="hidden space-y-6 animate-in fade-in pt-4">
      <h2 class="text-3xl font-extrabold font-headline px-2 text-slate-800">建立活動</h2>
      <div class="flex bg-slate-200/60 p-1.5 rounded-[1.25rem] shadow-inner mx-1">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-xl text-sm font-bold bg-white text-primary shadow-sm transition-all">⚡ 快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-xl text-sm font-bold text-slate-500 transition-all">🌟 完整發佈</button>
      </div>
      
      <!-- 快速模式 -->
      <div id="form-quick" class="bg-white rounded-[2rem] shadow-app-card p-7 space-y-5">
        <div><label class="input-label">活動標題</label><input type="text" id="quick-name" placeholder="輸入活動名稱"></div>
        <div><label class="input-label">活動性質</label><div class="relative"><select id="quick-type"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40 pointer-events-none">expand_more</span></div></div>
        <div><label class="input-label">預設身分</label><div class="relative"><select id="quick-identity"><option>來賓</option><option>會員</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40 pointer-events-none">expand_more</span></div></div>
        <div><label class="input-label">名單內容</label><textarea id="quick-names" class="h-48 resize-none leading-relaxed" placeholder="王小明&#10;李大華&#10;(一行一個姓名)"></textarea></div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="w-full py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all mt-2">建立資料</button>
      </div>
      
      <!-- 完整模式 -->
      <div id="form-detailed" class="hidden bg-white rounded-[2rem] shadow-app-card p-7 space-y-5">
         <div><label class="input-label">正式標題</label><input type="text" id="detail-name" placeholder="吸睛的活動標題"></div>
         <div><label class="input-label">活動性質</label><div class="relative"><select id="detail-type"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40 pointer-events-none">expand_more</span></div></div>
         
         <div>
           <label class="input-label">收費方式</label>
           <div class="flex gap-6 items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
             <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput()" class="w-5 h-5 text-primary focus:ring-primary"><span class="font-bold text-slate-700">免費</span></label>
             <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput()" class="w-5 h-5 text-primary focus:ring-primary"><span class="font-bold text-slate-700">收費</span></label>
           </div>
         </div>
         <input type="number" id="detail-price" class="hidden" placeholder="輸入金額 (NT$)">
         
         <div class="pt-2">
           <label class="input-label">開始時間</label>
           <input type="datetime-local" id="detail-start" class="text-sm font-bold text-slate-600">
         </div>
         <div>
           <label class="input-label">結束時間</label>
           <input type="datetime-local" id="detail-end" class="text-sm font-bold text-slate-600">
         </div>
         
         <div><label class="input-label">說明文案</label><textarea id="detail-desc" class="h-32 resize-none" placeholder="活動特色、注意事項等..."></textarea></div>
         
         <div onclick="document.getElementById('file-input-create').click()" class="w-full h-48 border-2 border-dashed border-slate-300 rounded-[2rem] flex flex-col items-center justify-center bg-slate-50 cursor-pointer overflow-hidden transition-all hover:bg-slate-100 relative group">
           <div id="preview-placeholder-create" class="text-center text-slate-400 flex flex-col items-center group-hover:scale-105 transition-transform">
             <span class="material-symbols-outlined text-4xl mb-2">add_photo_alternate</span>
             <p class="text-[13px] font-bold uppercase tracking-widest text-slate-500">上傳滿版宣傳圖</p>
           </div>
           <img id="image-preview-create" class="hidden w-full h-full object-cover absolute inset-0">

         <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="w-full py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all mt-4">發布報名頁</button>

    <!-- 後台：簽到管理 -->
    <div id="view-admin-checkin" class="hidden h-full flex flex-col p-0 overflow-y-auto pb-24 space-y-4 pt-2">
       <div id="checkin-list-container" class="space-y-4"></div>
    </div>
  </main>

  <!-- 底部導覽：使用者 -->
  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-200 flex justify-around items-center px-2 py-2 z-50 pb-safe shadow-app-nav left-1/2 -translate-x-1/2">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn nav-active"><span class="material-symbols-outlined text-[28px]">explore</span><span class="text-[10px] font-bold mt-1">探索活動</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><span class="material-symbols-outlined text-[28px]">receipt_long</span><span class="text-[10px] font-bold mt-1">報名紀錄</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><span class="material-symbols-outlined text-[28px]">person</span><span class="text-[10px] font-bold mt-1">帳號設定</span></button>
  </nav>

  <!-- 底部導覽：管理員 -->
  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-200 flex justify-around items-center px-1 py-2 z-50 pb-safe shadow-app-nav left-1/2 -translate-x-1/2">
    <button onclick="switchView('admin-activities')" id="nav-admin-activities" class="nav-btn nav-active"><span class="material-symbols-outlined text-[28px]">fact_check</span><span class="text-[10px] font-bold mt-1">管理核銷</span></button>
    <button onclick="switchView('admin-create')" id="nav-admin-create" class="nav-btn"><span class="material-symbols-outlined text-[28px]">add_box</span><span class="text-[10px] font-bold mt-1">建立活動</span></button>
    <button onclick="switchView('admin-settings')" id="nav-admin-settings" class="nav-btn"><span class="material-symbols-outlined text-[28px]">settings</span><span class="text-[10px] font-bold mt-1">系統參數</span></button>
  </nav>
</div>

<!-- Toast 通知容器 -->
<div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm shadow-[0_10px_30px_rgba(0,0,0,0.15)] transition-all z-[10000] font-bold transform translate-y-0 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]"></div>

<!-- Modal 彈窗 -->
<div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-md p-6">
  <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center scale-95 transition-all duration-200">
    <div class="w-16 h-16 bg-blue-50 text-primary rounded-full flex items-center justify-center mx-auto mb-6"><span class="material-symbols-outlined text-3xl">notifications_active</span></div>
    <h3 id="modal-title" class="text-2xl font-black mb-3 text-slate-800 tracking-tight text-center font-headline">系統通知</h3>
    <p id="modal-desc" class="text-slate-500 font-medium mb-8 leading-relaxed"></p>
    <button onclick="closeModalAndGo()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">我知道了</button>
  </div>
</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let currentActivities = [], currentCheckinData = [], activeActivityName = '', modalTargetView = '';
  let isProcessing = false;

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { 
        result = JSON.parse(resText); 
      } catch(e) { 
        throw new Error(`系統連線錯誤，請確認 GAS 已發佈為「所有人」。`); 
      }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true); throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);

      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      
      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) switchView('user-activities');
        else { 
          document.getElementById('reg-name').value = userProfile.displayName; 
          switchView('user-register'); 
        }
      }
    } catch (err) { 
      document.getElementById('loading-text').innerHTML = `<span class="text-error font-bold">載入中斷</span><br><p class="text-xs text-slate-400 mt-2">${err.toString()}</p>`;
    }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('role-switch-btn').innerHTML = isViewModeAdmin ? '前台' : '後台';
    if (isViewModeAdmin) switchView('admin-activities');
    else { if (isRegistered) switchView('user-activities'); else switchView('user-register'); }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-settings'].forEach(v => {
      const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden'); navUser.classList.add('hidden');
    
    if (isAdmin && isViewModeAdmin && (view.startsWith('admin') || view === 'admin-activities')) {
      navAdmin.classList.remove('hidden');
      ['activities', 'create', 'settings'].forEach(k => {
        const btn = document.getElementById('nav-admin-'+k);
        if(btn) btn.className = `nav-btn ${view==='admin-'+k ? 'nav-active' : ''}`;
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin) && view.startsWith('user')) {
      navUser.classList.remove('hidden');
      ['activities', 'history', 'profile'].forEach(k => {
        const btn = document.getElementById('nav-user-'+k);
        if(btn) btn.className = `nav-btn ${view==='user-'+k ? 'nav-active' : ''}`;
      });
    }

    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  async function reloadActivities() {
    const btn = document.getElementById('btn-refresh-activities');
    btn.classList.add('btn-disabled');
    btn.querySelector('span').classList.add('refresh-spin');
    try {
      await loadUserActivities();
      showToast("最新活動已同步");
    } finally {
      setTimeout(() => {
        btn.classList.remove('btn-disabled');
        btn.querySelector('span').classList.remove('refresh-spin');
      }, 500);
    }
  }

  // ⭐ 升級版活動卡片 (Premium Card)
  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>';
    const data = await fetchAPI('getPublicActivities');
    if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-16 bg-white rounded-[2rem] shadow-app-card text-slate-400 font-bold">目前暫無公開活動</div>'; return; }
    
    container.innerHTML = data.map(act => `
      <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-[0_12px_30px_rgba(0,0,0,0.06)] animate-in fade-in slide-in-from-bottom-4 duration-500">
        ${act.imageUrl ? `<div class="relative h-48 w-full"><img src="${act.imageUrl}" class="w-full h-full object-cover"></div>` : `<div class="h-32 bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center"><span class="material-symbols-outlined text-5xl text-blue-200">local_activity</span></div>`}
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <span class="badge bg-primary/10 text-primary">${act.type}</span>
            <span class="text-lg font-black tracking-tight ${act.feeType==='收費'?'text-orange-500':'text-green-500'}">${act.feeType==='收費'?'NT$'+act.price:'免費'}</span>
          </div>
          <h3 class="text-2xl font-extrabold text-slate-800 leading-snug font-headline mb-3">${act.name}</h3>
          <p class="text-sm text-slate-500 font-bold flex items-center gap-1.5"><span class="material-symbols-outlined text-lg">schedule</span> ${act.startTime ? formatTime(act.startTime) : '尚未指定時間'}</p>
          <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-6 py-4 bg-slate-800 text-white rounded-2xl font-bold text-[17px] shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">我要報名 <span class="material-symbols-outlined text-[20px]">arrow_forward</span></button>
        </div>
      </div>`).join('');
  }

  async function userJoinActivity(btn, name, feeType, price) {
    if (isProcessing) return;
    if (!confirm(`確定報名「${name}」？`)) return;
    isProcessing = true; btn.classList.add('btn-disabled');
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName: name });
      if (feeType === '收費') showModal("報名成功", `此為收費活動，請完成匯款 <b>NT$ ${price}</b> 後，至「報名查詢」填寫帳號後五碼。`, "history");
      else showModal("報名成功", `您已成功報名！期待現場見到您。`, "activities");
    } finally { isProcessing = false; btn.classList.remove('btn-disabled'); }
  }

  async function loadUserHistory() {
    const container = document.getElementById('user-history-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>';
    const history = await fetchAPI('getUserHistory', { userId: userProfile.userId });
    if (!history || history.length === 0) { container.innerHTML = '<div class="text-center py-16 bg-white shadow-app-card rounded-[2rem] text-slate-400 font-bold">尚無報名紀錄</div>'; return; }
    container.innerHTML = history.map(item => {
      let payStatusBadge = `<span class="badge ${item.payStatus==='已完款'?'bg-blue-100 text-blue-600':(item.payStatus==='匯款審核中'?'bg-slate-800 text-white':'bg-orange-100 text-orange-600')}">${item.payStatus}</span>`;
      const isPendingAudit = item.payStatus === '匯款審核中';
      return `
      <div class="bg-white rounded-[2rem] shadow-app-card p-6 animate-in fade-in">
        <div class="flex justify-between items-start">
          <div class="flex-1 pr-3">
            <h4 class="text-[17px] font-extrabold text-slate-800 leading-snug">${item.name}</h4>
            <div class="flex items-center gap-2 mt-3">${payStatusBadge} <span class="badge ${item.regStatus==='正常'?'bg-green-100 text-green-600':'bg-slate-100 text-slate-400'}">${item.regStatus}</span></div>
          </div>
          <div class="shrink-0 pt-1">${item.checkedIn ? '<span class="material-symbols-outlined text-green-500 text-[32px]">check_circle</span>' : '<span class="material-symbols-outlined text-slate-200 text-[32px]">schedule</span>'}</div>
        </div>
        ${item.regStatus === '正常' && !isPendingAudit && item.payStatus !== '已完款' ? `
          <div id="remit-area-${item.name.replace(/\s+/g, '')}" class="mt-5 pt-5 border-t border-slate-100">
            ${item.isPaidAct ? `<div class="flex items-center gap-2 bg-slate-50 border border-slate-100 p-2 rounded-2xl mb-4"><span class="material-symbols-outlined text-slate-400 ml-3">payments</span><input type="text" id="last5-${item.name}" value="${item.last5}" placeholder="補填匯款後五碼" maxlength="5" class="bg-transparent border-none shadow-none font-bold outline-none flex-1 text-slate-800 py-2"></div>` : ''}
            <div class="flex gap-3">
              <button onclick="userCancelRegistration('${item.name}')" class="flex-1 py-3.5 bg-white text-error border border-error/20 rounded-2xl font-bold text-sm">取消報名</button>
              ${item.isPaidAct ? `<button onclick="updateUserLast5('${item.name}')" class="flex-1 py-3.5 bg-primary text-white rounded-2xl font-bold text-sm shadow-md active:scale-95 transition-all">送出審核</button>` : ''}
            </div>
          </div>` : (item.regStatus === '正常' ? `<div class="text-xs text-slate-500 font-bold border-t border-slate-100 pt-4 mt-4">目前狀態：${item.payStatus}</div>` : '')}
      </div>`;
    }).join('');
  }

  async function updateUserLast5(name) {
    if (isProcessing) return;
    const val = document.getElementById(`last5-${name}`).value.trim();
    if (!val || val.length < 4) return showToast("⚠️ 請輸入正確的後五碼", true);
    isProcessing = true;
    try {
      await fetchAPI('updateLast5Digits', { userId: userProfile.userId, activityName: name, last5Digits: val });
      showToast("✅ 已送出審核");
      setTimeout(() => { loadUserHistory(); }, 500);
    } finally { isProcessing = false; }
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined">${e?'error':'check_circle'}</span>` + m; 
    t.className = `fixed top-12 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-sm shadow-app-card transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-error text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }
  function showModal(title, desc, target) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerHTML = desc; modalTargetView = target; document.getElementById('custom-modal').classList.remove('hidden'); }
  function closeModalAndGo() { document.getElementById('custom-modal').classList.add('hidden'); if (modalTargetView === 'history') switchView('user-history'); else if (modalTargetView === 'activities') switchView('user-activities'); }
  function formatTime(t) { return t ? new Date(t).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) : ''; }
  function toggleFeeInput() { document.getElementById('detail-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); }
  function toggleCreateMode(m) { document.getElementById('tab-quick').className = `flex-1 py-3.5 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-1 ${m==='quick'?'bg-white text-primary shadow-sm':'text-slate-500'}`; document.getElementById('tab-detailed').className = `flex-1 py-3.5 rounded-xl text-sm font-bold transition-all flex justify-center items-center gap-1 ${m==='detailed'?'bg-white text-primary shadow-sm':'text-slate-500'}`; document.getElementById('form-quick').classList.toggle('hidden', m!=='quick'); document.getElementById('form-detailed').classList.toggle('hidden', m!=='detailed'); }
  function previewFile(mode) { const f = document.getElementById('file-input-create').files[0]; if(!f) return; const r = new FileReader(); r.onloadend = () => { const img = new Image(); img.onload = () => { let w = img.width; if (w > 650) { h = Math.round(img.height * (650/w)); w = 650; } else h = img.height; const cvs = document.createElement('canvas'); cvs.width = w; cvs.height = h; const ctx = cvs.getContext('2d'); ctx.drawImage(img, 0, 0, w, h); const b64 = cvs.toDataURL('image/jpeg', 0.8); document.getElementById('image-preview-create').src = b64; document.getElementById('image-preview-create').classList.remove('hidden'); document.getElementById('preview-placeholder-create').classList.add('hidden'); document.getElementById('in-image-url-create').value = b64; }; img.src = r.result; }; r.readAsDataURL(f); }

  async function submitUserRegistration() { const p = { userId: userProfile.userId, name: document.getElementById('reg-name').value.trim(), gender: document.getElementById('reg-gender').value, phone: document.getElementById('reg-phone').value.trim(), industry: document.getElementById('reg-industry').value.trim(), referrerId: document.getElementById('reg-referrer') ? document.getElementById('reg-referrer').value.trim() : '' }; if (!p.name || !p.phone) return showToast("⚠️ 請完整填寫資料", true); await fetchAPI('registerUser', p); isRegistered = true; registeredInfo = p; switchView('user-activities'); }
  function populateUserProfile() { if(registeredInfo) { document.getElementById('edit-name').value=registeredInfo.name; document.getElementById('edit-gender').value=registeredInfo.gender; document.getElementById('edit-phone').value=registeredInfo.phone; document.getElementById('edit-industry').value=registeredInfo.industry; } }
  async function submitProfileUpdate() { const p = { userId: userProfile.userId, name: document.getElementById('edit-name').value.trim(), gender: document.getElementById('edit-gender').value, phone: document.getElementById('edit-phone').value.trim(), industry: document.getElementById('edit-industry').value.trim() }; await fetchAPI('updateUser', p); registeredInfo = p; showToast("✅ 資料儲存成功"); }
  async function userCancelRegistration(name) { if (confirm("確定取消報名？")) { await fetchAPI('cancelRegistration', { userId: userProfile.userId, activityName: name }); loadUserHistory(); } }
  
  async function handleCreateActivity(mode) { 
    if(isProcessing) return; 
    const btn = document.getElementById(mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create'); 
    isProcessing=true; btn.classList.add('btn-disabled'); 
    let payload = { 
      activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(), 
      activityType: document.getElementById(mode === 'quick' ? 'quick-type' : 'detail-type').value, 
      feeType: '免費', price: '', startTime: '', endTime: '', description: '', imageUrl: '', names: [], 
      defaultIdentity: mode === 'quick' ? document.getElementById('quick-identity').value : '來賓' 
    }; 
    if (!payload.activityName) { isProcessing=false; btn.classList.remove('btn-disabled'); return showToast("⚠️ 活動標題必填", true); } 
    if (mode === 'quick') { 
      const raw = document.getElementById('quick-names').value.trim(); payload.names = raw.split('\n').filter(n => n.trim()); 
    } else { 
      payload.feeType = document.querySelector('input[name="fee-type"]:checked').value; 
      payload.price = document.getElementById('detail-price').value; 
      payload.startTime = document.getElementById('detail-start').value; 
      payload.endTime = document.getElementById('detail-end').value;
      payload.description = document.getElementById('detail-desc').value; 
      payload.imageUrl = document.getElementById('in-image-url-create').value; 
    } 
    try { 
      await fetchAPI('bulkAddRegistrants', payload); 
      showToast("✅ 活動建立成功"); switchView('admin-activities'); 
    } finally { isProcessing=false; btn.classList.remove('btn-disabled'); } 
  }
  
  async function loadAdminActivities() { const container = document.getElementById('admin-activity-list-container'); container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>'; currentActivities = await fetchAPI('getActivityDashboard'); container.innerHTML = currentActivities.map(act => `<div class="bg-white rounded-[2rem] shadow-app-card p-7 space-y-5"><div class="flex justify-between items-start"><div><span class="badge bg-primary/10 text-primary mb-2 block w-fit">${act.type}</span><h3 class="text-xl font-extrabold text-slate-800 leading-tight font-headline">${act.name}</h3></div></div><div class="grid grid-cols-3 gap-3 bg-slate-50 border border-slate-100 rounded-[1.5rem] p-4 text-center"><div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">報名</p><p class="font-black text-xl text-slate-700">${act.total}</p></div><div><p class="text-[10px] text-green-500 font-bold uppercase tracking-widest mb-1">實到</p><p class="font-black text-xl text-green-600">${act.attended}</p></div><div><p class="text-[10px] text-error/70 font-bold uppercase tracking-widest mb-1">取消</p><p class="font-black text-xl text-error">${act.cancelled}</p></div></div><button onclick="openAdminCheckin('${act.name}')" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold text-[15px] shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">進入核銷簽到 <span class="material-symbols-outlined text-lg">fact_check</span></button><div class="flex justify-between px-2 text-[11px] font-bold tracking-widest uppercase mt-2"><button onclick="toggleActStatus('${act.name}')" class="text-slate-400 hover:text-slate-600 transition-colors">${act.status==='下架'?'設為上架':'設為下架'}</button><button onclick="deleteAct('${act.name}')" class="text-error/70 hover:text-error transition-colors">刪除活動</button></div></div>`).join(''); }
  async function openAdminCheckin(name) { activeActivityName = name; switchView('admin-checkin'); currentCheckinData = await fetchAPI('getRegistrants', { activityName: name }); document.getElementById('checkin-list-container').innerHTML = `<div class="bg-white/90 backdrop-blur-xl p-5 sticky top-0 border-b border-slate-100 mb-4 flex items-center gap-4 z-30 shadow-sm"><button onclick="switchView('admin-activities')" class="p-2.5 bg-slate-50 rounded-full text-slate-600 active:scale-90 transition-all"><span class="material-symbols-outlined">arrow_back</span></button><h2 class="font-extrabold truncate text-xl text-slate-800 font-headline">${name}</h2></div>` + currentCheckinData.map(p => `<div class="bg-white rounded-[2rem] shadow-app-card p-6 mb-4 mx-4"><div class="flex justify-between items-center mb-5"><div class="flex-1"><h4 class="text-[17px] font-extrabold text-slate-800">${p.姓名}</h4><p class="text-[13px] text-primary font-bold mt-1.5 flex items-center gap-1"><span class="material-symbols-outlined text-sm">payments</span> ${p.last5?p.last5 : '尚未填寫'}</p></div><button onclick="toggleCheckin('${p.rowId}', ${p.checkedIn})" class="px-6 py-3.5 rounded-full font-bold text-sm transition-all flex items-center gap-1.5 active:scale-95 shadow-sm ${p.checkedIn?'bg-green-500 text-white':'bg-slate-50 text-slate-500 border border-slate-200'}"><span class="material-symbols-outlined text-[18px]">${p.checkedIn?'check_circle':'radio_button_unchecked'}</span> ${p.checkedIn?'已簽到':'未簽到'}</button></div><div class="grid grid-cols-2 gap-3 pt-5 border-t border-slate-100"><select onchange="updateRow('${p.rowId}', '繳費狀態', this.value)" class="py-3 text-[13px] px-4 bg-slate-50 border-none shadow-none"><option value="未繳費" ${p.payStatus==='未繳費'?'selected':''}>未繳費</option><option value="匯款審核中" ${p.payStatus==='匯款審核中'?'selected':''}>匯款審核</option><option value="已完款" ${p.payStatus==='已完款'?'selected':''}>已完款</option></select><select onchange="updateRow('${p.rowId}', '報名狀態', this.value)" class="py-3 text-[13px] px-4 bg-slate-50 border-none shadow-none"><option value="正常" ${p.regStatus==='正常'?'selected':''}>正常</option><option value="已取消" ${p.regStatus==='已取消'?'selected':''}>已取消</option></select></div></div>`).join(''); }
  async function autoFetchTgChatId() { const token = document.getElementById('set-tg-token').value.trim(); if (!token) return showToast("⚠️ 請先輸入 Token", true); const btn = document.getElementById('btn-fetch-tg'); btn.disabled = true; try { const chatId = await fetchAPI('getTgChatId', { token }); document.getElementById('set-tg-chat').value = chatId; showToast("✅ 獲取成功！記得儲存"); } catch(err) { showToast(err.message, true); } btn.disabled = false; }
  async function loadAdminSettings() { const s = await fetchAPI('getSettings'); document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN; document.getElementById('set-tg-chat').value = s.TG_CHAT_ID; document.getElementById('set-line-link').value = s.LINE_LINK; }
  async function submitSettings() { if (isProcessing) return; isProcessing = true; try { await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value.trim(), TG_CHAT_ID: document.getElementById('set-tg-chat').value.trim(), LINE_LINK: document.getElementById('set-line-link').value.trim() }); showToast("✅ 設定已儲存"); } finally { isProcessing = false; } }
  async function toggleActStatus(n) { await fetchAPI('toggleActivityStatus', { activityName: n }); loadAdminActivities(); }
  async function deleteAct(n) { if (confirm("確定永久刪除此活動及所有名單？")) { await fetchAPI('deleteActivity', { activityName: n }); loadAdminActivities(); } }
  async function toggleCheckin(id, status) { await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: id, currentStatus: status }); openAdminCheckin(activeActivityName); }
  async function updateRow(id, col, val) { await fetchAPI('updateCellStatus', { activityName: activeActivityName, rowId: id, colName: col, val: val }); showToast("✅ 同步成功"); }
</script>
</body>
</html>
