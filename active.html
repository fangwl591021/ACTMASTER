<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>建立新活動 - 報名大師</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#2563eb", 
            background: "#ffffff", 
            "text-main": "#333333", 
            "text-muted": "#64748b" 
          },
          fontFamily: { 
            sans: ["Noto Sans TC", "sans-serif"] 
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; font-weight: 400; color: #333333; }
    
    /* LINE 原生風格：不加粗、15px、簡潔邊框 */
    .input-label { @apply block text-[15px] text-[#333333] mb-2 font-normal; }
    .custom-input { @apply w-full h-[46px] px-3 bg-white border border-[#cbd5e1] rounded-lg outline-none focus:border-primary transition-colors text-[15px] shadow-none; }
    .textarea-block { @apply w-full p-3 bg-white border border-[#cbd5e1] rounded-lg outline-none focus:border-primary transition-colors text-[15px] resize-none leading-relaxed; }

    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-bold text-[16px] active:opacity-80 transition-opacity flex items-center justify-center gap-2; }
    .btn-add-row { @apply w-full py-3 border border-dashed border-[#06C755] text-[#06C755] bg-[#06C755]/5 rounded-xl text-[14px] font-bold flex items-center justify-center gap-1; }
    
    .tab-btn { @apply flex-1 py-3 text-[14px] font-medium transition-all text-slate-500 border-b-2 border-transparent; }
    .tab-active { @apply text-primary border-primary font-bold; }

    .batch-card { @apply bg-white border border-slate-200 rounded-xl p-4 relative mb-4; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

<div id="app-container" class="w-full max-w-md min-h-screen relative flex flex-col bg-white">
  
  <header class="sticky top-0 w-full z-40 bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center">
    <div class="text-[18px] font-medium text-slate-800 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary">add_circle</span>
      建立新活動
      <span class="bg-slate-800 text-white text-[9px] px-2 py-0.5 rounded uppercase font-bold">Admin</span>
    </div>
    <div id="user-profile-badge" class="hidden">
      <img id="user-avatar" src="" class="w-8 h-8 rounded-full border border-slate-100">
    </div>
  </header>

  <main id="main-content" class="flex-1 pb-32 px-5 pt-2">
    <div id="view-loading" class="h-[60vh] flex flex-col items-center justify-center space-y-4">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-400 text-[13px]">權限驗證中</p>
    </div>

    <div id="view-admin-create" class="hidden space-y-6">
      <!-- 模式切換頁籤 -->
      <div class="flex border-b border-slate-100 mb-2">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="tab-btn tab-active">快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="tab-btn">單場發佈</button>
        <button onclick="toggleCreateMode('batch')" id="tab-batch" class="tab-btn">梯次建立</button>
      </div>
      
      <!-- 快速模式 -->
      <div id="form-quick" class="space-y-5 animate-in fade-in">
        <div class="flex flex-col"><label class="input-label">活動名稱</label><input type="text" id="quick-name" class="custom-input" placeholder="例如：2026 商務交流會"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label">活動類型</label><select id="quick-type" class="custom-input"><option>例會</option><option>課程</option><option>講座</option></select></div>
          <div><label class="input-label">預設身份</label><select id="quick-identity" class="custom-input"><option>會員</option><option>來賓</option></select></div>
        </div>
        <div class="flex flex-col">
          <label class="input-label">匯入名單</label>
          <textarea id="quick-names" class="textarea-block h-40" placeholder="王小明&#10;李小華&#10;張大山"></textarea>
        </div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="btn-primary mt-4">確認並發布</button>
      </div>
      
      <!-- 完整模式 -->
      <div id="form-detailed" class="hidden space-y-5 animate-in fade-in">
         <div class="flex flex-col"><label class="input-label">正式活動標題</label><input type="text" id="detail-name" class="custom-input" placeholder="輸入活動完整名稱"></div>
         <div class="grid grid-cols-2 gap-4">
            <div><label class="input-label">開始時間</label><input type="datetime-local" id="detail-start" class="custom-input !px-1.5"></div>
            <div><label class="input-label">結束時間</label><input type="datetime-local" id="detail-end" class="custom-input !px-1.5"></div>
         </div>
         <div class="flex flex-col"><label class="input-label">活動說明</label><textarea id="detail-desc" class="textarea-block h-32" placeholder="詳細內容..."></textarea></div>
         <button onclick="handleCreateActivity('detailed')" id="btn-detailed-create" class="btn-primary mt-4">發布單場活動</button>
      </div>

      <!-- 梯次建立模式 -->
      <div id="form-batch" class="hidden space-y-5 animate-in fade-in">
        <div class="flex flex-col"><label class="input-label">系列活動標題</label><input type="text" id="batch-name" class="custom-input" placeholder="例如：2026 AI 實戰班"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label">類型</label><select id="batch-type" class="custom-input"><option>課程</option><option>教學</option><option>講座</option></select></div>
          <div><label class="input-label">身分</label><select id="batch-identity" class="custom-input"><option>會員</option><option>來賓</option></select></div>
        </div>
        <div class="flex flex-col"><label class="input-label">系列共同說明</label><textarea id="batch-desc" class="textarea-block h-24" placeholder="輸入此系列活動的統整說明..."></textarea></div>

        <div class="pt-2">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[15px] font-medium text-slate-800">梯次排程</span>
            <span class="text-[11px] text-slate-400">點擊右下角可複製或刪除</span>
          </div>
          <div id="batch-list-container">
            <!-- 梯次項目由 JS 動態生成 -->
          </div>
          <button onclick="addBatchItem()" class="btn-add-row mt-2">
            <span class="material-symbols-outlined text-[18px]">add</span> 新增活動梯次
          </button>
        </div>

        <button onclick="handleCreateActivity('batch')" id="btn-batch-create" class="btn-primary mt-6">發布系列梯次</button>
      </div>
    </div>
  </main>

  <!-- 底部導覽 -->
  <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-around items-center h-[70px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="location.href='index.html?view=admin-activities'" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">fact_check</span><span class="text-[10px] mt-1">核銷</span></button>
    <button class="flex flex-col items-center text-primary"><span class="material-symbols-outlined !fill-1">add_circle</span><span class="text-[10px] mt-1 font-bold">建立</span></button>
    <button onclick="location.href='index.html?view=admin-crm'" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">groups</span><span class="text-[10px] mt-1">CRM</span></button>
    <button onclick="location.href='card.html'" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">recent_patient</span><span class="text-[10px] mt-1">名片</span></button>
    <button onclick="location.href='index.html?view=admin-settings'" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">settings</span><span class="text-[10px] mt-1">設定</span></button>
  </nav>
</div>

<div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg z-[100] transition-all duration-300"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm";
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];

  let userProfile = null;
  let isProcessing = false;

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      if (ADMIN_IDS.includes(userProfile.userId)) {
        document.getElementById('view-loading').classList.add('hidden');
        document.getElementById('view-admin-create').classList.remove('hidden');
        
        // 初始載入時，若是梯次模式則預設產生一個
        if (document.getElementById('batch-list-container').children.length === 0) {
          addBatchItem();
        }
      } else {
        location.href = 'index.html';
      }
    } catch (err) {
      document.getElementById('view-loading').innerText = "連線失敗，請稍後再試";
    }
  };

  function toggleCreateMode(m) {
    const tabs = ['quick', 'detailed', 'batch'];
    tabs.forEach(t => {
      const btn = document.getElementById('tab-' + t);
      const form = document.getElementById('form-' + t);
      if(btn) btn.className = (m === t) ? 'tab-btn tab-active' : 'tab-btn';
      if(form) form.classList.toggle('hidden', m !== t);
    });

    // 如果切換到梯次模式且目前沒內容，自動新增一個
    if (m === 'batch') {
      const container = document.getElementById('batch-list-container');
      if (container && container.children.length === 0) {
        addBatchItem();
      }
    }
  }

  function addBatchItem(data = null) {
    const container = document.getElementById('batch-list-container');
    if (!container) return;

    const id = Date.now() + Math.floor(Math.random() * 1000);
    const html = `
      <div id="batch-item-${id}" class="batch-card animate-in fade-in slide-in-from-top-2">
        <div class="flex justify-between items-center mb-3">
          <label class="text-[13px] text-slate-500">梯次資訊</label>
          <div class="flex gap-2">
            <button onclick="copyBatchItem('${id}')" class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined text-[18px]">content_copy</span></button>
            <button onclick="removeBatchItem('${id}')" class="text-slate-400 hover:text-red-500"><span class="material-symbols-outlined text-[18px]">delete</span></button>
          </div>
        </div>
        <div class="mb-3">
          <input type="text" class="custom-input batch-name-input !h-[40px]" placeholder="梯次名稱，如：第一梯次" value="${data?.name || ''}">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div><label class="text-[12px] text-slate-500 block mb-1">開始時間</label><input type="datetime-local" class="custom-input batch-start-input !h-[40px] !px-1.5 !text-[13px]" value="${data?.start || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1">結束時間</label><input type="datetime-local" class="custom-input batch-end-input !h-[40px] !px-1.5 !text-[13px]" value="${data?.end || ''}"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-[12px] text-slate-500 block mb-1">費用 (NT$)</label><input type="number" class="custom-input batch-price-input !h-[40px]" placeholder="免費填0" value="${data?.price || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1">名額限制</label><input type="number" class="custom-input batch-limit-input !h-[40px]" placeholder="不限留空" value="${data?.limit || ''}"></div>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
  }

  function removeBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (el) {
      if (document.querySelectorAll('[id^="batch-item-"]').length <= 1) {
        showToast("系列活動至少需要一個梯次", true);
        return;
      }
      el.remove();
    }
  }

  function copyBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (!el) return;
    const data = {
      name: el.querySelector('.batch-name-input').value,
      start: el.querySelector('.batch-start-input').value,
      end: el.querySelector('.batch-end-input').value,
      price: el.querySelector('.batch-price-input').value,
      limit: el.querySelector('.batch-limit-input').value
    };
    addBatchItem(data);
  }

  function showToast(m, isErr = false) {
    const t = document.getElementById('toast');
    t.innerText = m;
    t.className = `fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-[14px] shadow-lg z-[100] transition-all duration-300 ${isErr ? 'bg-red-500 text-white' : 'bg-slate-800 text-white opacity-90'}`;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
  }

  async function handleCreateActivity(mode) {
    if (isProcessing) return;
    const name = document.getElementById(mode + '-name').value.trim();
    if (!name) return showToast("請填寫活動名稱", true);

    isProcessing = true;
    const btn = document.getElementById(`btn-${mode}-create`);
    const oriText = btn.innerText;
    btn.innerText = "處理中...";
    btn.disabled = true;

    let payload = {
      activityName: name,
      activityType: document.getElementById(mode + '-type').value,
      defaultIdentity: document.getElementById(mode + '-identity').value,
      isBatch: (mode === 'batch'),
      p: new URLSearchParams(window.location.search).get('p') || ''
    };

    if (mode === 'quick') {
      payload.names = document.getElementById('quick-names').value.split('\n').filter(n => n.trim());
    } else if (mode === 'batch') {
      payload.description = document.getElementById('batch-desc').value;
      const cards = document.querySelectorAll('[id^="batch-item-"]');
      payload.batches = Array.from(cards).map(card => ({
        name: card.querySelector('.batch-name-input').value.trim(),
        startTime: card.querySelector('.batch-start-input').value,
        endTime: card.querySelector('.batch-end-input').value,
        price: card.querySelector('.batch-price-input').value,
        limit: card.querySelector('.batch-limit-input').value
      }));
      
      if (payload.batches.length > 0) {
        payload.startTime = payload.batches[0].startTime;
        payload.endTime = payload.batches[payload.batches.length-1].endTime;
      }
    } else {
      payload.startTime = document.getElementById('detail-start').value;
      payload.endTime = document.getElementById('detail-end').value;
      payload.description = document.getElementById('detail-desc').value;
    }

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'bulkAddRegistrants', payload })
      });
      const result = await res.json();
      if (result.success) {
        showToast("✅ 活動建立成功");
        setTimeout(() => location.href = 'index.html?view=admin-activities', 1500);
      } else {
        throw new Error(result.error || "系統回應異常");
      }
    } catch (err) {
      showToast("建立失敗：" + err.message, true);
      btn.innerText = oriText;
      btn.disabled = false;
      isProcessing = false;
    }
  }
</script>
</body>
</html>
