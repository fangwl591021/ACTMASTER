<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>報名大師</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #334155; font-size: 16px; }
    ::-webkit-scrollbar { width: 0px; }
    .nav-btn { @apply flex flex-col items-center gap-1 p-2 transition-colors w-full text-slate-400; }
    .nav-active { @apply text-blue-600; }
    .card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 p-5; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    input, select, textarea { @apply bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none transition-all w-full font-normal; }
    input:focus, select:focus, textarea:focus { @apply ring-2 ring-blue-500/10 border-blue-400; }
    .btn-disabled { @apply pointer-events-none opacity-50; }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden">

<div id="app-container" class="w-full max-w-md bg-white h-full relative shadow-2xl flex flex-col">
  
  <header class="bg-blue-600 text-white px-5 py-4 flex items-center justify-between shrink-0 shadow-sm z-30">
    <div class="flex items-center gap-2">
       <i class="fas fa-calendar-check text-xl"></i>
       <h1 class="text-lg font-bold tracking-wider">報名大師</h1>
    </div>
    <div class="flex items-center gap-2">
      <div id="user-profile-badge" class="hidden flex items-center gap-2 bg-black/10 px-3 py-1 rounded-full border border-white/20">
        <img id="user-avatar" src="" class="w-6 h-6 rounded-full object-cover border border-white/50">
        <span id="user-name-display" class="text-xs font-normal"></span>
      </div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden text-xs font-medium bg-white/20 px-3 py-1 rounded-full border border-white/40 transition-all">
        <i class="fas fa-exchange-alt"></i> 前台
      </button>
    </div>
  </header>

  <main id="main-content" class="flex-1 overflow-y-auto pb-24 relative p-4 space-y-4">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
      <p id="loading-text" class="text-slate-400 text-sm">正在連線...</p>
    </div>

    <!-- 前台註冊 -->
    <div id="view-user-register" class="hidden p-6 space-y-6">
      <div class="text-center mt-4"><h2 class="text-xl font-bold">建立會員檔案</h2><p class="text-slate-500 mt-1">完善您的報名資訊</p></div>
      <div class="card space-y-4">
        <div class="space-y-1"><label class="text-xs font-bold text-slate-500">姓名</label><input type="text" id="reg-name"></div>
        <div class="space-y-1"><label class="text-xs font-bold text-slate-500">性別</label><select id="reg-gender"><option>男</option><option>女</option></select></div>
        <div class="space-y-1"><label class="text-xs font-bold text-slate-500">電話</label><input type="tel" id="reg-phone" placeholder="09XX-XXXXXX"></div>
        <div class="space-y-1"><label class="text-xs font-bold text-slate-500">業種</label><input type="text" id="reg-industry"></div>
        <button onclick="submitUserRegistration()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium shadow-lg mt-4">確認註冊</button>
      </div>
    </div>

    <!-- 活動列表 -->
    <div id="view-user-activities" class="hidden space-y-4">
      <div id="user-activities-container" class="space-y-4"></div>
    </div>

    <!-- 報名紀錄 -->
    <div id="view-user-history" class="hidden space-y-4">
      <div id="user-history-container" class="space-y-4"></div>
    </div>

    <!-- 修改檔案 -->
    <div id="view-user-profile" class="hidden">
      <div class="card space-y-4">
        <h3 class="font-bold text-center mb-2">修改個人資料</h3>
        <input type="text" id="edit-name">
        <select id="edit-gender"><option>男</option><option>女</option></select>
        <input type="tel" id="edit-phone">
        <input type="text" id="edit-industry">
        <button onclick="submitProfileUpdate()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium shadow-md">儲存變更</button>
      </div>
    </div>

    <!-- 後台列表 -->
    <div id="view-admin-activities" class="hidden space-y-4">
      <div id="admin-activity-list-container" class="space-y-4"></div>
    </div>

    <!-- 建立活動 -->
    <div id="view-admin-create" class="hidden space-y-4">
       <div class="flex bg-slate-100 p-1 rounded-xl">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-lg text-sm font-bold bg-white text-blue-600 shadow-sm transition-all">⚡ 快速建檔</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-lg text-sm font-bold text-slate-500 transition-all">🌟 完整發布</button>
      </div>
      <div id="form-quick" class="card space-y-4">
        <input type="text" id="quick-name" placeholder="活動名稱">
        <textarea id="quick-names" class="h-48" placeholder="貼上名單，一個姓名一行..."></textarea>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium shadow-md">建立活動</button>
      </div>
      <div id="form-detailed" class="hidden card space-y-4">
         <input type="text" id="detail-name" placeholder="活動名稱">
         <div class="flex gap-4 p-1"><label class="flex items-center gap-2"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput('create')"> <span>免費</span></label><label class="flex items-center gap-2"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput('create')"> <span>收費</span></label></div>
         <input type="number" id="detail-price" class="hidden" placeholder="金額 (NT$)">
         <div onclick="document.getElementById('file-input-create').click()" class="w-full h-40 border border-dashed border-slate-300 rounded-xl flex items-center justify-center bg-slate-50 cursor-pointer overflow-hidden"><div id="preview-placeholder-create" class="text-center text-slate-300"><i class="fas fa-image text-2xl"></i><p class="text-xs font-bold mt-1">上傳圖片</p></div><img id="image-preview-create" class="hidden w-full h-full object-contain"><input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')"></div>
         <input type="hidden" id="in-image-url-create">
         <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium shadow-md">發布正式報名表</button>
      </div>
    </div>
    
    <div id="view-admin-checkin" class="hidden h-full flex flex-col p-0">
       <div id="checkin-list-container" class="flex-1 space-y-3 overflow-y-auto"></div>
    </div>
  </main>

  <nav id="bottom-nav-user" class="hidden absolute bottom-0 w-full bg-white border-t flex justify-around items-center px-2 py-2 z-50 pb-safe shadow-lg">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn nav-active"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-bold">報名活動</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><i class="fas fa-history text-xl"></i><span class="text-[10px] font-bold">報名查詢</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><i class="fas fa-user-circle text-xl"></i><span class="text-[10px] font-bold">我的帳號</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden absolute bottom-0 w-full bg-white border-t flex justify-around items-center px-1 py-2 z-50 pb-safe shadow-lg">
    <button onclick="switchView('admin-activities')" id="nav-admin-activities" class="nav-btn nav-active"><i class="fas fa-list text-lg"></i><span class="text-[10px] font-bold">列表核銷</span></button>
    <button onclick="switchView('admin-create')" id="nav-admin-create" class="nav-btn"><i class="fas fa-plus-circle text-lg"></i><span class="text-[10px] font-bold">建立活動</span></button>
    <button onclick="switchView('admin-crm')" id="nav-admin-crm" class="nav-btn"><i class="fas fa-users text-lg"></i><span class="text-[10px] font-bold">CRM數據</span></button>
  </nav>
</div>

<!-- Modal -->
<div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
  <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl text-center">
    <h3 id="modal-title" class="text-lg font-bold mb-2">通知</h3>
    <p id="modal-desc" class="text-slate-500 text-sm mb-6 leading-relaxed font-medium"></p>
    <button onclick="closeModalAndGo()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">確認</button>
  </div>
</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let currentActivities = [], currentCheckinData = [], activeActivityName = '', modalTarget = '';

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { result = JSON.parse(resText); } catch(e) { throw new Error("伺服器回應錯誤，請確認 GAS 權限已設為「所有人」。"); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true); throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) switchView('user-activities');
        else { document.getElementById('reg-name').value = userProfile.displayName; switchView('user-register'); }
      }
    } catch (err) { 
      document.getElementById('loading-text').innerHTML = `<span class="text-red-500 font-bold">LIFF 初始化失敗</span><br><p class="text-xs text-slate-400 mt-2">${err.toString()}</p>`;
    }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('role-switch-btn').innerHTML = isViewModeAdmin ? '切換前台' : '切換後台';
    if (isViewModeAdmin) switchView('admin-activities');
    else { if (isRegistered) switchView('user-activities'); else switchView('user-register'); }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-edit', 'admin-crm'].forEach(v => {
      const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden'); navUser.classList.add('hidden');
    
    if (isAdmin && isViewModeAdmin && view.startsWith('admin') && view !== 'admin-checkin') {
      navAdmin.classList.remove('hidden');
      ['activities', 'create', 'crm'].forEach(k => {
        const btn = document.getElementById('nav-admin-'+k);
        if(btn) btn.className = `nav-btn ${view==='admin-'+k ? 'nav-active' : ''}`;
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin) && view.startsWith('user')) {
      navUser.classList.remove('hidden');
      ['activities', 'history', 'profile'].forEach(k => {
        const btn = document.getElementById('nav-user-'+k);
        if(btn) btn.className = `nav-btn ${view==='user-'+k ? 'nav-active' : ''}`;
      });
    }

    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  // --- 報名邏輯 ---
  async function userJoinActivity(btn, name, feeType, price) {
    if (!confirm(`確定報名「${name}」？`)) return;
    btn.classList.add('btn-disabled');
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName: name });
      if (feeType === '收費') showModal("報名成功", `請完成匯款 <b>NT$ ${price}</b> 後，前往「報名查詢」補填帳號後五碼。`, "history");
      else showModal("報名成功", `期待見到您！`, "activities");
    } catch(err) { btn.classList.remove('btn-disabled'); }
  }

  function showModal(title, desc, target) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerHTML = desc; modalTarget = target; document.getElementById('custom-modal').classList.remove('hidden'); }
  function closeModalAndGo() { document.getElementById('custom-modal').classList.add('hidden'); if (modalTarget === 'history') switchView('user-history'); else switchView('user-activities'); }

  // --- 管理功能 ---
  async function openAdminCheckin(name) {
    activeActivityName = name; switchView('admin-checkin');
    currentCheckinData = await fetchAPI('getRegistrants', { activityName: name });
    document.getElementById('checkin-list-container').innerHTML = `<div class="bg-white p-4 sticky top-0 border-b mb-2 flex items-center gap-3"><button onclick="switchView('admin-activities')" class="p-2 bg-slate-100 rounded-full"><i class="fas fa-arrow-left text-slate-500 text-sm"></i></button><h2 class="font-medium truncate text-lg">${name}</h2></div>` + currentCheckinData.map(p => `
      <div class="card border-slate-100 mb-3">
        <div class="flex justify-between items-center mb-3">
          <div><h4 class="font-bold">${p.姓名}</h4><p class="text-[13px] text-blue-600 font-medium">${p.last5?'💰 後五碼: '+p.last5 : '⏳ 未填寫'}</p></div>
          <button onclick="toggleCheckin('${p.rowId}', ${p.checkedIn})" class="px-5 py-2 rounded-xl font-medium text-sm ${p.checkedIn?'bg-green-500 text-white':'bg-slate-100 text-slate-400'}">${p.checkedIn?'已簽到':'未簽到'}</button>
        </div>
        <div class="grid grid-cols-2 gap-2"><select onchange="updateRow('${p.rowId}', '繳費狀態', this.value)" class="py-2 text-[13px] font-medium"><option value="未繳費" ${p.payStatus==='未繳費'?'selected':''}>未繳費</option><option value="匯款審核中" ${p.payStatus==='匯款審核中'?'selected':''}>審核</option><option value="已完款" ${p.payStatus==='已完款'?'selected':''}>已完款</option></select><select onchange="updateRow('${p.rowId}', '報名狀態', this.value)" class="py-2 text-[13px] font-medium"><option value="正常" ${p.regStatus==='正常'?'selected':''}>正常</option><option value="已取消" ${p.regStatus==='已取消'?'selected':''}>已取消</option></select></div>
      </div>`).join('');
  }

  // --- 其他功能 (省略重複邏輯供快速還原) ---
  async function submitUserRegistration() {
    const p = { userId: userProfile.userId, name: document.getElementById('reg-name').value.trim(), gender: document.getElementById('reg-gender').value, phone: document.getElementById('reg-phone').value.trim(), industry: document.getElementById('reg-industry').value.trim() };
    if (!p.name || !p.phone) return showToast("⚠️ 請輸入完整資料", true);
    await fetchAPI('registerUser', p); isRegistered = true; registeredInfo = p; switchView('user-activities');
  }
  function populateUserProfile() { if(registeredInfo) { document.getElementById('edit-name').value=registeredInfo.name; document.getElementById('edit-gender').value=registeredInfo.gender; document.getElementById('edit-phone').value=registeredInfo.phone; document.getElementById('edit-industry').value=registeredInfo.industry; } }
  async function submitProfileUpdate() {
    const p = { userId: userProfile.userId, name: document.getElementById('edit-name').value.trim(), gender: document.getElementById('edit-gender').value, phone: document.getElementById('edit-phone').value.trim(), industry: document.getElementById('edit-industry').value.trim() };
    await fetchAPI('updateUser', p); registeredInfo = p; showToast("✅ 已儲存");
  }
  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-500"></i></div>';
    const data = await fetchAPI('getPublicActivities');
    if (data.length === 0) { container.innerHTML = '<div class="text-center py-16 card text-slate-400">目前沒有活動</div>'; return; }
    container.innerHTML = data.map(act => `
      <div class="card overflow-hidden p-0 border-none shadow-md">
        ${act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-40 object-cover">` : ''}
        <div class="p-5">
          <div class="flex items-center gap-2 mb-2"><span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded uppercase">${act.type}</span><span class="text-[10px] font-bold text-orange-500">${act.feeType==='收費'?'NT$'+act.price:'免費'}</span></div>
          <h3 class="text-lg font-bold">${act.name}</h3>
          <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-medium active:scale-95 transition-all">我要報名</button>
        </div>
      </div>`).join('');
  }
  async function loadUserHistory() {
    const container = document.getElementById('user-history-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin"></i></div>';
    const history = await fetchAPI('getUserHistory', { userId: userProfile.userId });
    if (history.length === 0) { container.innerHTML = '<div class="text-center py-16 card text-slate-400">尚無紀錄</div>'; return; }
    container.innerHTML = history.map(item => `
      <div class="card space-y-4">
        <div class="flex justify-between items-start">
          <div><h4 class="text-lg font-bold">${item.name}</h4><p class="text-xs text-slate-400 mt-1">${item.payStatus} • ${item.regStatus}</p></div>
          <div class="shrink-0">${item.checkedIn ? '<i class="fas fa-check-circle text-green-500 text-2xl"></i>' : '<i class="fas fa-clock text-slate-200 text-2xl"></i>'}</div>
        </div>
        ${item.isPaidAct && item.regStatus === '正常' ? `
          <div class="flex gap-2"><input type="text" id="last5-${item.name}" value="${item.last5}" placeholder="補填後五碼" maxlength="5" class="flex-1 py-2 text-sm"><button onclick="updateUserLast5('${item.name}')" class="bg-blue-600 text-white px-5 rounded-xl font-medium text-sm">送出</button></div>
        ` : (item.regStatus === '正常' ? `<button onclick="userCancelRegistration('${item.name}')" class="w-full py-2 bg-slate-50 text-red-500 rounded-xl font-medium text-sm">取消報名</button>` : '')}
      </div>`).join('');
  }
  async function updateUserLast5(name) {
    const val = document.getElementById(`last5-${name}`).value.trim();
    if(!val) return showToast("⚠️ 請輸入數字", true);
    await fetchAPI('updateLast5Digits', { userId: userProfile.userId, activityName: name, last5Digits: val });
    showToast("✅ 已送出審核"); loadUserHistory();
  }
  async function userCancelRegistration(name) { if (confirm("確定取消？")) { await fetchAPI('cancelRegistration', { userId: userProfile.userId, activityName: name }); loadUserHistory(); } }
  async function loadAdminActivities() {
    const container = document.getElementById('admin-activity-list-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin"></i></div>';
    currentActivities = await fetchAPI('getActivityDashboard');
    container.innerHTML = currentActivities.map(act => `
      <div class="card space-y-3 border-none shadow-md">
        <h3 class="text-lg font-bold">${act.name}</h3>
        <div class="grid grid-cols-3 gap-2 bg-slate-50 rounded-xl p-3 text-center border">
          <div><p class="text-[10px] text-slate-400 font-bold">報名</p><p class="font-bold">${act.total}</p></div>
          <div><p class="text-[10px] text-green-600 font-bold">簽到</p><p class="font-bold">${act.attended}</p></div>
          <div><p class="text-[10px] text-red-400 font-bold">取消</p><p class="font-bold">${act.cancelled}</p></div>
        </div>
        <button onclick="openAdminCheckin('${act.name}')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium text-sm">進入管理</button>
        <div class="flex justify-between px-1 text-xs"><button onclick="toggleActStatus('${act.name}')" class="text-slate-400 font-bold">${act.status==='下架'?'上架':'下架'}</button><button onclick="deleteAct('${act.name}')" class="text-red-400 font-bold">刪除</button></div>
      </div>`).join('');
  }
  async function toggleCheckin(id, status) { await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: id, currentStatus: status }); openAdminCheckin(activeActivityName); }
  async function updateRow(id, col, val) { await fetchAPI('updateCellStatus', { activityName: activeActivityName, rowId: id, colName: col, val: val }); showToast("已同步"); }
  async function submitSettings() { await fetchAPI('saveSettings', { LINE_LINK: document.getElementById('set-line-link').value.trim() }); showToast("✅ 設定已儲存"); }
  function previewFile(mode) {
    const f = document.getElementById('file-input-create').files[0]; if(!f) return;
    const r = new FileReader(); r.onloadend = () => {
      const img = new Image(); img.onload = () => {
        let w = img.width, h = img.height; if (w > 650) { h = Math.round(h * (650/w)); w = 650; }
        const cvs = document.createElement('canvas'); cvs.width = w; cvs.height = h;
        cvs.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = cvs.toDataURL('image/jpeg', 0.8);
        document.getElementById('image-preview-create').src = b64; document.getElementById('image-preview-create').classList.remove('hidden');
        document.getElementById('preview-placeholder-create').classList.add('hidden'); document.getElementById('in-image-url-create').value = b64;
      }; img.src = r.result;
    }; r.readAsDataURL(f);
  }
  function toggleCreateMode(m) {
    document.getElementById('tab-quick').className = `flex-1 py-3 rounded-lg text-sm font-bold ${m==='quick'?'bg-white text-blue-600 shadow-sm':'text-slate-500'}`;
    document.getElementById('tab-detailed').className = `flex-1 py-3 rounded-lg text-sm font-bold ${m==='detailed'?'bg-white text-blue-600 shadow-sm':'text-slate-500'}`;
    document.getElementById('form-quick').classList.toggle('hidden', m!=='quick'); document.getElementById('form-detailed').classList.toggle('hidden', m!=='detailed');
  }
  function toggleFeeInput(m) {
    const isFee = document.querySelector('input[name="fee-type"]:checked').value === '收費';
    document.getElementById('detail-price').classList.toggle('hidden', !isFee);
  }
  async function handleCreateActivity(mode) {
    const btn = document.getElementById(mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create');
    btn.classList.add('btn-disabled');
    let payload = {
      activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(),
      activityType: '一般', feeType: '免費', price: '', startTime: '', description: '', imageUrl: '', names: []
    };
    if (mode === 'quick') {
      const raw = document.getElementById('quick-names').value.trim();
      payload.names = raw.split('\n').filter(n => n.trim());
      payload.defaultIdentity = document.getElementById('quick-identity').value;
    } else {
      payload.feeType = document.querySelector('input[name="fee-type"]:checked').value;
      payload.price = document.getElementById('detail-price').value;
      payload.startTime = document.getElementById('detail-start').value;
      payload.imageUrl = document.getElementById('in-image-url-create').value;
    }
    try { await fetchAPI('bulkAddRegistrants', payload); showToast("✅ 活動建立成功"); switchView('admin-activities'); } finally { btn.classList.remove('btn-disabled'); }
  }
  function formatTime(t) { return t ? new Date(t).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) : ''; }
  function showToast(m, e=false) { const t = document.getElementById('toast'); t.innerHTML = m; t.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm shadow-2xl transition-all z-[10000] font-medium transform ${e ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 2500); }
</script>
