<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片管理中樞</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2563eb", 
            "primary-light": "#eff6ff",
            background: "#ffffff",
            "text-main": "#0f172a",
            "text-muted": "#64748b",
            error: "#ef4444" 
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"],
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[14px] text-slate-700 mb-1.5 font-normal; }
    
    select.custom-input {
      -webkit-appearance: none !important;
      -moz-appearance: none !important;
      appearance: none !important;
      background-image: none !important;
    }

    .custom-input { @apply w-full py-2.5 px-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-text-main text-[15px] shadow-sm; }
    .custom-input::placeholder { @apply text-slate-400; }
    
    .textarea-block { @apply w-full p-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-[15px] text-text-main resize-none leading-relaxed shadow-sm; }

    .btn-primary { @apply w-full py-3 bg-primary text-white rounded-lg font-bold text-[16px] shadow-sm active:opacity-80 transition-opacity flex items-center justify-center gap-2 hover:bg-blue-700; }
    .btn-secondary { @apply w-full py-3 bg-white border border-slate-300 text-slate-700 rounded-lg font-bold text-[16px] hover:bg-slate-50 active:bg-slate-50 transition-colors flex items-center justify-center gap-2 shadow-sm; }

    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; min-width: 48px; }
    .nav-active { @apply text-text-main font-bold; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; color: #1e293b; }

    .flex-preview-bubble { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; width: 100%; border: 1px solid #edf2f7; }
    .flex-preview-img { width: 100%; object-fit: cover; background-color: #f1f5f9; transition: aspect-ratio 0.3s ease, object-fit 0.3s ease; }
    .flex-badge { position: absolute; top: 12px; left: 12px; background-color: #FF0000; color: white; font-size: 13px; font-weight: bold; padding: 2px 10px; border-radius: 9999px; z-index: 10; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center">

<div class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <!-- Header 統一風格設計 -->

      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center shadow-md shadow-blue-500/20">

    </div>

<!-- Toast -->
<div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-bold flex items-center gap-2 w-max max-w-[90vw] bg-slate-800 text-white opacity-0 pointer-events-none"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  
  let userProfile = null;
  let cropperInstance = null;
  let globalCardContacts = []; 
  let filteredCards = [];
  let currentPage = 1;
  const PAGE_LIMIT = 10;
  let currentActiveCard = null; 
  let isProcessing = false;

  async function fetchAPI(action, payload = {}, useCache = false) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true); 
      throw err;
    }
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      
      // 更新 Banner 頭像
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');

      loadCardContacts();
      switchView('list');
    } catch (err) {
      showToast("初始化失敗", true);
    }
  };

  function switchView(view) {
    ['view-loading', 'view-list', 'view-process'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(`view-${view}`).classList.remove('hidden');
  }

  async function loadCardContacts() { 
    const container = document.getElementById('admin-card-list-container');
    container.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>';
    try {
      globalCardContacts = await fetchAPI('getCardContacts', {}, true);
      filteredCards = [...globalCardContacts];
      renderCardPage(true);
    } catch(e) {
      container.innerHTML = '<p class="text-center py-10 text-red-400">讀取失敗</p>';
    }
  }

  function filterCardList() { 
    const term = document.getElementById('card-search-input').value.toLowerCase();
    filteredCards = globalCardContacts.filter(c => 
      (c['姓名'] || '').toLowerCase().includes(term) || 
      (c['公司名稱'] || '').toLowerCase().includes(term)
    );
    renderCardPage(true);
  }

  function renderCardPage(isReset = false) {
    const list = document.getElementById('admin-card-list-container');
    const moreBtnBox = document.getElementById('card-load-more-box');
    
    if (isReset) {
      currentPage = 1;
      list.innerHTML = '';
    }

    if (!filteredCards.length) {
      moreBtnBox.classList.add('hidden');
      list.innerHTML = `<div class="text-center py-16 text-slate-400 text-[14px]">尚無名單或找不到符合者</div>`;
      return;
    }

    const displayItems = filteredCards.slice(0, currentPage * PAGE_LIMIT);
    
    let html = '';
    displayItems.forEach((c, i) => {
      html += `
      <div onclick="openCardDetailByRowId('${c.rowId}')" class="px-5 py-4 flex justify-between items-center border-b border-slate-100 active:bg-slate-50 transition-colors">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 shrink-0 rounded-full overflow-hidden bg-slate-100 border border-slate-200 flex items-center justify-center">
            ${c['名片圖檔'] && c['名片圖檔'].startsWith('http') ? `<img src="${c['名片圖檔']}" class="w-full h-full object-cover">` : `<span class="material-symbols-outlined text-slate-400 text-[22px]">person</span>`}
          </div>
          <div class="flex flex-col">
            <span class="text-[16px] text-slate-800 font-medium">${c['姓名'] || '未知姓名'}</span>
            <span class="text-[12px] text-slate-400 truncate max-w-[180px]">${c['公司名稱'] || c['職稱'] || '無詳細資訊'}</span>
          </div>
        </div>
        <div class="text-slate-300">
          <span class="material-symbols-outlined text-[20px]">chevron_right</span>
        </div>
      </div>`;
    });
    
    list.innerHTML = html;
    moreBtnBox.classList.toggle('hidden', filteredCards.length <= currentPage * PAGE_LIMIT);
  }

  function loadMoreCards() {
    currentPage++;
    renderCardPage(false);
  }

  // 以下為原本的名片處理與 Crop 功能 (保持完整性)
  function openCropper(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image'); img.src = e.target.result; img.style.opacity = '0';
      document.getElementById('section-cropper').classList.remove('hidden');
      if (cropperInstance) cropperInstance.destroy();
      setTimeout(() => { img.style.opacity = '1'; cropperInstance = new Cropper(img, { viewMode: 1, autoCropArea: 0.9 }); }, 100);
    }; reader.readAsDataURL(file);
  }
  
  function cancelCrop() { if (cropperInstance) cropperInstance.destroy(); document.getElementById('section-cropper').classList.add('hidden'); }
  function confirmCrop() {
    const canvas = cropperInstance.getCroppedCanvas({ maxWidth: 1000 });
    const base64 = canvas.toDataURL('image/webp', 0.8);
    document.getElementById('preview-image').src = base64;
    cancelCrop(); switchView('process'); switchProcessSection('section-loading');
    recognizeCardData(base64);
  }

  async function recognizeCardData(base64) {
    try {
      const data = await fetchAPI('recognizeCard', { base64Image: base64 });
      ['Name', 'Title', 'CompanyName', 'Mobile', 'Email', 'Address'].forEach(f => {
        const el = document.getElementById(`f-${f}`); if(el) el.value = data[f] || '';
      });
      switchProcessSection('section-form');
    } catch(e) { resetUI(); }
  }

  function switchProcessSection(id) {
    ['section-loading', 'section-form'].forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function resetUI() { switchView('list'); }
  function showToast(m, e=false) {
    const t = document.getElementById('toast'); t.innerHTML = m;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-bold ${e?'bg-red-500':'bg-slate-800'} text-white opacity-100`;
    setTimeout(() => { t.style.opacity = '0'; }, 3000);
  }

  function openCardDetailByRowId(rowId) {
    const card = globalCardContacts.find(c => String(c.rowId) === String(rowId));
    if (!card) return;
    currentActiveCard = card;
    document.getElementById('ro-name').innerText = card['姓名'] || '未知姓名';
    document.getElementById('ro-title').innerText = [card['職稱'], card['部門']].filter(Boolean).join(' / ') || '無職稱';
    document.getElementById('ro-company').innerText = card['公司名稱'] || '未提供';
    document.getElementById('ro-notes').innerText = card['建檔人/備註'] || '無備註';
    const img = document.getElementById('ro-image');
    if(card['名片圖檔'] && card['名片圖檔'].startsWith('http')){ img.src=card['名片圖檔']; img.classList.remove('hidden'); document.getElementById('ro-no-image').classList.add('hidden'); }
    else { img.classList.add('hidden'); document.getElementById('ro-no-image').classList.remove('hidden'); }
    document.getElementById('readonly-card-modal').classList.remove('hidden');
  }
  function closeReadOnlyCard() { document.getElementById('readonly-card-modal').classList.add('hidden'); }
  function openCardEdit() { document.getElementById('card-edit-modal').classList.remove('hidden'); }
  function closeCardEdit() { document.getElementById('card-edit-modal').classList.add('hidden'); }
</script>
</body>
</html>
