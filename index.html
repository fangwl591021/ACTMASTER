<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>報名大師</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #334155; font-size: 16px; }
    ::-webkit-scrollbar { width: 0px; }
    .nav-btn { @apply flex flex-col items-center gap-1 p-2 transition-colors w-full text-slate-400; }
    .nav-active { @apply text-blue-600; }
    .card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 p-5; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    input, select, textarea { @apply bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none transition-all w-full font-normal; }
    input:focus, select:focus, textarea:focus { @apply ring-2 ring-blue-500/10 border-blue-400; }
    .btn-disabled { @apply pointer-events-none opacity-50; }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden">

<div id="app-container" class="w-full max-w-md bg-white h-full relative shadow-2xl flex flex-col">
  
  <header class="bg-blue-600 text-white px-5 py-4 flex items-center justify-between shrink-0 shadow-sm z-30">
    <div class="flex items-center gap-2">
       <i class="fas fa-calendar-check text-xl"></i>
       <h1 class="text-lg font-bold tracking-wider">報名大師</h1>
    </div>
    <div class="flex items-center gap-2">
      <div id="user-profile-badge" class="hidden flex items-center gap-2 bg-black/10 px-3 py-1 rounded-full border border-white/20">
        <img id="user-avatar" src="" class="w-6 h-6 rounded-full object-cover">
        <span id="user-name-display" class="text-xs font-normal"></span>
      </div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden text-xs font-medium bg-white/20 px-3 py-1 rounded-full border border-white/40">切換</button>
    </div>
  </header>

  <main id="main-content" class="flex-1 overflow-y-auto pb-24 relative p-4 space-y-4">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
      <p id="loading-text" class="text-slate-400 text-sm font-medium">系統連線中...</p>
    </div>

    <!-- 前台註冊 -->
    <div id="view-user-register" class="hidden space-y-6 pt-4 animate-in fade-in">
      <div class="text-center"><h2 class="text-xl">建立會員檔案</h2><p class="text-slate-400 text-sm mt-1">完善報名資訊，以後一鍵加入活動</p></div>
      <div class="card space-y-4">
        <div><label class="text-xs font-bold text-slate-500 block mb-1 ml-1">真實姓名</label><input type="text" id="reg-name"></div>
        <div><label class="text-xs font-bold text-slate-500 block mb-1 ml-1">性別</label><select id="reg-gender"><option>男</option><option>女</option></select></div>
        <div><label class="text-xs font-bold text-slate-500 block mb-1 ml-1">電話</label><input type="tel" id="reg-phone" placeholder="09XX-XXXXXX"></div>
        <div><label class="text-xs font-bold text-slate-500 block mb-1 ml-1">業種</label><input type="text" id="reg-industry"></div>
        <button onclick="submitUserRegistration()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium mt-2 shadow-md">完成註冊</button>
      </div>
    </div>

    <!-- 會員專區 -->
    <div id="view-user-activities" class="hidden space-y-4 animate-in fade-in">
      <div id="user-activities-container" class="space-y-4"></div>
    </div>
    <div id="view-user-history" class="hidden space-y-4 animate-in fade-in">
      <div id="user-history-container" class="space-y-4"></div>
    </div>
    <div id="view-user-profile" class="hidden animate-in fade-in">
      <div class="card space-y-4"><h3 class="text-center mb-2">我的資料</h3><input type="text" id="edit-name"><select id="edit-gender"><option>男</option><option>女</option></select><input type="tel" id="edit-phone"><input type="text" id="edit-industry"><button onclick="submitProfileUpdate()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium">儲存修改</button></div>
    </div>

    <!-- 後台管理 -->
    <div id="view-admin-activities" class="hidden space-y-4 animate-in fade-in">
      <div id="admin-activity-list-container" class="space-y-4"></div>
    </div>
    <div id="view-admin-settings" class="hidden card space-y-5 animate-in fade-in">
      <h3 class="border-b pb-2">系統參數設定</h3>
      <div class="space-y-4">
        <div><label class="text-xs font-bold text-slate-500 block mb-1">Telegram Bot Token</label>
          <div class="flex gap-2"><input type="text" id="set-tg-token" class="flex-1"><button onclick="autoFetchTgChatId()" id="btn-fetch-tg" class="bg-blue-50 text-blue-600 px-4 rounded-xl text-sm font-medium border border-blue-100">轉換</button></div>
        </div>
        <div><label class="text-xs font-bold text-slate-500 block mb-1">Telegram Chat ID</label><input type="text" id="set-tg-chat" placeholder="轉換獲取"></div>
        <div><label class="text-xs font-bold text-slate-500 block mb-1">LINE 加友網址</label><input type="text" id="set-line-link"></div>
      </div>
      <button onclick="submitSettings()" class="w-full py-4 bg-slate-800 text-white rounded-xl font-medium mt-2">儲存</button>
    </div>

    <div id="view-admin-create" class="hidden space-y-4 animate-in fade-in">
      <div class="flex bg-slate-100 p-1 rounded-xl">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-lg text-sm font-medium bg-white text-blue-600 shadow-sm">⚡ 快速</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-lg text-sm font-medium text-slate-500">🌟 完整</button>
      </div>
      <div id="form-quick" class="card space-y-4"><input type="text" id="quick-name" placeholder="活動名稱"><textarea id="quick-names" class="h-48" placeholder="名單一個姓名一行..."></textarea><button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium">建立活動</button></div>
      <div id="form-detailed" class="hidden card space-y-4"><input type="text" id="detail-name" placeholder="活動名稱"><div class="flex gap-4 p-1"><label class="flex items-center gap-2 font-medium"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput('create')"> <span>免費</span></label><label class="flex items-center gap-2 font-medium"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput('create')"> <span>收費</span></label></div><input type="number" id="detail-price" class="hidden" placeholder="金額 (NT$)"><div onclick="document.getElementById('file-input-create').click()" class="w-full h-40 border border-dashed border-slate-300 rounded-xl flex items-center justify-center bg-slate-50 cursor-pointer overflow-hidden"><div id="preview-placeholder-create" class="text-center text-slate-300 font-medium"><i class="fas fa-image text-2xl"></i><p class="text-xs mt-1">上傳圖片</p></div><img id="image-preview-create" class="hidden w-full h-full object-contain"><input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')"></div><input type="hidden" id="in-image-url-create"><button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium shadow-md">發布報名表</button></div>
    </div>
    
    <div id="view-admin-checkin" class="hidden h-full flex flex-col p-0">
       <div id="checkin-list-container" class="flex-1 space-y-3 overflow-y-auto"></div>
    </div>
  </main>

  <!-- NAV -->
  <nav id="bottom-nav-user" class="hidden absolute bottom-0 w-full bg-white border-t flex justify-around items-center px-2 py-2 z-50 pb-safe shadow-lg">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn nav-active"><i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] font-medium">報名活動</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><i class="fas fa-history text-xl"></i><span class="text-[10px] font-medium">報名查詢</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><i class="fas fa-user-circle text-xl"></i><span class="text-[10px] font-medium">我的資料</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden absolute bottom-0 w-full bg-white border-t flex justify-around items-center px-1 py-2 z-50 pb-safe shadow-lg">
    <button onclick="switchView('admin-activities')" id="nav-admin-activities" class="nav-btn nav-active"><i class="fas fa-list-ul text-lg"></i><span class="text-[10px] font-medium">核銷名單</span></button>
    <button onclick="switchView('admin-create')" id="nav-admin-create" class="nav-btn"><i class="fas fa-plus-circle text-lg"></i><span class="text-[10px] font-medium">建立活動</span></button>
    <button onclick="switchView('admin-settings')" id="nav-admin-settings" class="nav-btn"><i class="fas fa-cog text-lg"></i><span class="text-[10px] font-medium">設定</span></button>
  </nav>
</div>

<div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-base shadow-2xl transition-all z-[10000] font-medium transform -translate-y-4 opacity-0 pointer-events-none"></div>

<div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
  <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
    <h3 id="modal-title" class="text-xl mb-3">通知</h3>
    <p id="modal-desc" class="text-slate-500 text-sm mb-8 leading-relaxed font-medium"></p>
    <button onclick="closeModalAndGo()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium">確認</button>
  </div>
</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let currentActivities = [], currentCheckinData = [], activeActivityName = '', modalTargetView = '';

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { result = JSON.parse(resText); } catch(e) { throw new Error("伺服器回應錯誤，請確認 GAS 權限已設為所有人。"); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true); throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) switchView('user-activities');
        else { document.getElementById('reg-name').value = userProfile.displayName; switchView('user-register'); }
      }
    } catch (err) { 
      document.getElementById('loading-text').innerHTML = `<span class="text-red-500 font-bold">初始化失敗</span><br><p class="text-xs text-slate-400 mt-2">${err.toString()}</p>`;
    }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('role-switch-btn').innerHTML = isViewModeAdmin ? '切換前台' : '切換後台';
    if (isViewModeAdmin) switchView('admin-activities');
    else { if (isRegistered) switchView('user-activities'); else switchView('user-register'); }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-edit', 'admin-crm', 'admin-settings'].forEach(v => {
      const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden'); navUser.classList.add('hidden');
    
    if (isAdmin && isViewModeAdmin && view.startsWith('admin') && view !== 'admin-checkin') {
      navAdmin.classList.remove('hidden');
      ['activities', 'create', 'settings'].forEach(k => {
        const btn = document.getElementById('nav-admin-'+k);
        if(btn) btn.className = `nav-btn ${view==='admin-'+k ? 'nav-active' : ''}`;
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin) && view.startsWith('user')) {
      navUser.classList.remove('hidden');
      ['activities', 'history', 'profile'].forEach(k => {
        const btn = document.getElementById('nav-user-'+k);
        if(btn) btn.className = `nav-btn ${view==='user-'+k ? 'nav-active' : ''}`;
      });
    }

    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  async function userJoinActivity(btn, name, feeType, price) {
    if (!confirm(`確定報名「${name}」？`)) return;
    btn.classList.add('btn-disabled');
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName: name });
      if (feeType === '收費') showModal("報名成功", `請匯款 <b>NT$ ${price}</b> 後，前往「報名查詢」補填帳號後五碼。`, "history");
      else showModal("報名成功", `期待見到您！`, "activities");
    } catch(err) { btn.classList.remove('btn-disabled'); }
  }

  function showModal(title, desc, target) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerHTML = desc; modalTargetView = target; document.getElementById('custom-modal').classList.remove('hidden'); }
  function closeModalAndGo() { document.getElementById('custom-modal').classList.add('hidden'); if (modalTargetView === 'history') switchView('user-history'); else switchView('user-activities'); }

  // 其他 UI 切換與功能函式 (承襲前版邏輯並套用簡約樣式)
  function toggleCreateMode(m) {
    document.getElementById('tab-quick').className = `flex-1 py-3 rounded-lg text-sm font-medium ${m==='quick'?'bg-white text-blue-600 shadow-sm':'text-slate-500'}`;
    document.getElementById('tab-detailed').className = `flex-1 py-3 rounded-lg text-sm font-medium ${m==='detailed'?'bg-white text-blue-600 shadow-sm':'text-slate-500'}`;
    document.getElementById('form-quick').classList.toggle('hidden', m!=='quick'); document.getElementById('form-detailed').classList.toggle('hidden', m!=='detailed');
  }

  async function autoFetchTgChatId() {
    const token = document.getElementById('set-tg-token').value.trim();
    if (!token) return showToast("⚠️ 請先輸入 Token", true);
    const btn = document.getElementById('btn-fetch-tg'); btn.disabled = true;
    try {
      const chatId = await fetchAPI('getTgChatId', { token });
      document.getElementById('set-tg-chat').value = chatId; showToast("✅ 獲取成功！請儲存");
    } catch(err) { showToast(err.message, true); }
    btn.disabled = false;
  }

  function formatTime(t) { return t ? new Date(t).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) : ''; }
  function showToast(m, e=false) { const t = document.getElementById('toast'); t.innerHTML = m; t.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-sm shadow-2xl transition-all z-[10000] font-medium transform ${e ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`; t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 2500); }

  // --- 省略部分重複性 UI 渲染程式碼以縮短篇幅，維持核心邏輯不變 ---
  async function submitUserRegistration() {
    const p = { userId: userProfile.userId, name: document.getElementById('reg-name').value.trim(), gender: document.getElementById('reg-gender').value, phone: document.getElementById('reg-phone').value.trim(), industry: document.getElementById('reg-industry').value.trim() };
    if (!p.name || !p.phone) return showToast("⚠️ 請輸入完整資料", true);
    await fetchAPI('registerUser', p); isRegistered = true; registeredInfo = p; switchView('user-activities');
  }
  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-500"></i></div>';
    const data = await fetchAPI('getPublicActivities');
    if (data.length === 0) { container.innerHTML = '<div class="text-center py-16 card text-slate-400">目前沒有活動</div>'; return; }
    container.innerHTML = data.map(act => `
      <div class="card overflow-hidden p-0 border-none shadow-md">
        ${act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-40 object-cover">` : ''}
        <div class="p-5">
          <div class="flex items-center gap-2 mb-2"><span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded uppercase">${act.type}</span><span class="text-[10px] font-bold text-orange-500">${act.feeType==='收費'?'NT$'+act.price:'免費'}</span></div>
          <h3 class="text-lg">${act.name}</h3>
          <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-medium active:scale-95 transition-all">我要報名</button>
        </div>
      </div>`).join('');
  }
  async function loadAdminActivities() {
    const container = document.getElementById('admin-activity-list-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin"></i></div>';
    currentActivities = await fetchAPI('getActivityDashboard');
    container.innerHTML = currentActivities.map(act => `
      <div class="card space-y-3 border-none shadow-md">
        <h3 class="text-lg">${act.name}</h3>
        <div class="grid grid-cols-3 gap-2 bg-slate-50 rounded-xl p-3 text-center border">
          <div><p class="text-[10px] text-slate-400 font-bold">報名</p><p class="font-bold text-base">${act.total}</p></div>
          <div><p class="text-[10px] text-green-600 font-bold">簽到</p><p class="font-bold text-base">${act.attended}</p></div>
          <div><p class="text-[10px] text-red-400 font-bold">取消</p><p class="font-bold text-base">${act.cancelled}</p></div>
        </div>
        <button onclick="openAdminCheckin('${act.name}')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-medium text-sm">核銷與簽到</button>
        <div class="flex justify-between px-1 text-xs"><button onclick="toggleActStatus('${act.name}')" class="text-slate-400 font-medium">${act.status==='下架'?'上架':'下架'}</button><button onclick="deleteAct('${act.name}')" class="text-red-400 font-medium">刪除</button></div>
      </div>`).join('');
  }
  async function loadAdminSettings() { const s = await fetchAPI('getSettings'); document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN; document.getElementById('set-tg-chat').value = s.TG_CHAT_ID; document.getElementById('set-line-link').value = s.LINE_LINK; }
  async function submitSettings() { await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value.trim(), TG_CHAT_ID: document.getElementById('set-tg-chat').value.trim(), LINE_LINK: document.getElementById('set-line-link').value.trim() }); showToast("✅ 設定已儲存"); }
</script>
</body>
</html>
