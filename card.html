              <div class="flex flex-col w-full"><label class="input-label">手機號碼</label><input type="tel" id="f-Mobile" class="custom-input"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">

<!-- ========================================== -->
<!-- 核心資料請求與列表渲染邏輯 (完整還原版) -->
<!-- ========================================== -->
<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
  
  let globalCardContacts = [];
  let filteredCards = [];
  let currentDisplayCount = 10;
  let userProfile = null;
  let cropperInstance = null;
  let currentCropTarget = '';
  let regCompressedBase64 = '';
  
  window.currentActiveCard = null; // 供 card-ecard.js 使用

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${isError ? 'error' : 'info'}</span> ${msg}`;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] ${isError ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} opacity-100 z-[10000]`;
    t.classList.remove('hidden');
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  };

  async function fetchAPI(action, payload = {}) {
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);
        
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, payload }),
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        const json = await response.json();
        
        if (!json.success) throw new Error(json.error);
        return json.data;
    } catch (err) {
        if (err.name === 'AbortError') err.message = '網路連線超時，請重試。';
        throw err;
    }
  }
  window.fetchAPI = fetchAPI;

  window.onload = async () => {
      try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) { 
              liff.login({ redirectUri: window.location.href }); 
              return; 
          }
          
          userProfile = await liff.getProfile();
          const avatar = document.getElementById('user-avatar');
          if (avatar) avatar.src = userProfile.pictureUrl;
          document.getElementById('user-profile-badge').classList.remove('hidden');
          
          if (!ADMIN_IDS.includes(userProfile.userId)) {
              alert("無權限存取名片管理台");
              window.location.href = 'index.html';
              return;
          }
          await reloadCardContacts();
      } catch (err) {
          console.error(err);
          document.getElementById('loading-text').innerText = "初始化失敗: " + err.message;
      }
  };

  window.reloadCardContacts = async function() {
      const container = document.getElementById('admin-card-list-container');
      const btn = document.getElementById('btn-refresh-cards');
      
      document.getElementById('view-loading').classList.remove('hidden');
      document.getElementById('view-list').classList.add('hidden');
      if (btn) btn.classList.add('animate-spin', 'pointer-events-none');

      try {
          const data = await fetchAPI('getCardContacts');
          globalCardContacts = data || [];
          filterCardList();
      } catch (e) {
          container.innerHTML = `<div class="bg-red-50 p-4 rounded-xl text-red-500 font-bold border border-red-100 text-center">讀取失敗: ${e.message}</div>`;
      } finally {
          document.getElementById('view-loading').classList.add('hidden');
          document.getElementById('view-list').classList.remove('hidden');
          if (btn) btn.classList.remove('animate-spin', 'pointer-events-none');
      }
  };

  window.filterCardList = function() {
      const input = document.getElementById('card-search-input');
      const term = (input ? input.value : '').toLowerCase();
      
      filteredCards = globalCardContacts.filter(c => {
          const name = (c['姓名'] || c['Name'] || '').toLowerCase();
          const company = (c['公司名稱'] || c['CompanyName'] || '').toLowerCase();
          const phone = (c['手機號碼'] || c['Mobile'] || '').toLowerCase();
          return name.includes(term) || company.includes(term) || phone.includes(term);
      });
      
      currentDisplayCount = 10;
      renderCards();
  };

  window.renderCards = function() {
      const container = document.getElementById('admin-card-list-container');
      const loadMoreBox = document.getElementById('card-load-more-box');
      if (!container) return;

      if (filteredCards.length === 0) {
          container.innerHTML = '<div class="text-center py-16 bg-white rounded-2xl shadow-sm border border-slate-100 text-slate-400 font-bold text-[15px]">查無名片紀錄</div>';
          if (loadMoreBox) loadMoreBox.classList.add('hidden');
          return;
      }

      const toDisplay = filteredCards.slice(0, currentDisplayCount);
      let html = '';
      
      toDisplay.forEach(c => {
          const name = c['姓名'] || c['Name'] || '未命名';
          let company = c['公司名稱'] || c['CompanyName'] || '';
          if (company === '-' || company === 'Not provided') company = '';
          
          let title = c['職稱'] || c['Title'] || '';
          if (title === '-' || title === 'Not provided') title = '';
          
          let phone = c['手機號碼'] || c['Mobile'] || '無電話';
          if (phone === '-') phone = '無電話';
          
          let img = c['名片圖檔'];
          if (!img || img === '-' || img === 'IMAGE_DATA_LARGE') {
              img = 'https://images.unsplash.com/photo-1616628188550-808682f3926d?w=200&q=80';
          }

          html += `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 transition-transform active:scale-[0.99]">
              <img src="${img}" class="w-16 h-16 rounded-full object-cover shrink-0 bg-slate-100 border border-slate-200">
              <div class="flex-1 overflow-hidden cursor-pointer" onclick="openReadOnlyCard('${c.rowId}')">
                  <h3 class="text-[17px] font-extrabold text-slate-800 truncate">${name}</h3>
                  <p class="text-[13px] text-slate-500 truncate mt-0.5">${company} ${title ? '- ' + title : ''}</p>
                  <p class="text-[12px] text-slate-400 font-mono mt-1 font-bold">${phone}</p>
              </div>
              <div class="flex flex-col gap-2 shrink-0 border-l border-slate-100 pl-3">
                  <button onclick="window.currentActiveCard = globalCardContacts.find(x=>x.rowId==='${c.rowId}'); if(typeof window.openECardGenerator === 'function') window.openECardGenerator();" class="w-10 h-10 bg-[#06C755]/10 text-[#06C755] rounded-full flex items-center justify-center active:scale-90 transition-transform">
                      <span class="material-symbols-outlined text-[18px]">contact_mail</span>
                  </button>
              </div>
          </div>`;
      });
      container.innerHTML = html;

      if (filteredCards.length > currentDisplayCount) {
          if (loadMoreBox) loadMoreBox.classList.remove('hidden');
      } else {
          if (loadMoreBox) loadMoreBox.classList.add('hidden');
      }
  };

  window.loadMoreCards = function() {
      currentDisplayCount += 10;
      renderCards();
  };

  window.openReadOnlyCard = function(rowId) {
      const card = globalCardContacts.find(c => c.rowId === rowId);
      if (!card) return;
      window.currentActiveCard = card;

      document.getElementById('ro-name').innerText = card['姓名'] || card['Name'] || '未命名';
      document.getElementById('ro-title').innerText = `${card['公司名稱'] || ''} ${card['職稱'] || ''}`;
      document.getElementById('ro-company').innerText = card['公司名稱'] || card['CompanyName'] || '-';
      document.getElementById('ro-mobile').innerText = card['手機號碼'] || card['Mobile'] || '-';
      
      document.getElementById('readonly-card-modal').classList.remove('hidden');
  };

  window.closeReadOnlyCard = function() {
      document.getElementById('readonly-card-modal').classList.add('hidden');
  };

  // =========================================================================
  // 圖片裁切與 AI 辨識邏輯
  // =========================================================================
  window.openCropper = function(input, targetMode) {
      const file = input.files[0]; if (!file) return;
      currentCropTarget = targetMode; 

      const reader = new FileReader();
      reader.onload = (e) => {
          const img = document.getElementById('cropper-image'); 
          if(!img) return;

          img.onload = () => {
              document.getElementById('section-image-cropper').classList.remove('hidden');
              if (cropperInstance) cropperInstance.destroy();
              img.style.opacity = '1';
              
              cropperInstance = new Cropper(img, { 
                  aspectRatio: NaN, 
                  viewMode: 1, 
                  dragMode: 'move', 
                  autoCropArea: 0.9, 
                  guides: true, 
                  center: true, 
                  highlight: false 
              }); 
          };
          img.src = e.target.result; 
          img.style.opacity = '0';
          input.value = ""; 
      }; 
      reader.readAsDataURL(file); 
  };

  window.cancelCrop = function() { 
      if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; } 
      document.getElementById('section-image-cropper').classList.add('hidden'); 
      const img = document.getElementById('cropper-image');
      if(img) { img.removeAttribute('src'); img.style.opacity = '0'; }
  };

  window.confirmCrop = async function() { 
      if (!cropperInstance) return; 
      let quality = 0.8;
      let base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }).toDataURL('image/jpeg', quality); 
      
      while (base64.length > 400000 && quality > 0.1) {
          quality -= 0.1;
          base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1200, maxHeight: 1200 }).toDataURL('image/jpeg', quality);
      }
      
      cancelCrop(); 
      
      if (currentCropTarget === 'card') {
          regCompressedBase64 = base64;
          recognizeAndFillCard();
      } else if (currentCropTarget === 'ecard' || currentCropTarget === 'v2logo') {
          const previewImg = document.getElementById(currentCropTarget === 'v2logo' ? 'ec-v2-logo-preview' : 'ec-img-preview-box');
          const placeholder = document.getElementById(currentCropTarget === 'v2logo' ? 'ec-v2-logo-placeholder' : 'ec-upload-placeholder');
          const urlInput = document.getElementById(currentCropTarget === 'v2logo' ? 'ec-v2-logo-url' : 'ec-img-input');

          if(previewImg && placeholder && urlInput) {
              previewImg.src = base64; 
              previewImg.classList.remove('hidden'); 
              placeholder.classList.add('hidden'); 
              urlInput.value = base64; 
              if (typeof window.updateECardPreview === 'function') window.updateECardPreview(base64, currentCropTarget);
          }
      }
  };

  async function recognizeAndFillCard() {
      document.getElementById('view-list').classList.add('hidden');
      document.getElementById('view-process').classList.remove('hidden');
      document.getElementById('section-loading').classList.remove('hidden');
      document.getElementById('section-form').classList.add('hidden');
      document.getElementById('process-preview-image').src = regCompressedBase64;

      try {
          const data = await fetchAPI('recognizeCard', { base64Image: regCompressedBase64 });
          const fields = ['Name', 'EnglishName', 'Title', 'Department', 'CompanyName', 'TaxID', 'Mobile', 'Tel', 'Ext', 'Fax', 'Address', 'Email', 'Website', 'SocialMedia', 'Slogan'];
          fields.forEach(f => {
              const el = document.getElementById(`f-${f}`);
              if(el) el.value = data[f] || '';
          });
          
          document.getElementById('section-loading').classList.add('hidden');
          document.getElementById('section-form').classList.remove('hidden');
      } catch(err) {
          showToast("辨識失敗: " + err.message, true);
          resetUI();
      }
  }

  window.saveToCloud = async function() {
      const btn = document.getElementById('btn-save');
      btn.classList.add('pointer-events-none', 'opacity-70');
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 儲存中...';

      const payload = {
          base64Image: regCompressedBase64,
          userId: userProfile.userId,
          'LINE ID': userProfile.userId,
          Notes: document.getElementById('f-Notes').value,
          Birthday: ''
      };
      
      const fields = ['Name', 'EnglishName', 'Title', 'Department', 'CompanyName', 'TaxID', 'Mobile', 'Tel', 'Ext', 'Fax', 'Address', 'Email', 'Website', 'SocialMedia', 'Slogan'];
      fields.forEach(f => {
          const el = document.getElementById(`f-${f}`);
          if (el) payload[f] = el.value;
      });

      try {
          await fetchAPI('saveCard', payload);
          showToast("✅ 名片建立成功");
          resetUI();
          reloadCardContacts();
      } catch(err) {
          showToast("儲存失敗: " + err.message, true);
          btn.classList.remove('pointer-events-none', 'opacity-70');
          btn.innerHTML = '存入雲端 <span class="material-symbols-outlined text-[18px]">cloud_upload</span>';
      }
  };

  window.resetUI = function() {
      document.getElementById('view-process').classList.add('hidden');
      document.getElementById('view-list').classList.remove('hidden');
      document.getElementById('section-form').classList.add('hidden');
      document.getElementById('section-loading').classList.add('hidden');
      regCompressedBase64 = "";
  };

  // =========================================================================
  // 名片資料編輯邏輯
  // =========================================================================
  window.openCardEdit = function() {
      if(!window.currentActiveCard) return;
      const c = window.currentActiveCard;
      const fields = ['Name', 'EnglishName', 'Title', 'Department', 'CompanyName', 'TaxID', 'Mobile', 'Tel', 'Ext', 'Fax', 'Address', 'Email', 'Website', 'SocialMedia', 'Slogan', 'Notes', 'Birthday'];
      
      fields.forEach(f => {
          const el = document.getElementById(`edit-c-${f}`);
          if(el) {
              let val = c[f] || c[getZhKey(f)] || '';
              if(val === '-' || val === 'Not provided') val = '';
              el.value = val;
          }
      });
      
      document.getElementById('readonly-card-modal').classList.add('hidden');
      document.getElementById('card-edit-modal').classList.remove('hidden');
  };

  function getZhKey(f) {
      const map = {'Name':'姓名', 'EnglishName':'英文名/別名', 'Title':'職稱', 'Department':'部門', 'CompanyName':'公司名稱', 'TaxID':'統一編號', 'Mobile':'手機號碼', 'Tel':'公司電話', 'Ext':'分機', 'Fax':'傳真', 'Address':'公司地址', 'Email':'電子郵件', 'Website':'公司網址', 'SocialMedia':'社群帳號', 'Slogan':'服務項目/品牌標語', 'Notes':'建檔人/備註', 'Birthday':'生日'};
      return map[f] || f;
  }

  window.closeCardEdit = function() {
      document.getElementById('card-edit-modal').classList.add('hidden');
      document.getElementById('readonly-card-modal').classList.remove('hidden');
  };

  window.submitCardEdit = async function() {
      const btn = document.getElementById('btn-save-card-edit');
      btn.classList.add('pointer-events-none', 'opacity-70');
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 儲存中...';

      const payload = { rowId: window.currentActiveCard.rowId };
      const fields = ['Name', 'EnglishName', 'Title', 'Department', 'CompanyName', 'TaxID', 'Mobile', 'Tel', 'Ext', 'Fax', 'Address', 'Email', 'Website', 'SocialMedia', 'Slogan', 'Notes', 'Birthday'];
      
      fields.forEach(f => {
          const el = document.getElementById(`edit-c-${f}`);
          if(el) payload[f] = el.value;
      });

      try {
          await fetchAPI('updateCard', payload);
          showToast("✅ 名片資料更新成功");
          document.getElementById('card-edit-modal').classList.add('hidden');
          reloadCardContacts();
      } catch(err) {
          showToast("更新失敗: " + err.message, true);
      } finally {
          btn.classList.remove('pointer-events-none', 'opacity-70');
          btn.innerHTML = '儲存變更';
      }
  };

  // VOOM 關閉按鈕
  window.closeVoomModal = function() {
      const m = document.getElementById('voom-modal');
      if (m) m.classList.add('hidden');
  };

</script>
</body>
</html>
