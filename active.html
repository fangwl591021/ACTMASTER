<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null;
  let isProcessing = false;

  function setButtonLoading(btnId, isLoading, originalText = '') {
      const btn = document.getElementById(btnId);
      if (!btn) return false;
      if (isLoading) {
          if (!btn.dataset.oriText) btn.dataset.oriText = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px] align-middle">refresh</span> 處理中...';
          btn.classList.add('opacity-50', 'pointer-events-none');
          return true;
      } else {
          btn.innerHTML = originalText || btn.dataset.oriText || '送出';
          btn.classList.remove('opacity-50', 'pointer-events-none');
          return false;
      }
  }

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
      const resText = await response.text();
      let result; 
      try { result = JSON.parse(resText); } catch(e) { throw new Error(`連線錯誤，請確認 GAS 權限。`); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) { 
      showToast(err.message, true); 
      throw err; 
    }
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e?'error':'info'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded text-[15px] shadow-lg transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      if (ADMIN_IDS.includes(userProfile.userId)) {
          document.getElementById('view-loading').classList.add('hidden');
          document.getElementById('view-admin-create').classList.remove('hidden');
      } else {
          window.location.href = 'index.html';
      }
    } catch (err) { 
      document.getElementById('view-loading').innerHTML = `<p class="text-error font-bold">${err.message}</p>`;
    }
  };

  function toggleCreateMode(m) { 
    const tabs = ['quick', 'detailed', 'batch'];
    tabs.forEach(t => {
        const btn = document.getElementById('tab-' + t);
        const form = document.getElementById('form-' + t);
        if (m === t) {
            btn.className = `flex-1 py-2 rounded text-[14px] font-bold transition-all bg-white text-primary shadow-sm border border-slate-200`;
            form.classList.remove('hidden');
        } else {
            btn.className = `flex-1 py-2 rounded text-[14px] font-bold transition-all text-slate-500 hover:text-slate-700 border border-transparent`;
            form.classList.add('hidden');
        }
    });
  }
  
  function toggleFeeInput(modeStr) { 
      document.getElementById(modeStr + '-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); 
  }
  
  function addBatchItem() {
      const container = document.getElementById('batch-list-container');
      const id = Date.now();
      const html = `
      <div id="batch-item-${id}" class="bg-slate-50 border border-slate-300 rounded p-4 relative animate-in fade-in zoom-in-95 duration-200">
          <button onclick="removeBatchItem(${id})" class="absolute top-2.5 right-2.5 w-7 h-7 flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors bg-white border border-slate-200 rounded shadow-sm"><span class="material-symbols-outlined text-[18px]">delete</span></button>
          <div class="flex flex-col mb-4 pr-8">
              <label class="input-label !text-[13px] !text-slate-600">梯次名稱</label>
              <input type="text" class="custom-input batch-name-input !h-[38px] !text-[14px]" placeholder="例如：第一梯次 (7/1~7/5)">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">開始時間</label><input type="datetime-local" class="custom-input batch-start-input !h-[38px] !px-2 !text-[13px] text-slate-700"></div>
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">結束時間</label><input type="datetime-local" class="custom-input batch-end-input !h-[38px] !px-2 !text-[13px] text-slate-700"></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">收費 (NT$)</label><input type="number" class="custom-input batch-price-input !h-[38px] !text-[14px]" placeholder="免費請留空或0"></div>
              <div class="flex flex-col"><label class="input-label !text-[13px] !text-slate-600">人數限制</label><input type="number" class="custom-input batch-limit-input !h-[38px] !text-[14px]" placeholder="無限制請留空"></div>
          </div>
      </div>
      `;
      container.insertAdjacentHTML('beforeend', html);
  }

  function removeBatchItem(id) {
      const item = document.getElementById(`batch-item-${id}`);
      if (item) item.remove();
  }

  function previewFile(mode) { 
    const f = document.getElementById(`file-input-${mode}`).files[0]; 
    if(!f) return; 
    showToast("壓縮中...", false);
    const r = new FileReader(); 
    r.onloadend = () => { 
      const img = new Image(); 
      img.onload = () => { 
        let w = img.width, h = img.height, max = 800; 
        if(w > max){h=Math.round(h*(max/w)); w=max;} 
        const cvs = document.createElement('canvas'); cvs.width=w; cvs.height=h; 
        const ctx=cvs.getContext('2d'); ctx.fillStyle='#FFF'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); 
        
        let quality = 0.8;
        let b64=cvs.toDataURL('image/jpeg', quality); 
        
        while (b64.length > 40000 && quality > 0.1) { quality -= 0.1; b64 = cvs.toDataURL('image/jpeg', quality); }
        if (b64.length > 49000) return showToast("圖片過大", true);
        
        document.getElementById(`image-preview-${mode}`).src=b64; 
        document.getElementById(`image-preview-${mode}`).classList.remove('hidden'); 
        document.getElementById(`preview-placeholder-${mode}`).classList.add('hidden'); 
        const badge = document.getElementById(`upload-badge-${mode}`);
        if(badge) badge.classList.remove('hidden');
        document.getElementById(`in-image-url-${mode}`).value=b64; 
        showToast("✅ 完成");
      }; 
      img.src=r.result; 
    }; 
    r.readAsDataURL(f); 
  }

  async function handleCreateActivity(mode) { 
    if(isProcessing) return; isProcessing=true; 
    const btnId = `btn-${mode}-create`;
    const btnHtml = document.getElementById(btnId).innerHTML;
    setButtonLoading(btnId, true);
    
    let p = { 
        activityName: '', 
        activityType: '', 
        feeType: '免費', 
        price: '', 
        startTime: '', 
        endTime: '', 
        description: '', 
        imageUrl: '', 
        names: [], 
        defaultIdentity: '會員',
        isBatch: false,
        batches: []
    }; 
    
    if(mode === 'quick') {
        p.activityName = document.getElementById('quick-name').value.trim();
        p.activityType = document.getElementById('quick-type').value;
        p.defaultIdentity = document.getElementById('quick-identity').value;
        p.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
        p.imageUrl = document.getElementById('in-image-url-quick').value;
        p.startTime = document.getElementById('quick-start').value;
        p.endTime = document.getElementById('quick-end').value;
    } else if(mode === 'detailed') { 
        p.activityName = document.getElementById('detail-name').value.trim();
        p.activityType = document.getElementById('detail-type').value;
        p.defaultIdentity = document.getElementById('detail-identity').value;
        p.feeType = document.querySelector('input[name="fee-type"]:checked').value; 
        p.price = document.getElementById('detail-price').value; 
        p.startTime = document.getElementById('detail-start').value; 
        p.endTime = document.getElementById('detail-end').value; 
        p.description = document.getElementById('detail-desc').value; 
        p.imageUrl = document.getElementById('in-image-url-create').value; 
    } else if(mode === 'batch') {
        p.activityName = document.getElementById('batch-name').value.trim();
        p.activityType = document.getElementById('batch-type').value;
        p.defaultIdentity = document.getElementById('batch-identity').value;
        p.description = document.getElementById('batch-desc').value;
        p.imageUrl = document.getElementById('in-image-url-batch').value;
        p.isBatch = true;
        
        const container = document.getElementById('batch-list-container');
        const items = container.querySelectorAll('[id^="batch-item-"]');
        items.forEach(item => {
            p.batches.push({
                name: item.querySelector('.batch-name-input').value.trim(),
                startTime: item.querySelector('.batch-start-input').value,
                endTime: item.querySelector('.batch-end-input').value,
                price: item.querySelector('.batch-price-input').value,
                limit: item.querySelector('.batch-limit-input').value
            });
        });
    }
    
    if(!p.activityName) { isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("標題名稱必填", true); }

    if (mode === 'batch') {
        if (p.batches.length === 0) {
            isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("至少需新增一個梯次", true);
        }
        for(let b of p.batches) {
            if(!b.name) {
                isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("梯次名稱必填", true);
            }
        }
    }
    
    try { 
      await fetchAPI('bulkAddRegistrants', p); 
      showToast("✅ 已建立成功"); 
      sessionStorage.removeItem('getActivityDashboard{}'); 
      sessionStorage.removeItem('getPublicActivities{}');
      setTimeout(()=> window.location.href = 'index.html?view=admin-activities', 1000); 
    } catch(e){
      console.error(e);
    } finally{ 
      isProcessing=false; setButtonLoading(btnId, false, btnHtml); 
    }
  }
</script>
