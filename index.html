  const loadScript = (src) => new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  const loadCSS = (href) => new Promise((res, rej) => {

  async function fetchAPI(action, payload = {}, useCache = false) {
    const cacheKey = action + JSON.stringify(payload);
    if (useCache) {
      const cachedStr = sessionStorage.getItem(cacheKey);
      if (cachedStr) {
        try {
          const cachedData = JSON.parse(cachedStr);
          fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) })
            .then(r => r.text())
            .then(resText => {
                try {
                    const res = JSON.parse(resText);
                    if (res.success) sessionStorage.setItem(cacheKey, JSON.stringify(res.data));
                } catch(e) {}
            })
            .catch(e => console.log('Cache update failed', e));
          return cachedData;
        } catch(e) {
          sessionStorage.removeItem(cacheKey); 
        }
      }
    }
    
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000); 

      const response = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ action, payload }),
          signal: controller.signal
      });
      clearTimeout(timeoutId);

      const resText = await response.text();
      let result; 
      try { 
        result = JSON.parse(resText); 
      } catch(e) { 
        throw new Error(`伺服器回應異常:\n${resText.substring(0, 100)}`); 
      }
      
      if (!result.success) throw new Error(result.error);
      
      if (useCache) sessionStorage.setItem(cacheKey, JSON.stringify(result.data));
      return result.data;
    } catch (err) { 
      if (err.name === 'AbortError') err.message = '連線已經超時 (20秒)，請檢查網路或伺服器狀態。';
      throw err; 
    }
  }

  async function openCropper(input, targetMode) {
    const file = input.files[0]; if (!file) return;
    currentCropTarget = targetMode;

    if (!window.Cropper) {
       showToast("載入影像模組中...", false);
       await loadCSS("https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css");
       await loadScript("https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js");
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image'); 
      img.src = e.target.result; 
      img.style.opacity = '0';
      document.getElementById('section-image-cropper').classList.remove('hidden');
      if (cropperInstance) cropperInstance.destroy();
      
      const aspectRatio = currentCropTarget === 'reg' ? NaN : 4 / 3;

      setTimeout(() => { 
        img.style.opacity = '1'; 
        cropperInstance = new Cropper(img, { 
          aspectRatio: aspectRatio,
          viewMode: 1, 
          dragMode: 'move', 
          autoCropArea: 0.9, 
          guides: true, 
          center: true, 
          highlight: false 
        }); 
      }, 100);
    }; 
    reader.readAsDataURL(file); 
    input.value = ""; 
  }

  function cancelCrop() { 
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; } 
    document.getElementById('section-image-cropper').classList.add('hidden'); 
  }

  function confirmCrop() { 
    if (!cropperInstance) return; 
    let quality = 0.8;
    let base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/webp', quality); 
    
    while (base64.length > 40000 && quality > 0.1) {
       quality -= 0.1;
       base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/webp', quality);
    }
    if (base64.length > 49000) {
       return showToast("圖片仍過大，請裁切更小的範圍", true);
    }

    cancelCrop(); 

    if (currentCropTarget === 'reg') {
      regCompressedBase64 = base64;
      recognizeAndSaveRegCard();
    } else if (currentCropTarget === 'profile') {
      regCompressedBase64 = base64;
      recognizeAndSaveProfileCard();
    }
  }

  function openActivityDetailByName(name) {
    const act = globalPublicActivities.find(a => a.name === name); if (!act) return;
    const imgEl = document.getElementById('detail-modal-image');
    const noImgEl = document.getElementById('detail-modal-no-image');
    if (act.imageUrl) {
      imgEl.src = act.imageUrl; imgEl.classList.remove('hidden'); noImgEl.classList.add('hidden');
    } else {
      imgEl.src = ''; imgEl.classList.add('hidden'); noImgEl.classList.remove('hidden');
    }

    document.getElementById('detail-modal-type').innerText = act.type;
    const feeEl = document.getElementById('detail-modal-fee');
    feeEl.innerText = act.feeType === '收費' ? `NT$ ${act.price}` : '免費';
    feeEl.className = `px-2.5 py-0.5 text-[11px] font-bold rounded-md shadow-sm ${act.feeType === '收費' ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`;
    document.getElementById('detail-modal-title').innerText = act.name;

    document.getElementById('detail-modal-start').innerText = act.startTime ? formatTime(act.startTime) : '未定';
    const endContainer = document.getElementById('detail-modal-end-container');
    if (act.endTime) {
      document.getElementById('detail-modal-end').innerText = formatTime(act.endTime);
      endContainer.classList.remove('hidden');
    } else {
      endContainer.classList.add('hidden');
    }

    document.getElementById('detail-modal-desc').innerText = act.description || '主辦單位尚未提供說明。';

    let batches = [];
    try { 
        if (act.batches) batches = typeof act.batches === 'string' ? JSON.parse(act.batches) : act.batches; 
    } catch(e) {}
    
    const batchContainer = document.getElementById('detail-modal-batch-container');
    const batchSelect = document.getElementById('detail-modal-batch-select');
    
    batchSelect.onchange = function() {
        const selectedOpt = this.options[this.selectedIndex];
        const bPrice = parseInt(selectedOpt.dataset.price || 0);
        const bStart = selectedOpt.dataset.start;
        const bEnd = selectedOpt.dataset.end;

        if (bPrice > 0) {
            feeEl.innerText = `NT$ ${bPrice}`;
            feeEl.className = 'px-2.5 py-0.5 text-[11px] font-bold rounded-md shadow-sm bg-orange-50 text-orange-600 border border-orange-100';
        } else {
            feeEl.innerText = '免費';
            feeEl.className = 'px-2.5 py-0.5 text-[11px] font-bold rounded-md shadow-sm bg-emerald-50 text-emerald-600 border border-emerald-100';
        }

        if (bStart) document.getElementById('detail-modal-start').innerText = formatTime(bStart);
        if (bEnd) {
            document.getElementById('detail-modal-end').innerText = formatTime(bEnd);
            endContainer.classList.remove('hidden');
        } else {
            endContainer.classList.add('hidden');
        }
    };

    if (act.isBatch || batches.length > 0) {
        batchSelect.innerHTML = batches.map(b => {
            const tStr = b.startTime ? formatTimeShort(b.startTime) : '時間未定';
            const pStr = (b.price && parseInt(b.price) > 0) ? ` - NT$${b.price}` : ' - 免費';
            return `<option value="${b.name}" data-price="${b.price || 0}" data-start="${b.startTime || ''}" data-end="${b.endTime || ''}">${b.name} (${tStr}${pStr})</option>`;
        }).join('');
        batchContainer.classList.remove('hidden');
        batchSelect.onchange(); 
    } else {
        batchContainer.classList.add('hidden');
    }

    const joinBtn = document.getElementById('detail-modal-join-btn');
    joinBtn.onclick = async function() {
      let selectedBatchName = null;
      let finalFeeType = act.feeType;
      let finalPrice = act.price;

      if ((act.isBatch || batches.length > 0) && !batchContainer.classList.contains('hidden')) {
          selectedBatchName = batchSelect.value;
          const selectedOption = batchSelect.options[batchSelect.selectedIndex];
          const bPrice = parseInt(selectedOption.dataset.price || 0);
          if (bPrice > 0) {
              finalFeeType = '收費';
              finalPrice = bPrice;
          } else {
              finalFeeType = '免費';
              finalPrice = 0;
          }
      }

      closeActivityDetail(); 
      await userJoinActivity(this, act.name, finalFeeType, finalPrice, selectedBatchName);
    };

    document.getElementById('activity-detail-modal').classList.remove('hidden');
  }

  function renderAdminRegList(data) {
    const list = document.getElementById('admin-reg-list');
    if(!data.length) return list.innerHTML = `<div class="text-center py-16 bg-white rounded-3xl shadow-sm border border-slate-200 text-slate-400 font-bold mx-1">尚無名單或找不到符合者</div>`;
    
    let html = '';
    data.forEach(r => {
      const isCanceled = r.regStatus === '已取消'; const cIn = r.checkedIn;
      html += `
      <div class="bg-white rounded-2xl shadow-sm border ${cIn ? 'border-emerald-300 bg-emerald-50/50' : 'border-slate-200'} p-4 relative overflow-hidden transition-all ${isCanceled ? 'opacity-50 grayscale' : ''} mx-1">
        ${isCanceled ? '<div class="absolute top-0 right-0 bg-slate-500 text-white text-[10px] px-3 py-0.5 rounded-bl-lg">已取消</div>' : ''}
        <div class="flex justify-between items-start mb-3">
          <div class="flex flex-col">
            <h4 class="font-bold text-[15px] text-slate-800 flex items-center gap-1">${r['姓名']} ${cIn ? '<span class="material-symbols-outlined text-[15px] text-emerald-500 icon-filled">check_circle</span>' : ''}</h4>
            <p class="text-[11px] text-slate-500 font-medium mt-1">${r['電話'] || '無電話'}</p>
          </div>
          <button id="btn-chk-${r.rowId}" ${isCanceled ? 'disabled' : ''} onclick="toggleCheckIn(this, ${r.rowId}, ${cIn})" class="px-3 py-1.5 rounded-md flex items-center justify-center gap-1 transition-all font-bold text-[12px] ${cIn ? 'bg-emerald-500 text-white shadow-sm' : 'bg-white border border-slate-300 text-slate-600 active:scale-95 hover:bg-slate-50'}">
            <span class="material-symbols-outlined text-[16px] ${cIn?'icon-filled':''}">${cIn ? 'check_circle' : 'touch_app'}</span>
            ${cIn ? '已簽到' : '手動簽到'}
          </button>
        </div>
        <div class="flex items-center gap-2 pt-3 border-t ${cIn?'border-emerald-100':'border-slate-100'}">
           <select onchange="updatePayStatus(${r.rowId}, this.value)" class="text-[12px] font-bold border border-slate-300 bg-white rounded-md py-1.5 px-2 outline-none focus:ring-2 focus:ring-primary/20 cursor-pointer ${r.payStatus==='已繳費'?'text-emerald-600':(r.payStatus==='匯款審核中'?'text-amber-500':'text-red-500')}" ${isCanceled ? 'disabled' : ''}>
             <option value="未繳費" ${r.payStatus==='未繳費'?'selected':''}>未繳費</option><option value="匯款審核中" ${r.payStatus==='匯款審核中'?'selected':''}>審核中</option><option value="已完款" ${r.payStatus==='已完款'?'selected':''}>已完款</option>
           </select>
        </div>
      </div>`;
    });
    list.innerHTML = html;
  }

  async function toggleCheckIn(btn, rowId, currentStatus) { 
    if(isProcessing) return; isProcessing = true;
    setButtonLoading(btn.id, true);
    try { 
      await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: rowId, currentStatus: currentStatus }); 
      const reg = currentRegistrants.find(r => r.rowId === rowId); if(reg) reg.checkedIn = !currentStatus; 
      filterAdminReg(); 
    } catch(e) { 
      console.error(e); showToast("錯誤", true); 
    } finally { 
      isProcessing = false; 
    }
  }

  async function updatePayStatus(rowId, val) { try { await fetchAPI('updateCellStatus', { activityName: activeActivityName, rowId: rowId, colName: '繳費', val: val }); const reg = currentRegistrants.find(r => r.rowId === rowId); if(reg) reg.payStatus = val; } catch(e) {} }
  
  async function submitWalkIn() { 
    if(isProcessing) return;
    const name = document.getElementById('f-walkin-name').value; if(!name) return; 
    isProcessing = true;
    setButtonLoading('btn-walkin', true);
    try {
      await fetchAPI('addWalkIn', { activityName: activeActivityName, name: name }); 
      document.getElementById('f-walkin-name').value = ''; 
      document.getElementById('walkin-modal').classList.add('hidden'); 
      await openAdminRegistrants(activeActivityName); 
    } catch(e) { 
      console.error(e); 
    } finally { 
      isProcessing = false; 
      setButtonLoading('btn-walkin', false, '新增並自動簽到 <span class="material-symbols-outlined text-[20px]">how_to_reg</span>');
    }
  }

  async function startScanner() {
    if (html5QrcodeScanner) return;
    if (!window.Html5Qrcode) {
       showToast("載入掃描器...", false);
       await loadScript("https://unpkg.com/html5-qrcode");
    }
    document.getElementById('qr-scanner-modal').classList.remove('hidden');
    html5QrcodeScanner = new Html5Qrcode("qr-reader");
    html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
      async (decodedText) => { 
        stopScanner(); 
        try { 
          const uRes = await fetchAPI('checkUser', { userId: decodedText }); 
          if(!uRes.isRegistered) return showToast("非會員", true); 
          const name = uRes.info.name; 
          const reg = currentRegistrants.find(r => r['姓名'] === name); 
          if(reg) { 
            if(!reg.checkedIn) { 
              await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: reg.rowId, currentStatus: false }); 
              showToast(`${name} 簽到成功`); 
              openAdminRegistrants(activeActivityName);
            } else showToast("已簽到過"); 
          } else { 
            if(confirm(`未報名，是否現場報名簽到？`)) { 
              await fetchAPI('addWalkIn', { activityName: activeActivityName, name: name }); 
              openAdminRegistrants(activeActivityName); 
            } 
          } 
        } catch(e) {} 
      },
      () => {}
    ).catch(err => { showToast("相機錯誤", true); stopScanner(); });
  }
  function stopScanner() { if(html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }); } document.getElementById('qr-scanner-modal').classList.add('hidden'); }

  async function loadCrmData() { 
    const list = document.getElementById('admin-crm-list-container');
    list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>'; 
    try {
      globalCrmData = await fetchAPI('getAllCrmData', {}, true); 
      filteredCrmData = [...globalCrmData];
      currentCrmViewCount = crmPageLimit;
      renderCrmList(); 
    } catch(e) {
      list.innerHTML = `<p class="text-center text-red-400 font-bold py-10">載入失敗</p>`;
    }
  }

  function filterCrmList() { 
    const term = document.getElementById('crm-search-input').value.toLowerCase(); 
    filteredCrmData = globalCrmData.filter(u => u.name.toLowerCase().includes(term));
    currentCrmViewCount = crmPageLimit;
    renderCrmList(); 
  }

  function loadMoreCrm() {
    currentCrmViewCount += crmPageLimit;
    renderCrmList();
  }

  function renderCrmList() {
    const list = document.getElementById('admin-crm-list-container');
    const moreBtnBox = document.getElementById('crm-load-more-box');
    
    if(!filteredCrmData.length) {
      moreBtnBox.classList.add('hidden');
      return list.innerHTML = `<div class="text-center text-slate-400 py-16 text-[14px]">找不到符合的會員</div>`;
    }

    const displayItems = filteredCrmData.slice(0, currentCrmViewCount);
    
    let html = '';
    displayItems.forEach((r, i) => {
      html += `
      <div class="px-4 py-4 flex justify-between items-center border-b border-slate-100 active:bg-slate-50 transition-colors">
        <div class="flex items-center gap-4">
          <span class="text-[13px] text-slate-400 w-5 text-center">${i + 1}</span>
          <div class="flex flex-col">
            <span class="text-[16px] text-slate-800 font-medium">${r.name}</span>
            <span class="text-[11px] text-slate-400 uppercase tracking-tight">VIP Member</span>
          </div>
        </div>
        <div class="flex flex-col items-end">
          <span class="text-[15px] text-slate-700">${r.attended} 次</span>
          <span class="text-[10px] text-slate-400 font-medium uppercase">出席總計</span>
        </div>
      </div>`;
    });
    
    list.innerHTML = html;

    if (filteredCrmData.length > currentCrmViewCount) {
      moreBtnBox.classList.remove('hidden');
    } else {
      moreBtnBox.classList.add('hidden');
    }
  }

  async function loadAdminSettings() { const s = await fetchAPI('getSettings'); document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN || ''; document.getElementById('set-tg-chat').value = s.TG_CHAT_ID || ''; document.getElementById('set-line-link').value = s.LINE_LINK || ''; }
  async function autoFetchTgChatId() { const token = document.getElementById('set-tg-token').value; if(!token) return; document.getElementById('set-tg-chat').value = "獲取中..."; try { document.getElementById('set-tg-chat').value = await fetchAPI('getTgChatId', { token }); } catch(e) { document.getElementById('set-tg-chat').value = ""; } }
  
  async function submitSettings() { 
    if(isProcessing) return; isProcessing = true;
    setButtonLoading('btn-submit-settings', true);
    try {
      await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value, TG_CHAT_ID: document.getElementById('set-tg-chat').value, LINE_LINK: document.getElementById('set-line-link').value }); showToast("已儲存"); 
    } catch(e) { console.error(e); } finally { isProcessing = false; setButtonLoading('btn-submit-settings', false, '儲存設定'); }
  }
</script>
