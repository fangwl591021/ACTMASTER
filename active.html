<!-- Version: v1.3.1 (修復底部導覽列太淡與過細的 CSS 權重問題) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>建立新活動 - 報名大師</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#2563eb", 
            "primary-light": "#eff6ff", 
            background: "#ffffff", 
            "text-main": "#333333", 
            "text-muted": "#64748b", 
            error: "#ef4444" 
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; color: #333333; font-weight: 400; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[15px] text-[#64748b] mb-1.5 font-normal tracking-wide; }
    select.custom-input { -webkit-appearance: none !important; appearance: none !important; background-image: none !important; }
    .custom-input { @apply w-full py-3 px-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary transition-all text-text-main text-[15px]; }
    .custom-input::placeholder { @apply text-slate-400 font-normal; }
    
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-medium text-[16px] active:scale-[0.98] transition-all flex items-center justify-center gap-2; }
    .btn-add-row { @apply w-full py-3 border border-dashed border-[#06C755] text-[#06C755] bg-[#06C755]/5 rounded-xl text-[14px] font-medium flex items-center justify-center gap-1; }
    
    .tab-btn { @apply flex-1 py-3 text-[14px] font-medium transition-all text-slate-500 border-b-2 border-transparent bg-white; }
    .tab-active { @apply text-primary border-primary font-bold; }

    .batch-card { @apply bg-white border border-slate-200 rounded-xl p-4 mb-4 relative shadow-sm; }

    /* ⭐ 修正底部導航列：恢復標準 400 粗細與 slate-500 原生灰色 */
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-500 h-full; min-width: 48px;}
    .nav-btn .icon-box { @apply flex items-center justify-center mb-0.5; }
    .nav-btn .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; font-size: 24px; }
    
    .nav-active-btn { @apply text-slate-800 font-bold; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #1e293b; }

    .refresh-spin { animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col shadow-2xl overflow-hidden bg-background">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-200 shadow-sm">
    <div class="text-[18px] font-medium text-slate-800 flex items-center gap-2 tracking-tight">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center shadow-sm">
        <span class="material-symbols-outlined text-[20px]">add_circle</span>
      </div>
      建立新活動
      <span class="bg-slate-800 text-white text-[9px] px-2 py-0.5 rounded uppercase font-bold ml-1">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full object-cover border border-slate-200 shadow-sm">
      </div>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-16 px-5 space-y-6">

    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-400 text-[13px]">系統權限驗證中</p>
    </div>

    <div id="view-admin-create" class="hidden space-y-6 pt-4">
      <div class="mb-4">
        <p class="text-slate-500 text-[14px] mt-1 leading-relaxed">請選擇適合您的發佈模式，完成後將自動建立專屬的報名頁面與資料庫。</p>
      </div>

      <div class="flex border-b border-slate-200 sticky top-0 bg-white z-10 pt-2 pb-1">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="tab-btn tab-active">快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="tab-btn">完整發佈</button>
        <button onclick="toggleCreateMode('batch')" id="tab-batch" class="tab-btn">系列梯次</button>
      </div>
      
      <!-- 1. 快速模式 -->
      <div id="form-quick" class="space-y-5 animate-in fade-in">
        <div class="flex flex-col"><label class="input-label">活動名稱</label><input type="text" id="quick-name" class="custom-input" placeholder="例如：2026 商務交流會"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label">活動類型</label><select id="quick-type" class="custom-input cursor-pointer"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select></div>
          <div><label class="input-label">預設身份</label><select id="quick-identity" class="custom-input cursor-pointer"><option>會員</option><option>來賓</option></select></div>
        </div>
        <div class="flex flex-col"><label class="input-label">名單內容 (每行一位)</label><textarea id="quick-names" class="custom-input h-36 resize-none" placeholder="王小明&#10;李小華"></textarea></div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="btn-primary mt-2">建立並發布</button>
      </div>
      
      <!-- 2. 完整模式 -->
      <div id="form-detailed" class="hidden space-y-5 animate-in fade-in">
         <div class="flex flex-col"><label class="input-label">活動標題</label><input type="text" id="detail-name" class="custom-input" placeholder="輸入標題"></div>
         <div class="grid grid-cols-2 gap-4">
            <div><label class="input-label">開始時間</label><input type="datetime-local" id="detail-start" class="custom-input !px-1.5 !text-[13px]"></div>
            <div><label class="input-label">結束時間</label><input type="datetime-local" id="detail-end" class="custom-input !px-1.5 !text-[13px]"></div>
         </div>
         <div class="flex flex-col">
           <label class="input-label">收費方式</label>
           <div class="flex gap-4 items-center h-[46px] px-3 bg-slate-50 border border-slate-200 rounded-lg">
             <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2"><span class="font-normal text-[14px] text-slate-700">免費</span></label>
             <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2"><span class="font-normal text-[14px] text-slate-700">收費</span></label>
           </div>
         </div>
         <div class="flex flex-col"><input type="number" id="detail-price" class="custom-input hidden h-[46px]" placeholder="金額 (NT$)"></div>
         <div class="flex flex-col"><label class="input-label">活動說明</label><textarea id="detail-desc" class="custom-input h-32 resize-none" placeholder="詳細內容..."></textarea></div>
         <button onclick="handleCreateActivity('detailed')" id="btn-detailed-create" class="btn-primary mt-4">發布單場活動</button>
      </div>

      <!-- 3. 系列梯次模式 -->
      <div id="form-batch" class="hidden space-y-5 animate-in fade-in">
        <div class="flex flex-col"><label class="input-label">主系列標題</label><input type="text" id="batch-name" class="custom-input" placeholder="例如：2026 AI 應用實戰班"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label">活動類型</label><select id="batch-type" class="custom-input cursor-pointer"><option>課程</option><option>教學</option><option>講座</option><option>例會</option><option>聯誼</option><option>參訪</option><option>其他</option></select></div>
          <div><label class="input-label">預設身份</label><select id="batch-identity" class="custom-input cursor-pointer"><option>會員</option><option>來賓</option></select></div>
        </div>
        <div class="flex flex-col"><label class="input-label">系列共同說明</label><textarea id="batch-desc" class="custom-input h-24 resize-none" placeholder="輸入此系列活動的統整說明..."></textarea></div>

        <div class="pt-2">
          <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
            <span class="text-[15px] font-medium text-slate-800">梯次與排程設定</span>
          </div>
          <div id="batch-list-container">
            <!-- 梯次項目由 JS 動態生成 -->
          </div>
          <button onclick="addBatchItem()" class="btn-add-row mt-4">
            <span class="material-symbols-outlined text-[18px]">add_circle</span> 新增一個梯次
          </button>
        </div>

        <button onclick="handleCreateActivity('batch')" id="btn-batch-create" class="btn-primary mt-6">發布系列梯次</button>
      </div>

    </div>
  </main>

  <!-- 底部導航 Admin：注意建立按鈕是 Active，其他按鈕跳回 index.html -->
  <nav id="bottom-nav-admin" class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-evenly items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40 hidden">
    <button onclick="window.location.href='active.html'" class="nav-btn nav-active-btn" id="nav-admin-create"><div class="icon-box"><span class="material-symbols-outlined">add_circle</span></div><span class="text-[10px] font-bold mt-0.5">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn" id="nav-admin-activities"><div class="icon-box"><span class="material-symbols-outlined">fact_check</span></div><span class="text-[10px] font-normal mt-0.5">核銷</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn" id="nav-admin-crm"><div class="icon-box"><span class="material-symbols-outlined">groups</span></div><span class="text-[10px] font-normal mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] font-normal mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">recent_patient</span></div><span class="text-[10px] font-normal mt-0.5">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn" id="nav-admin-settings"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] font-normal mt-0.5">參數</span></button>
  </nav>

</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isProcessing = false;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      
      const isAdminUser = ADMIN_IDS.includes(userProfile.userId);
      document.getElementById('view-loading').classList.add('hidden');
      
      if (isAdminUser) {
        document.getElementById('user-profile-badge').classList.remove('hidden');
        document.getElementById('view-admin-create').classList.remove('hidden');
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
        
        // 初始化第一個梯次
        if(document.getElementById('batch-list-container').children.length === 0) addBatchItem();
      } else {
        // 如果不是管理員，強制踢回首頁
        window.location.href = 'index.html';
      }
    } catch (err) { 
      alert("初始化失敗：" + err.message);
    }
  });

  // 切換建立模式
  function toggleCreateMode(m) { 
    ['quick', 'detailed', 'batch'].forEach(t => {
      const btn = document.getElementById('tab-' + t);
      const form = document.getElementById('form-' + t);
      if(btn) btn.className = (m === t) ? 'tab-btn tab-active' : 'tab-btn';
      if(form) form.classList.toggle('hidden', m !== t);
    });

    if (m === 'batch' && document.getElementById('batch-list-container').children.length === 0) {
      addBatchItem();
    }
  }

  function toggleFeeInput() { document.getElementById('detail-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); }

  // 新增梯次項目
  function addBatchItem(data = null) {
    const container = document.getElementById('batch-list-container');
    const id = Date.now() + Math.floor(Math.random() * 100);
    const html = `
      <div id="batch-item-${id}" class="batch-card animate-in fade-in slide-in-from-top-2">
        <div class="flex justify-between items-center mb-3">
          <span class="text-[13px] text-slate-500 font-bold bg-slate-100 px-2 py-1 rounded">梯次細節</span>
          <div class="flex gap-3">
            <button onclick="copyBatchItem('${id}')" class="text-slate-400 hover:text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-[20px]">content_copy</span></button>
            <button onclick="removeBatchItem('${id}')" class="text-slate-400 hover:text-red-500 active:scale-90 transition-transform"><span class="material-symbols-outlined text-[20px]">delete</span></button>
          </div>
        </div>
        <div class="mb-3">
          <input type="text" class="custom-input batch-name-input bg-slate-50" placeholder="梯次名稱，如：第一場 (10/01)" value="${data?.name || ''}">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">開始時間</label><input type="datetime-local" class="custom-input batch-start-input !py-2 !text-[13px] bg-slate-50" value="${data?.start || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">結束時間</label><input type="datetime-local" class="custom-input batch-end-input !py-2 !text-[13px] bg-slate-50" value="${data?.end || ''}"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">費用</label><input type="number" class="custom-input batch-price-input !py-2 !text-[13px] bg-slate-50" placeholder="免費填0" value="${data?.price || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">名額限制</label><input type="number" class="custom-input batch-limit-input !py-2 !text-[13px] bg-slate-50" placeholder="不限留空" value="${data?.limit || ''}"></div>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
  }

  function removeBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (el) {
      if (document.querySelectorAll('[id^="batch-item-"]').length <= 1) return alert('系列活動至少需要一個梯次');
      el.remove();
    }
  }

  function copyBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (!el) return;
    addBatchItem({
      name: el.querySelector('.batch-name-input').value,
      start: el.querySelector('.batch-start-input').value,
      end: el.querySelector('.batch-end-input').value,
      price: el.querySelector('.batch-price-input').value,
      limit: el.querySelector('.batch-limit-input').value
    });
  }

  // 提交活動建立
  async function handleCreateActivity(mode) { 
    if(isProcessing) return; 
    const name = document.getElementById(mode === 'batch' ? 'batch-name' : (mode === 'quick' ? 'quick-name' : 'detail-name')).value.trim();
    if(!name) return alert('請填寫活動名稱');

    isProcessing = true;
    const btnId = `btn-${mode}-create`;
    const btn = document.getElementById(btnId);
    const oriText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px] align-middle">refresh</span> 處理中...';
    btn.disabled = true;

    let p = { 
      activityName: name,
      activityType: '例會', 
      feeType: '免費',
      price: '',
      startTime: '',
      endTime: '',
      description: '',
      imageUrl: '',
      names: [],
      defaultIdentity: '來賓',
      isBatch: (mode === 'batch'),
      userId: userProfile.userId
    }; 
    
    if(mode==='quick') {
      p.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
      p.activityType = document.getElementById('quick-type').value;
      p.defaultIdentity = document.getElementById('quick-identity').value;
    } else if(mode==='detailed') {
      p.activityType = document.getElementById('detail-type').value;
      p.defaultIdentity = document.getElementById('detail-identity').value;
      const feeRadio = document.querySelector('input[name="fee-type"]:checked');
      p.feeType = feeRadio ? feeRadio.value : '免費'; 
      p.price = document.getElementById('detail-price').value; 
      p.startTime = document.getElementById('detail-start').value; 
      p.endTime = document.getElementById('detail-end').value; 
      p.description = document.getElementById('detail-desc').value;
    } else if(mode==='batch') {
      p.activityType = document.getElementById('batch-type').value;
      p.defaultIdentity = document.getElementById('batch-identity').value;
      p.description = document.getElementById('batch-desc').value;
      const cards = document.querySelectorAll('[id^="batch-item-"]');
      p.batches = Array.from(cards).map(card => ({
        name: card.querySelector('.batch-name-input').value.trim(),
        startTime: card.querySelector('.batch-start-input').value,
        endTime: card.querySelector('.batch-end-input').value,
        price: card.querySelector('.batch-price-input').value,
        limit: card.querySelector('.batch-limit-input').value
      }));

      if(p.batches.length > 0) {
           p.startTime = p.batches[0].startTime;
           p.endTime = p.batches[p.batches.length - 1].endTime;
           const hasPaid = p.batches.some(b => parseInt(b.price) > 0);
           if (hasPaid) {
               p.feeType = '收費';
               p.price = Math.max(...p.batches.map(b => parseInt(b.price) || 0)); 
           }
      }
    }
    
    try { 
      const response = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'bulkAddRegistrants', payload: p }) 
      });
      const res = await response.json();
      if (!res.success) throw new Error(res.error);

      alert('✅ 活動建立成功！');
      
      sessionStorage.removeItem('getActivityDashboard{}');
      window.location.href = 'index.html?view=admin-activities';
      
    } catch(e) { 
      alert('建立失敗：' + e.message);
      btn.innerHTML = oriText;
      btn.disabled = false;
      isProcessing = false;
    }
  }
</script>
</body>
</html>
