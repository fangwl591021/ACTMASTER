<script>
  const LIFF_ID = "2009367829-DLtYBDUm";
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
  
  let batchCount = 0;
  let currentCropTarget = '';
  let cropperInstance = null;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      const profile = await liff.getProfile();
      if (!ADMIN_IDS.includes(profile.userId)) { 
          alert("無權限存取此頁面");
          window.location.href = 'index.html'; 
          return; 
      }
      
      addBatchRow();
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('form-content').classList.remove('hidden');
    } catch(e) { 
        alert("LINE 初始化失敗，請重新載入"); 
    }
  });

  function switchTab(tabId) {
      ['quick', 'full', 'series'].forEach(id => {
          document.getElementById(`tab-content-${id}`).classList.add('hidden');
          const btn = document.getElementById(`tab-btn-${id}`);
          btn.className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700 bg-transparent';
      });
      document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
      document.getElementById(`tab-btn-${tabId}`).className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-white text-blue-600 shadow-sm transition-all';
  }

  function togglePrice(prefix) {
      const feeType = document.querySelector(`input[name="${prefix}-fee-type"]:checked`).value;
      const priceBox = document.getElementById(`${prefix}-price-box`);
      if (feeType === '收費') {
          priceBox.classList.remove('hidden');
      } else {
          priceBox.classList.add('hidden');
          document.getElementById(`${prefix}-price`).value = '';
      }
  }

  function addBatchRow(defaultValues = null, insertAfterId = null) {
      batchCount++;
      const container = document.getElementById('batch-container');
      const rowId = `batch-${batchCount}`;
      const html = `
      <div id="${rowId}" class="bg-slate-50 p-4 rounded-2xl relative border-none animate-in slide-in-from-top-2">
          <div class="absolute top-3 right-3 flex gap-1.5 z-10">
              <button onclick="copyBatchRow('${rowId}')" class="w-8 h-8 bg-white text-blue-500 hover:bg-blue-50 rounded-full flex items-center justify-center shadow-sm transition-colors" title="複製此梯次"><span class="material-symbols-outlined text-[15px]">content_copy</span></button>
              ${batchCount > 1 || insertAfterId ? `<button onclick="document.getElementById('${rowId}').remove()" class="w-8 h-8 bg-white text-slate-400 hover:text-red-500 rounded-full flex items-center justify-center shadow-sm transition-colors" title="刪除此梯次"><span class="material-symbols-outlined text-[18px]">close</span></button>` : ''}
          </div>
          <div class="flex flex-col mb-3 pr-20">
              <input type="text" id="${rowId}-name" class="custom-input !h-[44px] !bg-white shadow-sm" placeholder="梯次名稱 (例如: 台北平日班)" value="${defaultValues ? defaultValues.name : ''}">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
              <input type="datetime-local" id="${rowId}-start" class="custom-input !h-[44px] !bg-white shadow-sm !text-[13px] !px-3 text-slate-600" value="${defaultValues ? defaultValues.start : ''}">
              <input type="datetime-local" id="${rowId}-end" class="custom-input !h-[44px] !bg-white shadow-sm !text-[13px] !px-3 text-slate-600" value="${defaultValues ? defaultValues.end : ''}">
          </div>
          <div class="flex items-center gap-2">
              <span class="text-[13px] font-bold text-slate-500 shrink-0 ml-1">收費 NT$</span>
              <input type="number" id="${rowId}-price" class="custom-input !h-[44px] !bg-white shadow-sm" placeholder="免費請留空或填 0" value="${defaultValues ? defaultValues.price : ''}">
          </div>
      </div>
      `;
      if (insertAfterId) document.getElementById(insertAfterId).insertAdjacentHTML('afterend', html);
      else container.insertAdjacentHTML('beforeend', html);
  }

  function copyBatchRow(sourceId) {
      const srcName = document.getElementById(`${sourceId}-name`).value;
      const srcStart = document.getElementById(`${sourceId}-start`).value;
      const srcEnd = document.getElementById(`${sourceId}-end`).value;
      const srcPrice = document.getElementById(`${sourceId}-price`).value;
      addBatchRow({ name: srcName ? srcName + ' (複製)' : '', start: srcStart, end: srcEnd, price: srcPrice }, sourceId);
  }

  function openCropper(input, targetMode) {
    const file = input.files[0]; if (!file) return;
    currentCropTarget = targetMode;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image'); 
      if(!img) return;

      img.onload = () => {
          document.getElementById('section-image-cropper').classList.remove('hidden');
          if (cropperInstance) cropperInstance.destroy();
          img.style.opacity = '1';
          
          cropperInstance = new Cropper(img, { 
            aspectRatio: NaN, 
            viewMode: 1, 
            dragMode: 'crop', 
            autoCropArea: 0.9, 
            guides: true, 
            center: true, 
            highlight: false 
          }); 
      };
      img.src = e.target.result; 
      img.style.opacity = '0';
      input.value = ""; 
    }; 
    reader.readAsDataURL(file); 
  }

  function cancelCrop() { 
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; } 
    document.getElementById('section-image-cropper').classList.add('hidden'); 
    
    const img = document.getElementById('cropper-image');
    if(img) { img.src = 'data:,'; img.style.opacity = '0'; }
  }

  // ⭐ QQ 防呆修復：統一提取動態 ID 變數，解決 undefined 報錯問題
  function confirmCrop() { 
    if (!cropperInstance) return; 
    let size = 250;
    let quality = 0.6;
    let base64 = cropperInstance.getCroppedCanvas({ maxWidth: size, maxHeight: size }).toDataURL('image/jpeg', quality); 
    
    while (base64.length > 48000 && quality > 0.1) {
       quality -= 0.1;
       base64 = cropperInstance.getCroppedCanvas({ maxWidth: size, maxHeight: size }).toDataURL('image/jpeg', quality);
    }
    if (base64.length > 49000) {
        cancelCrop();
        return alert("⚠️ 圖片內容太複雜無法壓縮，請選擇其他單純一點的圖片");
    }

    cancelCrop(); 
    
    const modeId = currentCropTarget; // 'quick', 'detailed', 'batch'
    
    // ⭐ 精準對齊 HTML 中的 ID
    const previewImg = document.getElementById(`image-preview-${modeId}`);
    const placeholder = document.getElementById(`preview-placeholder-${modeId}`);
    const urlInput = document.getElementById(`in-image-url-${modeId}`);

    if(previewImg && placeholder && urlInput) {
        previewImg.src = base64; 
        previewImg.classList.remove('hidden'); 
        placeholder.classList.add('hidden'); 
        urlInput.value = base64; 
    } else {
        alert("⚠️ 系統找不到對應的預覽區塊，請通知管理員");
    }
  }

  const formatDT = (val) => {
      if (!val) return '';
      return val.replace('T', ' ');
  };

  async function handleSubmit(mode) { 
    let isProcessing = false;
    if(isProcessing) return; 
    
    const nameInput = document.getElementById(mode === 'batch' ? 'batch-name' : (mode === 'quick' ? 'q-name' : 'detail-name'));
    const name = nameInput ? nameInput.value.trim() : '';
    if(!name) { alert('⚠️ 請填寫活動名稱'); return nameInput?.focus(); }

    const btnId = `btn-submit-${mode}`;
    const btn = document.getElementById(btnId);
    const oriText = btn ? btn.innerHTML : '建立';
    isProcessing = true;
    
    if (btn) {
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-1 text-[20px]">refresh</span> 處理中...';
        btn.disabled = true;
        btn.classList.add('opacity-70');
    }

    let p = { 
      activityName: name,
      activityType: '例會', 
      feeType: '免費',
      price: '',
      startTime: '',
      endTime: '',
      description: '',
      imageUrl: '',
      names: [],
      defaultIdentity: '來賓',
      isBatch: (mode === 'batch'),
      userId: userProfile.userId
    }; 
    
    if(mode==='quick') {
      const feeRadioQ = document.querySelector('input[name="quick-fee-type"]:checked');
      p.feeType = feeRadioQ ? feeRadioQ.value : '免費';
      p.price = document.getElementById('quick-price') ? document.getElementById('quick-price').value : '';
      if(p.feeType === '收費' && (!p.price || p.price <= 0)) {
          isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return alert("⚠️ 請輸入正確的收費金額");
      }
      p.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
      p.activityType = document.getElementById('quick-type').value;
      p.defaultIdentity = document.getElementById('quick-identity').value;
      p.startTime = formatDT(document.getElementById('quick-start') ? document.getElementById('quick-start').value : '');
      p.endTime = formatDT(document.getElementById('quick-end') ? document.getElementById('quick-end').value : '');
      p.description = document.getElementById('quick-desc') ? document.getElementById('quick-desc').value.trim() : '';
      p.imageUrl = document.getElementById('in-image-url-quick') ? document.getElementById('in-image-url-quick').value : '';
      
    } else if(mode==='detailed') {
      p.activityType = document.getElementById('detail-type') ? document.getElementById('detail-type').value : '例會';
      p.defaultIdentity = document.getElementById('detail-identity') ? document.getElementById('detail-identity').value : '來賓';
      const feeRadioD = document.querySelector('input[name="detailed-fee-type"]:checked');
      p.feeType = feeRadioD ? feeRadioD.value : '免費'; 
      p.price = document.getElementById('detail-price') ? document.getElementById('detail-price').value : ''; 
      if(p.feeType === '收費' && (!p.price || p.price <= 0)) {
          isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return alert("⚠️ 請輸入正確的收費金額");
      }
      p.startTime = formatDT(document.getElementById('detail-start').value); 
      p.endTime = formatDT(document.getElementById('detail-end').value); 
      p.description = document.getElementById('detail-desc').value;
      p.imageUrl = document.getElementById('in-image-url-detailed') ? document.getElementById('in-image-url-detailed').value : '';
      
    } else if(mode==='batch') {
      p.activityType = document.getElementById('batch-type').value;
      p.defaultIdentity = document.getElementById('batch-identity').value;
      p.description = document.getElementById('batch-desc').value;
      p.imageUrl = document.getElementById('in-image-url-batch') ? document.getElementById('in-image-url-batch').value : '';
      const cards = document.querySelectorAll('[id^="batch-item-"]');
      p.batches = Array.from(cards).map(card => ({
        name: card.querySelector('.batch-name-input').value.trim(),
        startTime: formatDT(card.querySelector('.batch-start-input').value),
        endTime: formatDT(card.querySelector('.batch-end-input').value),
        price: card.querySelector('.batch-price-input').value,
        limit: card.querySelector('.batch-limit-input').value
      }));
      if(p.batches.length === 0) { isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return alert("⚠️ 至少需新增一個梯次"); }
      for(let b of p.batches) { if(!b.name) { isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return alert("⚠️ 梯次名稱必填"); } }
      if(p.batches.length > 0) {
           p.startTime = p.batches[0].startTime;
           p.endTime = p.batches[p.batches.length - 1].endTime;
           const hasPaid = p.batches.some(b => parseInt(b.price) > 0);
           if (hasPaid) {
               p.feeType = '收費';
               p.price = Math.max(...p.batches.map(b => parseInt(b.price) || 0)); 
           }
      }
    }
    
    try { 
      const response = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'bulkAddRegistrants', payload: p }) 
      });
      const res = await response.json();
      if (!res.success) throw new Error(res.error);

      alert('🎉 活動建立成功！即將跳轉...');
      sessionStorage.removeItem('getActivityDashboard{}');
      setTimeout(() => { window.location.href = 'index.html?view=admin-activities'; }, 1500);
    } catch(e) { 
      alert('⚠️ 建立失敗：' + e.message);
    } finally {
      if(btn) { btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70'); }
      isProcessing = false;
    }
  }
</script>
