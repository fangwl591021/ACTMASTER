<!-- Version: v1.6.10 (修理版：還原資訊流樣式與權限鎖，徹底隔離非管理員介面) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb", background: "#ffffff", "text-main": "#333333" }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; color: #333333; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .input-label { @apply block text-[15px] text-[#64748b] mb-1 font-normal; }
    .custom-input { @apply w-full h-[46px] px-3 bg-white border-b border-slate-200 outline-none focus:border-primary transition-colors text-[15px] rounded-none shadow-none; }
    .textarea-block { @apply w-full p-3 bg-white border border-slate-200 rounded-lg outline-none focus:border-primary text-[15px] resize-none leading-relaxed; }
    
    /* 底部選單樣式：全黑選取 */
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full font-normal; min-width: 48px;}
    .nav-btn .icon-box { @apply flex items-center justify-center mb-0.5; }
    .nav-btn .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; font-size: 24px; color: inherit; }
    .nav-active-btn { @apply text-black font-normal; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #000000; }
  </style>
</head>
<body class="font-sans">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col bg-white overflow-hidden mx-auto shadow-2xl">
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100">
    <div class="text-[18px] font-normal text-slate-800 flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center"><span class="material-symbols-outlined text-[20px]">recent_patient</span></div>
      名片管理
    </div>
    <div id="user-profile-badge" class="hidden"><img id="user-avatar" class="w-8 h-8 rounded-full object-cover border border-slate-100"></div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-16">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-400 text-[13px]">權限驗證中</p>
    </div>

    <!-- 名片列表 -->
    <div id="view-list" class="hidden animate-in fade-in">
      <div id="admin-tools" class="hidden px-5 pt-4 space-y-5">
        <div class="bg-slate-50 rounded-2xl p-6 text-center border border-slate-100">
          <h3 class="text-[16px] font-normal text-slate-800 mb-4">AI 智慧名片辨識</h3>
          <div class="flex gap-3">
            <button onclick="document.getElementById('card-camera').click()" class="w-full py-4 bg-[#06C755] text-white rounded-xl font-normal text-[16px] active:scale-95 flex items-center justify-center gap-2">相機辨識</button>
            <button onclick="document.getElementById('card-upload').click()" class="w-20 border border-slate-200 rounded-xl text-slate-500 text-[14px]">相簿</button>
          </div>
          <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="window.openCropper(this)">
          <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="window.openCropper(this)">
        </div>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
          <input type="text" id="card-search-input" onkeyup="window.filterCardList()" class="w-full h-[48px] pl-12 pr-4 bg-slate-100 border-none rounded-2xl text-[15px] outline-none" placeholder="搜尋姓名或公司...">
        </div>
      </div>
      <div id="card-list-container" class="mt-4 px-5 space-y-1"></div>
    </div>

    <!-- AI 確認表單 -->
    <div id="view-process" class="hidden space-y-6 animate-in fade-in pt-4 px-5 pb-20">
      <button onclick="window.resetUI()" class="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-400"><span class="material-symbols-outlined">arrow_back</span></button>
      <div id="section-loading" class="hidden py-10 text-center"><div class="w-10 h-10 border-4 border-slate-100 border-t-primary rounded-full animate-spin mx-auto mb-4"></div><h3 class="text-slate-800">AI 運算中...</h3></div>
      <div id="section-form" class="hidden space-y-1">
        <img id="process-preview-image" class="w-full rounded-2xl border mb-4">
        <label class="input-label">姓名</label><input type="text" id="f-Name" class="custom-input">
        <label class="input-label">公司</label><input type="text" id="f-CompanyName" class="custom-input">
        <label class="input-label">電話</label><input type="tel" id="f-Mobile" class="custom-input">
        <label class="input-label mt-4">品牌標語 / 服務項目</label><textarea id="f-Slogan" class="textarea-block h-24"></textarea>
        <button id="btn-save-confirm" onclick="window.saveToCloud()" class="w-full py-4 bg-[#06C755] text-white rounded-xl mt-6">確認存入雲端</button>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-evenly items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40 shadow-sm">
    <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">add_circle</span></div><span class="text-[10px] mt-0.5">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">fact_check</span></div><span class="text-[10px] mt-0.5">核銷</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">groups</span></div><span class="text-[10px] mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn nav-active-btn"><div class="icon-box"><span class="material-symbols-outlined">recent_patient</span></div><span class="text-[10px] mt-0.5">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] mt-0.5">參數</span></button>
  </nav>
</div>

<!-- 名片詳情 Modal -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-white flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0 z-[1000]">
  <div class="absolute top-4 right-4 z-[1010] flex gap-2">
    <button id="btn-card-edit" onclick="window.openCardEdit()" class="hidden w-9 h-9 bg-white/90 rounded-full flex items-center justify-center text-primary shadow-sm border border-slate-100"><span class="material-symbols-outlined text-[18px]">edit</span></button>
    <button onclick="window.closeReadOnlyCard()" class="w-9 h-9 bg-black/50 rounded-full flex items-center justify-center text-white"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="flex-1 overflow-y-auto pb-28">
    <div id="ro-hero" class="w-full h-64 bg-slate-50 flex items-center justify-center">
        <img id="ro-image" class="w-full h-full object-contain hidden">
        <div id="ro-no-image" class="text-slate-200"><span class="material-symbols-outlined text-6xl">contact_mail</span></div>
    </div>
    <div class="p-6 space-y-6">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <h2 id="ro-name" class="text-2xl font-normal text-slate-800">姓名</h2>
          <span id="ro-claim-badge" class="hidden px-2 py-0.5 rounded-md text-[10px] border"></span>
        </div>
        <p id="ro-title-dept" class="text-slate-500"></p>
      </div>
      <div class="space-y-4 text-[15px]">
        <div class="flex gap-4"><span class="material-symbols-outlined text-slate-300">apartment</span><span id="ro-company"></span></div>
        <div class="flex gap-4"><span class="material-symbols-outlined text-slate-300">smartphone</span><a id="ro-mobile-link" class="text-blue-600"></a></div>
        <div id="ro-fate-section" class="pt-6 border-t border-slate-100 hidden">
          <h3 class="text-[13px] font-medium text-primary mb-3 flex items-center gap-1.5"><span class="material-symbols-outlined text-[18px]">psychology</span> AI 命理標籤</h3>
          <div id="ro-fate-tags" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="admin-action-bar" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 border-t p-4 flex gap-3 z-[1010]">
    <button onclick="window.shareClaimLink()" class="flex-1 py-3.5 border rounded-xl text-slate-700">邀請認領</button>
    <button onclick="window.openECardGenerator()" class="flex-1 py-3.5 bg-slate-900 text-white rounded-xl">數位名片</button>
  </div>
</div>

<div id="cropper-modal" class="hidden fixed inset-0 bg-black flex flex-col z-[1080] w-full max-w-md mx-auto">
  <div class="flex justify-between items-center p-4 bg-black text-white shrink-0 border-b border-white/10">
    <button onclick="window.cancelCrop()" class="text-slate-400">取消</button>
    <span class="font-normal">裁切圖片</span>
    <button onclick="window.confirmCrop()" class="px-4 py-1.5 bg-primary rounded-lg text-sm">完成</button>
  </div>
  <div class="flex-1 relative bg-black flex items-center justify-center"><img id="cropper-image" class="max-w-full max-h-full block opacity-0"></div>
</div>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal flex items-center gap-2 w-max max-w-[90vw] bg-slate-800 text-white opacity-0 pointer-events-none"></div>

<script src="card.js"></script>
<script src="card-ecard.js"></script>
</body>
</html>
