<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let currentActivities = [], currentCheckinData = [], activeActivityName = '', modalTargetView = '';
  let isProcessing = false;

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { result = JSON.parse(resText); } catch(e) { throw new Error("伺服器連線異常，請確認 GAS 部署權限。"); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true); throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) switchView('user-activities');
        else { document.getElementById('reg-name').value = userProfile.displayName; switchView('user-register'); }
      }
    } catch (err) { 
      document.getElementById('loading-text').innerHTML = `<span class="text-error font-bold">連線失敗</span><br><p class="text-xs text-slate-400 mt-2">${err.toString()}</p>`;
    }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('role-switch-btn').innerHTML = isViewModeAdmin ? '切換前台' : '切換後台';
    if (isViewModeAdmin) switchView('admin-activities');
    else { if (isRegistered) switchView('user-activities'); else switchView('user-register'); }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-edit', 'admin-crm', 'admin-settings'].forEach(v => {
      const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden'); navUser.classList.add('hidden');
    
    if (isAdmin && isViewModeAdmin && (view.startsWith('admin') || view === 'admin-activities')) {
      navAdmin.classList.remove('hidden');
      ['activities', 'create', 'settings'].forEach(k => {
        const btn = document.getElementById('nav-admin-'+k);
        if(btn) btn.className = `nav-btn ${view==='admin-'+k ? 'nav-active' : ''}`;
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin) && view.startsWith('user')) {
      navUser.classList.remove('hidden');
      ['activities', 'history', 'profile'].forEach(k => {
        const btn = document.getElementById('nav-user-'+k);
        if(btn) btn.className = `nav-btn ${view==='user-'+k ? 'nav-active' : ''}`;
      });
    }

    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  async function userJoinActivity(btn, name, feeType, price) {
    if (isProcessing) return;
    if (!confirm(`確定報名「${name}」？`)) return;
    isProcessing = true; btn.classList.add('btn-disabled');
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName: name });
      if (feeType === '收費') showModal("報名成功", `此為收費活動，請完成匯款 <b>NT$ ${price}</b> 後，至「報名查詢」填寫帳號後五碼供核對。`, "history");
      else showModal("報名成功", `報名成功！期待現場見到您。`, "activities");
    } finally { isProcessing = false; btn.classList.remove('btn-disabled'); }
  }

  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>';
    const data = await fetchAPI('getPublicActivities');
    if (!data || data.length === 0) { container.innerHTML = '<div class="text-center py-16 card border-none shadow-md text-slate-400">目前暫無公開活動</div>'; return; }
    container.innerHTML = data.map(act => `
      <div class="card overflow-hidden p-0 border-none shadow-xl transition-all duration-300">
        ${act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-48 object-cover">` : ''}
        <div class="p-6">
          <div class="flex items-center gap-2 mb-3"><span class="badge bg-primary/5 text-primary">${act.type}</span><span class="badge ${act.feeType==='收費'?'bg-tertiary-fixed text-on-tertiary-fixed':'bg-green-50 text-green-600'}">${act.feeType==='收費'?'NT$'+act.price:'免費'}</span></div>
          <h3 class="text-xl font-bold text-slate-800 leading-snug">${act.name}</h3>
          <p class="text-[13px] text-slate-400 mt-2 font-medium flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span> ${act.startTime ? formatTime(act.startTime) : '尚未指定時間'}</p>
          <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-6 py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary/10 active:scale-95 transition-all">我要報名</button>
        </div>
      </div>`).join('');
  }

  async function loadUserHistory() {
    const container = document.getElementById('user-history-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>';
    const history = await fetchAPI('getUserHistory', { userId: userProfile.userId });
    if (!history || history.length === 0) { container.innerHTML = '<div class="text-center py-16 card border-none shadow-md text-slate-400 font-medium">尚無報名紀錄</div>'; return; }
    container.innerHTML = history.map(item => `
      <div class="card space-y-4 shadow-lg border-none animate-in fade-in">
        <div class="flex justify-between items-start">
          <div class="flex-1 pr-2">
            <h4 class="text-lg font-bold text-slate-800">${item.name}</h4>
            <div class="flex items-center gap-2 mt-2">
              <span class="badge ${item.payStatus==='已完款'?'bg-blue-50 text-blue-600':(item.payStatus==='匯款審核中'?'bg-purple-50 text-purple-600':'bg-orange-50 text-orange-500')}">${item.payStatus}</span>
              <span class="badge ${item.regStatus==='正常'?'bg-green-50 text-green-600':'bg-slate-100 text-slate-400'}">${item.regStatus}</span>
            </div>
          </div>
          <div class="shrink-0 pt-1">${item.checkedIn ? '<span class="material-symbols-outlined text-green-500 text-3xl">task_alt</span>' : '<span class="material-symbols-outlined text-slate-200 text-3xl">pending</span>'}</div>
        </div>
        ${item.isPaidAct && item.regStatus === '正常' ? `
          <div class="flex gap-2 border-t border-slate-50 pt-4"><input type="text" id="last5-${item.name}" value="${item.last5}" placeholder="補填後五碼" maxlength="5" class="flex-1 py-2.5 text-sm font-bold shadow-inner"><button onclick="updateUserLast5('${item.name}')" class="bg-primary text-white px-5 rounded-xl font-bold text-sm shadow-md active:scale-95 transition-all">送出</button><button onclick="userCancelRegistration('${item.name}')" class="bg-white text-error px-4 rounded-xl font-bold text-sm border border-error/10">取消</button></div>
        ` : (item.regStatus === '正常' ? `<button onclick="userCancelRegistration('${item.name}')" class="w-full py-3 bg-slate-50 text-error rounded-xl font-bold text-sm mt-2 border border-slate-100">取消報名</button>` : '')}
      </div>`).join('');
  }

  async function loadAdminActivities() {
    const container = document.getElementById('admin-activity-list-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-primary text-xl"></i></div>';
    currentActivities = await fetchAPI('getActivityDashboard');
    container.innerHTML = currentActivities.map(act => `
      <div class="card space-y-4 shadow-xl border-none">
        <div class="flex justify-between items-start"><div><span class="badge bg-primary/5 text-primary mb-1 block w-fit">${act.type}</span><h3 class="text-lg font-bold text-slate-800 leading-tight">${act.name}</h3></div></div>
        <div class="grid grid-cols-3 gap-3 bg-surface-container-low rounded-2xl p-4 text-center">
          <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">報名</p><p class="font-bold text-lg text-slate-700">${act.total}</p></div>
          <div><p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">實到</p><p class="font-bold text-lg text-green-600">${act.attended}</p></div>
          <div><p class="text-[10px] text-error font-bold uppercase tracking-widest">取消</p><p class="font-bold text-lg text-error">${act.cancelled}</p></div>
        </div>
        <button onclick="openAdminCheckin('${act.name}')" class="w-full py-4 bg-primary text-white rounded-2xl font-bold text-sm shadow-lg shadow-primary/10 active:scale-95 transition-all">進入核銷簽到</button>
        <div class="flex justify-between px-2 text-[11px] font-bold uppercase tracking-wider"><button onclick="toggleActStatus('${act.name}')" class="text-slate-400 hover:text-slate-600">${act.status==='下架'?'設為上架':'設為下架'}</button><button onclick="deleteAct('${act.name}')" class="text-error hover:text-red-700">刪除活動</button></div>
      </div>`).join('');
  }

  async function openAdminCheckin(name) {
    activeActivityName = name; switchView('admin-checkin');
    currentCheckinData = await fetchAPI('getRegistrants', { activityName: name });
    document.getElementById('checkin-list-container').innerHTML = `<div class="bg-white/80 backdrop-blur-md p-5 sticky top-0 border-b border-slate-100 mb-3 flex items-center gap-4 z-30"><button onclick="switchView('admin-activities')" class="p-2.5 bg-slate-100 rounded-full text-slate-500 active:scale-90 transition-all"><span class="material-symbols-outlined">arrow_back</span></button><h2 class="font-bold truncate text-xl text-slate-800">${name}</h2></div>` + currentCheckinData.map(p => `<div class="card border-none shadow-md mb-4 mx-4 transition-all"><div class="flex justify-between items-center mb-5"><div class="flex-1"><h4 class="text-lg font-bold text-slate-800">${p.姓名}</h4><p class="text-[13px] text-primary font-bold mt-1">${p.last5?'💰 後五碼: '+p.last5 : '⏳ 尚未填寫'}</p></div><button onclick="toggleCheckin('${p.rowId}', ${p.checkedIn})" class="px-6 py-3.5 rounded-2xl font-bold text-sm transition-all ${p.checkedIn?'bg-green-500 text-white shadow-lg shadow-green-100':'bg-slate-100 text-slate-400'}">${p.checkedIn?'已簽到':'未簽到'}</button></div><div class="grid grid-cols-2 gap-3"><select onchange="updateRow('${p.rowId}', '繳費狀態', this.value)" class="py-3 text-[13px] font-bold rounded-2xl bg-surface-container-low border-none"><option value="未繳費" ${p.payStatus==='未繳費'?'selected':''}>未繳費</option><option value="匯款審核中" ${p.payStatus==='匯款審核中'?'selected':''}>匯款審核</option><option value="已完款" ${p.payStatus==='已完款'?'selected':''}>已完款</option></select><select onchange="updateRow('${p.rowId}', '報名狀態', this.value)" class="py-3 text-[13px] font-bold rounded-2xl bg-surface-container-low border-none"><option value="正常" ${p.regStatus==='正常'?'selected':''}>正常</option><option value="已取消" ${p.regStatus==='已取消'?'selected':''}>已取消</option></select></div></div>`).join('');
  }

  async function autoFetchTgChatId() {
    const token = document.getElementById('set-tg-token').value.trim();
    if (!token) return showToast("⚠️ 請先輸入 Token", true);
    const btn = document.getElementById('btn-fetch-tg'); btn.disabled = true;
    try {
      const chatId = await fetchAPI('getTgChatId', { token });
      document.getElementById('set-tg-chat').value = chatId; showToast("✅ 成功獲取 Chat ID！");
    } catch(err) { showToast(err.message, true); }
    btn.disabled = false;
  }

  async function loadAdminSettings() { const s = await fetchAPI('getSettings'); document.getElementById('set-tg-token').value = s.TG_BOT_TOKEN; document.getElementById('set-tg-chat').value = s.TG_CHAT_ID; document.getElementById('set-line-link').value = s.LINE_LINK; }
  async function submitSettings() { if (isProcessing) return; isProcessing = true; try { await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value.trim(), TG_CHAT_ID: document.getElementById('set-tg-chat').value.trim(), LINE_LINK: document.getElementById('set-line-link').value.trim() }); showToast("✅ 設定已成功儲存"); } finally { isProcessing = false; } }

  // 輔助與邏輯 (與前版保持一致)
  function showToast(m, e=false) { const t = document.getElementById('toast'); if(!t) return; t.innerHTML = (e ? '<span class="material-symbols-outlined">error</span>' : '<span class="material-symbols-outlined">check_circle</span>') + m; t.className = `fixed top-12 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-sm shadow-2xl transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-error text-white' : 'bg-slate-800 text-white'}`; setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3500); }
  function showModal(title, desc, target) { document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerHTML = desc; modalTargetView = target; document.getElementById('custom-modal').classList.remove('hidden'); }
  function closeModalAndGo() { document.getElementById('custom-modal').classList.add('hidden'); if (modalTargetView === 'history') switchView('user-history'); else switchView('user-activities'); }
  function formatTime(t) { return t ? new Date(t).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }) : ''; }
  function toggleCreateMode(m) { document.getElementById('tab-quick').className = `flex-1 py-3.5 rounded-xl text-sm font-bold ${m==='quick'?'bg-white text-primary shadow-sm':'text-slate-500'}`; document.getElementById('tab-detailed').className = `flex-1 py-3.5 rounded-xl text-sm font-bold ${m==='detailed'?'bg-white text-primary shadow-sm':'text-slate-500'}`; document.getElementById('form-quick').classList.toggle('hidden', m!=='quick'); document.getElementById('form-detailed').classList.toggle('hidden', m!=='detailed'); }
  function toggleFeeInput() { document.getElementById('detail-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); }
  function previewFile(mode) { const f = document.getElementById('file-input-create').files[0]; if(!f) return; const r = new FileReader(); r.onloadend = () => { const img = new Image(); img.onload = () => { let w = img.width; if (w > 650) { h = Math.round(img.height * (650/w)); w = 650; } else h = img.height; const cvs = document.createElement('canvas'); cvs.width = w; cvs.height = h; const ctx = cvs.getContext('2d'); ctx.drawImage(img, 0, 0, w, h); const b64 = cvs.toDataURL('image/jpeg', 0.8); document.getElementById('image-preview-create').src = b64; document.getElementById('image-preview-create').classList.remove('hidden'); document.getElementById('preview-placeholder-create').classList.add('hidden'); document.getElementById('in-image-url-create').value = b64; }; img.src = r.result; }; r.readAsDataURL(f); }

  async function submitUserRegistration() { const p = { userId: userProfile.userId, name: document.getElementById('reg-name').value.trim(), gender: document.getElementById('reg-gender').value, phone: document.getElementById('reg-phone').value.trim(), industry: document.getElementById('reg-industry').value.trim() }; if (!p.name || !p.phone) return showToast("⚠️ 請完整填寫真實資料", true); await fetchAPI('registerUser', p); isRegistered = true; registeredInfo = p; switchView('user-activities'); }
  function populateUserProfile() { if(registeredInfo) { document.getElementById('edit-name').value=registeredInfo.name; document.getElementById('edit-gender').value=registeredInfo.gender; document.getElementById('edit-phone').value=registeredInfo.phone; document.getElementById('edit-industry').value=registeredInfo.industry; } }
  async function submitProfileUpdate() { const p = { userId: userProfile.userId, name: document.getElementById('edit-name').value.trim(), gender: document.getElementById('edit-gender').value, phone: document.getElementById('edit-phone').value.trim(), industry: document.getElementById('edit-industry').value.trim() }; await fetchAPI('updateUser', p); registeredInfo = p; showToast("✅ 個人資料已成功儲存"); }
  async function updateUserLast5(name) { if(isProcessing) return; const val = document.getElementById(`last5-${name}`).value.trim(); if(!val) return showToast("⚠️ 請輸入匯款帳號後五碼", true); isProcessing=true; try { await fetchAPI('updateLast5Digits', { userId: userProfile.userId, activityName: name, last5Digits: val }); showToast("✅ 資料已送出，請等待管理員審核"); loadUserHistory(); } finally { isProcessing=false; } }
  async function userCancelRegistration(name) { if (confirm("確定取消報名「"+name+"」嗎？")) { await fetchAPI('cancelRegistration', { userId: userProfile.userId, activityName: name }); loadUserHistory(); } }
  async function handleCreateActivity(mode) { if(isProcessing) return; const btn = document.getElementById(mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create'); isProcessing=true; btn.classList.add('btn-disabled'); let payload = { activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(), activityType: document.getElementById(mode === 'quick' ? 'quick-type' : 'detail-type').value, feeType: '免費', price: '', startTime: '', description: '', imageUrl: '', names: [], defaultIdentity: mode === 'quick' ? document.getElementById('quick-identity').value : '來賓' }; if (!payload.activityName) { isProcessing=false; btn.classList.remove('btn-disabled'); return showToast("⚠️ 活動標題不可為空", true); } if (mode === 'quick') { const raw = document.getElementById('quick-names').value.trim(); payload.names = raw.split('\n').filter(n => n.trim()); } else { payload.feeType = document.querySelector('input[name="fee-type"]:checked').value; payload.price = document.getElementById('detail-price').value; payload.startTime = document.getElementById('detail-start').value; payload.description = document.getElementById('detail-desc').value; payload.imageUrl = document.getElementById('in-image-url-create').value; } try { await fetchAPI('bulkAddRegistrants', payload); showToast("✅ 新活動已發佈成功"); switchView('admin-activities'); } finally { isProcessing=false; btn.classList.remove('btn-disabled'); } }
  async function toggleActStatus(n) { await fetchAPI('toggleActivityStatus', { activityName: n }); loadAdminActivities(); }
  async function deleteAct(n) { if (confirm("確定永久刪除此活動及所有名單？")) { await fetchAPI('deleteActivity', { activityName: n }); loadAdminActivities(); } }
  async function toggleCheckin(id, status) { await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId: id, currentStatus: status }); openAdminCheckin(activeActivityName); }
  async function updateRow(id, col, val) { await fetchAPI('updateCellStatus', { activityName: activeActivityName, rowId: id, colName: col, val: val }); showToast("✅ 狀態已同步至雲端"); }
</script>
</body>
</html>
