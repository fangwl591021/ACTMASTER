<!-- Version: v1.5.3 (修理版：修復認領參數偵測與註冊流程攔截) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>報名大師</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: { colors: { primary: "#2563eb", background: "#ffffff", "text-main": "#333333" } }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; color: #333333; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .input-label { @apply block text-[15px] text-[#64748b] mb-1.5 font-normal tracking-wide; }
    .custom-input { @apply w-full py-3 px-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary transition-all text-text-main text-[15px]; }
    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-normal text-[16px] active:scale-[0.98] transition-all flex items-center justify-center gap-2; }
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full font-normal; min-width: 48px;}
    .nav-active-btn { @apply text-black font-normal; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #000000; }
  </style>
</head>
<body class="font-sans">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col bg-background overflow-hidden mx-auto shadow-2xl">
  
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100">
    <div class="text-[18px] font-normal text-slate-800 flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center"><span class="material-symbols-outlined text-[20px]">event_note</span></div>
      報名大師
      <span id="header-admin-badge" class="hidden bg-slate-800 text-white text-[9px] px-2 py-0.5 rounded uppercase font-bold ml-1">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2"><img id="user-avatar" class="w-8 h-8 rounded-full object-cover border border-slate-100"></div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center active:scale-95 transition-all"><span class="material-symbols-outlined text-[20px]">swap_horiz</span></button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-16 px-5 space-y-6">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-400 text-[13px]">權限驗證中</p>
    </div>

    <!-- 註冊畫面 -->
    <div id="view-user-register" class="hidden space-y-6 pt-4 pb-10">
      <h1 class="text-2xl font-normal text-slate-800 tracking-tight">建立會員檔案</h1>
      <div class="space-y-4">
        <label class="input-label">姓名</label><input id="reg-name" class="custom-input" placeholder="真實姓名">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="input-label">業種</label><input id="reg-industry" class="custom-input" placeholder="例如：資訊"></div>
          <div><label class="input-label">性別</label><select id="reg-gender" class="custom-input"><option value="男">男</option><option value="女">女</option></select></div>
        </div>
        <label class="input-label">生日</label><input id="reg-birthday" class="custom-input" type="date">
        <button id="btn-reg-submit" onclick="submitUserRegistration()" class="btn-primary mt-4">儲存完成註冊</button>
      </div>
    </div>

    <!-- 探索活動 -->
    <div id="view-user-activities" class="hidden space-y-4 pt-2">
      <h2 class="text-2xl font-normal text-slate-800">精彩活動</h2>
      <div id="user-activities-container" class="grid grid-cols-2 gap-3"></div>
    </div>
  </main>

  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="switchView('user-activities')" class="nav-btn nav-active-btn" id="nav-user-activities"><div class="icon-box"><span class="material-symbols-outlined">explore</span></div><span class="text-[11px] mt-0.5">活動</span></button>
    <button onclick="switchView('user-history')" class="nav-btn" id="nav-user-history"><div class="icon-box"><span class="material-symbols-outlined">receipt_long</span></div><span class="text-[11px] mt-0.5">紀錄</span></button>
    <button onclick="switchView('user-profile')" class="nav-btn" id="nav-user-profile"><div class="icon-box"><span class="material-symbols-outlined">person</span></div><span class="text-[11px] mt-0.5">設定</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t flex justify-evenly items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">add_circle</span></div><span class="text-[10px] mt-0.5">建立</span></button>
    <button onclick="switchView('admin-activities')" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">fact_check</span></div><span class="text-[10px] mt-0.5">核銷</span></button>
    <button onclick="switchView('admin-crm')" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">groups</span></div><span class="text-[10px] mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">recent_patient</span></div><span class="text-[10px] mt-0.5">名片</span></button>
    <button onclick="switchView('admin-settings')" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] mt-0.5">參數</span></button>
  </nav>
</div>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal transform translate-y-0 opacity-100 bg-slate-800 text-white"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isAdmin = false, isRegistered = false, registeredInfo = null;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      
      const params = new URLSearchParams(window.location.search);
      const claimCardId = params.get('claimCardId');
      window.claimCardId = claimCardId;

      document.getElementById('user-avatar').src = userProfile.pictureUrl;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      document.getElementById('view-loading').classList.add('hidden'); 

      if (!isRegistered) {
          switchView('user-register');
          document.getElementById('reg-name').value = userProfile.displayName;
      } else {
          if (claimCardId) await handleClaim(claimCardId);
          switchView(isAdmin ? 'admin-activities' : 'user-activities');
          if(isAdmin) {
              document.getElementById('role-switch-btn').classList.remove('hidden');
              document.getElementById('header-admin-badge').classList.remove('hidden');
          }
      }
    } catch (err) { alert("啟動失敗"); }
  });

  async function handleClaim(cardId) {
      try {
          await fetchAPI('updateCard', { rowId: cardId, 'LINE ID': userProfile.userId, userId: userProfile.userId, Name: registeredInfo.name, Mobile: registeredInfo.phone });
          showToast("✅ 名片認領成功！");
      } catch(e) { showToast("認領失敗", true); }
  }

  async function fetchAPI(action, payload = {}) {
    const r = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action, payload }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    return j.data;
  }

  function switchView(v) {
    if (!isAdmin && v.startsWith('admin')) v = 'user-activities';
    const views = ['view-loading','view-user-register','view-user-activities','view-user-profile','view-user-history','view-admin-activities','view-admin-crm','view-admin-settings'];
    views.forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(`view-${v}`).classList.remove('hidden');
    
    document.getElementById('bottom-nav-admin').classList.toggle('hidden', !v.startsWith('admin'));
    document.getElementById('bottom-nav-user').classList.toggle('hidden', v.startsWith('admin') || !isRegistered);
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); t.innerHTML = m; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
  }
</script>
</body>
</html>
