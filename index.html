<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>活動大師 PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #e2e8f0; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .nav-btn { @apply flex flex-col items-center gap-1 p-2 transition-all w-full; }
    .nav-active { @apply text-blue-600; }
    .nav-inactive { @apply text-slate-400 hover:text-slate-600; }
    button:active { transform: scale(0.96); }
    .btn-disabled { pointer-events: none; opacity: 0.7; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
  </style>
</head>
<body class="flex justify-center h-screen overflow-hidden">

<div id="app-container" class="w-full max-w-md bg-slate-50 h-full relative shadow-2xl flex flex-col">
  
  <header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white px-4 py-5 flex items-center justify-between shadow-md z-20 shrink-0">
    <div class="flex items-center gap-2">
       <i class="fas fa-crown text-yellow-300 text-2xl"></i>
       <h1 class="text-xl font-black tracking-widest">活動大師</h1>
    </div>
    <div class="flex items-center gap-2">
      <div id="user-profile-badge" class="hidden text-sm font-bold bg-blue-800/40 px-3 py-1.5 rounded-full flex items-center gap-2 border border-blue-400/30">
        <img id="user-avatar" src="" class="w-5 h-5 rounded-full object-cover">
        <span id="user-name-display" class="tracking-wide"></span>
      </div>
      <!-- 新增：管理員身分切換按鈕 -->
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden text-xs font-bold bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full border border-white/40 transition-colors shadow-sm">
        <i class="fas fa-exchange-alt"></i> 前台
      </button>
    </div>
  </header>

  <main id="main-content" class="flex-1 overflow-y-auto pb-24 relative">
    
    <!-- 載入中 -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500"></i>
      <p class="text-base text-slate-500 font-bold tracking-widest animate-pulse" id="loading-text">連線驗證中...</p>
    </div>

    <!-- ================== 前台：一般使用者 ================== -->
    
    <!-- 首次註冊 -->
    <div id="view-user-register" class="hidden p-6 space-y-6">
      <div class="text-center mt-4">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
          <i class="fas fa-user-edit text-4xl text-blue-500"></i>
        </div>
        <h2 class="text-2xl font-black text-slate-800">建立會員檔案</h2>
        <p class="text-base text-slate-500 font-medium mt-1">填寫一次，未來即可一鍵快速報名</p>
      </div>

      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">真實姓名</label><input type="text" id="reg-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">性別</label><select id="reg-gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">手機號碼</label><input type="tel" id="reg-phone" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="09XX-XXXXXX"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">業種 (行業別)</label><input type="text" id="reg-industry" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="請填寫行業"></div>
        
        <button onclick="submitUserRegistration()" id="btn-submit-user-reg" class="w-full py-4 mt-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 transition-all shadow-xl shadow-blue-200">
          完成註冊
        </button>
      </div>
    </div>

    <!-- 會員專區 (資料修改) -->
    <div id="view-user-profile" class="hidden p-6 space-y-6">
      <div class="text-center mt-4 mb-4">
        <h2 class="text-2xl font-black text-slate-800">會員專區</h2>
        <p class="text-base text-slate-500 font-medium mt-1">您可以隨時更新個人資料</p>
      </div>

      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-4">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">真實姓名</label><input type="text" id="edit-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">性別</label><select id="edit-gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">手機號碼</label><input type="tel" id="edit-phone" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500 ml-1">業種 (行業別)</label><input type="text" id="edit-industry" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-base font-bold outline-none focus:ring-2 focus:ring-blue-500"></div>
        <button onclick="submitProfileUpdate()" id="btn-submit-profile" class="w-full py-4 mt-4 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl">儲存變更</button>
      </div>
    </div>

    <!-- 活動專區 (供會員報名) -->
    <div id="view-user-activities" class="hidden p-4 space-y-4">
      <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden">
        <div class="relative z-10"><h2 class="text-2xl font-black mb-1">近期活動</h2><p class="text-blue-100 text-base font-medium">點擊下方活動即可一鍵報名</p></div>
        <i class="fas fa-ticket-alt absolute -bottom-4 -right-2 text-7xl text-white opacity-10"></i>
      </div>
      <div id="user-activities-container" class="space-y-4"></div>
    </div>

    <!-- 歷史報名紀錄 -->
    <div id="view-user-history" class="hidden p-4 space-y-4">
      <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg mb-4 relative overflow-hidden">
        <div class="relative z-10"><h2 class="text-2xl font-black mb-1">歷史報名紀錄</h2><p class="text-indigo-100 text-base font-medium">總覽您參與過的所有活動</p></div>
        <i class="fas fa-history absolute -bottom-4 -right-2 text-7xl text-white opacity-10"></i>
      </div>
      <div id="user-history-container" class="space-y-4"></div>
    </div>

    <!-- ================== 後台：管理員介面 (Admin) ================== -->
    
    <!-- 後台：活動專區 -->
    <div id="view-admin-activities" class="hidden p-4 space-y-4">
      <div class="bg-blue-600 text-white p-6 rounded-3xl shadow-lg mb-6 relative overflow-hidden">
        <div class="relative z-10"><h2 class="text-2xl font-black mb-1">活動與核銷</h2><p class="text-blue-100 text-base font-medium">點擊活動進入簽到與管理名單</p></div>
        <i class="fas fa-calendar-check absolute -bottom-4 -right-4 text-7xl text-white opacity-10"></i>
      </div>
      <div id="admin-activity-list-container" class="space-y-4"></div>
    </div>

    <!-- 後台：核銷與簽到管理內頁 -->
    <div id="view-admin-checkin" class="hidden h-full flex flex-col bg-slate-50">
      <div class="bg-blue-600 text-white px-4 pt-6 pb-4 sticky top-0 z-20 shadow-md">
        <div class="flex items-center gap-3 mb-4">
          <button onclick="switchView('admin-activities')" class="p-2 bg-blue-500 hover:bg-blue-400 rounded-full transition-colors"><i class="fas fa-arrow-left"></i></button>
          <div class="flex-1 overflow-hidden">
            <p class="text-sm text-blue-200 font-bold mb-1">核銷與簽到管理</p>
            <h2 id="checkin-act-name" class="text-xl font-black truncate">載入中...</h2>
          </div>
          <button onclick="handleQuickAdd()" class="bg-white text-blue-600 px-3 py-2 rounded-xl text-sm font-black shadow-md flex items-center gap-1 active:scale-95 transition-transform"><i class="fas fa-user-plus"></i> 補登記</button>
        </div>
        <div class="relative">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input type="text" id="search-checkin" oninput="renderCheckinList()" placeholder="輸入姓名或後五碼搜尋..." class="w-full pl-10 pr-4 py-3 bg-white border-none rounded-2xl text-base font-bold text-slate-700 outline-none shadow-inner">
        </div>
      </div>
      <div id="checkin-list-container" class="p-4 space-y-4 pb-20"></div>
    </div>

    <!-- 後台：建立活動 (雙模式切換) -->
    <div id="view-admin-create" class="hidden p-4 space-y-4">
      <div class="text-center mt-2 mb-4"><h2 class="text-2xl font-black text-slate-800">發起新活動</h2></div>
      
      <!-- 模式切換 Tabs -->
      <div class="flex bg-slate-200/50 p-1.5 rounded-2xl mb-4">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-xl text-sm font-black bg-white shadow-sm text-blue-600 transition-all">⚡ 快速匯入名單</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-xl text-sm font-black text-slate-500 transition-all">🌟 開放線上報名</button>
      </div>

      <!-- 模式 A：快速建檔 -->
      <div id="form-quick" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5 animate-in fade-in zoom-in-95 duration-300">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">活動名稱 (必填)</label><input type="text" id="quick-name" class="w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold outline-none border border-slate-100"></div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-bold text-slate-500">活動性質</label>
            <select id="quick-type" class="w-full px-4 py-4 bg-slate-50 rounded-2xl text-base font-bold">
              <option value="例會">例會</option><option value="課程">課程</option><option value="教學">教學</option><option value="聯誼">聯誼</option><option value="參訪">參訪</option><option value="講座">講座</option><option value="工作坊">工作坊</option><option value="研討會">研討會</option><option value="說明會">說明會</option><option value="慶功宴">慶功宴</option><option value="發表會">發表會</option><option value="公益活動">公益活動</option><option value="其他">其他</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-sm font-bold text-slate-500">預設身份</label>
            <select id="quick-identity" class="w-full px-4 py-4 bg-slate-50 rounded-2xl text-base font-bold">
              <option>來賓</option><option>會員</option>
            </select>
          </div>
        </div>
        <div class="space-y-1 pt-2 border-t border-slate-100">
          <label class="text-sm font-bold text-slate-500 ml-1">直接貼上名單 (用換行分隔)</label>
          <textarea id="quick-names" class="w-full h-40 p-5 bg-slate-50 border border-slate-100 rounded-2xl font-medium text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 resize-none leading-relaxed" placeholder="王小明&#10;李大華..."></textarea>
        </div>
        <button id="btn-quick-create" onclick="handleCreateActivity('quick')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl shadow-blue-200">快速建立</button>
      </div>

      <!-- 模式 B：完整活動設定 -->
      <div id="form-detailed" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5 animate-in fade-in zoom-in-95 duration-300">
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">活動名稱 (必填)</label><input type="text" id="detail-name" class="w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold outline-none border border-slate-100"></div>
        <div class="space-y-2 pt-2">
          <label class="text-sm font-bold text-slate-500">收費設定</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput('create')" class="w-4 h-4 text-blue-600"> <span class="text-base font-bold text-slate-700">免費</span></label>
            <label class="flex items-center gap-2"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput('create')" class="w-4 h-4 text-blue-600"> <span class="text-base font-bold text-slate-700">收費</span></label>
          </div>
          <input type="number" id="detail-price" class="hidden w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold outline-none mt-2 border border-slate-100" placeholder="請輸入金額 (NT$)">
        </div>
        <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
          <div class="space-y-1"><label class="text-sm font-bold text-slate-500">開始時間</label><input type="datetime-local" id="detail-start" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
          <div class="space-y-1"><label class="text-sm font-bold text-slate-500">結束時間</label><input type="datetime-local" id="detail-end" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
        </div>
        <div class="space-y-1 pt-4 border-t border-slate-100">
          <label class="text-sm font-bold text-slate-500">活動性質</label>
          <select id="detail-type" class="w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold border border-slate-100">
            <option value="例會">例會</option><option value="課程">課程</option><option value="教學">教學</option><option value="聯誼">聯誼</option><option value="參訪">參訪</option><option value="講座">講座</option><option value="工作坊">工作坊</option><option value="研討會">研討會</option><option value="說明會">說明會</option><option value="慶功宴">慶功宴</option><option value="發表會">發表會</option><option value="公益活動">公益活動</option><option value="其他">其他</option>
          </select>
        </div>
        <div class="space-y-3 pt-4 border-t border-slate-100">
          <label class="text-sm font-bold text-slate-500">開放線上報名填寫欄位</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-3 bg-slate-50 px-4 py-3 rounded-2xl border border-slate-100"><input type="checkbox" id="field-gender" checked class="w-5 h-5 text-blue-600"> <span class="text-base font-bold text-slate-600">性別</span></label>
            <label class="flex items-center gap-3 bg-slate-50 px-4 py-3 rounded-2xl border border-slate-100"><input type="checkbox" id="field-phone" checked class="w-5 h-5 text-blue-600"> <span class="text-base font-bold text-slate-600">電話</span></label>
            <label class="flex items-center gap-3 bg-slate-50 px-4 py-3 rounded-2xl border border-slate-100 col-span-2"><input type="checkbox" id="field-industry" checked class="w-5 h-5 text-blue-600"> <span class="text-base font-bold text-slate-600">業種</span></label>
          </div>
        </div>
        <div class="space-y-1 pt-4 border-t border-slate-100">
           <label class="text-sm font-bold text-slate-500">活動宣傳圖</label>
           <div id="image-preview-container" onclick="document.getElementById('file-input-create').click()" class="w-full h-40 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center bg-slate-50 cursor-pointer">
             <div id="preview-placeholder-create" class="text-center"><i class="fas fa-image text-4xl text-slate-300 mb-1"></i><p class="text-sm text-slate-400 font-bold uppercase">點擊上傳高畫質照片</p></div>
             <img id="image-preview-create" class="hidden w-full h-full object-contain p-2">
             <input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')">
           </div>
           <input type="hidden" id="in-image-url-create">
        </div>
        <div class="space-y-1 pt-2 border-t border-slate-100"><label class="text-sm font-bold text-slate-500">活動說明</label><textarea id="detail-desc" class="w-full h-24 p-5 bg-slate-50 rounded-2xl font-medium border border-slate-100 resize-none text-base"></textarea></div>
        <button id="btn-detail-create" onclick="handleCreateActivity('detailed')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl shadow-blue-200">發佈報名頁面</button>
      </div>
    </div>

    <!-- 後台：編輯活動內容 -->
    <div id="view-admin-edit" class="hidden p-4 space-y-4">
      <div class="flex items-center gap-3 mt-2 mb-4">
        <button onclick="switchView('admin-activities')" class="p-2 bg-slate-200 rounded-full text-slate-600"><i class="fas fa-arrow-left"></i></button>
        <h2 class="text-2xl font-black text-slate-800">編輯活動內容</h2>
      </div>

      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
        <div class="space-y-1">
          <label class="text-sm font-bold text-slate-500">活動名稱 (不可修改)</label>
          <input type="text" id="edit-act-name" class="w-full px-5 py-4 bg-slate-100 text-slate-500 rounded-2xl text-base font-bold border border-slate-200" disabled>
        </div>
        <div class="space-y-2 pt-2">
          <label class="text-sm font-bold text-slate-500">收費設定</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2"><input type="radio" name="edit-fee-type" value="免費" onchange="toggleFeeInput('edit')" class="w-4 h-4 text-blue-600"> <span class="text-base font-bold text-slate-700">免費</span></label>
            <label class="flex items-center gap-2"><input type="radio" name="edit-fee-type" value="收費" onchange="toggleFeeInput('edit')" class="w-4 h-4 text-blue-600"> <span class="text-base font-bold text-slate-700">收費</span></label>
          </div>
          <input type="number" id="edit-act-price" class="hidden w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold outline-none mt-2 border border-slate-100" placeholder="請輸入金額 (NT$)">
        </div>
        <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
          <div class="space-y-1"><label class="text-sm font-bold text-slate-500">開始時間</label><input type="datetime-local" id="edit-act-start" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
          <div class="space-y-1"><label class="text-sm font-bold text-slate-500">結束時間</label><input type="datetime-local" id="edit-act-end" class="w-full px-2 py-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold"></div>
        </div>
        <div class="space-y-1 pt-4 border-t border-slate-100">
          <label class="text-sm font-bold text-slate-500">活動性質</label>
          <select id="edit-act-type" class="w-full px-5 py-4 bg-slate-50 rounded-2xl text-base font-bold border border-slate-100">
            <option value="例會">例會</option><option value="課程">課程</option><option value="教學">教學</option><option value="聯誼">聯誼</option><option value="參訪">參訪</option><option value="講座">講座</option><option value="工作坊">工作坊</option><option value="研討會">研討會</option><option value="說明會">說明會</option><option value="慶功宴">慶功宴</option><option value="發表會">發表會</option><option value="公益活動">公益活動</option><option value="其他">其他</option>
          </select>
        </div>
        <div class="space-y-1 pt-4 border-t border-slate-100">
           <label class="text-sm font-bold text-slate-500">活動宣傳圖</label>
           <div id="image-preview-container-edit" onclick="document.getElementById('file-input-edit').click()" class="w-full h-40 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center bg-slate-50 cursor-pointer">
             <div id="preview-placeholder-edit" class="text-center hidden"><i class="fas fa-image text-4xl text-slate-300 mb-1"></i><p class="text-sm text-slate-400 font-bold uppercase">點擊修改照片</p></div>
             <img id="image-preview-edit" class="w-full h-full object-contain p-2 hidden">
             <input type="file" id="file-input-edit" class="hidden" accept="image/*" onchange="previewFile('edit')">
           </div>
           <input type="hidden" id="in-image-url-edit">
        </div>
        <div class="space-y-1 pt-2 border-t border-slate-100"><label class="text-sm font-bold text-slate-500">活動說明</label><textarea id="edit-act-desc" class="w-full h-24 p-5 bg-slate-50 rounded-2xl font-medium border border-slate-100 resize-none text-base"></textarea></div>
        <button id="btn-submit-edit" onclick="handleUpdateActivity()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl shadow-blue-200">儲存修改</button>
      </div>
    </div>

    <!-- 後台：CRM -->
    <div id="view-admin-crm" class="hidden p-4 space-y-4">
      <div class="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg relative overflow-hidden"><h2 class="text-2xl font-black mb-1 relative z-10">CRM 會員大數據</h2><i class="fas fa-users absolute -bottom-2 -right-2 text-8xl text-white opacity-10"></i></div>
      <div class="relative mb-4"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" id="search-crm" oninput="renderCrmList()" placeholder="搜尋姓名..." class="w-full pl-12 pr-4 py-4 bg-white shadow-sm border border-slate-100 rounded-2xl text-base font-bold outline-none"></div>
      <div id="crm-list-container" class="space-y-4"></div>
    </div>

    <!-- 後台：參數設定 -->
    <div id="view-admin-settings" class="hidden p-4 space-y-4">
      <div class="bg-slate-800 text-white p-6 rounded-3xl shadow-lg relative overflow-hidden">
        <h2 class="text-2xl font-black mb-1 relative z-10">參數設定</h2>
        <p class="text-slate-300 text-base font-medium relative z-10">集中管理第三方金鑰與社群連結</p>
        <i class="fas fa-cogs absolute -bottom-2 -right-2 text-8xl text-white opacity-10"></i>
      </div>

      <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
        <div class="border-b border-slate-100 pb-3 mb-2">
          <h3 class="text-lg font-black text-blue-600 flex items-center gap-2"><i class="fab fa-telegram-plane"></i> Telegram 推播設定</h3>
          <p class="text-xs text-slate-400 mt-1">設定後，有新報名將自動通知到您的 TG 群組</p>
        </div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">TG_BOT_TOKEN</label><input type="text" id="set-tg-token" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold outline-none border border-slate-100"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500">TG_CHAT_ID</label><input type="text" id="set-tg-chat" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold outline-none border border-slate-100"></div>

        <div class="border-b border-slate-100 pb-3 mb-2 mt-6">
          <h3 class="text-lg font-black text-slate-700 flex items-center gap-2"><i class="fas fa-link"></i> 官方社群連結</h3>
        </div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500"><i class="fab fa-line text-green-500"></i> LINE 官方帳號</label><input type="text" id="set-line-link" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold outline-none border border-slate-100"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500"><i class="fab fa-facebook text-blue-600"></i> Facebook 粉專</label><input type="text" id="set-fb-link" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold outline-none border border-slate-100"></div>
        <div class="space-y-1"><label class="text-sm font-bold text-slate-500"><i class="fab fa-instagram text-pink-600"></i> Instagram</label><input type="text" id="set-ig-link" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold outline-none border border-slate-100"></div>

        <button onclick="submitSettings()" id="btn-submit-settings" class="w-full py-4 mt-2 bg-slate-800 text-white rounded-2xl font-black text-lg hover:bg-slate-900 transition-all shadow-xl">儲存設定</button>
      </div>
    </div>
  </main>

  <!-- 底部導覽列 (User) -->
  <nav id="bottom-nav-user" class="hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center px-2 py-2 z-50 pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-calendar-alt text-xl"></i></div><span class="text-sm font-black">活動報名</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-history text-xl"></i></div><span class="text-sm font-black">歷史紀錄</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-user-circle text-xl"></i></div><span class="text-sm font-black">會員專區</span></button>
  </nav>

  <!-- 底部導覽列 (Admin) -->
  <nav id="bottom-nav-admin" class="hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center px-1 py-2 z-50 pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
    <button onclick="switchView('admin-create')" id="nav-admin-create" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-plus-circle text-xl"></i></div><span class="text-xs font-black">發起活動</span></button>
    <button onclick="switchView('admin-activities')" id="nav-admin-activities" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-calendar-alt text-xl"></i></div><span class="text-xs font-black">活動核銷</span></button>
    <button onclick="switchView('admin-crm')" id="nav-admin-crm" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-user-check text-xl"></i></div><span class="text-xs font-black">會員CRM</span></button>
    <button onclick="switchView('admin-settings')" id="nav-admin-settings" class="nav-btn"><div class="p-1 rounded-xl transition-colors"><i class="fas fa-cogs text-xl"></i></div><span class="text-xs font-black">參數設定</span></button>
  </nav>

</div>

<!-- 全域 Toast 通知 -->
<div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-base shadow-2xl opacity-0 transition-all z-[10000] pointer-events-none flex items-center gap-2 font-bold transform -translate-y-4"></div>

<!-- 全域 Modal 彈跳視窗 -->
<div id="custom-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity">
  <div class="bg-white w-[85%] max-w-sm rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform text-center relative overflow-hidden">
    <div id="modal-icon" class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-check text-3xl"></i></div>
    <h3 id="modal-title" class="text-xl font-black text-slate-800 mb-2"></h3>
    <p id="modal-desc" class="text-base text-slate-500 font-medium mb-6 leading-relaxed"></p>
    <button onclick="closeModalAndGo()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-md">我知道了</button>
  </div>
</div>

<script>
  // ==================== 參數設定區 ====================
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null;
  let isAdmin = false;
  let isViewModeAdmin = false; // 新增：追蹤目前管理員是看後台還是前台
  let isRegistered = false;
  let registeredInfo = null;

  let currentActivities = [];
  let currentCheckinData = [];
  let currentCrmData = [];
  let activeActivityName = '';

  // ==================== 核心 API ====================
  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast("系統連線錯誤: " + err.message, true); throw err;
    }
  }

  window.onload = async () => {
    switchView('loading');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || 'https://via.placeholder.com/150';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      
      // 首次登入檢查是否已註冊會員 (即使是管理員也可以註冊)
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered;
      registeredInfo = res.info;

      if (isAdmin) {
        document.getElementById('role-switch-btn').classList.remove('hidden');
        isViewModeAdmin = true;
        switchView('admin-activities');
      } else {
        if (isRegistered) { switchView('user-activities'); } 
        else {
          document.getElementById('reg-name').value = userProfile.displayName;
          switchView('user-register');
        }
      }
    } catch (err) { document.getElementById('loading-text').innerText = 'LIFF 載入失敗，請在 LINE 內開啟'; }
  };

  function toggleRoleMode() {
    isViewModeAdmin = !isViewModeAdmin;
    const btn = document.getElementById('role-switch-btn');
    if (isViewModeAdmin) {
      btn.innerHTML = '<i class="fas fa-exchange-alt"></i> 前台';
      switchView('admin-activities');
    } else {
      btn.innerHTML = '<i class="fas fa-exchange-alt"></i> 後台';
      if (isRegistered) switchView('user-activities');
      else {
        document.getElementById('reg-name').value = userProfile.displayName;
        switchView('user-register');
      }
    }
  }

  function switchView(view) {
    ['loading', 'user-register', 'user-activities', 'user-profile', 'user-history', 'admin-activities', 'admin-checkin', 'admin-create', 'admin-edit', 'admin-crm', 'admin-settings'].forEach(v => {
      const el = document.getElementById(`view-${v}`);
      if(el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(`view-${view}`);
    if (activeEl) activeEl.classList.remove('hidden');

    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    navAdmin.classList.add('hidden');
    navUser.classList.add('hidden');

    if (view === 'user-register' || view === 'loading' || view === 'admin-checkin') {
      // 隱藏底部
    } else if (isAdmin && isViewModeAdmin) {
      navAdmin.classList.remove('hidden');
      ['create', 'activities', 'crm', 'settings'].forEach(v => {
        const btn = document.getElementById(`nav-admin-${v}`);
        if(!btn) return;
        const iconDiv = btn.querySelector('div');
        let isActive = (`admin-${v}` === view) || (view === 'admin-edit' && v === 'activities');
        if (isActive) {
          btn.className = `nav-btn nav-active`;
          iconDiv.className = `p-1 rounded-xl bg-blue-50`;
        } else {
          btn.className = 'nav-btn nav-inactive';
          iconDiv.className = 'p-1 rounded-xl transition-colors';
        }
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin)) {
      navUser.classList.remove('hidden');
      ['activities', 'history', 'profile'].forEach(v => {
        const btn = document.getElementById(`nav-user-${v}`);
        if(!btn) return;
        const iconDiv = btn.querySelector('div');
        if (`user-${v}` === view) {
          btn.className = `nav-btn nav-active`;
          iconDiv.className = `p-1 rounded-xl bg-blue-50`;
        } else {
          btn.className = 'nav-btn nav-inactive';
          iconDiv.className = 'p-1 rounded-xl transition-colors';
        }
      });
    }

    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-crm') loadCrmData();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') populateUserProfile();
    else if (view === 'user-history') loadUserHistory();
  }

  // ==================== 前台：一般使用者 ====================
  async function submitUserRegistration() {
    const name = document.getElementById('reg-name').value.trim();
    const gender = document.getElementById('reg-gender').value;
    const phone = document.getElementById('reg-phone').value.trim();
    const industry = document.getElementById('reg-industry').value.trim();

    if (!name || !phone || !industry) return showToast("⚠️ 請填寫完整資訊", true);

    const btn = document.getElementById('btn-submit-user-reg');
    btn.classList.add('btn-disabled'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';

    try {
      await fetchAPI('registerUser', { userId: userProfile.userId, name, gender, phone, industry });
      showToast("✅ 註冊成功！");
      isRegistered = true; registeredInfo = { name, gender, phone, industry };
      switchView('user-activities');
    } catch(err) { btn.classList.remove('btn-disabled'); btn.innerHTML = '完成註冊'; }
  }

  function populateUserProfile() {
    if (registeredInfo) {
      document.getElementById('edit-name').value = registeredInfo.name || '';
      document.getElementById('edit-gender').value = registeredInfo.gender || '男';
      document.getElementById('edit-phone').value = registeredInfo.phone || '';
      document.getElementById('edit-industry').value = registeredInfo.industry || '';
    }
  }

  async function submitProfileUpdate() {
    const name = document.getElementById('edit-name').value.trim();
    const gender = document.getElementById('edit-gender').value;
    const phone = document.getElementById('edit-phone').value.trim();
    const industry = document.getElementById('edit-industry').value.trim();
    if (!name || !phone || !industry) return showToast("⚠️ 請填寫完整資訊", true);

    const btn = document.getElementById('btn-submit-profile');
    btn.classList.add('btn-disabled'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
      await fetchAPI('updateUser', { userId: userProfile.userId, name, gender, phone, industry });
      showToast("✅ 資料更新成功！");
      registeredInfo = { name, gender, phone, industry };
      btn.classList.remove('btn-disabled'); btn.innerHTML = '儲存變更';
    } catch(err) { btn.classList.remove('btn-disabled'); btn.innerHTML = '儲存變更'; }
  }

  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></div>';
    
    try {
      const data = await fetchAPI('getPublicActivities');
      if (data.length === 0) {
         container.innerHTML = '<div class="text-center py-16 bg-white rounded-3xl border border-slate-100 shadow-sm"><i class="fas fa-box-open text-4xl text-slate-200 mb-2"></i><p class="text-base text-slate-500 font-bold">目前無開放活動</p></div>'; return;
      }
      
      container.innerHTML = data.map(act => {
        const timeStr = act.startTime ? `<div class="mt-2 text-sm text-slate-500 font-bold"><i class="far fa-clock mr-1"></i>${formatTime(act.startTime)}</div>` : '';
        const imgHtml = act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-36 object-cover rounded-t-3xl">` : '';
        const feeBadge = act.feeType === '收費' ? `<span class="text-xs font-black tracking-widest text-orange-500 bg-orange-50 px-2 py-1 rounded-md ml-2">NT$ ${act.price}</span>` : `<span class="text-xs font-black tracking-widest text-green-500 bg-green-50 px-2 py-1 rounded-md ml-2">免費</span>`;

        return `
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100">
          ${imgHtml}
          <div class="p-5">
            <div class="flex items-center">
              <span class="text-xs font-black uppercase tracking-widest text-blue-500 bg-blue-50 px-2 py-1 rounded-md">${act.type || '一般'}</span>
              ${feeBadge}
            </div>
            <h3 class="text-xl font-black text-slate-800 mt-2">${act.name}</h3>
            ${timeStr}
            <button onclick="userJoinActivity(this, '${act.name}', '${act.feeType}', '${act.price}')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all flex justify-center items-center gap-2">
              <i class="fas fa-paper-plane"></i> 一鍵報名
            </button>
          </div>
        </div>`;
      }).join('');
    } catch(err) {}
  }

  // 報名無阻力：取消強制填寫，改為成功後彈跳視窗提醒
  async function userJoinActivity(btn, activityName, feeType, price) {
    if (!confirm(`確定要報名「${activityName}」嗎？`)) return;

    btn.classList.add('btn-disabled'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 報名中...';
    try {
      await fetchAPI('joinActivity', { userId: userProfile.userId, activityName, last5Digits: '' });
      btn.classList.replace('bg-blue-600', 'bg-green-500'); btn.innerHTML = '<i class="fas fa-check"></i> 已報名';
      
      if (feeType === '收費') {
        showModal("報名資料保留中", `您已成功報名！此為收費活動 <b>(NT$ ${price})</b><br><br>請記得完成匯款後，至「歷史紀錄」補填您的<strong class="text-orange-500">匯款帳號後五碼</strong>！`, "history");
      } else {
        showModal("報名成功", `您已成功報名「${activityName}」！期待您的參與。`, "activities");
      }
    } catch(err) {
      showToast(err.message || "報名失敗", true);
      btn.classList.remove('btn-disabled'); btn.innerHTML = '<i class="fas fa-paper-plane"></i> 一鍵報名';
    }
  }

  let modalTargetView = '';
  function showModal(title, desc, target) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerHTML = desc;
    modalTargetView = target;
    const modal = document.getElementById('custom-modal');
    modal.classList.remove('hidden');
    setTimeout(() => modal.querySelector('div').classList.replace('scale-95', 'scale-100'), 10);
  }

  function closeModalAndGo() {
    const modal = document.getElementById('custom-modal');
    modal.querySelector('div').classList.replace('scale-100', 'scale-95');
    setTimeout(() => {
       modal.classList.add('hidden');
       if (modalTargetView === 'history') switchView('user-history');
       else if (modalTargetView === 'activities') switchView('user-activities');
    }, 200);
  }

  async function loadUserHistory() {
    const container = document.getElementById('user-history-container');
    container.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-indigo-500"></i></div>';
    try {
      const history = await fetchAPI('getUserHistory', { userId: userProfile.userId });
      if (history.length === 0) {
        container.innerHTML = '<div class="text-center py-16 bg-white rounded-3xl border border-slate-100"><p class="text-base text-slate-500 font-bold">尚無報名紀錄</p></div>'; return;
      }
      container.innerHTML = history.map(item => {
        let statusBadge = '';
        if(item.regStatus === '已取消') statusBadge = '<span class="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded">已取消</span>';
        else if(item.regStatus === '已退款') statusBadge = '<span class="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded">已退款</span>';
        else statusBadge = '<span class="text-xs text-green-500 bg-green-50 px-2 py-0.5 rounded">報名成功</span>';

        let payBadge = '';
        if(item.isPaidAct) {
          if (item.payStatus === '已完款') {
            payBadge = '<span class="text-xs text-blue-500 font-bold ml-2"><i class="fas fa-check-circle"></i> 已完款</span>';
          } else if (item.payStatus === '匯款審核中') {
            payBadge = '<span class="text-xs text-purple-500 font-bold ml-2"><i class="fas fa-spinner fa-spin"></i> 匯款審核中</span>';
          } else {
            payBadge = '<span class="text-xs text-orange-400 font-bold ml-2"><i class="fas fa-exclamation-circle"></i> 未繳費</span>';
          }
        }

        // 後五碼：左取消、右送出
        let actionButtonsHtml = '';
        if (item.regStatus === '正常' && !item.checkedIn) {
          if (item.isPaidAct) {
            actionButtonsHtml = `
              <div class="mt-4 pt-4 border-t border-slate-100">
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200 mb-3">
                   <i class="fas fa-money-check-alt text-slate-400 ml-2"></i>
                   <input type="text" id="last5-${item.name}" value="${item.last5 || ''}" placeholder="點此填寫匯款後五碼" maxlength="5" class="flex-1 bg-transparent text-base font-bold outline-none text-slate-700 placeholder-slate-400 py-1">
                </div>
                <div class="flex gap-3">
                  <button onclick="userCancelRegistration('${item.name}')" class="flex-1 py-3 bg-white border border-red-200 text-red-500 rounded-xl text-sm font-bold hover:bg-red-50 transition-colors">取消報名</button>
                  <button onclick="updateUserLast5('${item.name}')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700 transition-colors shadow-md shadow-blue-200">送出後五碼</button>
                </div>
              </div>
            `;
          } else {
            actionButtonsHtml = `
              <div class="mt-4 pt-4 border-t border-slate-100">
                <button onclick="userCancelRegistration('${item.name}')" class="w-full py-3 bg-white border border-red-200 text-red-500 rounded-xl text-sm font-bold hover:bg-red-50 transition-colors">
                  取消報名
                </button>
              </div>
            `;
          }
        }

        return `
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 relative">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-black uppercase text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md">${item.type}</span>
                ${statusBadge}
              </div>

  function toggleFeeInput(mode) {
    const radioName = mode === 'create' ? 'fee-type' : 'edit-fee-type';
    const priceId = mode === 'create' ? 'detail-price' : 'edit-act-price';
    const feeType = document.querySelector(`input[name="${radioName}"]:checked`).value;
    const priceInput = document.getElementById(priceId);

  function previewFile(mode) {
    const inputId = mode === 'create' ? 'file-input-create' : 'file-input-edit';
    const previewId = mode === 'create' ? 'image-preview-create' : 'image-preview-edit';
    const placeholderId = mode === 'create' ? 'preview-placeholder-create' : 'preview-placeholder-edit';
    const hiddenId = mode === 'create' ? 'in-image-url-create' : 'in-image-url-edit';

    const file = document.getElementById(inputId).files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => {
      const img = new Image();
      img.onload = () => {
        // 畫質極限操作：寬度放寬至 500px，品質 0.65
        let w = img.width, h = img.height; if (w > 500) { h = Math.round(h * (500/w)); w = 500; }
        const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL('image/jpeg', 0.65);
        document.getElementById(previewId).src = b64; 
        document.getElementById(previewId).classList.remove('hidden');
        document.getElementById(placeholderId).classList.add('hidden'); 
        document.getElementById(hiddenId).value = b64;
      }; img.src = reader.result;
    }; reader.readAsDataURL(file);
  }

  async function handleCreateActivity(mode) {
    let payload = {};
    let btnId = '';
    
    if (mode === 'quick') {
      const actName = document.getElementById('quick-name').value.trim();
      if (!actName) return showToast("⚠️ 請輸入活動名稱", true);
      btnId = 'btn-quick-create';
      
      let rawNames = document.getElementById('quick-names').value.trim();
      let names = [];
      if (rawNames) {
        let cleaned = rawNames.replace(/^姓名[:：\s]*/, "");
        names = /\d+[\.\s、]/.test(cleaned) ? cleaned.split(/\s*\d+[\.\s、]+/).map(n => n.trim()).filter(n => n) : cleaned.split(/[\n,，]+/).map(n => n.trim()).filter(n => n);
      }
      
      payload = {
        names, activityName: actName, activityType: document.getElementById('quick-type').value,
        defaultIdentity: document.getElementById('quick-identity').value,
        feeType: '免費', price: '', startTime: '', endTime: '', description: '', imageUrl: '',
        selectedFields: { gender: true, phone: true, industry: true }
      };
    } else {
      const actName = document.getElementById('detail-name').value.trim();
      if (!actName) return showToast("⚠️ 請輸入活動名稱", true);
      const feeType = document.querySelector('input[name="fee-type"]:checked').value;
      const price = document.getElementById('detail-price').value.trim();
      if (feeType === '收費' && !price) return showToast("⚠️ 請輸入收費金額", true);
      btnId = 'btn-detail-create';
      
      payload = {
        names: [], activityName: actName, activityType: document.getElementById('detail-type').value,
        defaultIdentity: '來賓', feeType, price,
        startTime: document.getElementById('detail-start').value, endTime: document.getElementById('detail-end').value,
        description: document.getElementById('detail-desc').value, imageUrl: document.getElementById('in-image-url-create').value,
        selectedFields: {
          gender: document.getElementById('field-gender').checked,
          phone: document.getElementById('field-phone').checked,
          industry: document.getElementById('field-industry') ? document.getElementById('field-industry').checked : false
        }
      };
    }

    const btn = document.getElementById(btnId);
    btn.classList.add('btn-disabled'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 建立中...';

    try {
      await fetchAPI('bulkAddRegistrants', payload);
      showToast("✅ 活動建立成功！");
      document.getElementById('quick-name').value = ''; document.getElementById('quick-names').value = '';
      document.getElementById('detail-name').value = ''; document.getElementById('in-image-url-create').value = '';
      document.getElementById('detail-desc').value = ''; document.getElementById('detail-price').value = '';
      document.getElementById('image-preview-create').classList.add('hidden'); document.getElementById('preview-placeholder-create').classList.remove('hidden');
      switchView('admin-activities');
    } catch(err) { showToast(err.message || "建立失敗", true); }
    btn.classList.remove('btn-disabled'); btn.innerHTML = mode==='quick'?'快速建立':'發佈報名頁面';
  }

  function openEditActivity(actName) {
    const act = currentActivities.find(a => a.name === actName);
    if (!act) return;
    
    document.getElementById('edit-act-name').value = act.name;
    document.getElementById('edit-act-type').value = act.type || '例會';
    document.getElementById('edit-act-start').value = act.startTime || '';
    document.getElementById('edit-act-end').value = act.endTime || '';
    document.getElementById('edit-act-desc').value = act.description || '';
    
    if(act.feeType === '收費') {
      document.querySelector('input[name="edit-fee-type"][value="收費"]').checked = true;
      document.getElementById('edit-act-price').classList.remove('hidden');
      document.getElementById('edit-act-price').value = act.price || '';
    } else {
      document.querySelector('input[name="edit-fee-type"][value="免費"]').checked = true;
      document.getElementById('edit-act-price').classList.add('hidden');
      document.getElementById('edit-act-price').value = '';
    }

    const preview = document.getElementById('image-preview-edit');
    const placeholder = document.getElementById('preview-placeholder-edit');
    if (act.imageUrl) {
      preview.src = act.imageUrl;
      preview.classList.remove('hidden');
      placeholder.classList.add('hidden');
      document.getElementById('in-image-url-edit').value = act.imageUrl;
    } else {
      preview.src = '';
      preview.classList.add('hidden');
      placeholder.classList.remove('hidden');
      document.getElementById('in-image-url-edit').value = '';
    }

    switchView('admin-edit');
  }

  function formatTime(isoStr) {
    if (!isoStr) return ''; const d = new Date(isoStr);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    if(!t) return;
    t.innerHTML = msg;
    t.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-base shadow-2xl transition-all z-[10000] pointer-events-none flex items-center gap-2 font-bold transform ${isError ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`;
    t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 2500);
  }
