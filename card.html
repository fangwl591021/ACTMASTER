<!-- Version: v8.4.0 (QQ 終極完全體：恢復版型選擇入口，同步原生 UI) -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>數位名片管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fafc; font-family: 'Inter', 'Noto Sans TC', sans-serif; overscroll-behavior-y: none; }
        .phone-mock { border: 10px solid #1e293b; border-radius: 2.5rem; background: #f8fafc; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .toast-message { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
        .toast-message.show { opacity: 1; }
        .loading-spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #06C755; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-2xl font-black text-[16px] active:scale-95 transition-transform shadow-sm; }
        .custom-input { @apply w-full h-[50px] px-4 bg-slate-100 border-none rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-[#06C755]/20 transition-all font-bold text-slate-800 text-[15px]; }
        .textarea-block { @apply w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-[#06C755]/20 transition-all text-[15px] font-bold text-slate-800 resize-none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
        .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; min-width: 48px;}
        .nav-btn .icon-box { @apply px-4 py-1.5 rounded-2xl transition-all flex items-center justify-center mb-0.5; }
        .nav-active { @apply text-slate-800 font-bold; }
        .nav-active .icon-box { @apply bg-slate-100 text-slate-800; }
        .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="text-slate-800">

<div id="toast" class="toast-message"></div>

<div class="max-w-md mx-auto bg-white min-h-screen relative shadow-2xl overflow-hidden flex flex-col">
    
    <!-- Header -->
    <nav class="fixed top-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md z-30 px-5 py-3.5 flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#06C755] text-2xl" style="font-variation-settings: 'FILL' 1;">contact_mail</span>
            <span class="font-black text-slate-800 text-[19px] tracking-tight">名片通訊錄</span>
        </div>
        <div id="userArea" class="flex items-center gap-3">
            <div id="user-profile-badge" class="hidden"><img id="userAvatar" src="" class="w-9 h-9 rounded-full object-cover border border-slate-100"></div>
            <button id="roleSwitchBtn" onclick="window.location.href='index.html'" class="hidden w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center active:scale-90 transition-all"><span class="material-symbols-outlined text-slate-500 text-[20px]">swap_horiz</span></button>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto pt-20 pb-32 px-4 space-y-6">
        <div id="loadingView" class="h-full flex flex-col items-center justify-center py-20 space-y-4">
            <div class="loading-spinner"></div>
            <p id="loading-text" class="text-slate-400 font-bold tracking-widest text-[13px]">同步雲端資料庫...</p>
        </div>

        <div id="listView" class="hidden space-y-6">
            <!-- AI Scanner Box -->
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 text-center">
                <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-[#06C755] text-3xl">document_scanner</span></div>
                <h3 class="text-[17px] font-black text-slate-800">AI 智慧名片辨識</h3>
                <p class="text-[12px] text-slate-400 mt-1 mb-6 font-bold uppercase tracking-wider">Fast OCR & Fate Tags</p>
                <div class="flex gap-3">
                    <button onclick="window.openCamera()" class="flex-1 btn-primary text-sm py-4 shadow-lg shadow-green-500/20">📷 拍照辨識</button>
                    <button onclick="window.openGallery()" class="flex-1 py-4 bg-slate-50 text-slate-600 rounded-2xl font-black text-sm active:scale-95 transition-transform">🖼️ 相簿上傳</button>
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="window.handleCameraInput(event)">
                <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="window.handleGalleryInput(event)">
            </div>

            <!-- Search Bar -->
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                    <input type="text" id="searchInput" oninput="window.filterCardList()" placeholder="搜尋姓名或公司..." class="custom-input !pl-12 !h-[50px] shadow-sm">
                </div>
                <button id="btn-refresh-cards" onclick="window.reloadCardContacts()" class="w-[50px] h-[50px] bg-white rounded-2xl shadow-sm flex items-center justify-center text-slate-400 active:scale-90 border border-slate-100 transition-all"><span class="material-symbols-outlined">refresh</span></button>
            </div>

            <div id="admin-card-list-container" class="space-y-3"></div>
        </div>

        <!-- AI Process View -->
        <div id="processView" class="hidden animate-in fade-in space-y-6">
            <button onclick="window.resetUI()" class="flex items-center gap-1.5 text-slate-400 text-sm font-black active:opacity-60"><span class="material-symbols-outlined text-[18px]">arrow_back</span> 返回列表</button>
            <div id="section-loading" class="hidden text-center py-20"><div class="loading-spinner"></div><p class="text-[#06C755] font-black tracking-widest text-sm">AI 正在辨識名片中...</p></div>
            <div id="section-form" class="bg-white rounded-[2.5rem] p-6 shadow-sm hidden space-y-4 border border-slate-100">
                <img id="process-preview-image" class="w-full rounded-2xl mb-4 max-h-52 object-contain bg-slate-50 border border-slate-100">
                <div class="space-y-4">
                    <input type="text" id="f-Name" placeholder="姓名" class="custom-input">
                    <input type="text" id="f-CompanyName" placeholder="公司名稱" class="custom-input">
                    <input type="tel" id="f-Mobile" placeholder="手機號碼" class="custom-input">
                    <input type="text" id="f-Title" placeholder="職稱" class="custom-input">
                    <textarea id="f-Slogan" placeholder="服務項目 / 品牌標語" class="textarea-block h-24"></textarea>
                    <textarea id="f-Notes" placeholder="內部備註" class="textarea-block h-24"></textarea>
                    <button onclick="window.saveToCloud()" id="btn-save" class="btn-primary mt-4 py-5 shadow-lg shadow-green-500/20">💾 存入雲端通訊錄</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[76px] rounded-t-3xl border-t border-slate-100">
        <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">fact_check</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">核銷</span></button>
        <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">add_circle</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">建立</span></button>
        <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">groups</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">CRM</span></button>
        <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">psychology</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">配對</span></button>
        <button onclick="window.location.href='card.html'" class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">recent_patient</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">名片</span></button>
        <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">settings</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">參數</span></button>
    </nav>
    <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[76px] rounded-t-3xl border-t border-slate-100">
        <button onclick="window.location.href='index.html?view=user-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">explore</span></div><span class="text-[10px] font-bold mt-0.5">探索</span></button>
        <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">psychology</span></div><span class="text-[10px] font-bold mt-0.5">配對</span></button>
        <button onclick="window.location.href='index.html?view=user-history'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">receipt_long</span></div><span class="text-[10px] font-bold mt-0.5">紀錄</span></button>
        <button onclick="window.location.href='index.html?view=user-profile'" class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">person</span></div><span class="text-[10px] font-bold mt-0.5">設定</span></button>
    </nav>
</div>

<!-- ======================== 名片詳情 Modal (恢復版型選擇入口) ======================== -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-slate-50/95 backdrop-blur-md z-50 max-w-md mx-auto flex flex-col overflow-hidden animate-in slide-in-from-bottom-full duration-300">
    <div class="absolute top-4 right-4 flex gap-2 z-10">
        <button onclick="window.openCardEdit()" class="w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all text-slate-600"><span class="material-symbols-outlined text-[20px]">edit</span></button>
        <button onclick="window.closeReadOnlyCard()" class="w-10 h-10 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white active:scale-90 transition-all"><span class="material-symbols-outlined text-[20px]">close</span></button>
    </div>
    <div class="flex-1 overflow-auto pb-28">
        <div class="w-full aspect-[4/3] bg-slate-100 relative overflow-hidden">
            <img id="ro-image" class="w-full h-full object-cover">
            <div id="ro-no-image" class="absolute inset-0 flex items-center justify-center text-slate-300 bg-slate-100 hidden"><span class="material-symbols-outlined text-6xl">contact_mail</span></div>
        </div>
        <div class="p-6 -mt-6 bg-white rounded-t-[2.5rem] relative z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] space-y-6">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <h2 id="ro-name" class="text-[26px] font-black text-slate-800 tracking-tight"></h2>
                    <span id="ro-claim-status" class="hidden"></span>
                </div>
                <p id="ro-title" class="text-slate-500 font-bold text-sm tracking-wide"></p>
            </div>
            <div class="space-y-4 border-y border-slate-100 py-6">
                <div class="flex gap-4 items-center"><span class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[20px]">business</span></span><span id="ro-company" class="font-bold text-slate-700"></span></div>
                <div class="flex gap-4 items-center"><span class="w-10 h-10 rounded-xl bg-green-50 text-[#06C755] flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[20px]">smartphone</span></span><a id="ro-mobile-link" class="text-[#06C755] font-black tracking-widest text-[16px]"></a></div>
                <div class="flex gap-4 items-center"><span class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[20px]">email</span></span><a id="ro-email-link" class="text-blue-500 font-bold text-sm"></a></div>
            </div>
            <div class="space-y-3">
                <h4 class="text-[13px] font-black text-slate-400 uppercase tracking-widest">關於我 / 備註</h4>
                <div id="ro-notes" class="text-slate-600 text-[14px] whitespace-pre-wrap leading-relaxed bg-slate-50 p-5 rounded-[1.5rem] border border-slate-100 font-medium"></div>
            </div>
        </div>
    </div>
    <div class="absolute bottom-0 w-full bg-white/90 backdrop-blur-xl p-4 border-t border-slate-100 flex gap-3 pb-safe shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button onclick="window.shareClaimLink()" id="btn-share-claim" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hidden">邀請認領</button>
        <button onclick="window.openECardGenerator()" class="flex-1 btn-primary py-4 shadow-lg shadow-green-500/20">✨ 產生數位名片</button>
    </div>
</div>

<!-- ======================== 數位名片產生器 Modal (三大版型完全體) ======================== -->
<div id="ecard-generator-modal" class="hidden fixed inset-0 bg-white z-[70] max-w-md mx-auto flex flex-col overflow-hidden animate-in slide-in-from-right-full duration-300">
    <div class="bg-white px-5 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 z-20 shadow-sm shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="window.closeECardGenerator()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center active:scale-90 transition-all"><span class="material-symbols-outlined text-slate-600">arrow_back</span></button>
            <span class="font-black text-slate-800 tracking-tight text-lg">版型編輯器</span>
        </div>
        <button onclick="window.saveECardConfig()" id="btn-save-ecard" class="text-sm bg-blue-50 text-blue-600 px-5 py-2.5 rounded-full font-black active:scale-95 transition-all">儲存草稿</button>
    </div>

    <div class="flex-1 overflow-auto p-5 pb-32 bg-white space-y-6">
        <!-- 手機實時預覽 -->
        <div class="lg:hidden flex flex-col items-center mb-8 pb-6 border-b border-slate-50">
            <div class="flex items-center gap-1.5 mb-3 text-slate-400"><span class="material-symbols-outlined text-[18px]">preview</span><span class="text-[12px] font-black uppercase tracking-widest tracking-widest">Live Preview</span></div>
            <div class="w-[280px] border-[8px] border-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl bg-white relative">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-5 bg-slate-900 rounded-b-2xl z-30"></div>
                <div id="mobilePreviewContainer" class="min-h-[400px] w-full relative z-10 bg-slate-50"></div>
            </div>
        </div>

        <input type="hidden" id="ec-card-type" value="image">
        
        <!-- 三大頁籤切換器 -->
        <div class="flex p-1.5 rounded-2xl bg-slate-100 border border-slate-200/50 mb-6">
            <button id="ec-tab-image" onclick="window.toggleECardType('image')" class="flex-1 py-3 text-[13px] font-black rounded-xl bg-white text-blue-600 shadow-sm transition-all">🖼️ 圖片</button>
            <button id="ec-tab-video" onclick="window.toggleECardType('video')" class="flex-1 py-3 text-[13px] font-black rounded-xl text-slate-500 bg-transparent transition-all">🎬 影片</button>
            <button id="ec-tab-v2" onclick="window.toggleECardType('v2')" class="flex-1 py-3 text-[13px] font-black rounded-xl text-slate-500 bg-transparent transition-all">✨ 多連結</button>
        </div>

        <div class="space-y-5">
            <div class="space-y-1.5"><label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">名片標題</label><input type="text" id="ec-title-input" class="custom-input shadow-sm" oninput="window.updateECardPreview()"></div>
            <div class="space-y-1.5"><label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">內容描述</label><textarea id="ec-desc-input" rows="3" class="textarea-block shadow-sm h-32" oninput="window.updateECardPreview()"></textarea></div>
        </div>

        <!-- V1 (圖片/影片) -->
        <div id="ec-v1-fields" class="space-y-6 mt-6">
            <div id="ec-video-input-group" class="hidden animate-in slide-in-from-top-2">
                <label class="text-[12px] font-black text-blue-600 ml-1 uppercase tracking-widest">MP4 影片連結</label>
                <div class="flex gap-2">
                    <input type="url" id="ec-video-url" class="custom-input shadow-sm flex-1" oninput="window.updateECardPreview()">
                    <button onclick="window.openVoomModal()" class="w-[50px] bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center active:scale-90"><span class="material-symbols-outlined">movie_edit</span></button>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">封面圖片</label>
                <div onclick="document.getElementById('ec-file-input').click()" class="relative drag-area w-full h-40 bg-slate-50 rounded-[1.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all hover:bg-slate-100">
                    <img id="ec-img-preview-box" src="" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                    <div id="ec-upload-placeholder" class="flex flex-col items-center z-0 text-slate-300"><span class="material-symbols-outlined text-4xl mb-1">add_photo_alternate</span><p class="text-[11px] font-black tracking-widest uppercase">Click to Upload</p></div>
                </div>
                <input type="text" id="ec-img-input" class="custom-input mt-2 shadow-sm text-xs font-mono" placeholder="或貼上圖片網址" oninput="window.updateECardPreview()">
                <input type="file" id="ec-file-input" accept="image/*" class="hidden" onchange="window.openCropper(this, 'ecard')">
            </div>
            <div id="ec-btn-list" class="space-y-3 pt-4 border-t border-slate-50"></div>
        </div>

        <!-- V2 (質感多連結) -->
        <div id="ec-v2-fields" class="hidden space-y-6 mt-6">
            <div class="space-y-2">
                <label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">LOGO / 大頭貼</label>
                <div class="flex gap-4 items-center">
                    <div onclick="document.getElementById('ec-v2-logo-file').click()" class="w-20 h-20 bg-slate-50 rounded-full flex flex-col items-center justify-center border-2 border-dashed border-slate-200 relative shrink-0 overflow-hidden shadow-inner">
                        <img id="ec-v2-logo-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                        <span id="ec-v2-logo-placeholder" class="material-symbols-outlined text-slate-300">add_a_photo</span>
                    </div>
                    <input type="text" id="ec-v2-logo-url" class="custom-input flex-1 shadow-sm text-xs" placeholder="圖片網址" oninput="window.updateECardPreview()">
                    <input type="file" id="ec-v2-logo-file" accept="image/*" class="hidden" onchange="window.openCropper(this, 'v2logo')">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5"><label class="text-[11px] font-black text-slate-400 ml-1">漸層起點色</label><input type="color" id="ec-v2-bg-start" value="#57142b" class="w-full h-12 rounded-xl cursor-pointer border-none bg-slate-100 p-1" oninput="window.updateECardPreview()"></div>
                <div class="space-y-1.5"><label class="text-[11px] font-black text-slate-400 ml-1">漸層迄點色</label><input type="color" id="ec-v2-bg-end" value="#46250c" class="w-full h-12 rounded-xl cursor-pointer border-none bg-slate-100 p-1" oninput="window.updateECardPreview()"></div>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">社群圖示</label><button onclick="window.addV2Social()" class="px-4 py-1.5 bg-slate-800 text-white rounded-full text-[11px] font-black active:scale-90 transition-all">+ 新增</button></div>
                <div id="ec-v2-social-list" class="space-y-2"></div>
            </div>
            <div class="space-y-4 pt-4 border-t border-slate-50">
                <div class="flex justify-between items-center"><label class="text-[12px] font-black text-slate-400 ml-1 uppercase tracking-widest">質感導購按鈕</label><button onclick="window.addV2Bar()" class="px-4 py-1.5 bg-[#06C755] text-white rounded-full text-[11px] font-black active:scale-90 transition-all">+ 新增</button></div>
                <div id="ec-v2-bars-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 space-y-4">
            <div class="space-y-1.5"><label class="text-[12px] font-black text-[#06C755] ml-1 uppercase tracking-widest">LINE 轉發預覽文字</label><input type="text" id="ec-alt-text-input" class="custom-input shadow-sm" placeholder="這是我的數位名片"></div>
            <button onclick="window.shareECardToLine()" id="btn-share-line" class="btn-primary py-5 bg-[#06C755] shadow-lg shadow-green-500/30 text-[17px] tracking-widest flex items-center justify-center gap-2">🚀 發送名片至 LINE</button>
        </div>
    </div>
</div>

<!-- Cropper Modal -->
<div id="section-image-cropper" class="hidden fixed inset-0 bg-slate-900 flex flex-col z-[1080] animate-in fade-in">
  <div class="flex justify-between items-center p-5 text-white border-b border-slate-800 bg-slate-900 shadow-xl shrink-0">
    <button onclick="window.cancelCrop()" class="px-4 py-2 font-black text-slate-400">取消</button>
    <span class="font-black text-lg tracking-widest">調整裁切</span>
    <button onclick="window.confirmCrop()" class="px-6 py-2 font-black bg-[#06C755] rounded-xl shadow-lg">完成</button>
  </div>
  <div class="flex-1 relative bg-black flex items-center justify-center overflow-hidden"><img id="cropper-image" class="max-w-full max-h-full block opacity-0"></div>
</div>
