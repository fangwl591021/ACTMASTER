<script>
/**
 * ACTMASTER 核心邏輯 v7.7.0
 */
const LIFF_ID = "2009367829-DLtYBDUm"; 
const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 

let globalCardContacts = []; 
let filteredCards = [];
let currentActiveCard = null; 
let userProfile = null;
let cropperInstance = null;

// ⭐ 智慧修復：絕對防止 IMAGE_DATA_LARGE 導致的 404
window.getSafeImgUrl = function(val) {
  if (!val || val === '無圖檔' || val === '圖片儲存失敗' || val === 'IMAGE_DATA_LARGE' || String(val).length < 10) {
    return 'https://images.unsplash.com/photo-1616628188550-808682f3926d?w=300&q=80';
  }
  const driveMatch = val.match(/id=([a-zA-Z0-9_-]+)/) || val.match(/d\/([a-zA-Z0-9_-]+)/);
  if (driveMatch && val.includes('drive.google.com')) return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1000`;
  return val;
};

window.fetchAPI = async function(action, payload = {}) {
  try {
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    return json.data;
  } catch (e) { window.showToast(e.message, true); throw e; }
};

window.showToast = function(msg, isError = false) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.innerHTML = `<span class="material-symbols-outlined">${isError ? 'error' : 'info'}</span> ${msg}`;
  t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] ${isError ? 'bg-red-500' : 'bg-slate-800'} text-white opacity-100 z-[10000]`;
  t.classList.remove('hidden');
  setTimeout(() => { t.classList.add('hidden'); }, 3000); 
};

// ⭐ 關鍵修正：解決鬼打牆，不准跳轉網址
window.closeReadOnlyCard = function() {
    document.getElementById('readonly-card-modal').classList.add('hidden');
};

function formatPhoneStr(val) {
  if (!val) return '';
  let s = String(val).replace(/[^\d+]/g, '');
  if (s.startsWith('9') && s.length === 9) s = '0' + s;
  return s;
}

// ⭐ 智慧預填：按照您要求的順序 (官網 > 社群 > 地圖 > LINE)
window.initAndOpenECardGenerator = function(rowId) {
    const card = globalCardContacts.find(c => String(c.rowId) === String(rowId));
    if (!card) return;
    window.currentActiveCard = card;

    let config = {};
    if (card['自訂名片設定']) { try { config = JSON.parse(card['自訂名片設定']); } catch(e){} }

    // 1. 決定 Action URL 優先順序
    let defaultUrl = `https://liff.line.me/${LIFF_ID}`;
    const website = (card['公司網址'] || card['Website'] || '').trim();
    const social = (card['社群帳號'] || card['SocialMedia'] || '').trim();
    const address = (card['公司地址'] || card['Address'] || '').trim();

    if (website && website !== '-') {
        defaultUrl = website.startsWith('http') ? website : 'https://' + website;
    } else if (social && social !== '-' && social.startsWith('http')) {
        defaultUrl = social;
    } else if (address && address !== '-') {
        defaultUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
    }

    // 2. 智慧預填按鈕
    let btns = [];
    let p1 = card['手機號碼'] || card['Mobile'];
    if (p1 && p1 !== '-') btns.push({ l: '撥打手機', u: `tel:${formatPhoneStr(p1)}`, c: '#2563eb' });
    if (address && address !== '-') btns.push({ l: '地圖導航', u: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`, c: '#ef4444' });
    if (website && website !== '-') btns.push({ l: '官方網站', u: website.startsWith('http') ? website : 'https://' + website, c: '#64748b' });

    config.cardType = config.cardType || 'image';
    config.title = config.title || (card['姓名'] || '商務名片');
    config.imgActionUrl = config.imgActionUrl || defaultUrl;
    config.buttons = (config.buttons && config.buttons.length > 0) ? config.buttons : btns;
    
    // ⭐ 重要：直接把生成的預設值同步到外掛腳本的變數中
    window.v2Socials = config.v2Socials || [];
    window.v2Bars = config.v2Bars || btns.map(b => ({ t: b.l, u: b.u }));
    window.currentActiveCard['自訂名片設定'] = JSON.stringify(config);

    // 3. 手動同步 UI 欄位內容
    const tIn = document.getElementById('ec-title-input'); if(tIn) tIn.value = config.title;
    const aIn = document.getElementById('ec-img-action-url'); if(aIn) aIn.value = config.imgActionUrl;
    const iIn = document.getElementById('ec-img-input'); if(iIn) iIn.value = (card['名片圖檔'] === 'IMAGE_DATA_LARGE') ? '' : (config.imgUrl || card['名片圖檔'] || '');

    // 4. 開啟編輯器
    if (typeof window.openECardGenerator === 'function') {
        window.openECardGenerator();
        if(typeof window.renderV2SocialUI === 'function') window.renderV2SocialUI();
        if(typeof window.renderV2BarsUI === 'function') window.renderV2BarsUI();
        if(typeof window.updateECardPreview === 'function') window.updateECardPreview();
    }
};

window.saveECardConfig = async function() {
    const btn = document.getElementById('btn-save-ecard');
    btn.innerText = '儲存中...';
    try {
        const title = document.getElementById('ec-title-input').value;
        const imgActionUrl = document.getElementById('ec-img-action-url').value;
        if (!title || !imgActionUrl) throw new Error("主標題與連結不可為空");

        let config = JSON.parse(window.currentActiveCard['自訂名片設定'] || '{}');
        config.title = title;
        config.desc = document.getElementById('ec-desc-input').value;
        config.imgActionUrl = imgActionUrl;
        config.imgUrl = document.getElementById('ec-img-input').value;
        config.v2Socials = window.v2Socials || [];
        config.v2Bars = window.v2Bars || [];

        await window.fetchAPI('updateECardConfig', { rowId: window.currentActiveCard.rowId, config: config });
        window.currentActiveCard['自訂名片設定'] = JSON.stringify(config);
        window.showToast("✅ 儲存成功");
        document.getElementById('ecard-generator-modal').classList.add('hidden');
    } catch(e) { alert("儲存失敗：" + e.message); } finally { btn.innerText = '儲存草稿'; }
};

window.shareECardToLine = async function() {
    try {
        const title = document.getElementById('ec-title-input').value;
        const url = document.getElementById('ec-img-action-url').value;
        if (!title || !url) return alert("❌ 請填寫標題與連結");

        let config = JSON.parse(window.currentActiveCard['自訂名片設定'] || '{}');
        config.title = title;
        config.imgActionUrl = url;
        config.v2Socials = window.v2Socials || [];
        config.v2Bars = window.v2Bars || [];

        const flex = window.buildFlexMessageFromCard(window.currentActiveCard, config);
        const res = await liff.shareTargetPicker([{ type: "flex", altText: `您收到名片：${title}`, contents: flex }]);
        if (res) window.showToast('🚀 發送成功！');
    } catch(e) { alert("傳送失敗"); }
};

window.renderCardPage = function() {
    const container = document.getElementById('admin-card-list-container');
    container.innerHTML = filteredCards.map(c => `
        <div class="p-5 bg-white flex items-center gap-4 rounded-[2rem] shadow-sm mb-3">
          <div onclick="openCardDetailByRowId('${c.rowId}')" class="w-[56px] h-[56px] shrink-0 rounded-2xl overflow-hidden bg-slate-50 flex items-center justify-center">
            <img src="${window.getSafeImgUrl(c['名片圖檔'])}" class="w-full h-full object-cover">
          </div>
          <div onclick="openCardDetailByRowId('${c.rowId}')" class="flex-1 overflow-hidden">
            <h4 class="text-[17px] font-extrabold text-slate-800 truncate">${c['姓名'] || '未知'}</h4>
            <p class="text-[13px] text-slate-500 truncate">${c['公司名稱'] || ''}</p>
          </div>
          <button onclick="initAndOpenECardGenerator('${c.rowId}')" class="w-10 h-10 bg-[#06C755]/10 text-[#06C755] rounded-full flex items-center justify-center shrink-0">
              <span class="material-symbols-outlined text-[18px]">contact_mail</span>
          </button>
        </div>`).join('');
};

async function loadCardContacts() { 
    try {
        const data = await window.fetchAPI('getCardContacts');
        globalCardContacts = data || [];
        filterCardList();
    } catch(e) { }
}

window.filterCardList = function() {
    const term = document.getElementById('card-search-input').value.toLowerCase();
    filteredCards = globalCardContacts.filter(c => (c['姓名']||'').toLowerCase().includes(term) || (c['公司名稱']||'').toLowerCase().includes(term));
    renderCardPage();
};

document.addEventListener("DOMContentLoaded", async () => {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    userProfile = await liff.getProfile();
    document.getElementById('user-avatar').src = userProfile.pictureUrl;
    document.getElementById('view-loading').classList.add('hidden');
    document.getElementById('view-list').classList.remove('hidden');
    loadCardContacts();
});

function openCardDetailByRowId(id) { 
    const c = globalCardContacts.find(x => x.rowId === id);
    if (!c) return;
    window.currentActiveCard = c;
    document.getElementById('ro-name').innerText = c['姓名'] || '未知';
    document.getElementById('ro-company').innerText = c['公司名稱'] || '';
    document.getElementById('ro-notes').innerText = (c['建檔人/備註'] || '') + '\n' + (c['服務項目/品牌標語'] || '');
    let mob = c['手機號碼'] || c['Mobile'] || '';
    const mobLink = document.getElementById('ro-mobile-link');
    if(mobLink) { mobLink.innerText = mob || '未提供'; mobLink.href = mob ? `tel:${formatPhoneStr(mob)}` : '#'; }
    const imgEl = document.getElementById('ro-image');
    const noImgEl = document.getElementById('ro-no-image');
    if (c['名片圖檔'] && c['名片圖檔'].length > 20 && c['名片圖檔'] !== 'IMAGE_DATA_LARGE') {
        imgEl.src = window.getSafeImgUrl(c['名片圖檔']); imgEl.classList.remove('hidden'); noImgEl.classList.add('hidden');
    } else { imgEl.classList.add('hidden'); noImgEl.classList.remove('hidden'); }
    document.getElementById('readonly-card-modal').classList.remove('hidden');
}

function resetUI() { window.location.reload(); }
</script>
</body>
</html>
