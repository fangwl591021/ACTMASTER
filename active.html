<script>
  const LIFF_ID = "2009367829-DLtYBDUm";
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
  
  let batchCount = 0;
  let currentCropTarget = '';
  let cropperInstance = null;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      const profile = await liff.getProfile();
      if (!ADMIN_IDS.includes(profile.userId)) { 
          alert("無權限存取此頁面");
          window.location.href = 'index.html'; 
          return; 
      }
      
      addBatchRow();
      
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('form-content').classList.remove('hidden');
    } catch(e) { 
        alert("LINE 初始化失敗，請重新載入"); 
    }
  });

  // =====================
  // UI 邏輯
  // =====================
  function switchTab(tabId) {
      ['quick', 'full', 'series'].forEach(id => {
          document.getElementById(`tab-content-${id}`).classList.add('hidden');
          const btn = document.getElementById(`tab-btn-${id}`);
          btn.className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700 bg-transparent';
      });
      
      document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
      const activeBtn = document.getElementById(`tab-btn-${tabId}`);
      activeBtn.className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-white text-blue-600 shadow-sm transition-all';
  }

  function togglePrice(prefix) {
      const feeType = document.querySelector(`input[name="${prefix}-fee-type"]:checked`).value;
      const priceBox = document.getElementById(`${prefix}-price-box`);
      if (feeType === '收費') {
          priceBox.classList.remove('hidden');
      } else {
          priceBox.classList.add('hidden');
          document.getElementById(`${prefix}-price`).value = '';
      }
  }

  function addBatchRow(defaultValues = null, insertAfterId = null) {
      batchCount++;
      const container = document.getElementById('batch-container');
      const rowId = `batch-${batchCount}`;
      
      const html = `
      <div id="${rowId}" class="bg-slate-50 p-4 rounded-2xl relative border-none animate-in slide-in-from-top-2">
          <div class="absolute top-3 right-3 flex gap-1.5 z-10">
              <button onclick="copyBatchRow('${rowId}')" class="w-8 h-8 bg-white text-blue-500 hover:bg-blue-50 rounded-full flex items-center justify-center shadow-sm transition-colors" title="複製此梯次">
                  <span class="material-symbols-outlined text-[15px]">content_copy</span>
              </button>
              ${batchCount > 1 || insertAfterId ? `
              <button onclick="document.getElementById('${rowId}').remove()" class="w-8 h-8 bg-white text-slate-400 hover:text-red-500 rounded-full flex items-center justify-center shadow-sm transition-colors" title="刪除此梯次">
                  <span class="material-symbols-outlined text-[18px]">close</span>
              </button>
              ` : ''}
          </div>
          
          <div class="flex flex-col mb-3 pr-20">
              <input type="text" id="${rowId}-name" class="custom-input !h-[44px] !bg-white shadow-sm" placeholder="梯次名稱 (例如: 台北平日班)" value="${defaultValues ? defaultValues.name : ''}">
          </div>
          
          <div class="grid grid-cols-2 gap-3 mb-3">
              <input type="datetime-local" id="${rowId}-start" class="custom-input !h-[44px] !bg-white shadow-sm !text-[13px] !px-3 text-slate-600" value="${defaultValues ? defaultValues.start : ''}">
              <input type="datetime-local" id="${rowId}-end" class="custom-input !h-[44px] !bg-white shadow-sm !text-[13px] !px-3 text-slate-600" value="${defaultValues ? defaultValues.end : ''}">
          </div>
          
          <div class="flex items-center gap-2">
              <span class="text-[13px] font-bold text-slate-500 shrink-0 ml-1">收費 NT$</span>
              <input type="number" id="${rowId}-price" class="custom-input !h-[44px] !bg-white shadow-sm" placeholder="免費請留空或填 0" value="${defaultValues ? defaultValues.price : ''}">
          </div>
      </div>
      `;
      
      if (insertAfterId) document.getElementById(insertAfterId).insertAdjacentHTML('afterend', html);
      else container.insertAdjacentHTML('beforeend', html);
  }

  function copyBatchRow(sourceId) {
      const srcName = document.getElementById(`${sourceId}-name`).value;
      const srcStart = document.getElementById(`${sourceId}-start`).value;
      const srcEnd = document.getElementById(`${sourceId}-end`).value;
      const srcPrice = document.getElementById(`${sourceId}-price`).value;
      
      addBatchRow({
          name: srcName ? srcName + ' (複製)' : '',
          start: srcStart,
          end: srcEnd,
          price: srcPrice
      }, sourceId);
  }

  // =====================
  // ⭐ 影像裁切邏輯 
  // =====================
  function openCropper(input, targetMode) {
      const file = input.files[0];
      if (!file) return;
      currentCropTarget = targetMode; // 'q', 'f', 's'
      
      const reader = new FileReader();
      reader.onload = (e) => {
          const img = document.getElementById('cropper-image');
          if (!img) return;
          
          img.onload = () => {
              const modal = document.getElementById('section-image-cropper');
              if (modal) modal.classList.remove('hidden');
              if (cropperInstance) cropperInstance.destroy();
              img.style.opacity = '1';
              
              cropperInstance = new Cropper(img, {
                  aspectRatio: 4 / 3, 
                  viewMode: 1,
                  dragMode: 'move',
                  autoCropArea: 0.9,
                  guides: true,
                  center: true,
                  highlight: false
              });
          };
          img.src = e.target.result;
          input.value = ""; // 防止 iOS 靜默 abort
      };
      reader.onerror = () => alert("讀取圖片失敗，請重試");
      reader.readAsDataURL(file);
  }

  function cancelCrop() {
      if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
      const modal = document.getElementById('section-image-cropper');
      if (modal) modal.classList.add('hidden');
      const img = document.getElementById('cropper-image');
      if (img) { img.src = ''; img.style.opacity = '0'; }
  }

  async function confirmCrop() {
      if (!cropperInstance) return;
      let quality = 0.8;
      let base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/jpeg', quality);
      
      while (base64.length > 400000 && quality > 0.1) {
          quality -= 0.1;
          base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/jpeg', quality);
      }
      cancelCrop();

      // ⭐ Optimistic UI: 即時顯示在表單上
      const previewImg = document.getElementById(`${currentCropTarget}-img-preview`);
      const placeholder = document.getElementById(`${currentCropTarget}-upload-placeholder`);
      if (previewImg && placeholder) {
          previewImg.src = base64;
          previewImg.classList.remove('hidden');
          placeholder.classList.add('hidden');
      }

      // 按鈕鎖定與狀態提示
      let submitBtnId = '';
      if (currentCropTarget === 'q') submitBtnId = 'btn-submit-quick';
      if (currentCropTarget === 'f') submitBtnId = 'btn-submit-full';
      if (currentCropTarget === 's') submitBtnId = 'btn-submit-series';
      
      const submitBtn = document.getElementById(submitBtnId);
      const originalText = submitBtn ? submitBtn.innerHTML : '建立';
      if (submitBtn) {
          submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-1 text-[20px]">refresh</span> 圖片上傳中...';
          submitBtn.disabled = true;
          submitBtn.classList.add('opacity-70');
      }

      try {
          // 背景非同步上傳至 Google Drive
          const res = await fetch(WORKER_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'uploadImage', payload: { base64Image: base64 } })
          });
          const json = await res.json();
          if (!json.success) throw new Error(json.error);
          
          // 寫入真實網址到 hidden input
          const hiddenInput = document.getElementById(`${currentCropTarget}-img`);
          if (hiddenInput) hiddenInput.value = json.data;
          
      } catch (e) {
          alert('圖片上傳失敗：' + e.message);
          // 若上傳失敗，復原預覽畫面
          if (previewImg && placeholder) {
              previewImg.src = '';
              previewImg.classList.add('hidden');
              placeholder.classList.remove('hidden');
          }
      } finally {
          if (submitBtn) {
              submitBtn.innerHTML = originalText;
              submitBtn.disabled = false;
              submitBtn.classList.remove('opacity-70');
          }
      }
  }

  // =====================
  // API 發送邏輯
  // =====================
  async function handleSubmit(mode) {
      let payload = {};
      
      if (mode === 'quick') {
          const name = document.getElementById('q-name').value.trim();
          const type = document.getElementById('q-type').value.trim() || '例會';
          const identity = document.getElementById('q-identity').value.trim() || '會員';
          const feeType = document.querySelector('input[name="q-fee-type"]:checked').value;
          const price = feeType === '收費' ? (document.getElementById('q-price').value || 0) : 0;
          const names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());
          const img = document.getElementById('q-img') ? document.getElementById('q-img').value.trim() : '';

          if(!name) return alert('⚠️ 請輸入活動名稱');
          if(feeType === '收費' && (!price || price <= 0)) return alert('⚠️ 請輸入正確的收費金額');

          payload = {
              activityName: name,
              activityType: type,
              defaultIdentity: identity,
              feeType: feeType,
              price: price,
              names: names,
              startTime: '', endTime: '', description: '', imageUrl: img
          };
          
      } else if (mode === 'full') {
          const name = document.getElementById('f-name').value.trim();
          const start = document.getElementById('f-start').value;
          const end = document.getElementById('f-end').value;
          const feeType = document.querySelector('input[name="f-fee-type"]:checked').value;
          const price = feeType === '收費' ? (document.getElementById('f-price').value || 0) : 0;
          const desc = document.getElementById('f-desc').value.trim();
          const img = document.getElementById('f-img') ? document.getElementById('f-img').value.trim() : '';

          if(!name) return alert('⚠️ 請輸入活動標題');
          if(feeType === '收費' && (!price || price <= 0)) return alert('⚠️ 請輸入正確的收費金額');

          payload = {
              activityName: name,
              activityType: '一般',
              defaultIdentity: '會員',
              feeType: feeType,
              price: price,
              names: [],
              startTime: start,
              endTime: end,
              description: desc,
              imageUrl: img
          };
          
      } else if (mode === 'series') {
          const name = document.getElementById('s-name').value.trim();
          const desc = document.getElementById('s-desc').value.trim();
          const img = document.getElementById('s-img') ? document.getElementById('s-img').value.trim() : '';
          
          if(!name) return alert('⚠️ 請輸入活動總標題');

          const batchNodes = document.querySelectorAll('#batch-container > div');
          if (batchNodes.length === 0) return alert('⚠️ 請至少建立一個梯次');

          const batches = [];
          let hasError = false;
          
          batchNodes.forEach(node => {
              const id = node.id;
              const bName = document.getElementById(`${id}-name`).value.trim();
              const bStart = document.getElementById(`${id}-start`).value;
              const bEnd = document.getElementById(`${id}-end`).value;
              let bPrice = document.getElementById(`${id}-price`).value;
              bPrice = bPrice ? parseInt(bPrice) : 0;

              if (!bName) hasError = true;
              
              batches.push({
                  name: bName,
                  startTime: bStart,
                  endTime: bEnd,
                  price: bPrice
              });
          });

          if (hasError) return alert('⚠️ 每個梯次的名稱都必須填寫');

          const isPaid = batches.some(b => b.price > 0);

          payload = {
              activityName: name,
              activityType: '一般',
              defaultIdentity: '會員',
              feeType: isPaid ? '收費' : '免費',
              price: isPaid ? '多票種' : 0,
              names: [],
              startTime: batches[0].startTime, 
              endTime: batches[batches.length-1].endTime,
              description: desc,
              imageUrl: img,
              batches: batches
          };
      }

      const btn = document.getElementById(`btn-submit-${mode}`);
      const originalText = btn.innerText;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-1 text-[20px]">refresh</span> 處理中...'; 
      btn.disabled = true;
      btn.classList.add('opacity-70');

      try {
        const res = await fetch(WORKER_URL, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'bulkAddRegistrants', payload: payload }) 
        });
        
        const json = await res.json();
        
        if (json.success) { 
            alert('🎉 活動建立成功！即將為您導向核銷頁面。'); 
            window.location.href = 'index.html?view=admin-activities'; 
        } else {
            throw new Error(json.error || '未知錯誤');
        }
      } catch(e) { 
          alert('❌ 建立失敗: ' + e.message); 
      } finally {
          btn.innerText = originalText; 
          btn.disabled = false; 
          btn.classList.remove('opacity-70');
      }
  }
</script>
