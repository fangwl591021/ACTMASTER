<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>發起新活動</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#2563eb",
            "primary-light": "#dbeafe",
            background: "#f8f9fc",
            "input-bg": "#f0f2f8",
            "text-main": "#1e293b",
            "text-muted": "#64748b",
            error: "#ef4444"
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            body: ["Inter", "Noto Sans TC", "sans-serif"],
          },
          boxShadow: {
            'app-card': '0 10px 40px -10px rgba(0,0,0,0.08)',
            'app-nav': '0 -4px 20px rgba(0,0,0,0.04)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    
    body { background-color: #f8f9fc; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[13px] font-bold text-text-main mb-2 ml-1; }
    .custom-input { @apply w-full py-4 pl-5 pr-12 bg-input-bg border-none rounded-2xl outline-none focus:ring-2 focus:ring-primary/30 transition-all font-medium text-text-main appearance-none; }
    .custom-input::placeholder { @apply text-slate-400 font-normal; }
    
    .btn-primary { @apply w-full py-4 bg-primary text-white rounded-full font-bold text-[17px] shadow-lg shadow-blue-500/30 active:scale-95 transition-all flex items-center justify-center gap-2; }
    .btn-disabled { pointer-events: none; opacity: 0.5; filter: grayscale(100%); }
    
    .nav-btn { @apply flex flex-col items-center gap-1.5 transition-all flex-1 text-slate-400; }
    .nav-btn .icon-box { @apply px-4 py-1.5 rounded-full transition-all; }
    .nav-active { @apply text-primary font-bold; }
    .nav-active .icon-box { @apply bg-primary-light text-primary; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    
    .loading-gif { width: 100px; height: auto; }
  </style>
</head>
<body class="font-body text-text-main min-h-screen flex flex-col items-center">

<div id="app-container" class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <!-- 頂部 Header -->
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-background/90 backdrop-blur-xl px-6 py-4 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-200/50">
    <div class="text-[22px] font-black text-primary flex items-center gap-2 font-headline tracking-tight">
      <span class="material-symbols-outlined text-2xl icon-filled">event_note</span>
      建立活動
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full object-cover border-2 border-white shadow-sm">
      </div>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-24 px-4 space-y-6">
    
    <!-- View: Loading -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXpzNDRvN3BpNjZhZmZ1djh6ZDV4N2ZucjQ5MHJidjhoOGNrZWp6byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/uOlsQMZSTU6Ff55OnQ/giphy.gif" alt="Loading" class="loading-gif mb-2">
      <p id="loading-text" class="text-primary font-bold tracking-widest text-sm">驗證權限中...</p>
    </div>

    <!-- View: Admin Create -->
    <div id="view-admin-create" class="hidden space-y-6 animate-in fade-in">
      
      <!-- ⭐ UI 優化：加強標題與間距 -->
      <div class="px-2 mb-4 pt-2">
        <h2 class="text-[32px] font-black font-headline text-text-main tracking-tight leading-tight">建立新活動</h2>
        <p class="text-text-muted text-[14px] font-medium mt-2 leading-relaxed">快速部署您的活動報名流程，支援批次匯入或完整圖文發佈。</p>
      </div>

      <!-- ⭐ UI 優化：切換按鈕 (Segmented Control) 質感提升 -->
      <div class="flex p-1.5 rounded-full mx-2 border border-slate-200 bg-slate-50 shadow-inner">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3 rounded-full text-[15px] font-bold bg-white text-primary shadow-sm transition-all ring-1 ring-slate-900/5">快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3 rounded-full text-[15px] font-bold text-slate-500 transition-all hover:text-slate-800">完整發佈</button>
      </div>
      
      <!-- 快速模式 -->
      <div id="form-quick" class="space-y-6 px-2 mt-8 animate-in fade-in">
        <div><label class="input-label">活動名稱</label><input type="text" id="quick-name" class="custom-input !pr-5" placeholder="輸入活動標題..."></div>
        <div>
            <label class="input-label">活動類型</label>
            <div class="relative"><select id="quick-type" class="custom-input text-slate-700"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span></div>
        </div>
        <div>
            <label class="input-label">預設身份</label>
            <div class="relative"><select id="quick-identity" class="custom-input text-slate-700"><option>會員</option><option>來賓</option></select><span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span></div>
        </div>
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-[13px] font-bold text-text-main ml-1">名單內容</label>
            <span class="text-[10px] font-bold text-primary bg-primary-light px-2 py-0.5 rounded">支援批次輸入</span>
          </div>
          <textarea id="quick-names" class="custom-input h-48 !pr-5 py-5 resize-none leading-relaxed text-[15px]" placeholder="請貼上參與者姓名，每行一位..."></textarea>
        </div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="btn-primary mt-4">
            建立活動 <span class="material-symbols-outlined text-[20px]">add_circle</span>
        </button>
      </div>
      
      <!-- 完整模式 -->
      <div id="form-detailed" class="hidden space-y-6 px-2 mt-8 animate-in fade-in">
         <div><label class="input-label">正式標題</label><input type="text" id="detail-name" class="custom-input !pr-5" placeholder="輸入活動標題..."></div>
         <div class="grid grid-cols-2 gap-4">
           <div><label class="input-label">活動類型</label><div class="relative"><select id="detail-type" class="custom-input text-slate-700 !pr-10"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select><span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span></div></div>
           <div>
             <label class="input-label">收費方式</label>
             <div class="flex gap-4 items-center h-[56px] px-2">
               <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput()" class="w-4 h-4 text-primary focus:ring-primary"><span class="font-bold text-[15px] text-text-main">免費</span></label>
               <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput()" class="w-4 h-4 text-primary focus:ring-primary"><span class="font-bold text-[15px] text-text-main">收費</span></label>
             </div>
           </div>
         </div>
         <input type="number" id="detail-price" class="custom-input !pr-5 hidden animate-in fade-in" placeholder="金額 (NT$)">
         <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-5 mt-2">
           <div><label class="input-label">開始時間</label><input type="datetime-local" id="detail-start" class="custom-input !px-4 text-[13px] font-bold text-slate-600"></div>
           <div><label class="input-label">結束時間</label><input type="datetime-local" id="detail-end" class="custom-input !px-4 text-[13px] font-bold text-slate-600"></div>
         </div>
         <div><label class="input-label">活動說明</label><textarea id="detail-desc" class="custom-input h-32 !pr-5 py-4 resize-none leading-relaxed text-[15px]" placeholder="輸入詳盡說明..."></textarea></div>
         <div>
           <label class="input-label">宣傳大圖</label>
           <div onclick="document.getElementById('file-input-create').click()" class="w-full h-44 border-2 border-dashed border-slate-300 rounded-[1.5rem] flex flex-col items-center justify-center bg-white cursor-pointer overflow-hidden transition-all hover:bg-slate-50 relative group">
             <div id="preview-placeholder-create" class="text-center text-slate-400 flex flex-col items-center group-hover:scale-110 transition-transform">
               <span class="material-symbols-outlined text-4xl mb-2">add_photo_alternate</span>
               <p class="text-[12px] font-bold">點擊上傳圖片</p>
             </div>
             <img id="image-preview-create" class="hidden w-full h-full object-cover absolute inset-0">
             <input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')">
           </div>
           <input type="hidden" id="in-image-url-create">
         </div>
         <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="btn-primary mt-4">
            發布活動頁面 <span class="material-symbols-outlined text-[20px]">rocket_launch</span>
         </button>
      </div>
    </div>

  </main>

  <!-- 底部導覽：管理員 -->
  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-200 flex justify-between items-center px-1 py-2 z-40 pb-safe shadow-app-nav left-1/2 -translate-x-1/2">
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[26px]">fact_check</span></div><span class="text-[10px] font-bold mt-1">核銷</span></button>
    <button class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[26px]">add_circle</span></div><span class="text-[10px] font-bold mt-1">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[26px]">groups</span></div><span class="text-[10px] font-bold mt-1">CRM</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[26px]">recent_patient</span></div><span class="text-[10px] font-bold mt-1">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[26px]">settings</span></div><span class="text-[10px] font-bold mt-1">參數</span></button>
  </nav>
</div>

<!-- Toast 通知容器 -->
<div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[10000] font-bold transform translate-y-0 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isProcessing = false;

  async function fetchAPI(action, payload = {}, silent = false) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { result = JSON.parse(resText); } catch(e) { throw new Error(`系統連線錯誤，請確認 GAS 已發佈為「所有人」。`); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      if (!silent) showToast(err.message, true); 
      throw err;
    }
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) { liff.login(); return; }

      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      isAdmin = ADMIN_IDS.includes(userProfile.userId);

      document.getElementById('view-loading').classList.add('hidden');

      if (isAdmin) {
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
        document.getElementById('view-admin-create').classList.remove('hidden');
      } else {
        // 如果不是管理員，強制導回首頁
        window.location.replace('index.html');
      }

    } catch (err) { 
      showToast("載入中斷: " + err.toString(), true);
    }
  };

  function showToast(m, e = false) { 
    const t = document.getElementById('toast'); 
    if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e ? 'error' : 'check_circle'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }

  function toggleFeeInput() { 
    const isFee = document.querySelector('input[name="fee-type"]:checked').value === '收費';
    document.getElementById('detail-price').classList.toggle('hidden', !isFee); 
  }

  function toggleCreateMode(mode) { 
    const tabQuick = document.getElementById('tab-quick');
    const tabDetailed = document.getElementById('tab-detailed');
    const formQuick = document.getElementById('form-quick');
    const formDetailed = document.getElementById('form-detailed');

    if (mode === 'quick') {
      tabQuick.className = 'flex-1 py-3 rounded-full text-[15px] font-bold bg-white text-primary shadow-sm transition-all ring-1 ring-slate-900/5';
      tabDetailed.className = 'flex-1 py-3 rounded-full text-[15px] font-bold text-slate-500 transition-all hover:text-slate-800';
      formQuick.classList.remove('hidden');
      formDetailed.classList.add('hidden');
    } else {
      tabQuick.className = 'flex-1 py-3 rounded-full text-[15px] font-bold text-slate-500 transition-all hover:text-slate-800';
      tabDetailed.className = 'flex-1 py-3 rounded-full text-[15px] font-bold bg-white text-primary shadow-sm transition-all ring-1 ring-slate-900/5';
      formQuick.classList.add('hidden');
      formDetailed.classList.remove('hidden');
    }
  }

  function previewFile(mode) { 
    const f = document.getElementById(`file-input-${mode}`).files[0]; 
    if(!f) return; 
    
    showToast("圖片處理壓縮中...", false);
    
    const r = new FileReader(); 
    r.onloadend = () => { 
      const img = new Image(); 
      img.onload = () => { 
        let w = img.width; 
        let h = img.height; 
        let maxWidth = 300; 
        if (w > maxWidth) { h = Math.round(h * (maxWidth/w)); w = maxWidth; } 
        
        const cvs = document.createElement('canvas'); 
        cvs.width = w; cvs.height = h; 
        const ctx = cvs.getContext('2d'); 
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h); 
        
        let quality = 0.5; 
        let b64 = cvs.toDataURL('image/jpeg', quality); 
        
        while (b64.length > 40000 && quality > 0.1) {
          quality -= 0.1;
          b64 = cvs.toDataURL('image/jpeg', quality);
        }
        
        if (b64.length > 49000) {
          showToast("⚠️ 圖片過於複雜無法壓縮至系統限制，請裁切或更換圖片", true);
          return;
        }
        
        document.getElementById(`image-preview-${mode}`).src = b64; 
        document.getElementById(`image-preview-${mode}`).classList.remove('hidden'); 
        document.getElementById(`preview-placeholder-${mode}`).classList.add('hidden'); 
        document.getElementById(`in-image-url-${mode}`).value = b64; 
        showToast("✅ 圖片預覽成功");
      }; 
      img.src = r.result; 
    }; 
    r.readAsDataURL(f); 
  }

  async function handleCreateActivity(mode) { 
    if (isProcessing) return; 
    const btn = document.getElementById(mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create'); 
    isProcessing = true; 
    
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 處理中...';
    btn.classList.add('btn-disabled'); 
    
    let payload = { 
      activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(), 
      activityType: document.getElementById(mode === 'quick' ? 'quick-type' : 'detail-type').value, 
      feeType: '免費', price: '', startTime: '', endTime: '', description: '', imageUrl: '', names: [], 
      defaultIdentity: mode === 'quick' ? document.getElementById('quick-identity').value : '來賓' 
    }; 
    
    if (!payload.activityName) { 
      isProcessing = false; 
      btn.innerHTML = originalText;
      btn.classList.remove('btn-disabled'); 
      return showToast("⚠️ 活動標題必填", true); 
    } 
    
    if (mode === 'quick') { 
      const raw = document.getElementById('quick-names').value.trim(); 
      payload.names = raw.split('\n').filter(n => n.trim()); 
    } else { 
      const feeCheck = document.querySelector('input[name="fee-type"]:checked');
      payload.feeType = feeCheck ? feeCheck.value : '免費'; 
      payload.price = document.getElementById('detail-price').value; 
      payload.startTime = document.getElementById('detail-start').value; 
      payload.endTime = document.getElementById('detail-end').value;
      payload.description = document.getElementById('detail-desc').value; 
      payload.imageUrl = document.getElementById('in-image-url-create').value; 
    } 
    
    try { 
      await fetchAPI('bulkAddRegistrants', payload); 
      showToast("✅ 活動建立成功"); 
      
      // ⭐ 建立成功後，自動跳轉回首頁的活動管理列表
      setTimeout(() => {
        window.location.href = 'index.html?view=admin-activities';
      }, 1000);
      
    } catch(e) { 
      console.error(e); 
      isProcessing = false; 
      btn.innerHTML = originalText;
      btn.classList.remove('btn-disabled'); 
    } 
  }
</script>
</body>
</html>
