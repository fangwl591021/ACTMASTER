<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>發起新活動</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#2563eb",
            "primary-light": "#eff6ff",
            background: "#ffffff",
            "input-bg": "#f3f4f6", /* 更柔和的輸入框底色 */
            "text-main": "#0f172a",
            "text-muted": "#64748b",
            error: "#ef4444"
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            body: ["Inter", "Noto Sans TC", "sans-serif"],
          },
          boxShadow: {
            'app-card': '0 12px 40px -12px rgba(0,0,0,0.06)',
            'app-nav': '0 -4px 24px rgba(0,0,0,0.04)',
            'tab-active': '0 2px 10px rgba(0,0,0,0.05)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    
    /* 整體背景加上淡淡的漸層，營造高級感 */
    body { background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); background-attachment: fixed; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    /* ⭐ 優化輸入框樣式：無邊框、大圓角、獲取焦點時的柔和光暈 */
    .input-label { @apply block text-[13px] font-bold text-slate-700 mb-2 ml-1 tracking-wide; }
    .custom-input { @apply w-full py-4 pl-5 pr-12 bg-input-bg border-2 border-transparent rounded-[1.25rem] outline-none focus:border-blue-500/20 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all duration-300 font-bold text-text-main appearance-none; }
    .custom-input::placeholder { @apply text-slate-400 font-medium; }
    
    /* ⭐ 優化按鈕樣式 */
    .btn-primary { @apply w-full py-4 bg-primary text-white rounded-full font-black text-[17px] shadow-xl shadow-blue-600/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2; }
    .btn-disabled { pointer-events: none; opacity: 0.6; filter: grayscale(50%); }
    
    /* ⭐ 優化底部導覽列 */
    .nav-btn { @apply flex flex-col items-center gap-1 transition-all flex-1 text-slate-400; }
    .nav-btn .icon-box { @apply px-5 py-1.5 rounded-2xl transition-all duration-300 flex justify-center items-center; }
    .nav-active { @apply text-primary font-bold; }
    .nav-active .icon-box { @apply bg-primary-light text-primary; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
    
    .loading-gif { width: 90px; height: auto; }
  </style>
</head>
<body class="font-body text-text-main min-h-screen flex flex-col items-center">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col overflow-hidden bg-transparent">
  
  <!-- 頂部 Header (改為更簡潔的透明毛玻璃) -->
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-white/80 backdrop-blur-xl px-6 py-4 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100">
    <div class="text-[20px] font-black text-primary flex items-center gap-2 font-headline tracking-tight">
      <span class="material-symbols-outlined text-[24px] icon-filled text-primary">event_note</span>
      報名大師
      <span class="bg-blue-100 text-blue-700 text-[10px] px-2.5 py-0.5 rounded-full uppercase tracking-wider font-black ml-1">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full object-cover border-2 border-white shadow-sm">
      </div>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-24 px-5 space-y-6">
    
    <!-- View: Loading -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXpzNDRvN3BpNjZhZmZ1djh6ZDV4N2ZucjQ5MHJidjhoOGNrZWp6byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/uOlsQMZSTU6Ff55OnQ/giphy.gif" alt="Loading" class="loading-gif mb-2">
      <p id="loading-text" class="text-primary font-bold tracking-widest text-sm">驗證權限中...</p>
    </div>

    <!-- View: Admin Create -->
    <div id="view-admin-create" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
      
      <!-- 標題區 (對齊截圖的簡約大氣風格) -->
      <div class="px-1 pt-2">
        <h2 class="text-[34px] font-black font-headline text-slate-800 tracking-tight leading-tight">建立新活動</h2>
        <p class="text-slate-500 text-[14px] font-medium mt-2 leading-relaxed">快速部署您的活動報名流程，只需幾個步驟。</p>
      </div>

      <!-- ⭐ 模式切換 Tabs (還原截圖的精緻膠囊感) -->
      <div class="flex p-1.5 rounded-[1.5rem] mx-1 border border-slate-100 bg-slate-100/70 shadow-inner">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold bg-white text-primary shadow-tab-active transition-all">快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold text-slate-500 transition-all hover:text-slate-700">完整發佈</button>
      </div>
      
      <!-- ================= 快速模式 ================= -->
      <div id="form-quick" class="space-y-6 px-1 animate-in fade-in">

          <label class="input-label">活動名稱</label>
          <input type="text" id="quick-name" class="custom-input !pr-5" placeholder="輸入活動標題...">
        </div>
        
        <div>

          </button>
        </div>
      </div>
      
      <!-- ================= 完整模式 ================= -->
      <div id="form-detailed" class="hidden space-y-6 px-1 animate-in fade-in">
         
         <div>
           <label class="input-label">正式標題</label>
           <input type="text" id="detail-name" class="custom-input !pr-5" placeholder="輸入活動標題...">
         </div>
         
         <div class="grid grid-cols-2 gap-4">
           <div>
             <label class="input-label">活動類型</label>
             <div class="relative">
               <select id="detail-type" class="custom-input text-slate-700 !pr-10 cursor-pointer">
                 <option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option>
               </select>
               <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
             </div>
           </div>
           <div>
             <label class="input-label">收費方式</label>
             <div class="flex gap-4 items-center h-[52px] px-3 bg-input-bg rounded-[1.25rem]">
               <label class="flex items-center gap-2 cursor-pointer">
                 <input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2">
                 <span class="font-bold text-[14px] text-slate-700">免費</span>
               </label>
               <label class="flex items-center gap-2 cursor-pointer">
                 <input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2">
                 <span class="font-bold text-[14px] text-slate-700">收費</span>
               </label>
             </div>
           </div>
         </div>
         
         <input type="number" id="detail-price" class="custom-input !pr-5 hidden animate-in fade-in" placeholder="請輸入金額 (NT$)">
         
         <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-6 mt-2">
           <div>
             <label class="input-label">開始時間</label>
             <input type="datetime-local" id="detail-start" class="custom-input !px-4 text-[13px] font-bold text-slate-600">
           </div>
           <div>
             <label class="input-label">結束時間</label>
             <input type="datetime-local" id="detail-end" class="custom-input !px-4 text-[13px] font-bold text-slate-600">
           </div>
         </div>
         
         <div>
           <label class="input-label">活動說明</label>
           <textarea id="detail-desc" class="custom-input h-32 !pr-5 py-4 resize-none leading-relaxed text-[15px]" placeholder="輸入詳盡說明..."></textarea>
         </div>
         
         <div>
           <label class="input-label">宣傳大圖</label>
           <div onclick="document.getElementById('file-input-create').click()" class="w-full h-44 border-2 border-dashed border-blue-200 rounded-[1.25rem] flex flex-col items-center justify-center bg-blue-50/50 cursor-pointer overflow-hidden transition-all hover:bg-blue-50 relative group">
             <div id="preview-placeholder-create" class="text-center text-blue-500 flex flex-col items-center group-hover:scale-105 transition-transform duration-300">
               <span class="material-symbols-outlined text-4xl mb-2 icon-filled">add_photo_alternate</span>
               <p class="text-[13px] font-bold">點擊上傳宣傳圖片</p>
             </div>
             <img id="image-preview-create" class="hidden w-full h-full object-cover absolute inset-0">
             <input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')">
           </div>
           <input type="hidden" id="in-image-url-create">
         </div>
         
         <div class="pt-4">
           <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="btn-primary">
              發布活動頁面 <span class="material-symbols-outlined text-[20px]">rocket_launch</span>
           </button>
         </div>
      </div>
    </div>

  </main>

  <!-- ⭐ 底部導覽：管理員 (全站統一 6 顆按鈕) -->

    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn">

    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn">
      <div class="icon-box group-hover:bg-slate-50"><span class="material-symbols-outlined text-[24px]">groups</span></div>
      <span class="text-[10px] font-bold mt-1">CRM</span>
    </button>
    <button onclick="window.location.href='fate.html'" class="nav-btn">
      <div class="icon-box group-hover:bg-slate-50"><span class="material-symbols-outlined text-[24px] text-pink-500">psychology</span></div>
      <span class="text-[10px] font-bold mt-1 text-pink-600">配對</span>
    </button>
    <button onclick="window.location.href='card.html'" class="nav-btn">
      <div class="icon-box group-hover:bg-slate-50"><span class="material-symbols-outlined text-[24px]">recent_patient</span></div>
      <span class="text-[10px] font-bold mt-1">名片</span>
    </button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn">

<!-- Toast 通知容器 -->
<div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[10000] font-bold transform translate-y-0 opacity-0 pointer-events-none flex items-center gap-2 w-max max-w-[90vw]"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"]; 

  let userProfile = null, isAdmin = false, isProcessing = false;

  async function fetchAPI(action, payload = {}, silent = false) {
    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const resText = await response.text();
      let result;
      try { result = JSON.parse(resText); } catch(e) { throw new Error(`系統連線錯誤，請確認 GAS 已發佈為「所有人」。`); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      if (!silent) showToast(err.message, true); 
      throw err;
    }
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) { liff.login(); return; }

      userProfile = await liff.getProfile();
      isAdmin = ADMIN_IDS.includes(userProfile.userId);

      if (isAdmin) {
        document.getElementById('view-loading').classList.add('hidden');
        document.getElementById('view-admin-create').classList.remove('hidden');
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
      } else {
        // 如果不是管理員，強制導回首頁
        window.location.replace('index.html');
      }

    } catch (err) { 
      showToast("載入中斷: " + err.toString(), true);
    }
  };

  function showToast(m, e = false) { 
    const t = document.getElementById('toast'); 
    if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e ? 'error' : 'check_circle'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3.5 rounded-full text-[15px] shadow-app-card transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }

  function toggleFeeInput() { 
    const isFee = document.querySelector('input[name="fee-type"]:checked').value === '收費';
    document.getElementById('detail-price').classList.toggle('hidden', !isFee); 
  }

  function toggleCreateMode(mode) { 
    const tabQuick = document.getElementById('tab-quick');
    const tabDetailed = document.getElementById('tab-detailed');
    const formQuick = document.getElementById('form-quick');
    const formDetailed = document.getElementById('form-detailed');

    if (mode === 'quick') {
      tabQuick.className = 'flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold bg-white text-primary shadow-tab-active transition-all';
      tabDetailed.className = 'flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold text-slate-500 transition-all hover:text-slate-700';
      formQuick.classList.remove('hidden');
      formDetailed.classList.add('hidden');
    } else {
      tabQuick.className = 'flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold text-slate-500 transition-all hover:text-slate-700';
      tabDetailed.className = 'flex-1 py-3.5 rounded-[1.25rem] text-[15px] font-bold bg-white text-primary shadow-tab-active transition-all';
      formQuick.classList.add('hidden');
      formDetailed.classList.remove('hidden');
    }
  }

  function previewFile(mode) { 
    const f = document.getElementById(`file-input-${mode}`).files[0]; 
    if(!f) return; 
    
    showToast("圖片處理壓縮中...", false);
    
    const r = new FileReader(); 
    r.onloadend = () => { 
      const img = new Image(); 
      img.onload = () => { 
        let w = img.width; 
        let h = img.height; 
        let maxWidth = 400; // 稍微提升預覽解析度 
        if (w > maxWidth) { h = Math.round(h * (maxWidth/w)); w = maxWidth; } 
        
        const cvs = document.createElement('canvas'); 
        cvs.width = w; cvs.height = h; 
        const ctx = cvs.getContext('2d'); 
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h); 
        
        let quality = 0.6; 
        let b64 = cvs.toDataURL('image/jpeg', quality); 
        
        while (b64.length > 40000 && quality > 0.1) {
          quality -= 0.1;
          b64 = cvs.toDataURL('image/jpeg', quality);
        }
        
        if (b64.length > 49000) {
          showToast("⚠️ 圖片過於複雜無法壓縮至系統限制，請裁切或更換圖片", true);
          return;
        }
        
        const previewImg = document.getElementById(`image-preview-${mode}`);
        const placeholder = document.getElementById(`preview-placeholder-${mode}`);
        
        if (previewImg) {
            previewImg.src = b64; 
            previewImg.classList.remove('hidden'); 
        }
        if (placeholder) {
            placeholder.classList.add('hidden'); 
        }
        
        document.getElementById(`in-image-url-${mode}`).value = b64; 
        showToast("✅ 圖片預覽成功");
      }; 
      img.src = r.result; 
    }; 
    r.readAsDataURL(f); 
  }

  async function handleCreateActivity(mode) { 
    if (isProcessing) return; 
    const btn = document.getElementById(mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create'); 
    isProcessing = true; 
    
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 處理中...';
    btn.classList.add('btn-disabled'); 
    
    let payload = { 
      activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(), 
      activityType: document.getElementById(mode === 'quick' ? 'quick-type' : 'detail-type').value, 
      feeType: '免費', price: '', startTime: '', endTime: '', description: '', imageUrl: '', names: [], 
      defaultIdentity: mode === 'quick' ? document.getElementById('quick-identity').value : '來賓' 
    }; 
    
    if (!payload.activityName) { 
      isProcessing = false; 
      btn.innerHTML = originalText;
      btn.classList.remove('btn-disabled'); 
      return showToast("⚠️ 活動標題必填", true); 
    } 
    
    if (mode === 'quick') { 
      const raw = document.getElementById('quick-names').value.trim(); 
      payload.names = raw.split('\n').filter(n => n.trim()); 
      payload.description = document.getElementById('quick-desc').value;
      payload.imageUrl = document.getElementById('in-image-url-quick').value;
    } else { 
      const feeCheck = document.querySelector('input[name="fee-type"]:checked');
      payload.feeType = feeCheck ? feeCheck.value : '免費'; 
      payload.price = document.getElementById('detail-price').value; 
      payload.startTime = document.getElementById('detail-start').value; 
      payload.endTime = document.getElementById('detail-end').value;
      payload.description = document.getElementById('detail-desc').value; 
      payload.imageUrl = document.getElementById('in-image-url-create').value; 
    } 
    
    try { 
      await fetchAPI('bulkAddRegistrants', payload); 
      showToast("✅ 活動建立成功"); 
      
      // 成功後清空表單
      if (mode === 'quick') {
        document.getElementById('quick-name').value = '';
        document.getElementById('quick-desc').value = '';
        document.getElementById('in-image-url-quick').value = '';
        document.getElementById('quick-names').value = '';
        const imgPreviewQuick = document.getElementById('image-preview-quick');
        if (imgPreviewQuick) {
            imgPreviewQuick.classList.add('hidden');
            imgPreviewQuick.src = '';
        }
        const placeholderQuick = document.getElementById('preview-placeholder-quick');
        if (placeholderQuick) placeholderQuick.classList.remove('hidden');
      } else {
        document.getElementById('detail-name').value = '';
        document.getElementById('detail-price').value = '';
        document.getElementById('detail-start').value = '';
        document.getElementById('detail-end').value = '';
        document.getElementById('detail-desc').value = '';
        document.getElementById('in-image-url-create').value = '';
        const imgPreview = document.getElementById('image-preview-create');
        if (imgPreview) {
            imgPreview.classList.add('hidden');
            imgPreview.src = '';
        }
        const placeholder = document.getElementById('preview-placeholder-create');
        if (placeholder) placeholder.classList.remove('hidden');
      }
      
      // 自動跳轉回首頁的活動管理
      setTimeout(() => {
        window.location.replace('index.html?view=admin-activities');
      }, 1000);
      
    } catch(e) { 
      console.error(e); 
      isProcessing = false; 
      btn.innerHTML = originalText;
      btn.classList.remove('btn-disabled'); 
    } 
  }
</script>
</body>
</html>
