<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>報名大師 PRO</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@200..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@line/liff@2.29.1/dist/liff.es2017.js">
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2563eb",
            "primary-dark": "#1e40af",
            "success": "#10b981",
            "warning": "#f59e0b",
            "error": "#ef4444",
          },
          fontFamily: {
            "headline": ["Manrope", "Noto Sans TC"],
            "body": ["Noto Sans TC"],
          },
          borderRadius: {"DEFAULT": "0.75rem"},
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { 
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      font-family: 'Noto Sans TC', sans-serif;
      overflow-x: hidden;
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500; }
    .card { @apply bg-white rounded-xl shadow-sm border border-slate-100; }
    .btn-primary { @apply bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-5 rounded-lg transition-all active:scale-95; }
    .btn-secondary { @apply bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 px-5 rounded-lg transition-all; }
    .input-base { @apply w-full px-4 py-3 border border-slate-200 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<div id="app" class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 shadow-sm">
    <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center shadow-lg">
          <span class="material-symbols-outlined text-white">event_available</span>
        </div>
        <div>
          <h1 class="font-headline font-bold text-lg text-slate-900">報名大師</h1>
          <p class="text-xs text-slate-500">活動簽到系統</p>
        </div>
      </div>
      <button id="user-menu-btn" onclick="toggleUserMenu()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200 transition-all">
        <img id="user-avatar" src="" alt="" class="w-10 h-10 rounded-full object-cover">
      </button>
    </div>
    
    <!-- User Menu -->
    <div id="user-menu" class="hidden absolute top-16 right-4 bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden z-50 w-48">
      <div class="px-4 py-3 border-b border-slate-100">
        <p id="user-name-display" class="font-semibold text-slate-900 text-sm"></p>
        <p id="user-role-display" class="text-xs text-slate-500 mt-1"></p>
      </div>
      <button id="switch-role-btn" onclick="switchRole()" class="hidden w-full text-left px-4 py-3 hover:bg-slate-50 text-sm font-medium text-slate-700 border-b border-slate-100">
        切換為管理員模式
      </button>
      <button onclick="logoutUser()" class="w-full text-left px-4 py-3 hover:bg-slate-50 text-sm font-medium text-slate-700">
        登出
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main" class="flex-1 max-w-md mx-auto w-full pb-28">
    
    <!-- Loading State -->
    <div id="state-loading" class="flex flex-col items-center justify-center h-96 space-y-4">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-100 to-blue-50 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-blue-500 animate-spin" style="animation: spin 1s linear infinite;">settings</span>
      </div>
      <p class="text-slate-600 font-semibold">載入中...</p>
      <p class="text-xs text-slate-400">初始化系統設定</p>
    </div>

    <!-- Register State -->
    <div id="state-register" class="hidden px-4 py-8 space-y-6">
      <div class="text-center space-y-3 mb-8">
        <h2 class="font-headline text-3xl font-bold text-slate-900">建立會員檔案</h2>
        <p class="text-slate-600">完成註冊後，報名活動只需 1 秒</p>
      </div>
      
      <div class="card p-6 space-y-6 slide-up">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">真實姓名 <span class="text-red-500">*</span></label>
          <input id="reg-name" type="text" placeholder="輸入您的完整姓名" class="input-base" autofocus>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">性別 <span class="text-red-500">*</span></label>
            <select id="reg-gender" class="input-base">
              <option value="未提供">- 未提供 -</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">手機號碼 <span class="text-red-500">*</span></label>
            <input id="reg-phone" type="tel" placeholder="09XX-XXX-XXX" class="input-base" autocomplete="tel">
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">所屬業種 <span class="text-red-500">*</span></label>
          <input id="reg-industry" type="text" placeholder="例：科技資訊、金融、製造..." class="input-base">
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">引薦人 UID <span class="text-slate-400 font-normal">(選填)</span></label>
          <input id="reg-referrer" type="text" placeholder="推薦您的朋友 UID" class="input-base">
        </div>
        
        <button onclick="submitRegister()" class="btn-primary w-full flex items-center justify-center gap-2 mt-8">
          <span>確認完成註冊</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>

    <!-- Activities State (User) -->
    <div id="state-activities" class="hidden px-4 py-6 space-y-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-headline text-2xl font-bold text-slate-900">近期活動</h2>
        <button id="btn-refresh" onclick="reloadActivities()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center hover:bg-slate-200 transition-all active:scale-90">
          <span class="material-symbols-outlined">refresh</span>
        </button>
      </div>
      <div id="activities-list" class="space-y-4"></div>
    </div>

    <!-- History State (User) -->
    <div id="state-history" class="hidden px-4 py-6 space-y-6">
      <h2 class="font-headline text-2xl font-bold text-slate-900">報名紀錄</h2>
      <div id="history-list" class="space-y-4"></div>
    </div>

    <!-- Profile State (User) -->
    <div id="state-profile" class="hidden px-4 py-6 space-y-6">
      <h2 class="font-headline text-2xl font-bold text-slate-900">個人資料</h2>
      <div class="card p-6 space-y-6 fade-in">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">姓名</label>
          <input id="edit-name" type="text" class="input-base">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">性別</label>
            <select id="edit-gender" class="input-base">
              <option value="未提供">未提供</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">手機</label>
            <input id="edit-phone" type="tel" class="input-base">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">業種</label>
          <input id="edit-industry" type="text" class="input-base">
        </div>
        <button onclick="submitProfile()" class="btn-primary w-full">儲存變更</button>
      </div>
    </div>

    <!-- Admin Activities State -->
    <div id="state-admin-activities" class="hidden px-4 py-6 space-y-6">
      <h2 class="font-headline text-2xl font-bold text-slate-900">活動管理</h2>
      <div id="admin-list" class="space-y-4"></div>
    </div>

    <!-- Admin Create State -->
    <div id="state-admin-create" class="hidden px-4 py-6 space-y-6">
      <h2 class="font-headline text-2xl font-bold text-slate-900">建立活動</h2>
      <div id="create-form" class="card p-6 space-y-6"></div>
    </div>

    <!-- Admin Checkin State -->
    <div id="state-admin-checkin" class="hidden px-4 py-6 space-y-4">
      <div class="flex items-center gap-3 mb-6">
        <button onclick="goBack()" class="p-2 hover:bg-slate-100 rounded-lg transition-all">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h2 id="checkin-title" class="font-headline text-xl font-bold text-slate-900 flex-1 truncate"></h2>
      </div>
      <div id="checkin-list" class="space-y-4"></div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav id="nav-user" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 shadow-2xl">
    <div class="max-w-md mx-auto px-2 py-2 flex justify-around pb-safe">
      <button onclick="switchView('activities')" class="nav-btn nav-active flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold transition-all">
        <span class="material-symbols-outlined text-2xl">event_note</span>
        <span class="text-xs">活動</span>
      </button>
      <button onclick="switchView('history')" class="nav-btn flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold text-slate-600 transition-all hover:text-slate-900">
        <span class="material-symbols-outlined text-2xl">history</span>
        <span class="text-xs">紀錄</span>
      </button>
      <button onclick="switchView('profile')" class="nav-btn flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold text-slate-600 transition-all hover:text-slate-900">
        <span class="material-symbols-outlined text-2xl">account_circle</span>
        <span class="text-xs">帳號</span>
      </button>
    </nav>

    <nav id="nav-admin" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 shadow-2xl">
      <div class="max-w-md mx-auto px-2 py-2 flex justify-around pb-safe">
        <button onclick="switchView('admin-activities')" class="nav-btn nav-active flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold transition-all">
          <span class="material-symbols-outlined text-2xl">checklist</span>
          <span class="text-xs">簽到</span>
        </button>
        <button onclick="switchView('admin-create')" class="nav-btn flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold text-slate-600 transition-all hover:text-slate-900">
          <span class="material-symbols-outlined text-2xl">add_circle</span>
          <span class="text-xs">建立</span>
        </button>
        <button onclick="switchView('admin-settings')" class="nav-btn flex flex-col items-center gap-1.5 py-3 px-4 rounded-lg text-sm font-semibold text-slate-600 transition-all hover:text-slate-900">
          <span class="material-symbols-outlined text-2xl">settings</span>
          <span class="text-xs">設定</span>
        </button>
      </div>
    </nav>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg text-white font-semibold text-sm opacity-0 pointer-events-none transition-all z-50"></div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end">
  <div class="w-full bg-white rounded-t-2xl p-6 space-y-4 animate-in slide-in-from-bottom">
    <h3 id="modal-title" class="font-headline text-xl font-bold"></h3>
    <p id="modal-desc" class="text-slate-600"></p>
    <button onclick="closeModal()" class="btn-primary w-full">確認</button>
  </div>
</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm";
  const API_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55"];

  let userProfile = null;
  let isAdmin = false;
  let isUserMode = true;
  let userInfo = null;
  let currentActivities = [];
  let isLoading = false;

  // ==================== 初始化 ====================
  async function initializeLiff() {
    try {
      // 檢查 liff 是否存在，如果不存在則等待
      if (typeof liff === 'undefined') {
        console.warn('LIFF SDK 尚未載入，等待中...');
        setTimeout(initializeLiff, 500);
        return;
      }

      await liff.init({ liffId: LIFF_ID });
      
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-name-display').innerText = userProfile.displayName;
      document.getElementById('user-role-display').innerText = '會員';
      
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      if (isAdmin) {
        document.getElementById('switch-role-btn').classList.remove('hidden');
      }
      
      await checkAndInitUser();
      switchView('activities');
    } catch (err) {
      console.error('初始化錯誤:', err);
      showToast('系統初始化失敗: ' + err.message, true);
      setTimeout(initializeLiff, 2000); // 2秒後重試
    }
  }

  // 文檔載入完成後開始初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeLiff);
  } else {
    initializeLiff();
  }

  async function checkAndInitUser() {
    const res = await apiCall('checkUser', { userId: userProfile.userId });
    if (!res.isRegistered) {
      switchView('register');
      document.getElementById('reg-name').value = userProfile.displayName;
    } else {
      userInfo = res.info;
      await loadActivities();
    }
  }

  // ==================== API 呼叫 ====================
  async function apiCall(action, payload = {}) {
    if (isLoading) return null;
    isLoading = true;
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) {
      showToast(err.message, true);
      throw err;
    } finally {
      isLoading = false;
    }
  }

  // ==================== 檢視切換 ====================
  function switchView(view) {
    const states = ['register', 'activities', 'history', 'profile', 'admin-activities', 'admin-create', 'admin-checkin', 'loading'];
    states.forEach(s => {
      const el = document.getElementById(`state-${s}`);
      if (el) el.classList.add('hidden');
    });
    
    document.getElementById(`state-${view}`).classList.remove('hidden');
    document.getElementById('nav-user').classList.add('hidden');
    document.getElementById('nav-admin').classList.add('hidden');
    
    if (view === 'register') return;
    
    if (isUserMode && !isAdmin) {
      document.getElementById('nav-user').classList.remove('hidden');
    } else if (isAdmin) {
      document.getElementById('nav-admin').classList.remove('hidden');
    }
    
    if (view === 'activities') loadActivities();
    else if (view === 'history') loadHistory();
    else if (view === 'profile') populateProfile();
    else if (view === 'admin-activities') loadAdminActivities();
  }

  function switchRole() {
    isUserMode = !isUserMode;
    document.getElementById('user-role-display').innerText = isUserMode ? '會員' : '管理員';
    document.getElementById('switch-role-btn').innerText = isUserMode ? '切換為管理員模式' : '切換為會員模式';
    switchView(isUserMode ? 'activities' : 'admin-activities');
  }

  function toggleUserMenu() {
    document.getElementById('user-menu').classList.toggle('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function goBack() {
    switchView(isUserMode ? 'admin-activities' : 'activities');
  }

  // ==================== 使用者功能 ====================
  async function submitRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const gender = document.getElementById('reg-gender').value;
    const industry = document.getElementById('reg-industry').value.trim();
    
    if (!name || !phone || !industry) {
      showToast('⚠️ 請完整填寫必填欄位', true);
      return;
    }
    
    await apiCall('registerUser', {
      userId: userProfile.userId,
      name, phone, gender, industry,
      referrerId: document.getElementById('reg-referrer').value.trim()
    });
    
    userInfo = { name, phone, gender, industry };
    showToast('✅ 註冊成功！');
    switchView('activities');
  }

  async function loadActivities() {
    const container = document.getElementById('activities-list');
    container.innerHTML = '<div class="text-center py-8"><div class="skeleton h-32 rounded-lg"></div></div>';
    
    const activities = await apiCall('getPublicActivities');
    if (!activities || activities.length === 0) {
      container.innerHTML = '<div class="card p-8 text-center text-slate-500">暫無公開活動</div>';
      return;
    }
    
    container.innerHTML = activities.map(act => `
      <div class="card p-5 space-y-3 slide-up">
        ${act.imageUrl ? `<img src="${act.imageUrl}" class="w-full h-40 object-cover rounded-lg">` : ''}
        <div class="space-y-2">
          <div class="flex gap-2">
            <span class="text-xs px-3 py-1 bg-blue-100 text-blue-700 rounded-full font-semibold">${act.type}</span>
            <span class="text-xs px-3 py-1 ${act.feeType === '收費' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'} rounded-full font-semibold">
              ${act.feeType === '收費' ? 'NT$' + act.price : '免費'}
            </span>
          </div>
          <h3 class="font-bold text-slate-900 text-lg">${act.name}</h3>
          <p class="text-sm text-slate-600">${act.description || '精彩活動'}</p>
          <p class="text-xs text-slate-500 flex items-center gap-1">
            <span class="material-symbols-outlined" style="font-size: 16px;">calendar_today</span>
            ${act.startTime ? new Date(act.startTime).toLocaleDateString('zh-TW') : '尚未指定時間'}
          </p>
        </div>
        <button onclick="joinActivity('${act.name}', '${act.feeType}')" class="btn-primary w-full">我要報名</button>
      </div>
    `).join('');
  }

  async function joinActivity(name, feeType) {
    if (!confirm(`確定報名「${name}」？`)) return;
    
    await apiCall('joinActivity', {
      userId: userProfile.userId,
      activityName: name,
      activityType: '活動'
    });
    
    if (feeType === '收費') {
      showModal('報名成功', '此為收費活動，請完成匯款並在「報名紀錄」填寫後五碼');
    } else {
      showModal('報名成功', '恭喜報名成功！期待現場見到您');
    }
    loadActivities();
  }

  async function loadHistory() {
    const container = document.getElementById('history-list');
    container.innerHTML = '<div class="text-center py-8"><div class="skeleton h-24 rounded-lg"></div></div>';
    
    const history = await apiCall('getUserHistory', { userId: userProfile.userId });
    if (!history || history.length === 0) {
      container.innerHTML = '<div class="card p-8 text-center text-slate-500">尚無報名紀錄</div>';
      return;
    }
    
    container.innerHTML = history.map(item => `
      <div class="card p-5 space-y-3">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <h4 class="font-bold text-slate-900">${item.name}</h4>
            <div class="flex gap-2 mt-2">
              <span class="text-xs px-2 py-1 rounded-full ${item.checkedIn ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'} font-semibold">
                ${item.checkedIn ? '✓ 已簽到' : '未簽到'}
              </span>
              <span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700 font-semibold">${item.regStatus}</span>
            </div>
          </div>
        </div>
        ${item.isPaidAct && item.regStatus === '正常' && item.payStatus !== '已完款' ? `
          <div class="pt-3 border-t border-slate-100 space-y-2">
            <input type="text" id="last5-${item.name}" maxlength="5" placeholder="輸入匯款後五碼" class="input-base text-sm">
            <button onclick="submitLast5('${item.name}')" class="btn-primary w-full text-sm">送出審核</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  async function submitLast5(name) {
    const val = document.getElementById(`last5-${name}`).value.trim();
    if (!val || val.length < 4) {
      showToast('⚠️ 請輸入正確的後五碼', true);
      return;
    }
    
    await apiCall('updateLast5Digits', {
      userId: userProfile.userId,
      activityName: name,
      last5Digits: val
    });
    
    showToast('✅ 已送出審核');
    loadHistory();
  }

  function populateProfile() {
    if (!userInfo) return;
    document.getElementById('edit-name').value = userInfo.name;
    document.getElementById('edit-phone').value = userInfo.phone;
    document.getElementById('edit-gender').value = userInfo.gender;
    document.getElementById('edit-industry').value = userInfo.industry;
  }

  async function submitProfile() {
    await apiCall('updateUser', {
      userId: userProfile.userId,
      name: document.getElementById('edit-name').value,
      phone: document.getElementById('edit-phone').value,
      gender: document.getElementById('edit-gender').value,
      industry: document.getElementById('edit-industry').value
    });
    
    showToast('✅ 個人資料已儲存');
  }

  // ==================== 管理員功能 ====================
  async function loadAdminActivities() {
    const container = document.getElementById('admin-list');
    container.innerHTML = '<div class="text-center py-8"><div class="skeleton h-24 rounded-lg"></div></div>';
    
    currentActivities = await apiCall('getActivityDashboard');
    if (!currentActivities || currentActivities.length === 0) {
      container.innerHTML = '<div class="card p-8 text-center text-slate-500">暫無活動</div>';
      return;
    }
    
    container.innerHTML = currentActivities.map(act => `
      <div class="card p-5 space-y-4">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <h3 class="font-bold text-slate-900 text-lg">${act.name}</h3>
            <p class="text-xs text-slate-500 mt-1">${act.type}</p>
          </div>
          <span class="text-xs px-2 py-1 rounded-full ${act.status === '上架' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'} font-semibold">
            ${act.status}
          </span>
        </div>
        <div class="grid grid-cols-3 gap-2 bg-slate-50 rounded-lg p-3 text-center">
          <div>
            <p class="text-xs text-slate-500 font-semibold">報名</p>
            <p class="text-lg font-bold text-slate-900">${act.total}</p>
          </div>
          <div>
            <p class="text-xs text-green-600 font-semibold">實到</p>
            <p class="text-lg font-bold text-green-600">${act.attended}</p>
          </div>
          <div>
            <p class="text-xs text-red-600 font-semibold">取消</p>
            <p class="text-lg font-bold text-red-600">${act.cancelled}</p>
          </div>
        </div>
        <button onclick="openCheckin('${act.name}')" class="btn-primary w-full">進入簽到</button>
      </div>
    `).join('');
  }

  async function openCheckin(name) {
    switchView('admin-checkin');
    document.getElementById('checkin-title').innerText = name;
    const registrants = await apiCall('getRegistrants', { activityName: name });
    const list = document.getElementById('checkin-list');
    
    list.innerHTML = registrants.map(p => `
      <div class="card p-4 space-y-3">
        <div class="flex justify-between items-center">
          <div class="flex-1">
            <h4 class="font-bold text-slate-900">${p.姓名}</h4>
            <p class="text-xs text-slate-500 mt-1">${p.電話}</p>
          </div>
          <button onclick="toggleCheckin('${name}', ${p.rowId}, ${p.checkedIn})" class="px-4 py-2 rounded-lg font-semibold text-sm ${p.checkedIn ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-600'}">
            ${p.checkedIn ? '✓ 已簽到' : '未簽到'}
          </button>
        </div>
        <div class="flex gap-2 pt-2 border-t border-slate-100">
          <select onchange="updateCell('${name}', ${p.rowId}, '繳費狀態', this.value)" class="flex-1 input-base text-xs py-2">
            <option value="未繳費" ${p.payStatus === '未繳費' ? 'selected' : ''}>未繳費</option>
            <option value="匯款審核中" ${p.payStatus === '匯款審核中' ? 'selected' : ''}>審核中</option>
            <option value="已完款" ${p.payStatus === '已完款' ? 'selected' : ''}>已完款</option>
          </select>
          <select onchange="updateCell('${name}', ${p.rowId}, '報名狀態', this.value)" class="flex-1 input-base text-xs py-2">
            <option value="正常" ${p.regStatus === '正常' ? 'selected' : ''}>正常</option>
            <option value="已取消" ${p.regStatus === '已取消' ? 'selected' : ''}>已取消</option>
          </select>
        </div>
      </div>
    `).join('');
  }

  async function toggleCheckin(name, rowId, status) {
    await apiCall('toggleStatus', {
      activityName: name,
      rowId: rowId,
      currentStatus: status
    });
    showToast('✅ 簽到狀態已更新');
    openCheckin(name);
  }

  async function updateCell(name, rowId, col, val) {
    await apiCall('updateCellStatus', {
      activityName: name,
      rowId: rowId,
      colName: col,
      val: val
    });
    showToast('✅ 已儲存');
  }

  // ==================== 工具函式 ====================
  function reloadActivities() {
    showToast('🔄 重新載入中...');
    loadActivities();
  }

  function logoutUser() {
    if (confirm('確定要登出？')) {
      liff.logout();
      location.reload();
    }
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-lg font-semibold text-sm opacity-100 transition-all z-50 ${isError ? 'bg-red-500 text-white' : 'bg-slate-900 text-white'}`;
    setTimeout(() => toast.classList.remove('opacity-100'), 3000);
  }

  function showModal(title, desc) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    document.getElementById('modal').classList.remove('hidden');
  }

  // 平滑滾動
  document.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if (window.scrollY > 10) {
      header.classList.add('shadow-md');
    } else {
      header.classList.remove('shadow-md');
    }
  });

  // 防止重複提交
  let lastSubmit = 0;
  document.addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON' && e.target.className.includes('btn-primary')) {
      const now = Date.now();
      if (now - lastSubmit < 1000) {
        e.preventDefault();
        e.stopPropagation();
      }
      lastSubmit = now;
    }
  });
</script>
</body>
</html>
