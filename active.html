<div id="section-image-cropper" class="hidden fixed inset-0 bg-slate-900 flex flex-col animate-in fade-in duration-200 w-full max-w-md mx-auto z-[1080]">
  <div class="flex justify-between items-center p-4 bg-slate-900 text-white shrink-0 border-b border-slate-800 shadow-sm">

  </div>

<!-- 系統 Toast 通知 -->
<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal flex items-center gap-2 w-max max-w-[90vw] opacity-0 pointer-events-none bg-slate-800 text-white"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isProcessing = false;
  let cropperInstance = null;
  let currentCropTarget = '';

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      userProfile = await liff.getProfile();
      
      const avatarEl = document.getElementById('user-avatar');
      if (avatarEl) {
        avatarEl.src = userProfile.pictureUrl || '';
        avatarEl.classList.remove('hidden');
      }
      
      const isAdminUser = ADMIN_IDS.includes(userProfile.userId);
      document.getElementById('view-loading').classList.add('hidden');
      
      if (isAdminUser) {
        document.getElementById('view-admin-create').classList.remove('hidden');
        document.getElementById('bottom-nav-admin').classList.remove('hidden');
        
        if(document.getElementById('batch-list-container').children.length === 0) addBatchItem();
      } else {
        window.location.href = 'index.html';
      }
    } catch (err) { 
      showToast("初始化失敗：" + err.message, true);
    }
  });

  // UI 工具函式
  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e?'error':'check_circle'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} flex items-center gap-2 w-max max-w-[90vw]`; 
    t.classList.remove('hidden');
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  }

  function setButtonLoading(btnId, isLoading, originalText = '') {
      const btn = document.getElementById(btnId);
      if (!btn) return false;
      if (isLoading) {
          if (!btn.dataset.oriText) btn.dataset.oriText = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px] align-middle">refresh</span> 處理中...';
          btn.classList.add('opacity-50', 'pointer-events-none');
          return true;
      } else {
          btn.innerHTML = originalText || btn.dataset.oriText || '送出';
          btn.classList.remove('opacity-50', 'pointer-events-none');
          return false;
      }
  }

  // 動態載入 Cropper.js
  const loadScript = (src) => new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  const loadCSS = (href) => new Promise((res, rej) => {
    if (document.querySelector(`link[href="${href}"]`)) return res();
    const l = document.createElement('link'); l.rel = 'stylesheet'; l.href = href; l.onload = res; l.onerror = rej; document.head.appendChild(l);
  });

  // 圖片裁切邏輯
  async function openCropper(input, targetMode) {
    const file = input.files[0]; if (!file) return;
    currentCropTarget = targetMode;

    if (!window.Cropper) {
       showToast("載入影像模組中...", false);
       await loadCSS("https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css");
       await loadScript("https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js");
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById('cropper-image'); 
      img.src = e.target.result; 
      img.style.opacity = '0';
      document.getElementById('section-image-cropper').classList.remove('hidden');
      if (cropperInstance) cropperInstance.destroy();
      
      // 固定 4:3 比例
      setTimeout(() => { 
        img.style.opacity = '1'; 
        cropperInstance = new Cropper(img, { 
          aspectRatio: 4 / 3,
          viewMode: 1, 
          dragMode: 'move', 
          autoCropArea: 0.9, 
          guides: true, 
          center: true, 
          highlight: false 
        }); 
      }, 100);
    }; 
    reader.readAsDataURL(file); 
    input.value = ""; 
  }

  function cancelCrop() { 
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; } 
    document.getElementById('section-image-cropper').classList.add('hidden'); 
  }

  function confirmCrop() { 
    if (!cropperInstance) return; 
    let quality = 0.8;
    let base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/webp', quality); 
    
    while (base64.length > 40000 && quality > 0.1) {
       quality -= 0.1;
       base64 = cropperInstance.getCroppedCanvas({ maxWidth: 1000, maxHeight: 1000 }).toDataURL('image/webp', quality);
    }
    if (base64.length > 49000) {
       return showToast("圖片仍過大，請裁切更小的範圍", true);
    }

    cancelCrop(); 

    const modeId = currentCropTarget;
    const previewImg = document.getElementById(`image-preview-${modeId}`);
    const placeholder = document.getElementById(`preview-placeholder-${modeId}`);
    const urlInput = document.getElementById(`in-image-url-${modeId}`);

    if(previewImg && placeholder && urlInput) {
        previewImg.src = base64; 
        previewImg.classList.remove('hidden'); 
        placeholder.classList.add('hidden'); 
        urlInput.value = base64; 
        showToast("✅ 圖片設定成功");
    }
  }

  // 切換建立模式
  function toggleCreateMode(m) { 
    ['quick', 'detailed', 'batch'].forEach(t => {
      const btn = document.getElementById('tab-' + t);
      const form = document.getElementById('form-' + t);
      if(btn) btn.className = (m === t) ? 'tab-btn tab-active' : 'tab-btn';
      if(form) form.classList.toggle('hidden', m !== t);
    });

    if (m === 'batch' && document.getElementById('batch-list-container').children.length === 0) {
      addBatchItem();
    }
  }

  function toggleFeeInput() { document.getElementById('detail-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); }

  // 新增梯次項目
  function addBatchItem(data = null) {
    const container = document.getElementById('batch-list-container');
    const id = Date.now() + Math.floor(Math.random() * 100);
    const html = `
      <div id="batch-item-${id}" class="batch-card animate-in fade-in slide-in-from-top-2">
        <div class="flex justify-between items-center mb-3">
          <span class="text-[13px] text-slate-500 font-bold bg-slate-100 px-2 py-1 rounded">梯次細節</span>
          <div class="flex gap-3">
            <button onclick="copyBatchItem('${id}')" class="text-slate-400 hover:text-primary active:scale-90 transition-transform"><span class="material-symbols-outlined text-[20px]">content_copy</span></button>
            <button onclick="removeBatchItem('${id}')" class="text-slate-400 hover:text-red-500 active:scale-90 transition-transform"><span class="material-symbols-outlined text-[20px]">delete</span></button>
          </div>
        </div>
        <div class="mb-3">
          <input type="text" class="custom-input batch-name-input bg-slate-50" placeholder="梯次名稱，如：第一場 (10/01)" value="${data?.name || ''}">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">開始時間</label><input type="datetime-local" class="custom-input batch-start-input !py-2 !text-[13px] bg-slate-50" value="${data?.start || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">結束時間</label><input type="datetime-local" class="custom-input batch-end-input !py-2 !text-[13px] bg-slate-50" value="${data?.end || ''}"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">費用</label><input type="number" class="custom-input batch-price-input !py-2 !text-[13px] bg-slate-50" placeholder="免費填0" value="${data?.price || ''}"></div>
          <div><label class="text-[12px] text-slate-500 block mb-1 ml-1">名額限制</label><input type="number" class="custom-input batch-limit-input !py-2 !text-[13px] bg-slate-50" placeholder="不限留空" value="${data?.limit || ''}"></div>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
  }

  function removeBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (el) {
      if (document.querySelectorAll('[id^="batch-item-"]').length <= 1) return showToast('⚠️ 系列活動至少需要一個梯次', true);
      el.remove();
    }
  }

  function copyBatchItem(id) {
    const el = document.getElementById(`batch-item-${id}`);
    if (!el) return;
    addBatchItem({
      name: el.querySelector('.batch-name-input').value,
      start: el.querySelector('.batch-start-input').value,
      end: el.querySelector('.batch-end-input').value,
      price: el.querySelector('.batch-price-input').value,
      limit: el.querySelector('.batch-limit-input').value
    });
  }

  // 提交活動建立 API
  async function handleCreateActivity(mode) { 
    if(isProcessing) return; 
    const nameInput = document.getElementById(mode === 'batch' ? 'batch-name' : (mode === 'quick' ? 'quick-name' : 'detail-name'));
    const name = nameInput ? nameInput.value.trim() : '';
    
    if(!name) {
      showToast('⚠️ 請填寫活動名稱', true);
      return nameInput?.focus();
    }

    isProcessing = true;
    const btnId = `btn-${mode}-create`;
    const btn = document.getElementById(btnId);
    const oriText = btn.innerHTML;
    setButtonLoading(btnId, true);

    let p = { 
      activityName: name,
      activityType: '例會', 
      feeType: '免費',
      price: '',
      startTime: '',
      endTime: '',
      description: '',
      imageUrl: '',
      names: [],
      defaultIdentity: '來賓',
      isBatch: (mode === 'batch'),
      userId: userProfile.userId
    }; 
    
    if(mode==='quick') {
      p.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
      p.activityType = document.getElementById('quick-type').value;
      p.defaultIdentity = document.getElementById('quick-identity').value;
      p.imageUrl = document.getElementById('in-image-url-quick') ? document.getElementById('in-image-url-quick').value : '';
    } else if(mode==='detailed') {
      p.activityType = document.getElementById('detail-type') ? document.getElementById('detail-type').value : '例會';
      p.defaultIdentity = document.getElementById('detail-identity') ? document.getElementById('detail-identity').value : '來賓';
      const feeRadio = document.querySelector('input[name="fee-type"]:checked');
      p.feeType = feeRadio ? feeRadio.value : '免費'; 
      p.price = document.getElementById('detail-price') ? document.getElementById('detail-price').value : ''; 
      p.startTime = document.getElementById('detail-start').value; 
      p.endTime = document.getElementById('detail-end').value; 
      p.description = document.getElementById('detail-desc').value;
      p.imageUrl = document.getElementById('in-image-url-detailed') ? document.getElementById('in-image-url-detailed').value : '';
    } else if(mode==='batch') {
      p.activityType = document.getElementById('batch-type').value;
      p.defaultIdentity = document.getElementById('batch-identity').value;
      p.description = document.getElementById('batch-desc').value;
      p.imageUrl = document.getElementById('in-image-url-batch') ? document.getElementById('in-image-url-batch').value : '';
      const cards = document.querySelectorAll('[id^="batch-item-"]');
      p.batches = Array.from(cards).map(card => ({
        name: card.querySelector('.batch-name-input').value.trim(),
        startTime: card.querySelector('.batch-start-input').value,
        endTime: card.querySelector('.batch-end-input').value,
        price: card.querySelector('.batch-price-input').value,
        limit: card.querySelector('.batch-limit-input').value
      }));

      if(p.batches.length === 0) { isProcessing=false; setButtonLoading(btnId, false, oriText); return showToast("⚠️ 至少需新增一個梯次", true); }
      for(let b of p.batches) { if(!b.name) { isProcessing=false; setButtonLoading(btnId, false, oriText); return showToast("⚠️ 梯次名稱必填", true); } }

      if(p.batches.length > 0) {
           p.startTime = p.batches[0].startTime;
           p.endTime = p.batches[p.batches.length - 1].endTime;
           const hasPaid = p.batches.some(b => parseInt(b.price) > 0);
           if (hasPaid) {
               p.feeType = '收費';
               p.price = Math.max(...p.batches.map(b => parseInt(b.price) || 0)); 
           }
      }
    }
    
    try { 
      const response = await fetch(WORKER_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'bulkAddRegistrants', payload: p }) 
      });
      const res = await response.json();
      if (!res.success) throw new Error(res.error);

      showToast('🎉 活動建立成功！即將跳轉...');
      
      // 清除快取並跳轉
      sessionStorage.removeItem('getActivityDashboard{}');
      setTimeout(() => {
        window.location.href = 'index.html?view=admin-activities';
      }, 1500);
      
    } catch(e) { 
      showToast('⚠️ 建立失敗：' + e.message, true);
      btn.innerHTML = oriText;
      btn.disabled = false;
      btn.classList.remove('opacity-50', 'pointer-events-none');
      isProcessing = false;
    }
  }
</script>
</body>
</html>
