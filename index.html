<!-- Version: v1.6.0 (完全修理版：還原所有遺失視圖、補齊執行邏輯、解決邀約空轉) -->
<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>報名大師</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#2563eb", 
            "primary-light": "#eff6ff", 
            background: "#ffffff", 
            "text-main": "#333333", 
            "text-muted": "#64748b" 
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; color: #333333; font-weight: 400; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .input-label { @apply block text-[15px] text-[#64748b] mb-1 font-normal; }
    .custom-input { @apply w-full h-[46px] px-3 bg-white border-b border-slate-200 outline-none focus:border-primary transition-all text-text-main text-[15px] rounded-none shadow-none; }
    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-normal text-[16px] active:scale-[0.98] flex items-center justify-center gap-2; }
    .btn-secondary { @apply w-full py-3 bg-white border border-slate-300 text-slate-700 rounded-xl font-normal text-[16px] active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm; }
    
    /* 底部選單樣式：全黑選取 */
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full font-normal; min-width: 48px;}
    .nav-btn .icon-box { @apply flex items-center justify-center mb-0.5; }
    .nav-btn .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; font-size: 24px; color: inherit; }
    .nav-active-btn { @apply text-black font-normal; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #000000; }

    .refresh-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="font-sans">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col bg-white overflow-hidden mx-auto shadow-2xl">
  
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100">
    <div class="text-[18px] font-normal text-slate-800 flex items-center gap-2 tracking-tight">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center">
        <span class="material-symbols-outlined text-[20px]">event_note</span>
      </div>
      報名大師
      <span id="header-admin-badge" class="hidden bg-slate-800 text-white text-[9px] px-2 py-0.5 rounded uppercase font-bold ml-1">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" class="w-8 h-8 rounded-full object-cover border border-slate-100">
      </div>
      <button id="role-switch-btn" onclick="toggleRoleMode()" class="hidden w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center active:scale-95 transition-all">
        <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-16 px-5 space-y-6">

    <!-- 0. 載入中 -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-2 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-400 text-[13px]">權限驗證中</p>
    </div>

    <!-- 1. 會員註冊 (還原步二：上傳名片) -->
    <div id="view-user-register" class="hidden space-y-6 pt-4 pb-10">
      <div id="reg-step-1" class="space-y-6">
        <h1 class="text-2xl font-normal text-slate-800">建立會員檔案</h1>
        <div class="space-y-4">
          <div class="flex flex-col"><label class="input-label">姓名</label><input id="reg-name" class="custom-input" placeholder="請輸入真實姓名"></div>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col"><label class="input-label">業種</label><input id="reg-industry" class="custom-input" placeholder="例如：資訊"></div>
            <div class="flex flex-col"><label class="input-label">性別</label><select id="reg-gender" class="custom-input"><option value="男">男</option><option value="女">女</option></select></div>
          </div>
          <div class="flex flex-col"><label class="input-label">手機</label><input id="reg-phone" class="custom-input" type="tel" placeholder="09XX-XXX-XXX"></div>
          <div class="flex flex-col"><label class="input-label">生日</label><input id="reg-birthday" class="custom-input" type="date"></div>
          <button id="btn-reg-next" onclick="submitUserRegistrationStep1()" class="btn-primary mt-4">下一步：建立通訊錄</button>
        </div>
      </div>

      <div id="reg-step-2" class="hidden space-y-6">
        <h1 class="text-2xl font-normal text-slate-800">建立數位名片</h1>
        <p class="text-slate-500 text-[14px]">建議上傳名片，AI 將自動為您分析商務特質並建立名片夾。</p>
        <div class="flex gap-3">
          <button onclick="window.location.href='card.html'" class="btn-secondary flex-1">開啟相機辨識</button>
          <button onclick="finishRegistration()" class="flex-1 text-slate-400 text-sm">稍後再說</button>
        </div>
      </div>
    </div>

    <!-- 2. 探索活動 (還原分類條) -->
    <div id="view-user-activities" class="hidden space-y-4 pt-2">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-2xl font-normal text-slate-800 tracking-tight">探索精彩活動</h2>
        <button onclick="reloadActivities()" id="btn-refresh-activities" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 active:scale-90 transition-all border border-slate-100 shrink-0">
          <span class="material-symbols-outlined text-[20px]">refresh</span>
        </button>
      </div>
      <div class="flex gap-2.5 overflow-x-auto hide-scrollbar pb-2" id="activity-categories"></div>
      <div id="user-activities-container" class="grid grid-cols-2 gap-3 px-1"></div>
    </div>

    <!-- 3. 報名紀錄 -->
    <div id="view-user-history" class="hidden space-y-4 pt-4">
      <h2 class="text-2xl font-normal text-slate-800 mb-4 tracking-tight">報名紀錄</h2>
      <div id="user-history-container" class="flex flex-col gap-3"></div>
    </div>

    <!-- 4. 個人資料 -->
    <div id="view-user-profile" class="hidden space-y-4 pt-4 pb-10">
      <h2 class="text-2xl font-normal mb-4 text-slate-800 tracking-tight">個人資料</h2>
      <div class="space-y-1">
        <div class="flex flex-col"><label class="input-label">姓名</label><input type="text" id="edit-name" class="custom-input"></div>
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col"><label class="input-label">業種</label><input type="text" id="edit-industry" class="custom-input"></div>
          <div class="flex flex-col"><label class="input-label">性別</label><select id="edit-gender" class="custom-input"><option value="男">男</option><option value="女">女</option></select></div>
        </div>
        <div class="flex flex-col"><label class="input-label">手機</label><input type="tel" id="edit-phone" class="custom-input"></div>
        <div class="flex flex-col"><label class="input-label">生日</label><input type="date" id="edit-birthday" class="custom-input"></div>
      </div>
      <button id="btn-save-profile" onclick="submitProfileUpdate()" class="btn-primary mt-6">儲存變更</button>

      <div id="my-card-entry" class="hidden mt-8 bg-slate-900 rounded-2xl p-5 text-white shadow-xl flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="window.location.href='card.html?mode=mycard'">
          <div>
              <div class="flex items-center gap-1.5 mb-1"><span class="w-2 h-2 rounded-full bg-emerald-400"></span><span class="text-[11px] font-normal text-emerald-300">已開通專屬名片</span></div>
              <h3 class="text-[18px] font-normal">查看您的數位名片</h3>
          </div>
          <span class="material-symbols-outlined">arrow_forward_ios</span>
      </div>
    </div>

    <!-- 5. 管理核銷 (Admin Only) -->
    <div id="view-admin-activities" class="hidden space-y-4 pt-4">
      <h2 class="text-2xl font-normal text-slate-800 tracking-tight">活動核銷管理</h2>
      <div id="admin-activity-list-container" class="space-y-3"></div>
    </div>

    <!-- 6. CRM (Admin Only) -->
    <div id="view-admin-crm" class="hidden space-y-2 pt-4">
      <h2 class="text-2xl font-normal text-slate-800 mb-4 px-1">會員 CRM 系統</h2>
      <div id="admin-crm-list-container" class="flex flex-col border-t border-slate-100"></div>
    </div>

    <!-- 7. 參數設定 (Admin Only) -->
    <div id="view-admin-settings" class="hidden space-y-4 pt-4">
      <h2 class="text-2xl font-normal text-slate-800 mb-4">系統參數設定</h2>
      <div class="space-y-4" id="admin-settings-container">
        <div class="flex flex-col"><label class="input-label">Telegram Bot Token</label><input type="text" id="set-tg-token" class="custom-input"></div>
        <div class="flex flex-col"><label class="input-label">LINE 公開連結</label><input type="text" id="set-line-link" class="custom-input"></div>
        <button onclick="submitSettings()" class="btn-primary mt-4">儲存設定</button>
      </div>
    </div>

  </main>

  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-around items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="switchView('user-activities')" class="nav-btn" id="nav-user-activities"><div class="icon-box"><span class="material-symbols-outlined">explore</span></div><span class="text-[11px] mt-0.5">活動</span></button>
    <button onclick="switchView('user-history')" class="nav-btn" id="nav-user-history"><div class="icon-box"><span class="material-symbols-outlined">receipt_long</span></div><span class="text-[11px] mt-0.5">紀錄</span></button>
    <button onclick="switchView('user-profile')" class="nav-btn" id="nav-user-profile"><div class="icon-box"><span class="material-symbols-outlined">person</span></div><span class="text-[11px] mt-0.5">設定</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white border-t border-slate-100 flex justify-evenly items-center h-[72px] pb-safe left-1/2 -translate-x-1/2 z-40">
    <button onclick="window.location.href='active.html'" class="nav-btn" id="nav-admin-create"><div class="icon-box"><span class="material-symbols-outlined">add_circle</span></div><span class="text-[10px] mt-0.5">建立</span></button>
    <button onclick="switchView('admin-activities')" class="nav-btn" id="nav-admin-activities"><div class="icon-box"><span class="material-symbols-outlined">fact_check</span></div><span class="text-[10px] mt-0.5">核銷</span></button>
    <button onclick="switchView('admin-crm')" class="nav-btn" id="nav-admin-crm"><div class="icon-box"><span class="material-symbols-outlined">groups</span></div><span class="text-[10px] mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">recent_patient</span></div><span class="text-[10px] mt-0.5">名片</span></button>
    <button onclick="switchView('admin-settings')" class="nav-btn" id="nav-admin-settings"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] mt-0.5">參數</span></button>
  </nav>
</div>

<!-- 核銷名單 Modal -->
<div id="admin-registrants-modal" class="hidden fixed inset-0 z-[1050] bg-slate-50 flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0">
  <div class="bg-white px-4 pt-12 pb-3 flex justify-between items-center shrink-0 border-b border-slate-100">
    <div class="flex items-center gap-2.5">
      <button onclick="closeAdminRegistrants()" class="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-500"><span class="material-symbols-outlined text-[20px]">arrow_back</span></button>
      <h3 id="admin-reg-title" class="text-[17px] font-normal text-slate-800 truncate max-w-[180px]">活動名單</h3>
    </div>
    <button onclick="startScanner()" class="px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-lg font-normal text-[13px] border border-emerald-100">掃碼核銷</button>
  </div>
  <div id="admin-reg-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 pb-safe"></div>
</div>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal bg-slate-800 text-white"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let globalPublicActivities = [], currentActivities = [], isProcessing = false;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      userProfile = await liff.getProfile();
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      
      const params = new URLSearchParams(window.location.search);
      const claimCardId = params.get('claimCardId');
      let targetView = params.get('view');

      // 安全過濾
      if (!isAdmin && targetView && targetView.startsWith('admin')) targetView = 'user-activities';

      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      document.getElementById('view-loading').classList.add('hidden'); 

      if (!isRegistered) {
          switchView('user-register');
          document.getElementById('reg-name').value = userProfile.displayName;
          if (claimCardId) window.claimCardId = claimCardId;
      } else {
          // ⭐ 修理：邀約流程不阻塞，先顯示視圖，再後台處理認領
          if (isAdmin) {
              isViewModeAdmin = true;
              document.getElementById('role-switch-btn').classList.remove('hidden');
              document.getElementById('header-admin-badge').classList.remove('hidden');
          }
          switchView(targetView || (isAdmin ? 'admin-activities' : 'user-activities'));
          if (claimCardId) handleClaim(claimCardId);
      }
    } catch (e) { 
        document.getElementById('view-loading').classList.add('hidden');
        showToast("啟動失敗，請檢查網路環境");
    }
  });

  async function handleClaim(cardId) {
      try {
          await fetchAPI('updateCard', { rowId: cardId, 'LINE ID': userProfile.userId, userId: userProfile.userId, Name: registeredInfo.name, Mobile: registeredInfo.phone });
          showToast("✅ 名片認領成功！");
      } catch(e) { console.error("Claim Failed", e); }
  }

  async function fetchAPI(action, payload = {}) {
    const r = await fetch(WORKER_URL, { method: 'POST', body: JSON.stringify({ action, payload }) });
    const j = await r.json();
    if (!j.success) throw new Error(j.error);
    return j.data;
  }

  function switchView(v) {
    if (!isAdmin && v.startsWith('admin')) v = 'user-activities';
    
    // ⭐ 修理：點擊建立強制跳轉
    if (v === 'admin-create') { window.location.href = 'active.html'; return; }

    const views = ['view-loading','view-user-register','view-user-activities','view-user-profile','view-user-history','view-admin-activities','view-admin-crm','view-admin-settings'];
    views.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('hidden'); });
    
    const target = document.getElementById(`view-${v}`);
    if (target) target.classList.remove('hidden');
    
    const isBack = v.startsWith('admin');
    document.getElementById('bottom-nav-admin').classList.toggle('hidden', !isBack);
    document.getElementById('bottom-nav-user').classList.toggle('hidden', isBack || !isRegistered);

    // 導航高亮 (純黑樣式)
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active-btn'));
    const navId = isBack ? `nav-admin-${v.split('-')[1]}` : `nav-user-${v.split('-')[1]}`;
    const activeBtn = document.getElementById(navId);
    if(activeBtn) activeBtn.classList.add('nav-active-btn');

    // 觸發載入
    if (v === 'user-activities') loadUserActivities();
    else if (v === 'admin-activities') loadAdminDashboard();
    else if (v === 'admin-crm') loadCrmData();
    else if (v === 'admin-settings') loadAdminSettings();
    else if (v === 'user-profile' && registeredInfo) {
        ['name','industry','gender','phone','birthday'].forEach(k => {
            const el = document.getElementById('edit-'+k);
            if(el) el.value = registeredInfo[k] || '';
        });
        checkMyCard();
    }
  }

  // --- 資料載入邏輯 (全數補齊，解決讀取慢與空轉) ---

  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="col-span-2 py-20 text-center text-slate-300">讀取中...</div>';
    try {
      const data = await fetchAPI('getPublicActivities', {});
      globalPublicActivities = data || [];
      container.innerHTML = globalPublicActivities.map(a => `
        <div onclick="openActivityDetail('${a.name}')" class="bg-white rounded-xl border border-slate-100 overflow-hidden active:scale-95 transition-all shadow-sm">
          <img src="${a.imageUrl || 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=500'}" class="aspect-[4/3] w-full object-cover">
          <div class="p-3">
            <h3 class="text-[14px] font-normal text-slate-800 line-clamp-2 h-10">${a.name}</h3>
            <p class="text-[11px] text-primary mt-1">${a.startTime ? a.startTime.substring(5,16) : '時間待定'}</p>
          </div>
        </div>
      `).join('');
    } catch(e) { container.innerHTML = '載入失敗'; }
  }

  async function loadAdminDashboard() {
    const container = document.getElementById('admin-activity-list-container');
    container.innerHTML = '<div class="py-20 text-center text-slate-300">載入管理數據...</div>';
    try {
      const data = await fetchAPI('getActivityDashboard', {});
      container.innerHTML = data.map(a => `
        <div class="bg-white p-4 border-b border-slate-50 flex justify-between items-center">
          <div class="overflow-hidden pr-4">
            <h3 class="text-[15px] font-normal text-slate-800 truncate">${a.name}</h3>
            <p class="text-[12px] text-slate-400 mt-0.5">人數: ${a.total} | 簽到: ${a.attended}</p>
          </div>
          <button onclick="openAdminRegistrants('${a.name}')" class="shrink-0 px-4 py-1.5 bg-slate-900 text-white rounded-lg text-[13px]">核銷</button>
        </div>
      `).join('');
    } catch(e) { container.innerHTML = '載入失敗'; }
  }

  async function loadCrmData() {
    const container = document.getElementById('admin-crm-list-container');
    container.innerHTML = '<div class="py-20 text-center text-slate-300">讀取會員資料...</div>';
    try {
      const data = await fetchAPI('getAllCrmData', {});
      container.innerHTML = data.map((u, i) => `
        <div class="px-4 py-4 flex justify-between items-center border-b border-slate-50">
          <div class="flex items-center gap-4">
            <span class="text-slate-300 text-xs">${i+1}</span>
            <span class="text-[16px] text-slate-800">${u.name}</span>
          </div>
          <span class="text-sm text-primary">${u.attended} 次出席</span>
        </div>
      `).join('');
    } catch(e) { container.innerHTML = '載入失敗'; }
  }

  async function checkMyCard() {
    try {
        const cards = await fetchAPI('getCardContacts');
        const my = cards.find(c => c.userId === userProfile.userId || c['LINE ID'] === userProfile.userId);
        document.getElementById('my-card-entry').classList.toggle('hidden', !my);
    } catch(e) {}
  }

  function toggleRoleMode() { isViewModeAdmin = !isViewModeAdmin; switchView(isViewModeAdmin ? 'admin-activities' : 'user-activities'); }
  function showToast(m, e=false) { const t = document.getElementById('toast'); t.innerText = m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 3000); }
</script>
</body>
</html>
