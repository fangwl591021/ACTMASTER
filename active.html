<!-- Version: v1.0.5 (獨立建立活動模組 - 完整梯次建立功能) -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>建立新活動 - 服務中台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #f4f4f4; color: #333; }
    .input-group { margin-bottom: 16px; }
    .label-text { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; background: #fff; transition: border-color 0.2s; }
    .form-input:focus { border-color: #06C755; box-shadow: 0 0 0 2px rgba(6, 199, 85, 0.1); }
    .tab-btn { flex: 1; text-align: center; padding: 12px 10px; font-size: 14px; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-btn.active { color: #06C755; border-bottom-color: #06C755; font-weight: bold; background-color: white; }
    .btn-main { background: #06C755; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-main:active { opacity: 0.8; }
    .btn-ai { background: #333; color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; float: right; margin-top: -24px; cursor: pointer; transition: opacity 0.2s; }
    .btn-ai:active { opacity: 0.8; }
    .batch-item { background: #fff; border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; display: flex; border-top: 1px solid #eee; height: 60px; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #999; cursor: pointer; transition: color 0.2s; font-weight: 500; }
    .nav-btn.active { color: #06C755; font-weight: bold; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="flex justify-center bg-gray-100">

<div class="w-full max-w-[450px] min-h-screen bg-gray-50 relative pb-24 shadow-xl">
  <!-- 頂部標題 -->
  <header class="bg-[#06C755] text-white p-4 text-center sticky top-0 z-40 shadow-sm">
    <h2 class="text-[17px] font-bold tracking-wider">建立新活動</h2>
  </header>

  <!-- 頁籤選單 -->
  <div class="flex bg-gray-50 border-b border-gray-200 sticky top-[56px] z-30">
    <div onclick="switchTab('quick')" id="tab-quick" class="tab-btn active">快速匯入</div>
    <div onclick="switchTab('detailed')" id="tab-detailed" class="tab-btn">詳細發佈</div>
    <div onclick="switchTab('batch')" id="tab-batch" class="tab-btn">梯次建立</div>
  </div>

  <main class="p-5">
    <!-- 1. 快速模式 -->
    <div id="form-quick" class="space-y-5 animate-in fade-in">
      <div class="input-group">
        <span class="label-text">活動標題</span>
        <input type="text" id="q-name" class="form-input" placeholder="例：每週商務例會">
      </div>
      <div class="input-group">
        <div class="flex justify-between items-center mb-1.5">
          <span class="label-text !mb-0">名單內容 (每行一位)</span>
          <span class="text-[10px] bg-gray-200 text-gray-600 px-2 py-0.5 rounded">批次輸入</span>
        </div>
        <textarea id="q-names" class="form-input h-48 resize-none" placeholder="請貼上參與者姓名...&#10;王小明&#10;陳大山&#10;林美麗"></textarea>
      </div>
      <button onclick="submitActivity('quick', this)" class="btn-main mt-6">立即建立並匯入</button>
    </div>

    <!-- 2. 詳細模式 -->
    <div id="form-detailed" class="hidden space-y-5 animate-in fade-in">
      <div class="input-group">
        <span class="label-text">正式活動標題</span>
        <input type="text" id="d-name" class="form-input" placeholder="輸入完整的活動名稱">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="input-group !mb-0">
          <span class="label-text">開始時間</span>
          <input type="datetime-local" id="d-start" class="form-input !text-[13px] !px-2">
        </div>
        <div class="input-group !mb-0">
          <span class="label-text">結束時間</span>
          <input type="datetime-local" id="d-end" class="form-input !text-[13px] !px-2">
        </div>
      </div>
      <div class="input-group">
        <span class="label-text">活動說明</span>
        <div onclick="aiOptimizeDesc('d-desc')" class="btn-ai shadow-sm hover:bg-gray-800">🤖 AI 優化文案</div>
        <textarea id="d-desc" class="form-input h-40 resize-none" placeholder="輸入活動介紹、流程或注意事項..."></textarea>
      </div>
      <button onclick="submitActivity('detailed', this)" class="btn-main mt-6">發布正式活動</button>
    </div>

    <!-- 3. 梯次模式 -->
    <div id="form-batch" class="hidden space-y-4 animate-in fade-in">
      <div class="input-group mb-5">
        <span class="label-text">系列活動標題</span>
        <input type="text" id="b-name" class="form-input" placeholder="例：2026 AI 應用實戰系列班">
      </div>
      
      <div class="flex justify-between items-center mb-2">
         <span class="text-[14px] font-bold text-gray-800">設定活動梯次</span>
         <span class="text-[11px] text-gray-400">可動態增減</span>
      </div>

      <div id="batch-container" class="space-y-3">
        <!-- 預設第一梯次 -->
        <div class="batch-item">
          <div class="input-group !mb-3">
            <span class="label-text">梯次名稱</span>
            <input type="text" class="form-input b-item-name !py-2" placeholder="例：第一梯次 (10/01)">
          </div>
          <div class="grid grid-cols-2 gap-3 mb-3">
             <div>
               <span class="label-text">開始時間</span>
               <input type="datetime-local" class="form-input b-item-start !text-[12px] !py-2 !px-1.5">
             </div>
             <div>
               <span class="label-text">結束時間</span>
               <input type="datetime-local" class="form-input b-item-end !text-[12px] !py-2 !px-1.5">
             </div>
          </div>
          <div class="input-group !mb-0">
             <span class="label-text">人數限制</span>
             <input type="number" class="form-input b-item-limit !py-2" placeholder="不限則留空">
          </div>
        </div>
      </div>
      
      <button onclick="addBatchRow()" class="w-full py-3 mt-2 border-2 border-dashed border-[#06C755] text-[#06C755] bg-[#06C755]/5 hover:bg-[#06C755]/10 font-bold rounded-xl text-sm transition-colors flex justify-center items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
        新增梯次
      </button>

      <div class="input-group mt-6">
        <span class="label-text">系列說明 (共用)</span>
        <div onclick="aiOptimizeDesc('b-desc')" class="btn-ai shadow-sm hover:bg-gray-800">🤖 AI 優化文案</div>
        <textarea id="b-desc" class="form-input h-32 resize-none" placeholder="輸入此系列活動的總體說明..."></textarea>
      </div>

      <button onclick="submitActivity('batch', this)" class="btn-main mt-6">發布梯次活動</button>
    </div>
  </main>

  <!-- 底部導覽 -->
  <nav class="nav">
    <div class="nav-btn" onclick="location.href='admin.html'">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
      <span>後台管理</span>
    </div>
    <div class="nav-btn active">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      <span>建立活動</span>
    </div>
    <div class="nav-btn" onclick="location.href='service_hub.html?p='+p">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
      <span>前台預覽</span>
    </div>
  </nav>
</div>

<script>
  const LIFF_ID = '2009367829-5bIWGL8O';
  const WORKER_URL = 'https://saas.ares-co2026.workers.dev/';
  let uid = '', p = '';

  async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    p = urlParams.get('p') || '';

    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        uid = profile.userId;
    } catch(err) {
        console.error('LIFF Error:', err);
    }
  }

  function switchTab(m) {
    ['quick', 'detailed', 'batch'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === m);
      document.getElementById('form-' + t).classList.toggle('hidden', t !== m);
    });
  }

  function addBatchRow() {
    const row = document.createElement('div');
    row.className = 'batch-item animate-in fade-in slide-in-from-top-4 duration-300';
    row.innerHTML = `
      <button onclick="this.parentElement.remove()" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition-colors">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
      <div class="input-group !mb-3">
        <span class="label-text">梯次名稱</span>
        <input type="text" class="form-input b-item-name !py-2" placeholder="例：第二梯次">
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3">
         <div>
           <span class="label-text">開始時間</span>
           <input type="datetime-local" class="form-input b-item-start !text-[12px] !py-2 !px-1.5">
         </div>
         <div>
           <span class="label-text">結束時間</span>
           <input type="datetime-local" class="form-input b-item-end !text-[12px] !py-2 !px-1.5">
         </div>
      </div>
      <div class="input-group !mb-0">
         <span class="label-text">人數限制</span>
         <input type="number" class="form-input b-item-limit !py-2" placeholder="不限則留空">
      </div>
    `;
    document.getElementById('batch-container').appendChild(row);
  }

  async function aiOptimizeDesc(id) {
    const el = document.getElementById(id);
    if (!el.value) return alert('請先輸入簡短的活動大綱，AI 才能幫您優化喔！');
    
    const oriText = el.value;
    el.value = '';
    el.placeholder = '🤖 AI 正在為您撰寫吸睛文案，請稍候...';
    
    try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'ai_optimize_activity', p, content: oriText })
        });
        
        let textResult = await res.text();
        
        try {
            const jsonResult = JSON.parse(textResult);
            if (jsonResult.success && jsonResult.data) {
                el.value = jsonResult.data;
            } else {
                el.value = textResult; 
            }
        } catch(e) {
            el.value = textResult;
        }
        
    } catch(err) {
        alert("AI 連線失敗，已恢復原文。");
        el.value = oriText;
    }
  }

  async function submitActivity(mode, btnElement) {
    const oriBtnText = btnElement.innerHTML;
    btnElement.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 處理中...`;
    btnElement.style.pointerEvents = 'none';
    btnElement.style.opacity = '0.8';

    let payload = { action: 'create_activity', mode, p, uid };
    
    if (mode === 'quick') {
      payload.name = document.getElementById('q-name').value;
      payload.names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());
    } else if (mode === 'detailed') {
      payload.name = document.getElementById('d-name').value;
      payload.start = document.getElementById('d-start').value;
      payload.end = document.getElementById('d-end').value;
      payload.desc = document.getElementById('d-desc').value;
    } else if (mode === 'batch') {
      payload.name = document.getElementById('b-name').value;
      payload.desc = document.getElementById('b-desc').value;
      
      const batchItems = Array.from(document.querySelectorAll('.batch-item'));
      payload.batches = batchItems.map(item => ({
        name: item.querySelector('.b-item-name').value,
        start: item.querySelector('.b-item-start').value,
        end: item.querySelector('.b-item-end').value,
        limit: item.querySelector('.b-item-limit').value
      }));

      // 取出全域開始與結束時間
      if (payload.batches.length > 0) {
          payload.start = payload.batches[0].start || '';
          payload.end = payload.batches[payload.batches.length - 1].end || payload.batches[0].end || '';
      }
    }
    
    if (!payload.name) {
        alert('請務必填寫活動標題！');
        btnElement.innerHTML = oriBtnText;
        btnElement.style.pointerEvents = 'auto';
        btnElement.style.opacity = '1';
        return;
    }

    if (mode === 'batch' && payload.batches.length === 0) {
        alert('請至少新增一個活動梯次！');
        btnElement.innerHTML = oriBtnText;
        btnElement.style.pointerEvents = 'auto';
        btnElement.style.opacity = '1';
        return;
    }

    // 轉換成後端 GAS 習慣接收的中文鍵值，保證寫入正確
    let backendPayload = {
        action: 'bulkAddRegistrants',
        activityName: payload.name,
        activityType: '課程', 
        feeType: '免費', 
        price: '', 
        startTime: payload.start || '', 
        endTime: payload.end || '', 
        description: payload.desc || '', 
        imageUrl: '', 
        names: payload.names || [], 
        defaultIdentity: '來賓',
        '開始時間': payload.start || '',
        '結束時間': payload.end || '',
        '活動名稱': payload.name,
        '活動說明': payload.desc || '',
    };

    if (mode === 'batch') {
        backendPayload['梯次'] = JSON.stringify(payload.batches);
    }

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(backendPayload)
      });
      
      const textResponse = await res.text();
      let result;
      try {
          result = JSON.parse(textResponse);
      } catch(e) {
          throw new Error('伺服器無回應');
      }

      alert('✅ 活動建立成功！');
      location.reload();
      
    } catch (err) {
      console.error(err);
      alert('發生錯誤：' + err.message);
      btnElement.innerHTML = oriBtnText;
      btnElement.style.pointerEvents = 'auto';
      btnElement.style.opacity = '1';
    }
  }

  init();
</script>
</body>
</html>
