<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  
  let globalCardContacts = [];
  let currentUserProfile = null;
  let currentActiveCard = null; 

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const profile = await liff.getProfile();
      const userRes = await fetchAPI('checkUser', { userId: profile.userId });
      currentUserProfile = {
        name: userRes.isRegistered ? userRes.info.name : profile.displayName,
        industry: userRes.isRegistered ? userRes.info.industry : '未知'
      };

      globalCardContacts = await fetchAPI('getCardContacts');
      
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-main').classList.remove('hidden');
      
      checkDatabaseStatus();
      
    } catch (err) {
      alert("初始化失敗：" + err.message);
    }
  };

  async function fetchAPI(action, payload = {}, silent = false) {
    try {
        const response = await fetch(WORKER_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, payload })
        });
        const result = await response.json();
        if (!result.success) throw new Error(result.error);
        return result.data;
    } catch (err) {
        if (!silent) alert(err.message);
        throw err;
    }
  }

  function checkDatabaseStatus() {
      const missingContacts = globalCardContacts.filter(c => !c['個性'] || String(c['個性']).trim() === '' || String(c['個性']) === '待分析' || String(c['個性']) === 'undefined');
      const missingCount = missingContacts.length;
      
      const totalEl = document.getElementById('total-count');
      const missingEl = document.getElementById('missing-count');
      const btnSync = document.getElementById('btn-sync-tags');
      
      if(totalEl) totalEl.innerText = globalCardContacts.length;
      if(missingEl) missingEl.innerText = missingCount;
      
      if (missingCount > 0) {
          if(btnSync) btnSync.classList.remove('hidden');
      } else {
          if(btnSync) btnSync.classList.add('hidden');
      }
  }

  async function syncOldTags(forceAll = false) {
      const targetContacts = forceAll 
          ? globalCardContacts 
          : globalCardContacts.filter(c => !c['個性'] || String(c['個性']).trim() === '' || String(c['個性']) === '待分析' || String(c['個性']) === 'undefined');
          
      if (targetContacts.length === 0) {
          if(!forceAll) return;
      }

      const msg = forceAll 
          ? `確定要強制重新運算【全庫 ${targetContacts.length} 張】名片的命理標籤嗎？\n\n(此操作會覆蓋所有舊標籤，全面套用最新的進階演算法)` 
          : `系統發現 ${targetContacts.length} 張名片缺乏命理標籤。\n是否立即啟動 AI 批次補漏？`;

      if (!confirm(msg + `\n\n(過程約需數十秒至數分鐘，請保持網頁開啟勿關閉)`)) return;

      const btnSync = document.getElementById('btn-sync-tags');
      const btnForce = document.getElementById('btn-force-recalc');
      if(btnSync) btnSync.classList.add('pointer-events-none', 'opacity-50');
      if(btnForce) btnForce.classList.add('pointer-events-none', 'opacity-50');
      
      const statusEl = document.getElementById('sync-status');

      let successCount = 0;
      
      for (let i = 0; i < targetContacts.length; i++) {
          const c = targetContacts[i];
          statusEl.innerHTML = `<span class="material-symbols-outlined animate-spin text-primary text-[14px] align-middle">refresh</span> 正在${forceAll?'重算':'同步'} <b>${c['姓名'] || '未知'}</b> (${i + 1}/${targetContacts.length})...`;
          
          try {
              const mobileToUse = c['手機號碼'] || c['公司電話'] || '';
              let bdayToUse = c['生日'] || ''; 

              // ⭐ QQ大師修復：資料庫連動斷層補漏！
              // 如果這張名片通訊錄沒有生日，但對方有註冊會員(有 LINE ID)，自動去會員資料庫抓生日！
              const uid = c['LINE ID'] || c.userId || c['Line ID'] || c.lineId || '';
              if ((!bdayToUse || bdayToUse === 'Not provided') && uid) {
                  try {
                      // 呼叫會員資料庫 (具備 Cache 以免頻繁連線)
                      const uRes = await fetchAPI('checkUser', { userId: uid }, true); 
                      if (uRes && uRes.isRegistered && uRes.info && uRes.info.birthday) {
                          let rawBday = uRes.info.birthday;
                          const d = new Date(rawBday);
                          if (!isNaN(d.getTime())) {
                              bdayToUse = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                          } else {
                              bdayToUse = rawBday;
                          }
                      }
                  } catch(e) { console.warn("Fetch user info failed", e); }
              }
              
              // 傳送最終的生日去算命
              const newTags = await fetchAPI('calculateFateTags', { Name: c['姓名'], Mobile: mobileToUse, Birthday: bdayToUse }, true);
              
              const fullPayload = {
                  rowId: c.rowId,
                  Name: c['姓名'] || '', 
                  EnglishName: c['英文名/別名'] || '', 
                  Title: c['職稱'] || '', 
                  Department: c['部門'] || '',
                  CompanyName: c['公司名稱'] || '', 
                  TaxID: c['統一編號'] || '', 
                  Mobile: c['手機號碼'] || '', 
                  Tel: c['公司電話'] || '',
                  Ext: c['分機'] || '', 
                  Fax: c['傳真'] || '', 
                  Address: c['公司地址'] || '', 
                  Email: c['電子郵件'] || '', 
                  Website: c['公司網址'] || '',
                  SocialMedia: c['社群帳號'] || '', 
                  Slogan: c['服務項目/品牌標語'] || '', 
                  Notes: c['建檔人/備註'] || '',
                  Birthday: bdayToUse, // ⭐ 將抓到的生日一併寫回名片通訊錄，以後就不會斷層了
                  Personality: newTags.Personality || '待分析',
                  Hobbies: newTags.Hobbies || '待分析',
                  Wealth: newTags.Wealth || '待分析',
                  Health: newTags.Health || '待分析',
                  Career: newTags.Career || '待分析'
              };
              
              await fetchAPI('updateCard', fullPayload, true);
              successCount++;
              
              c['個性'] = fullPayload.Personality;
              c['興趣'] = fullPayload.Hobbies;
              c['財運'] = fullPayload.Wealth;
              c['健康'] = fullPayload.Health;
              c['事業'] = fullPayload.Career;
              c['生日'] = fullPayload.Birthday;
              
          } catch (err) {
              console.error(`處理 ${c['姓名']} 失敗:`, err);
              alert(`⚠️ 處理「${c['姓名']}」時發生錯誤！\n\n錯誤訊息：${err.message}`);
              break; 
          }
          
          await new Promise(r => setTimeout(r, 1000));
      }

      if(btnSync) btnSync.classList.remove('pointer-events-none', 'opacity-50');
      if(btnForce) btnForce.classList.remove('pointer-events-none', 'opacity-50');
      
      statusEl.innerHTML = `共 <span id="total-count" class="font-bold text-slate-700">0</span> 筆，缺漏 <span id="missing-count" class="text-red-500 font-bold">0</span> 筆`;
      checkDatabaseStatus();
      
      if (successCount > 0) {
          alert(`✅ 作業結束！\n共成功${forceAll?'重算':'補算'} ${successCount} 張名片標籤。`);
      }
  }

  async function startMatchmaking() {
    const query = document.getElementById('search-query').value.trim();
    if (!query) return alert('請輸入您的業務需求！');

    const btn = document.getElementById('btn-match');
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> AI 深度分析中...';
    btn.classList.add('pointer-events-none', 'opacity-70');
    
    document.getElementById('results-container').innerHTML = '';

    try {
      const slimContacts = globalCardContacts.map(c => ({
          rowId: c.rowId,
          Name: c['姓名'],
          Company: c['公司名稱'],
          Title: c['職稱'],
          Industry: c['服務項目/品牌標語'],
          Personality: c['個性'],
          Hobbies: c['興趣'],
          Wealth: c['財運'],
          Health: c['健康'],
          Career: c['事業']
      }));

      const matches = await fetchAPI('matchmakeContacts', {
          currentUser: currentUserProfile,
          query: query,
          contacts: slimContacts
      });

      if (!matches || matches.length === 0) {
          document.getElementById('results-container').innerHTML = '<p class="text-center text-slate-400 mt-10 font-bold">目前資料庫沒有找到高度吻合的對象。</p>';
      } else {
          renderMatches(matches);
      }

    } catch (err) {
      alert("媒合過程發生錯誤：" + err.message);
    } finally {
      btn.innerHTML = '<span class="material-symbols-outlined">magic_button</span> 重新啟動媒合';
      btn.classList.remove('pointer-events-none', 'opacity-70');
    }
  }

  function renderMatches(matches) {
    const container = document.getElementById('results-container');
    
    container.innerHTML = matches.map((match, idx) => {
      const contact = globalCardContacts.find(c => c.rowId === match.rowId);
      if (!contact) return '';

      let phoneStr = contact['手機號碼'] ? String(contact['手機號碼']).replace(/[^\d+]/g,'') : '';

      return `
      <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 p-5 animate-in fade-in slide-in-from-bottom-4" style="animation-delay: ${idx * 100}ms">
        <div class="flex justify-between items-start mb-3">
            <div>
                <h3 class="text-lg font-black text-slate-800">${contact['姓名']}</h3>
                <p class="text-xs text-slate-500 font-bold mt-0.5">${contact['公司名稱']} - ${contact['職稱']}</p>
            </div>
            <div class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-sm font-black shadow-sm">
                ${match.score}% 契合
            </div>
        </div>
        
        <div class="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-100 relative">
            <span class="material-symbols-outlined absolute top-3 right-3 text-slate-200 text-3xl">format_quote</span>
            <p class="text-[13px] text-slate-600 leading-relaxed font-medium relative z-10">${match.reason}</p>
        </div>

        <div class="flex gap-2">
            ${phoneStr ? `<a href="tel:${phoneStr}" class="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold text-[13px] text-center active:scale-95 transition-transform flex justify-center items-center gap-1"><span class="material-symbols-outlined text-[16px]">call</span> 聯絡</a>` : ''}
            <button onclick="openWebCard('${contact.rowId}')" class="flex-1 py-2.5 bg-slate-800 text-white rounded-xl font-bold text-[13px] text-center active:scale-95 transition-transform flex justify-center items-center gap-1"><span class="material-symbols-outlined text-[16px]">contact_mail</span> 查看名片</button>
        </div>
      </div>
      `;
    }).join('');
  }

  function getDirectImageUrl(url) { 
      if (!url) return url;
      const driveMatch = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/d\/([a-zA-Z0-9_-]+)/);
      if (driveMatch && url.includes('drive.google.com')) {
        return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1000`;
      }
      return url;
  }

  const getTrueAspectRatio = (url) => new Promise((resolve) => {
      if (!url) return resolve('20:13');
      const img = new Image();
      img.onload = function() {
          let w = this.width; let h = this.height; let ratio = w / h;
          if (ratio > 3) { w = 300; h = 100; }
          else if (ratio < 0.334) { w = 100; h = 300; }
          resolve(`${Math.round(w)}:${Math.round(h)}`);
      };
      img.onerror = function() { resolve('20:13'); };
      img.src = url;
  });

  function openWebCard(rowId) {
      const card = globalCardContacts.find(c => String(c.rowId) === String(rowId));
      if (!card) return;
      currentActiveCard = card;

      let config = null;
      if (card['自訂名片設定']) { try { config = JSON.parse(card['自訂名片設定']); } catch(e){} }

      let rawImg = config?.imgUrl || card['名片圖檔'] || '';
      if (!rawImg || typeof rawImg !== 'string' || !rawImg.startsWith('http')) {
          rawImg = 'https://aiwe.cc/wp-content/uploads/2026/01/781206b661aebf645c633e618db3960b.png';
      }
      const imgUrl = getDirectImageUrl(rawImg);
      
      let title = config?.title || [card['公司名稱'], card['姓名']].filter(Boolean).join(' - ') || '商務名片';
      let desc = config?.desc || card['服務項目/品牌標語'] || '點擊下方按鈕與我聯繫';
      
      let buttons = [];
      if (config && config.buttons && config.buttons.length > 0) {
          buttons = config.buttons;
      } else {
          if (card['手機號碼']) {
              let phone = String(card['手機號碼']).split(',')[0].replace(/[^\d+]/g, '');
              if (phone.startsWith('886')) phone = '0' + phone.substring(3);
              if (phone) buttons.push({ l: '撥打手機', u: `tel:${phone}`, c: '#ff751f' });
          }
          if (card['公司電話']) {
              let tel = String(card['公司電話']).split(',')[0].replace(/[^\d+]/g, '');
              if (tel.startsWith('886')) tel = '0' + tel.substring(3);
              if (tel) buttons.push({ l: '撥打電話', u: `tel:${tel}`, c: '#ff751f' });
          }
          if (card['電子郵件']) {
              let email = String(card['電子郵件']).split(/[\s,]+/)[0];
              if (email.includes('@')) buttons.push({ l: '發送信箱', u: `mailto:${email}`, c: '#ff751f' });
          }
          if (card['公司地址']) {
              buttons.push({ l: 'Google 導航', u: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(card['公司地址'].split(',')[0])}`, c: '#ff751f' });
          }
      }

      document.getElementById('ro-img').src = imgUrl;
      
      const titleAlign = config?.titleAlign || 'center';
      const titleEl = document.getElementById('ro-title');
      titleEl.innerText = title;
      titleEl.style.textAlign = titleAlign === 'start' ? 'left' : (titleAlign === 'end' ? 'right' : 'center');
      
      document.getElementById('ro-desc').innerText = desc;

      const btnContainer = document.getElementById('ro-buttons');
      btnContainer.innerHTML = buttons.map(b => `
          <div class="w-full text-white text-[15px] font-bold text-center py-3.5 rounded-xl shadow-sm" style="background-color: ${b.c || '#ff751f'}">${b.l}</div>
      `).join('');

      document.getElementById('readonly-card-modal').classList.remove('hidden');
  }

  function closeReadOnlyCard() {
      document.getElementById('readonly-card-modal').classList.add('hidden');
  }

  function buildFlexMessageFromCard(card, config, dynamicAr = null) {
    let imgUrl, imgActionUrl, imgSize, aspectMode, ar, title, desc, buttons = [];
    let titleAlign = config && config.titleAlign ? config.titleAlign : 'center';
    let rawImg = (config && config.imgUrl) ? config.imgUrl : (card && card['名片圖檔'] ? card['名片圖檔'] : '');
    
    if (!rawImg || typeof rawImg !== 'string' || !rawImg.startsWith('http')) {
        rawImg = 'https://aiwe.cc/wp-content/uploads/2026/01/781206b661aebf645c633e618db3960b.png';
    }
    imgUrl = getDirectImageUrl(rawImg);
    
    if (config) {
        imgActionUrl = config.imgActionUrl || 'https://liff.line.me/2009367829-DLtYBDUm';
        imgSize = config.imgSize || 'mega';
        aspectMode = config.aspectMode || 'cover';
        ar = dynamicAr || config.ar || '20:13';
        title = config.title || '-';
        desc = config.desc || '-'; 
        buttons = config.buttons || [];
    } else {
        imgActionUrl = 'https://liff.line.me/2009367829-DLtYBDUm';
        imgSize = 'mega';
        aspectMode = 'cover';
        ar = dynamicAr || '20:13';
        title = [card['公司名稱'], card['姓名']].filter(Boolean).join(' - ') || '商務名片';
        desc = card['服務項目/品牌標語'] || '點擊下方按鈕與我聯繫';

        if (card['手機號碼']) {
            let phone = String(card['手機號碼']).split(',')[0].replace(/[^\d+]/g, '');
            if (phone.startsWith('886')) phone = '0' + phone.substring(3);
            if (phone) buttons.push({ l: '撥打手機', u: `tel:${phone}`, c: '#ff751f' });
        }
        if (card['公司電話']) {
            let tel = String(card['公司電話']).split(',')[0].replace(/[^\d+]/g, '');
            if (tel.startsWith('886')) tel = '0' + tel.substring(3);
            if (tel) buttons.push({ l: '撥打電話', u: `tel:${tel}`, c: '#ff751f' });
        }
        if (card['電子郵件']) {
            let email = String(card['電子郵件']).split(/[\s,]+/)[0];
            if (email.includes('@')) buttons.push({ l: '發送信箱', u: `mailto:${email}`, c: '#ff751f' });
        }
        if (card['公司地址']) {
            buttons.push({ l: 'Google 導航', u: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(card['公司地址'].split(',')[0])}`, c: '#ff751f' });
        }
    }

    const validSizes = ['nano', 'micro', 'kilo', 'mega', 'giga'];
    if (!validSizes.includes(imgSize)) imgSize = 'mega';
    if (!/^\d+:\d+$/.test(ar)) ar = '20:13';

    let safeImgActionUrl = imgActionUrl ? String(imgActionUrl).trim() : 'https://liff.line.me/2009367829-DLtYBDUm';
    if (!safeImgActionUrl.match(/^(http|https|tel|mailto|line):/i)) { safeImgActionUrl = 'https://' + safeImgActionUrl; }

    const btnContents = [];
    for (let i=0; i<buttons.length; i++) {
        let label = buttons[i].l ? String(buttons[i].l).trim() : '查看';
        let safeU = buttons[i].u ? String(buttons[i].u).trim() : 'https://line.me';
        let btnColor = buttons[i].c || '#ff751f';
        btnContents.push({ "type": "button", "style": "primary", "color": btnColor, "height": "sm", "margin": "sm", "action": { "type": "uri", "label": label.substring(0, 20), "uri": safeU.substring(0, 1000) } });
    }

    const badgeUrl = `https://liff.line.me/${LIFF_ID}?shareCardId=${card.rowId}`;

    const flexContents = {
        "type": "bubble", "size": imgSize,
        "body": {
            "type": "box", "layout": "vertical", "paddingAll": "0px",
            "contents": [
                { "type": "image", "url": imgUrl, "size": "full", "aspectRatio": ar, "aspectMode": aspectMode, "action": { "type": "uri", "label": "cover", "uri": safeImgActionUrl.substring(0, 1000) } },
                { "type": "box", "layout": "vertical", "paddingAll": "15px", "contents": [ { "type": "text", "text": title, "weight": "bold", "size": "xl", "align": titleAlign, "wrap": true }, { "type": "text", "text": desc, "size": "xs", "margin": "sm", "color": "#666666", "wrap": true } ] },
                { "type": "box", "layout": "vertical", "position": "absolute", "backgroundColor": "#FF0000", "cornerRadius": "xl", "paddingTop": "4px", "paddingBottom": "4px", "paddingStart": "12px", "paddingEnd": "12px", "offsetTop": "10px", "offsetStart": "10px", "action": { "type": "uri", "label": "badge", "uri": badgeUrl }, "contents": [{ "type": "text", "text": "分享", "color": "#ffffff", "size": "sm", "weight": "bold" }] }
            ]
        }
    };
    if (btnContents.length > 0) flexContents.footer = { "type": "box", "layout": "vertical", "spacing": "sm", "paddingAll": "15px", "backgroundColor": "#FFFFFF", "contents": btnContents };
    return flexContents;
  }

  const triggerFlexSharing = async (flexContents, altText) => {
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      try {
          const message = { type: "flex", altText: altText || "您收到一張數位名片", contents: flexContents };
          const res = await liff.shareTargetPicker([message]);
          if (res) alert('🚀 數位名片已成功轉發！');
          setTimeout(() => liff.closeWindow(), 1500);
      } catch (error) {
          if (error.message && error.message.includes('not allowed')) {
              alert("⚠️ 系統權限已更新！即將為您重新登入以獲取最新權限。");
              liff.logout(); window.location.reload(); 
          } else {
              alert('發送取消或發生未知錯誤');
          }
      }
  };

  async function shareReadOnlyCardToLine() {
       const btnShare = document.querySelector('#readonly-card-modal button');
       const originalHTML = btnShare.innerHTML;
       btnShare.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> 處理中...';
       btnShare.classList.add('pointer-events-none', 'opacity-70');

       try {
           let config = null;
           if (currentActiveCard['自訂名片設定']) { try { config = JSON.parse(currentActiveCard['自訂名片設定']); } catch(e){} }
           
           const currentImgUrl = getDirectImageUrl(config?.imgUrl || currentActiveCard['名片圖檔']);
           const detectedAr = await getTrueAspectRatio(currentImgUrl);
           const flexMessageObj = buildFlexMessageFromCard(currentActiveCard, config, detectedAr);
           const altText = `您收到一張數位名片：${config ? config.title : currentActiveCard['姓名'] || '商務名片'}`;

           await triggerFlexSharing(flexMessageObj, altText);
       } catch(err) {
           alert("發生錯誤：" + err.message);
       } finally {
           btnShare.innerHTML = originalHTML;
           btnShare.classList.remove('pointer-events-none', 'opacity-70');
       }
  }

</script>
