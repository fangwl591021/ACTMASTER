<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>建立新活動 - 報名大師</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#2563eb", 
            "primary-light": "#eff6ff", 
            background: "#ffffff", 
            "text-main": "#0f172a", 
            "text-muted": "#64748b", 
            error: "#ef4444" 
          },
          fontFamily: { 
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"] 
          },
          boxShadow: {
            'app-card': '0 4px 20px -2px rgba(0,0,0,0.05)',
            'app-nav': '0 -4px 20px rgba(0,0,0,0.03)',
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[14px] text-slate-700 mb-1.5 font-medium tracking-wide; }
    
    select.custom-input {
      -webkit-appearance: none !important;
      -moz-appearance: none !important;
      appearance: none !important;
      background-image: none !important;
    }

    .custom-input { @apply w-full py-2.5 px-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-medium text-text-main text-[15px] shadow-sm; }
    .custom-input::placeholder { @apply text-slate-400 font-normal; }
    
    .btn-primary { @apply w-full py-3 bg-primary text-white rounded-lg font-bold text-[16px] shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-blue-700; }
    
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; min-width: 48px;}
    .nav-btn .icon-box { @apply px-4 py-1 rounded-full transition-all flex items-center justify-center mb-0.5; }
    .nav-active { @apply text-primary font-bold; }
    .nav-active .icon-box { @apply bg-primary-light text-primary; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

    .refresh-spin { animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center bg-slate-50">

<div id="app-container" class="w-full max-w-md h-screen relative flex flex-col shadow-2xl overflow-hidden bg-background">
  
  <nav id="top-nav" class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-200 shadow-sm">
    <div class="text-[19px] font-extrabold text-slate-800 flex items-center gap-2 font-headline tracking-tight">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center shadow-md shadow-blue-500/20">
        <span class="material-symbols-outlined text-[20px]">add_circle</span>
      </div>
      建立新活動
      <span class="bg-slate-800 text-white text-[9px] px-2 py-0.5 rounded-md uppercase tracking-wider font-bold ml-1">Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border border-slate-200 shadow-sm">
      </div>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 px-5 space-y-6">

    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-10 h-10 border-4 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-500 font-bold tracking-widest text-[13px]">權限驗證中</p>
    </div>

    <div id="view-admin-create" class="hidden space-y-5 animate-in fade-in">
      <div class="mb-4">
        <p class="text-slate-500 text-[13px] font-medium mt-1">快速部署您的活動報名流程。</p>
      </div>

      <div class="flex p-1 rounded-lg border border-slate-200 bg-slate-100 mb-6">
        <button onclick="toggleCreateMode('quick')" id="tab-quick" class="flex-1 py-2 rounded-md text-[14px] font-bold bg-white text-primary shadow-sm transition-all">快速匯入</button>
        <button onclick="toggleCreateMode('detailed')" id="tab-detailed" class="flex-1 py-2 rounded-md text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700">完整發佈</button>
      </div>
      
      <div id="form-quick" class="space-y-4 animate-in fade-in">
        <div class="flex flex-col"><label class="input-label">活動名稱</label><input type="text" id="quick-name" class="custom-input" placeholder="輸入活動標題..."></div>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col"><label class="input-label">活動類型</label><select id="quick-type" class="custom-input cursor-pointer"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select></div>
          <div class="flex flex-col"><label class="input-label">預設身份</label><select id="quick-identity" class="custom-input cursor-pointer"><option>會員</option><option>來賓</option></select></div>
        </div>
        <div class="flex flex-col mt-2">
          <label class="input-label">宣傳大圖 (選填)</label>
          <div onclick="document.getElementById('file-input-quick').click()" class="w-full h-36 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center bg-slate-50 cursor-pointer overflow-hidden transition-all hover:bg-slate-100 relative group">
            <div id="preview-placeholder-quick" class="text-center text-slate-400 flex flex-col items-center"><span class="material-symbols-outlined text-3xl mb-1">add_photo_alternate</span><p class="text-[12px] font-bold">點擊上傳圖片</p></div>
            <img id="image-preview-quick" class="hidden w-full h-full object-cover absolute inset-0">
            <input type="file" id="file-input-quick" class="hidden" accept="image/*" onchange="previewFile('quick')">
          </div>
          <input type="hidden" id="in-image-url-quick">
        </div>
        <div class="flex flex-col mt-2">
          <div class="flex justify-between items-center mb-1"><label class="input-label !mb-0">名單內容</label><span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded border border-slate-200">支援批次輸入</span></div>
          <textarea id="quick-names" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl outline-none focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/20 transition-all text-[14px] text-slate-700 resize-none h-36" placeholder="請貼上參與者姓名，每行一位..."></textarea>
        </div>
        <button onclick="handleCreateActivity('quick')" id="btn-quick-create" class="btn-primary mt-2">建立活動 <span class="material-symbols-outlined text-[20px]">add_circle</span></button>
      </div>
      
      <div id="form-detailed" class="hidden space-y-4 animate-in fade-in">
         <div class="flex flex-col"><label class="input-label">正式標題</label><input type="text" id="detail-name" class="custom-input" placeholder="輸入活動標題..."></div>
         <div class="grid grid-cols-2 gap-3">
           <div class="flex flex-col"><label class="input-label">活動類型</label><select id="detail-type" class="custom-input cursor-pointer"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select></div>
           <div class="flex flex-col"><label class="input-label">預設身份</label><select id="detail-identity" class="custom-input cursor-pointer"><option>會員</option><option>來賓</option></select></div>
         </div>
         <div class="grid grid-cols-2 gap-3 border-t border-slate-100 pt-4 mt-1">
           <div class="flex flex-col">
             <label class="input-label">收費方式</label>
             <div class="flex gap-4 items-center h-[46px] px-3 bg-white border border-slate-300 rounded-lg shadow-sm">
               <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="免費" checked onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2"><span class="font-bold text-[14px] text-slate-700">免費</span></label>
               <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="fee-type" value="收費" onchange="toggleFeeInput()" class="w-4 h-4 text-primary bg-white border-slate-300 focus:ring-primary focus:ring-2"><span class="font-bold text-[14px] text-slate-700">收費</span></label>
             </div>
           </div>
           <div class="flex flex-col justify-end"><input type="number" id="detail-price" class="custom-input hidden h-[46px]" placeholder="金額 (NT$)"></div>
         </div>
         <div class="grid grid-cols-2 gap-3 border-t border-slate-100 pt-4 mt-1">
           <div class="flex flex-col"><label class="input-label">開始時間</label><input type="datetime-local" id="detail-start" class="custom-input !px-2 text-[13px] text-slate-600"></div>
           <div class="flex flex-col"><label class="input-label">結束時間</label><input type="datetime-local" id="detail-end" class="custom-input !px-2 text-[13px] text-slate-600"></div>
         </div>
         <div class="flex flex-col mt-2">
           <label class="input-label">活動說明</label>
           <textarea id="detail-desc" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl outline-none focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/20 transition-all text-[14px] text-slate-700 resize-none h-32" placeholder="輸入詳盡說明..."></textarea>
         </div>
         <div class="flex flex-col mt-2">
           <label class="input-label">宣傳大圖</label>
           <div onclick="document.getElementById('file-input-create').click()" class="w-full h-36 border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center bg-slate-50 cursor-pointer overflow-hidden transition-all hover:bg-slate-100 relative group">
             <div id="preview-placeholder-create" class="text-center text-slate-400 flex flex-col items-center"><span class="material-symbols-outlined text-3xl mb-1">add_photo_alternate</span><p class="text-[12px] font-bold">點擊上傳圖片</p></div>
             <img id="image-preview-create" class="hidden w-full h-full object-cover absolute inset-0">
             <input type="file" id="file-input-create" class="hidden" accept="image/*" onchange="previewFile('create')">
           </div>
           <input type="hidden" id="in-image-url-create">
         </div>
         <button onclick="handleCreateActivity('detailed')" id="btn-detail-create" class="btn-primary mt-4">發布活動頁面 <span class="material-symbols-outlined text-[20px]">rocket_launch</span></button>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-200 flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-app-nav left-1/2 -translate-x-1/2 h-[72px]">
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[22px]">fact_check</span></div><span class="text-[10px] font-bold mt-0.5">核銷</span></button>
    <button class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[22px]">add_circle</span></div><span class="text-[10px] font-bold mt-0.5">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[22px]">groups</span></div><span class="text-[10px] font-bold mt-0.5">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[22px] text-pink-500">psychology</span></div><span class="text-[10px] font-bold mt-0.5 text-pink-600">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[22px]">recent_patient</span></div><span class="text-[10px] font-bold mt-0.5">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[22px]">settings</span></div><span class="text-[10px] font-bold mt-0.5">參數</span></button>
  </nav>
</div>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-bold flex items-center gap-2 w-max max-w-[90vw] opacity-0 pointer-events-none"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null;
  let isProcessing = false;

  function setButtonLoading(btnId, isLoading, originalText = '') {
      const btn = document.getElementById(btnId);
      if (!btn) return false;
      if (isLoading) {
          if (!btn.dataset.oriText) btn.dataset.oriText = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px] align-middle">refresh</span> 處理中...';
          btn.classList.add('opacity-50', 'pointer-events-none');
          return true;
      } else {
          btn.innerHTML = originalText || btn.dataset.oriText || '送出';
          btn.classList.remove('opacity-50', 'pointer-events-none');
          return false;
      }
  }

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
      const resText = await response.text();
      let result; 
      try { result = JSON.parse(resText); } catch(e) { throw new Error(`連線錯誤，請確認 GAS 權限。`); }
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) { 
      showToast(err.message, true); 
      throw err; 
    }
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e?'error':'check_circle'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-bold transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`; 
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; }, 3000); 
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');
      
      if (ADMIN_IDS.includes(userProfile.userId)) {
          document.getElementById('view-loading').classList.add('hidden');
          document.getElementById('view-admin-create').classList.remove('hidden');
      } else {
          window.location.href = 'index.html';
      }
    } catch (err) { 
      document.getElementById('view-loading').innerHTML = `<p class="text-error font-bold">${err.message}</p>`;
    }
  };

  function toggleCreateMode(m) { 
    document.getElementById('tab-quick').className = `flex-1 py-2 rounded-md text-[14px] font-bold transition-all ${m==='quick'?'bg-white text-primary shadow-sm':'text-slate-500 hover:text-slate-700'}`; 
    document.getElementById('tab-detailed').className = `flex-1 py-2 rounded-md text-[14px] font-bold transition-all ${m==='detailed'?'bg-white text-primary shadow-sm':'text-slate-500 hover:text-slate-700'}`; 
    document.getElementById('form-quick').classList.toggle('hidden', m!=='quick'); 
    document.getElementById('form-detailed').classList.toggle('hidden', m!=='detailed'); 
  }
  
  function toggleFeeInput() { 
      document.getElementById('detail-price').classList.toggle('hidden', document.querySelector('input[name="fee-type"]:checked').value !== '收費'); 
  }
  
  function previewFile(mode) { 
    const f = document.getElementById(`file-input-${mode}`).files[0]; 
    if(!f) return; 
    showToast("壓縮中...", false);
    const r = new FileReader(); 
    r.onloadend = () => { 
      const img = new Image(); 
      img.onload = () => { 
        let w = img.width, h = img.height, max = 500; 
        if(w > max){h=Math.round(h*(max/w)); w=max;} 
        const cvs = document.createElement('canvas'); cvs.width=w; cvs.height=h; 
        const ctx=cvs.getContext('2d'); ctx.fillStyle='#FFF'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); 
        
        let quality = 0.8;
        let b64=cvs.toDataURL('image/webp', quality); 
        
        while (b64.length > 40000 && quality > 0.1) { quality -= 0.1; b64 = cvs.toDataURL('image/webp', quality); }
        if (b64.length > 49000) return showToast("圖片過大", true);
        
        document.getElementById(`image-preview-${mode}`).src=b64; 
        document.getElementById(`image-preview-${mode}`).classList.remove('hidden'); 
        document.getElementById(`preview-placeholder-${mode}`).classList.add('hidden'); 
        document.getElementById(`in-image-url-${mode}`).value=b64; 
        showToast("完成");
      }; 
      img.src=r.result; 
    }; 
    r.readAsDataURL(f); 
  }

  async function handleCreateActivity(mode) { 
    if(isProcessing) return; isProcessing=true; 
    const btnId = mode === 'quick' ? 'btn-quick-create' : 'btn-detail-create';
    const btnHtml = mode === 'quick' ? '建立活動 <span class="material-symbols-outlined text-[20px]">add_circle</span>' : '發布活動頁面 <span class="material-symbols-outlined text-[20px]">rocket_launch</span>';
    setButtonLoading(btnId, true);
    
    let p = { 
        activityName: document.getElementById(mode === 'quick' ? 'quick-name' : 'detail-name').value.trim(), 
        activityType: document.getElementById(mode === 'quick' ? 'quick-type' : 'detail-type').value, 
        feeType: '免費', 
        price: '', 
        startTime: '', 
        endTime: '', 
        description: '', 
        imageUrl: '', 
        names: [], 
        defaultIdentity: document.getElementById(mode === 'quick' ? 'quick-identity' : 'detail-identity').value 
    }; 
    
    if(!p.activityName) { isProcessing=false; setButtonLoading(btnId, false, btnHtml); return showToast("名稱必填", true); }
    
    if(mode==='quick') {
        p.names = document.getElementById('quick-names').value.split('\n').filter(n=>n.trim()); 
        p.imageUrl = document.getElementById('in-image-url-quick').value;
    } else { 
        p.feeType = document.querySelector('input[name="fee-type"]:checked').value; 
        p.price = document.getElementById('detail-price').value; 
        p.startTime = document.getElementById('detail-start').value; 
        p.endTime = document.getElementById('detail-end').value; 
        p.description = document.getElementById('detail-desc').value; 
        p.imageUrl = document.getElementById('in-image-url-create').value; 
    }
    
    try { 
      await fetchAPI('bulkAddRegistrants', p); 
      showToast("已建立"); 
      sessionStorage.removeItem('getActivityDashboard{}'); 
      setTimeout(()=> window.location.href = 'index.html?view=admin-activities', 1000); 
    } catch(e){
      console.error(e);
    } finally{ 
      isProcessing=false; setButtonLoading(btnId, false, btnHtml); 
    }
  }
</script>
</body>
</html>
