<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>建立活動</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#06C755", 
            "primary-light": "#e6f9ed", 
            background: "#f8fafc", 
            "text-main": "#0f172a"
          },
          fontFamily: { 
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"] 
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    
    body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
    input, textarea, select { -webkit-user-select: auto; user-select: auto; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .input-label { @apply block text-[13px] text-slate-500 mb-1.5 font-bold tracking-wide pl-1; }
    select.custom-input { -webkit-appearance: none !important; appearance: none !important; background-image: none !important; }
    
    /* 原生無框設計規範 */
    .custom-input { @apply w-full h-[50px] px-4 bg-slate-100 border-none rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all font-medium text-slate-800 text-[15px] placeholder-slate-400; }
    .textarea-block { @apply w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all text-[15px] text-slate-800 resize-none leading-relaxed placeholder-slate-400; }
    
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold text-[16px] shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2; }
    
    /* 底部導覽列樣式同步 */
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; min-width: 48px;}
    .nav-btn .icon-box { @apply px-4 py-1.5 rounded-2xl transition-all flex items-center justify-center mb-0.5; }
    .nav-active { @apply text-slate-800 font-bold; }
    .nav-active .icon-box { @apply bg-slate-100 text-slate-800; }
    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center">

<div class="w-full max-w-md h-screen relative flex flex-col overflow-hidden bg-background shadow-2xl">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/90 backdrop-blur-md px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-100">
    <div class="text-[20px] font-extrabold text-slate-800 tracking-tight flex items-center gap-1">
      建立活動
    </div>
    <button onclick="window.location.href='index.html?view=admin-activities'" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
      <span class="material-symbols-outlined text-[20px]">close</span>
    </button>
  </nav>

  <main class="flex-1 overflow-y-auto pb-32 pt-20 px-4 space-y-6">
    
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20 relative">
      <div class="w-10 h-10 border-4 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p class="text-slate-500 font-bold tracking-widest text-[13px]">權限驗證中</p>
    </div>

    <div id="form-content" class="hidden animate-in fade-in duration-300">
      
      <!-- ⭐ 藍色分頁切換器 (符合截圖設計) -->
      <div class="flex p-1.5 rounded-[1rem] bg-blue-50/60 border border-blue-100/50 mb-6 mx-1">
        <button id="tab-btn-quick" onclick="switchTab('quick')" class="flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-white text-blue-600 shadow-sm transition-all">快速匯入</button>
        <button id="tab-btn-full" onclick="switchTab('full')" class="flex-1 py-2.5 rounded-xl text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700 bg-transparent">完整發佈</button>
        <button id="tab-btn-series" onclick="switchTab('series')" class="flex-1 py-2.5 rounded-xl text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700 bg-transparent">系列梯次</button>
      </div>

      <!-- Tab 1: 快速匯入 -->
      <div id="tab-content-quick" class="space-y-5 bg-white p-5 rounded-[2rem] shadow-sm mx-1">
        <div class="flex flex-col">
            <label class="input-label">活動名稱</label>
            <input type="text" id="q-name" class="custom-input" placeholder="例如：2026 商務交流會">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col">
                <label class="input-label">活動類型</label>
                <input type="text" id="q-type" class="custom-input" placeholder="例會" value="例會">
            </div>
            <div class="flex flex-col">
                <label class="input-label">預設身份</label>
                <input type="text" id="q-identity" class="custom-input" placeholder="會員" value="會員">
            </div>
        </div>

        <!-- 快速匯入：收費選項 -->
        <div class="flex flex-col">
            <label class="input-label">收費方式</label>
            <div class="flex items-center gap-6 p-4 bg-slate-50 rounded-2xl">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="q-fee-type" value="免費" checked class="w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500 focus:ring-offset-0 bg-white" onchange="togglePrice('q')">
                    <span class="text-[15px] font-bold text-slate-700">免費</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="q-fee-type" value="收費" class="w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500 focus:ring-offset-0 bg-white" onchange="togglePrice('q')">
                    <span class="text-[15px] font-bold text-slate-700">收費</span>
                </label>
            </div>
            <div id="q-price-box" class="hidden mt-3 animate-in slide-in-from-top-2">
                <div class="relative">
                  <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">NT$</span>
                  <input type="number" id="q-price" class="custom-input !pl-12" placeholder="請輸入金額">
                </div>
            </div>
        </div>

        <div class="flex flex-col">
            <label class="input-label">名單內容 (每行一位)</label>
            <textarea id="q-names" class="textarea-block h-40" placeholder="王小明&#10;李小華"></textarea>
        </div>
        
        <div class="pt-2">
            <button onclick="handleSubmit('quick')" id="btn-submit-quick" class="btn-primary">建立並匯入名單</button>
        </div>
      </div>

      <!-- Tab 2: 完整發佈 -->
      <div id="tab-content-full" class="hidden space-y-5 bg-white p-5 rounded-[2rem] shadow-sm mx-1">
        <div class="flex flex-col">
            <label class="input-label">活動標題</label>
            <input type="text" id="f-name" class="custom-input" placeholder="輸入活動標題">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col">
                <label class="input-label">開始時間</label>
                <input type="datetime-local" id="f-start" class="custom-input !px-3 text-slate-600">
            </div>
            <div class="flex flex-col">
                <label class="input-label">結束時間</label>
                <input type="datetime-local" id="f-end" class="custom-input !px-3 text-slate-600">
            </div>
        </div>

        <!-- 完整發佈：收費選項 -->
        <div class="flex flex-col">
            <label class="input-label">收費方式</label>
            <div class="flex items-center gap-6 p-4 bg-slate-50 rounded-2xl">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="f-fee-type" value="免費" checked class="w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500 focus:ring-offset-0 bg-white" onchange="togglePrice('f')">
                    <span class="text-[15px] font-bold text-slate-700">免費</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="f-fee-type" value="收費" class="w-5 h-5 text-blue-600 border-slate-300 focus:ring-blue-500 focus:ring-offset-0 bg-white" onchange="togglePrice('f')">
                    <span class="text-[15px] font-bold text-slate-700">收費</span>
                </label>
            </div>
            <div id="f-price-box" class="hidden mt-3 animate-in slide-in-from-top-2">
                <div class="relative">
                  <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">NT$</span>
                  <input type="number" id="f-price" class="custom-input !pl-12" placeholder="請輸入金額">
                </div>
            </div>
        </div>

        <div class="flex flex-col">
            <label class="input-label">封面圖片網址</label>
            <input type="url" id="f-img" class="custom-input" placeholder="https://...">
        </div>

        <div class="flex flex-col">
            <label class="input-label">活動說明</label>
            <textarea id="f-desc" class="textarea-block h-32" placeholder="輸入活動詳細說明..."></textarea>
        </div>
        
        <div class="pt-2">
            <button onclick="handleSubmit('full')" id="btn-submit-full" class="btn-primary">確認建立並發佈</button>
        </div>
      </div>

      <!-- Tab 3: 系列梯次 (Placeholder) -->
      <div id="tab-content-series" class="hidden space-y-5 bg-white p-8 rounded-[2rem] shadow-sm mx-1 text-center">
         <span class="material-symbols-outlined text-[48px] text-slate-300 mb-3">construction</span>
         <h3 class="text-lg font-black text-slate-800">系列梯次模組</h3>
         <p class="text-sm text-slate-500 font-medium">多梯次、多票種模組建置中，敬請期待。</p>
      </div>

    </div>
  </main>

  <nav id="bottom-nav-admin" class="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-evenly items-center px-2 py-2 z-[80] pb-safe shadow-[0_-4px_15px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[76px] rounded-t-3xl">
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">fact_check</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">核銷</span></button>
    <button onclick="window.location.href='active.html'" class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">add_circle</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">groups</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">psychology</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">recent_patient</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">settings</span></div><span class="text-[10px] mt-1 font-bold whitespace-nowrap">參數</span></button>
  </nav>

</div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm";
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev";
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
  
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      const profile = await liff.getProfile();
      if (!ADMIN_IDS.includes(profile.userId)) { 
          alert("無權限存取此頁面");
          window.location.href = 'index.html'; 
          return; 
      }
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('form-content').classList.remove('hidden');
    } catch(e) { 
        alert("LINE 初始化失敗，請重新載入"); 
    }
  });

  // UI 切換邏輯
  function switchTab(tabId) {
      ['quick', 'full', 'series'].forEach(id => {
          document.getElementById(`tab-content-${id}`).classList.add('hidden');
          const btn = document.getElementById(`tab-btn-${id}`);
          btn.className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold text-slate-500 transition-all hover:text-slate-700 bg-transparent';
      });
      
      document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
      const activeBtn = document.getElementById(`tab-btn-${tabId}`);
      activeBtn.className = 'flex-1 py-2.5 rounded-xl text-[14px] font-bold bg-white text-blue-600 shadow-sm transition-all';
  }

  function togglePrice(prefix) {
      const feeType = document.querySelector(`input[name="${prefix}-fee-type"]:checked`).value;
      const priceBox = document.getElementById(`${prefix}-price-box`);
      if (feeType === '收費') {
          priceBox.classList.remove('hidden');
      } else {
          priceBox.classList.add('hidden');
          document.getElementById(`${prefix}-price`).value = '';
      }
  }

  // 統一的 API 發送邏輯
  async function handleSubmit(mode) {
      let payload = {};
      
      if (mode === 'quick') {
          const name = document.getElementById('q-name').value.trim();
          const type = document.getElementById('q-type').value.trim() || '例會';
          const identity = document.getElementById('q-identity').value.trim() || '會員';
          const feeType = document.querySelector('input[name="q-fee-type"]:checked').value;
          const price = feeType === '收費' ? (document.getElementById('q-price').value || 0) : 0;
          const names = document.getElementById('q-names').value.split('\n').filter(n => n.trim());

          if(!name) return alert('⚠️ 請輸入活動名稱');
          if(feeType === '收費' && (!price || price <= 0)) return alert('⚠️ 請輸入正確的收費金額');

          payload = {
              activityName: name,
              activityType: type,
              defaultIdentity: identity,
              feeType: feeType,
              price: price,
              names: names,
              startTime: '', endTime: '', description: '', imageUrl: ''
          };
          
      } else if (mode === 'full') {
          const name = document.getElementById('f-name').value.trim();
          const start = document.getElementById('f-start').value;
          const end = document.getElementById('f-end').value;
          const feeType = document.querySelector('input[name="f-fee-type"]:checked').value;
          const price = feeType === '收費' ? (document.getElementById('f-price').value || 0) : 0;
          const desc = document.getElementById('f-desc').value.trim();
          const img = document.getElementById('f-img').value.trim();

          if(!name) return alert('⚠️ 請輸入活動標題');
          if(feeType === '收費' && (!price || price <= 0)) return alert('⚠️ 請輸入正確的收費金額');

          payload = {
              activityName: name,
              activityType: '一般',
              defaultIdentity: '會員',
              feeType: feeType,
              price: price,
              names: [],
              startTime: start,
              endTime: end,
              description: desc,
              imageUrl: img
          };
      }

      const btn = document.getElementById(`btn-submit-${mode}`);
      const originalText = btn.innerText;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-1 text-[20px]">refresh</span> 處理中...'; 
      btn.disabled = true;
      btn.classList.add('opacity-70');

      try {
        const res = await fetch(WORKER_URL, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'bulkAddRegistrants', payload: payload }) 
        });
        
        const json = await res.json();
        
        if (json.success) { 
            alert('🎉 活動建立成功！即將為您導向核銷頁面。'); 
            window.location.href = 'index.html?view=admin-activities'; 
        } else {
            throw new Error(json.error || '未知錯誤');
        }
      } catch(e) { 
          alert('❌ 建立失敗: ' + e.message); 
      } finally {
          btn.innerText = originalText; 
          btn.disabled = false; 
          btn.classList.remove('opacity-70');
      }
  }
</script>
</body>
</html>
