<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <link rel="icon" href="data:,">
  <title>名片管理中樞</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <script src="liff-share.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2563eb", 
            "primary-light": "#eff6ff",
            background: "#ffffff",
            "text-main": "#0f172a",
            "text-muted": "#64748b",
            error: "#ef4444" 
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"],
          }
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[13px] font-bold text-slate-500 mb-2 uppercase tracking-wider; }
    select.custom-input { -webkit-appearance: none !important; -moz-appearance: none !important; appearance: none !important; background-image: none !important; }
    .custom-input { @apply w-full h-[48px] px-4 bg-slate-50 border border-transparent rounded-xl outline-none focus:bg-white focus:border-primary/30 focus:ring-4 focus:ring-primary/10 transition-all font-medium text-slate-800 text-[15px] shadow-sm placeholder-slate-400; }
    .textarea-block { @apply w-full p-4 bg-slate-50 border border-transparent rounded-xl outline-none focus:bg-white focus:border-primary/30 focus:ring-4 focus:ring-primary/10 transition-all text-[15px] text-slate-800 resize-none leading-relaxed shadow-sm placeholder-slate-400; }
    
    .btn-primary { @apply w-full py-3 bg-primary text-white rounded-xl font-bold text-[16px] shadow-md shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-blue-700; }
    .btn-secondary { @apply w-full py-3 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold text-[16px] hover:bg-slate-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm; }
    
    .tab-btn { @apply flex-1 py-3 text-[14px] font-normal transition-all text-slate-500 border-b-2 border-transparent; }
    .tab-active { @apply text-primary border-primary font-bold; }

    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full; min-width: 48px; }
    .nav-active-btn { @apply text-text-main font-bold; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1; color: #1e293b; }

    .cropper-view-box, .cropper-face { border-radius: 4px; }
    .cropper-line { background-color: #2563eb; opacity: 0.5; }
    .cropper-point { background-color: #2563eb; }

    .phone-frame { border: 10px solid #1e293b; border-radius: 3rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); background-color: #849ebf; position: relative; overflow: hidden; }
    .phone-notch { width: 45%; height: 26px; background-color: #1e293b; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 20; }
    .flex-preview-bubble { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; width: 100%; border: 1px solid #edf2f7; }
    .flex-preview-img { width: 100%; object-fit: cover; background-color: #f1f5f9; transition: aspect-ratio 0.3s ease, object-fit 0.3s ease; }
    
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center bg-slate-50">

<div class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-slate-200 shadow-sm">
    <div class="text-[19px] font-extrabold text-slate-800 flex items-center gap-2 font-headline tracking-tight">
      <div class="w-8 h-8 rounded-lg bg-primary text-white flex items-center justify-center shadow-sm">
        <span class="material-symbols-outlined text-[20px]">contact_mail</span>
      </div>
      名片管理
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border border-slate-200 shadow-sm">
      </div>
      <button id="role-switch-btn" onclick="window.location.href='index.html'" class="w-9 h-9 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center active:scale-95 transition-all hover:bg-slate-200">
        <span class="material-symbols-outlined text-[20px]">swap_horiz</span>
      </button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 bg-slate-50">
    
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin"></div>
      <p id="loading-text" class="text-slate-500 font-bold text-[13px] tracking-wider">資料載入中</p>
    </div>

    <!-- 主畫面 -->
    <div id="view-list" class="hidden animate-in fade-in">
      <div id="admin-tools-container" class="px-5 pt-4">
        <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-slate-100">
          <div class="w-12 h-12 bg-primary-light text-primary rounded-full flex items-center justify-center mx-auto mb-3">
            <span class="material-symbols-outlined text-[24px]">document_scanner</span>
          </div>
          <h2 class="text-[16px] font-bold text-slate-800 mb-1">AI 智慧名片辨識</h2>
          <p class="text-[13px] text-slate-500 mb-5 font-medium">對準名片拍照或上傳圖檔，自動擷取聯絡資訊。</p>
          
          <div class="flex gap-3">
            <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-[1.2]">
              <span class="material-symbols-outlined text-[20px]">photo_camera</span> 開啟相機
            </button>
            <button onclick="document.getElementById('card-upload').click()" class="btn-secondary flex-1">
              <span class="material-symbols-outlined text-[20px]">image</span> 從相簿
            </button>
          </div>
          
          <div class="text-center mt-4">
            <button id="btn-batch-regenerate" onclick="batchRegenerateECards()" class="text-[12px] text-slate-400 hover:text-primary transition-colors font-bold flex items-center justify-center mx-auto gap-1 active:scale-95">
              <span class="material-symbols-outlined text-[15px]">sync</span> 批次重新讀取寫入所有名片按鈕 (套用新版設定)
            </button>
          </div>

          <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="openCropper(this)">
          <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="openCropper(this)">
        </div>
      </div>

      <div class="mt-6" id="admin-search-container">
        <div class="px-5 mb-3">
          <div class="relative flex flex-col">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span>
            <input type="text" id="card-search-input" onkeyup="filterCardList()" class="w-full h-[48px] pl-11 pr-4 bg-white border border-transparent rounded-xl text-[15px] outline-none focus:ring-4 focus:ring-primary/10 transition-all shadow-sm font-medium" placeholder="搜尋姓名或公司...">
          </div>
        </div>
        <div id="admin-card-list-container" class="flex flex-col mt-2"></div>
        <div id="card-load-more-box" class="hidden py-6 text-center">
          <button onclick="loadMoreCards()" class="text-slate-600 font-bold text-[14px] px-6 py-2.5 bg-white shadow-sm rounded-full active:scale-95 transition-all">
            顯示更多名片
          </button>
        </div>
      </div>
    </div>

    <!-- AI 處理與確認表單 -->
    <div id="view-process" class="hidden space-y-6 animate-in fade-in pt-4 px-5">
      <div class="flex items-center gap-3 mb-2">
        <button onclick="resetUI()" class="w-9 h-9 bg-white rounded-full flex items-center justify-center text-slate-600 shadow-sm active:scale-90 transition-all"><span class="material-symbols-outlined text-[20px]">arrow_back</span></button>
        <h2 class="text-[20px] font-bold text-slate-800 tracking-tight">辨識結果確認</h2>
      </div>

      <div id="section-loading" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center mt-6">
        <span class="material-symbols-outlined text-4xl text-primary animate-spin mb-3 inline-block">autorenew</span>
        <h3 class="text-[16px] font-bold text-slate-800 mb-1">AI 辨識中...</h3>
        <p class="text-[13px] text-slate-500">正在萃取名片與擴寫行銷標語，請稍候。</p>
      </div>

      <div id="section-form" class="hidden space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <div class="mb-5 rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center min-h-[150px] shadow-inner">
            <img id="process-preview-image" src="" class="w-full h-auto object-contain max-h-[200px]">
          </div>

          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col"><label class="input-label">姓名</label><input type="text" id="f-Name" class="custom-input"></div>
              <div class="flex flex-col"><label class="input-label">英文名</label><input type="text" id="f-EnglishName" class="custom-input"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col"><label class="input-label">職稱</label><input type="text" id="f-Title" class="custom-input"></div>
              <div class="flex flex-col"><label class="input-label">部門</label><input type="text" id="f-Department" class="custom-input"></div>
            </div>
            <div class="flex flex-col"><label class="input-label">公司名稱</label><input type="text" id="f-CompanyName" class="custom-input"></div>
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col"><label class="input-label">統一編號</label><input type="text" id="f-TaxID" class="custom-input"></div>
              <div class="flex flex-col"><label class="input-label">手機號碼</label><input type="tel" id="f-Mobile" class="custom-input"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="flex flex-col"><label class="input-label">公司電話</label><input type="text" id="f-Tel" class="custom-input"></div>
              <div class="flex flex-col"><label class="input-label">分機</label><input type="text" id="f-Ext" class="custom-input"></div>
            </div>
            <div class="flex flex-col"><label class="input-label">傳真</label><input type="text" id="f-Fax" class="custom-input"></div>
            <div class="flex flex-col"><label class="input-label">公司地址</label><input type="text" id="f-Address" class="custom-input"></div>
            <div class="flex flex-col"><label class="input-label">電子信箱</label><input type="email" id="f-Email" class="custom-input"></div>
            <div class="flex flex-col"><label class="input-label">公司網址</label><input type="url" id="f-Website" class="custom-input"></div>
            <div class="flex flex-col"><label class="input-label">社群帳號 / ID</label><input type="text" id="f-SocialMedia" class="custom-input"></div>
            <div class="flex flex-col"><label class="input-label flex items-center gap-1">品牌標語 <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded">AI 擴寫</span></label><textarea id="f-Slogan" class="textarea-block h-28"></textarea></div>
            <div class="flex flex-col pt-4 border-t border-slate-100 mt-4">
              <label class="input-label text-primary">內部建檔備註 (手動輸入)</label>
              <textarea id="f-Notes" class="textarea-block h-20" placeholder="例如：展覽認識、Wilson 介紹"></textarea>
            </div>
          </div>

          <div class="flex gap-3 mt-8">
            <button onclick="resetUI()" class="w-1/3 py-3.5 bg-slate-100 text-slate-600 rounded-xl font-bold text-[15px] active:scale-95 transition-all">取消</button>
            <button id="btn-save" onclick="saveToCloud()" class="flex-1 btn-primary">存入雲端 <span class="material-symbols-outlined text-[18px]">cloud_upload</span></button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-200 flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[72px]">
    <button onclick="window.location.href='index.html?view=admin-activities'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">fact_check</span></div><span class="text-[10px] font-bold tracking-wide mt-1">核銷</span></button>
    <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">add_circle</span></div><span class="text-[10px] font-bold tracking-wide mt-1">建立</span></button>
    <button onclick="window.location.href='index.html?view=admin-crm'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">groups</span></div><span class="text-[10px] font-bold tracking-wide mt-1">CRM</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">psychology</span></div><span class="text-[10px] font-bold tracking-wide mt-1">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn nav-active-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">recent_patient</span></div><span class="text-[10px] font-bold tracking-wide mt-1">名片</span></button>
    <button onclick="window.location.href='index.html?view=admin-settings'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">settings</span></div><span class="text-[10px] font-bold tracking-wide mt-1">參數</span></button>
  </nav>
</div>

<!-- 名片詳情 Modal -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-white flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0 shadow-2xl overflow-hidden" style="z-index: 1000;">
  <div class="absolute top-4 right-4 z-50 flex gap-2">
    <button onclick="openCardEdit()" class="w-10 h-10 bg-white/90 backdrop-blur-md rounded-full flex items-center justify-center text-primary shadow-md"><span class="material-symbols-outlined text-[20px]">edit</span></button>
    <button onclick="closeReadOnlyCard()" class="w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-md"><span class="material-symbols-outlined text-[20px]">close</span></button>
  </div>

  <div class="flex-1 overflow-y-auto pb-24 bg-white">
    <div class="w-full h-[280px] bg-slate-100 relative flex items-center justify-center shrink-0 shadow-inner">
      <img id="ro-image" src="" class="w-full h-full object-cover hidden">
      <div id="ro-no-image" class="absolute inset-0 flex items-center justify-center bg-slate-100"><span class="material-symbols-outlined text-6xl text-slate-300">contact_mail</span></div>
      <div class="absolute inset-x-0 bottom-0 h-12 bg-gradient-to-t from-white to-transparent"></div>
    </div>
    
    <div class="bg-white relative z-10 px-6 pb-6 -mt-2 space-y-6">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <h2 id="ro-name" class="text-[24px] font-black text-slate-800 tracking-tight">姓名</h2>
          <span id="ro-claim-status" class="hidden px-2.5 py-0.5 rounded-md text-[11px] font-bold"></span>
        </div>
        <p id="ro-title" class="text-[15px] font-medium text-slate-500">職稱 / 部門</p>
      </div>
      
      <div class="bg-slate-50 rounded-2xl p-5 space-y-4">
        <div class="flex items-center gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px]">apartment</span><span id="ro-company" class="text-slate-800 text-[15px] font-medium"></span></div>
        <div class="flex items-center gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px]">tag</span><span id="ro-taxid" class="text-slate-800 text-[15px] font-medium"></span></div>
        <div class="flex items-center gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px]">smartphone</span><a href="" id="ro-mobile-link" class="text-blue-600 font-bold text-[15px]"></a></div>
        <div class="flex items-center gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px]">call</span><span id="ro-tel" class="text-slate-800 text-[15px] font-medium"></span></div>
        <div class="flex items-center gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px]">email</span><a href="" id="ro-email-link" class="text-blue-600 font-bold text-[15px] truncate"></a></div>
        <div class="flex items-start gap-4"><span class="material-symbols-outlined text-slate-400 text-[20px] mt-0.5">location_on</span><span id="ro-address" class="text-slate-800 text-[15px] font-medium leading-snug"></span></div>
      </div>
      
      <div id="ro-fate-tags-container" style="display:none;"></div>

      <div id="ro-notes-container">
        <h3 class="text-[14px] font-bold text-slate-400 uppercase tracking-widest mb-3">備註與其他</h3>
        <p id="ro-notes" class="text-[15px] text-slate-700 leading-relaxed whitespace-pre-wrap break-all font-medium"></p>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-100 p-4 pb-safe flex gap-3 z-[1005] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] shrink-0">
    <button id="btn-share-claim" onclick="shareClaimLink()" class="flex-1 py-3.5 bg-slate-100 text-slate-700 rounded-xl font-bold text-[16px] shadow-sm active:scale-95 transition-all">邀請認領</button>
    <button onclick="openECardGenerator()" class="flex-1 py-3.5 bg-[#06C755] text-white rounded-xl font-bold text-[16px] shadow-md shadow-green-500/30 active:scale-95 transition-all">產生數位名片</button>
  </div>
</div>

<!-- 名片編輯 Modal -->
<div id="card-edit-modal" class="hidden fixed inset-0 bg-slate-50 flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0 shadow-2xl overflow-hidden" style="z-index: 1010;">
  <div class="bg-white px-5 py-4 flex justify-between items-center border-b border-slate-100 shrink-0 shadow-sm">
    <h3 class="text-[18px] font-extrabold text-slate-800">編輯名片資料</h3>
    <button onclick="closeCardEdit()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-90 transition-transform"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div class="flex-1 overflow-y-auto px-5 py-6 space-y-6 pb-28">
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label">姓名</label><input type="text" id="edit-c-Name" class="custom-input"></div>
      <div class="flex flex-col"><label class="input-label">英文名</label><input type="text" id="edit-c-EnglishName" class="custom-input"></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label">職稱</label><input type="text" id="edit-c-Title" class="custom-input"></div>
      <div class="flex flex-col"><label class="input-label">部門</label><input type="text" id="edit-c-Department" class="custom-input"></div>
    </div>
    <div class="flex flex-col"><label class="input-label">公司名稱</label><input type="text" id="edit-c-CompanyName" class="custom-input"></div>
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label">統一編號</label><input type="text" id="edit-c-TaxID" class="custom-input"></div>
      <div class="flex flex-col"><label class="input-label">手機號碼</label><input type="tel" id="edit-c-Mobile" class="custom-input"></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label">公司電話</label><input type="text" id="edit-c-Tel" class="custom-input"></div>
      <div class="flex flex-col"><label class="input-label">分機</label><input type="text" id="edit-c-Ext" class="custom-input"></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label">電子信箱</label><input type="email" id="edit-c-Email" class="custom-input"></div>
      <div class="flex flex-col"><label class="input-label">傳真</label><input type="text" id="edit-c-Fax" class="custom-input"></div>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col"><label class="input-label text-primary">生日 (觸發深度命理)</label><input type="date" id="edit-c-Birthday" class="custom-input !text-[13px] border border-primary/20 bg-blue-50/30"></div>
      <div class="flex flex-col"><label class="input-label">社群帳號</label><input type="text" id="edit-c-SocialMedia" class="custom-input"></div>
    </div>

    <div class="flex flex-col"><label class="input-label">公司地址</label><input type="text" id="edit-c-Address" class="custom-input"></div>
    <div class="flex flex-col"><label class="input-label">公司網址</label><input type="url" id="edit-c-Website" class="custom-input"></div>
    <div class="flex flex-col"><label class="input-label">品牌標語 / 服務項目</label><textarea id="edit-c-Slogan" class="textarea-block h-24"></textarea></div>
    <div class="flex flex-col pt-4 border-t border-slate-200 mt-4"><label class="input-label text-primary">內部建檔備註</label><textarea id="edit-c-Notes" class="textarea-block h-24"></textarea></div>
  </div>
  <div class="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-slate-100 p-4 pb-safe z-[1015]">
    <button id="btn-save-card-edit" onclick="submitCardEdit()" class="btn-primary">儲存變更</button>
  </div>
</div>
