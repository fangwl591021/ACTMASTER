  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: "#2563eb", 
            "primary-light": "#eff6ff", 
            background: "#ffffff", 
            "text-main": "#333333",

            error: "#ef4444"

            sans: ["Inter", "Noto Sans TC", "sans-serif"]

  <style type="text/tailwindcss">
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; font-size: 15px; color: #333333; font-weight: 400; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    
    .input-label { @apply block text-[15px] text-[#64748b] mb-1.5 font-normal tracking-wide; }
    select.custom-input { -webkit-appearance: none !important; appearance: none !important; background-image: none !important; }
    .custom-input { @apply w-full py-3 px-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-primary transition-all text-text-main text-[15px]; }
    .custom-input::placeholder { @apply text-slate-400 font-normal; }
    
    .btn-primary { @apply w-full py-4 bg-[#06C755] text-white rounded-xl font-normal text-[16px] active:scale-[0.98] transition-all flex items-center justify-center gap-2; }
    .btn-secondary { @apply w-full py-3 bg-white border border-slate-300 text-slate-700 rounded-xl font-normal text-[16px] hover:bg-slate-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm; }
    
    /* 底部選單：全黑選取風格 (1.3.1 版後統一標準) */
    .nav-btn { @apply flex flex-col items-center justify-center transition-all flex-1 text-slate-400 h-full font-normal; min-width: 48px;}
    .nav-btn .icon-box { @apply flex items-center justify-center mb-0.5; }
    .nav-btn .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; font-size: 24px; color: inherit; }
    
    .nav-active-btn { @apply text-black font-normal; }
    .nav-active-btn .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; color: #000000; }

    .refresh-spin { animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>

    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">psychology</span></div><span class="text-[10px] mt-0.5">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined">recent_patient</span></div><span class="text-[10px] mt-0.5">名片</span></button>
    <button onclick="switchView('admin-settings')" class="nav-btn" id="nav-admin-settings"><div class="icon-box"><span class="material-symbols-outlined">settings</span></div><span class="text-[10px] mt-0.5">參數</span></button>

    <button onclick="switchView('user-history')" class="nav-btn" id="nav-user-history"><div class="icon-box"><span class="material-symbols-outlined">receipt_long</span></div><span class="text-[11px] mt-0.5 font-normal">紀錄</span></button>
    <button onclick="switchView('user-profile')" class="nav-btn" id="nav-user-profile"><div class="icon-box"><span class="material-symbols-outlined">person</span></div><span class="text-[11px] mt-0.5 font-normal">設定</span></button>

      <button onclick="closeAdminRegistrants()" class="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-500 active:scale-90 transition-all"><span class="material-symbols-outlined text-[20px]">arrow_back</span></button>

    <button onclick="document.getElementById('qr-scanner-modal').classList.remove('hidden'); startScanner();" class="px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-lg font-normal text-[13px] flex items-center gap-1 active:scale-95 shadow-sm border border-emerald-100"><span class="material-symbols-outlined text-[16px]">qr_code_scanner</span> 掃碼</button>
  </div>

     <div class="relative flex-1 flex flex-col"><span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[18px]">search</span><input type="text" id="admin-search-reg" onkeyup="filterAdminReg()" class="w-full py-2.5 pl-9 pr-3 bg-slate-50 border border-slate-200 rounded-lg text-[13px] outline-none focus:bg-white focus:ring-1 focus:ring-primary" placeholder="搜尋姓名或電話..."></div>
     <button onclick="document.getElementById('walkin-modal').classList.remove('hidden')" class="w-10 h-10 bg-primary-light text-primary rounded-lg flex items-center justify-center active:scale-90 transition-all"><span class="material-symbols-outlined text-[20px]">person_add</span></button>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal flex items-center gap-2 w-max max-w-[90vw] opacity-0 pointer-events-none bg-slate-800 text-white"></div>

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 
  
  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let globalPublicActivities = [], currentActivities = [], currentRegistrants = [], activeActivityName = '';
  let globalCrmData = [], filteredCrmData = [], crmPageLimit = 10, currentCrmViewCount = 10;
  let isProcessing = false;

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login({ redirectUri: window.location.href }); return; }
      userProfile = await liff.getProfile();
      
      const avatarEl = document.getElementById('user-avatar');
      if (avatarEl) avatarEl.src = userProfile.pictureUrl || '';
      const badgeEl = document.getElementById('user-profile-badge');
      if (badgeEl) badgeEl.classList.remove('hidden');
      
      // ⭐ 核心修復：強制重置 Admin 狀態，防止渲染洩露
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const rsb = document.getElementById('role-switch-btn');
      const hab = document.getElementById('header-admin-badge');
      
      if (isAdmin) {
          rsb.classList.remove('hidden');
          hab.classList.remove('hidden');
          isViewModeAdmin = true; 
      } else {
          rsb.classList.add('hidden');
          hab.classList.add('hidden');
          isViewModeAdmin = false;
      }
      
      const res = await fetchAPI('checkUser', { userId: userProfile.userId });
      isRegistered = res.isRegistered; registeredInfo = res.info;
      
      const params = new URLSearchParams(window.location.search);
      const claimCardId = params.get('claimCardId');
      window.claimCardId = claimCardId;

      document.getElementById('view-loading').classList.add('hidden'); 
      
      if (!isRegistered) {
          switchView('user-register');
          document.getElementById('reg-name').value = userProfile.displayName;
          if (claimCardId) showToast("認領邀請已偵測，請先註冊會員");
      } else {
          if (claimCardId) await handleClaimRequest(claimCardId);
          switchView(isViewModeAdmin ? 'admin-activities' : 'user-activities');
      }
    } catch (err) { 
      document.getElementById('view-loading').classList.add('hidden');
      showToast("載入中斷：" + err.message, true);
    }
  });

  // ⭐ 核心安全：視圖切換鎖
  function switchView(view) {
    if (!isAdmin && view.startsWith('admin')) {
        view = isRegistered ? 'user-activities' : 'user-register';
    }
    
    // 隱藏所有
    const views = ['view-loading', 'view-user-register', 'view-user-activities', 'view-user-profile', 'view-user-history', 'view-admin-activities', 'view-admin-crm', 'view-admin-settings'];
    views.forEach(v => { const el = document.getElementById(v); if(el) el.classList.add('hidden'); });
    
    // 顯示指定
    const activeEl = document.getElementById(`view-${view}`);
    if (activeEl) activeEl.classList.remove('hidden');
    
    // 選單控制
    const navAdmin = document.getElementById('bottom-nav-admin');
    const navUser = document.getElementById('bottom-nav-user');
    
    if (isAdmin && isViewModeAdmin && view.startsWith('admin')) {
        navAdmin.classList.remove('hidden'); navUser.classList.add('hidden');
        ['create', 'activities', 'crm', 'settings'].forEach(k => { 
            const btn = document.getElementById('nav-admin-'+k); 
            if(btn) btn.className = `nav-btn ${view==='admin-'+k ? 'nav-active-btn' : ''}`; 
        });
    } else {
        navUser.classList.remove('hidden'); navAdmin.classList.add('hidden');
        ['activities', 'history', 'profile'].forEach(k => { 
            const btn = document.getElementById('nav-user-'+k); 
            if(btn) btn.className = `nav-btn ${view==='user-'+k ? 'nav-active-btn' : ''}`; 
        });
    }
    
    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'admin-crm') loadCrmData();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-profile') {
        if(registeredInfo) { 
            ['name','gender','phone','industry','birthday'].forEach(k => { 
                if(document.getElementById('edit-'+k)) document.getElementById('edit-'+k).value=registeredInfo[k]||''; 
            }); 
        }
    }
    else if (view === 'user-history') loadUserHistory();
  }

  function toggleRoleMode() {
    if(!isAdmin) return;
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('header-admin-badge').classList.toggle('hidden', !isViewModeAdmin);
    switchView(isViewModeAdmin ? 'admin-activities' : 'user-activities');
  }

  async function handleClaimRequest(cardId) {
      showToast("正在認領專屬名片...", false);
      try {
          const cardData = await fetchAPI('getCardById', { rowId: cardId });
          if (cardData) {
              const payload = { rowId: cardId, 'LINE ID': userProfile.userId, userId: userProfile.userId, Name: registeredInfo.name, Mobile: registeredInfo.phone };
              await fetchAPI('updateCard', payload);
              showToast("✅ 名片已成功綁定至您的帳號！");
          }
      } catch(e) { showToast("認領失敗，請手動綁定", true); }
  }

  async function fetchAPI(action, payload = {}) {
    try {
      const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    } catch (err) { 
      showToast(err.message, true); 
      throw err; 
    }
  }

  function showToast(m, e=false) { 
    const t = document.getElementById('toast'); if(!t) return; 
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${e?'error':'check_circle'}</span>` + m; 
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-normal transform translate-y-0 opacity-100 ${e ? 'bg-red-500 text-white' : 'bg-slate-800 text-white'} flex items-center gap-2 w-max max-w-[90vw]`; 
    t.classList.remove('hidden');
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  }

  async function submitUserRegistration() {
    if (isProcessing) return; isProcessing = true;
    const btn = document.getElementById('btn-reg-submit');
    const oriText = btn.innerText;
    btn.innerText = '處理中...'; btn.disabled = true;
    
    const p = { 
      userId: userProfile.userId, 
      name: document.getElementById('reg-name').value.trim() || userProfile.displayName, 
      gender: document.getElementById('reg-gender').value, 
      industry: document.getElementById('reg-industry').value.trim(), 
      phone: document.getElementById('reg-phone').value.trim(), 
      birthday: document.getElementById('reg-birthday').value
    };
    
    try { 
      await fetchAPI('registerUser', p); 
      isRegistered = true; registeredInfo = p;
      showToast("註冊成功！");
      if (window.claimCardId) await handleClaimRequest(window.claimCardId);
      switchView('user-activities');
    } catch(e) {
      btn.innerText = oriText; btn.disabled = false;
    } finally { isProcessing = false; }
  }

  async function submitProfileUpdate() {
    if(isProcessing) return; isProcessing = true;
    const btn = document.getElementById('btn-save-profile');
    btn.innerText = '更新中...'; btn.disabled = true;
    
    const p = { 
        userId: userProfile.userId, 
        name: document.getElementById('edit-name').value.trim() || userProfile.displayName, 
        gender: document.getElementById('edit-gender').value, 
        phone: document.getElementById('edit-phone').value.trim(), 
        industry: document.getElementById('edit-industry').value.trim(), 
        birthday: document.getElementById('edit-birthday').value
    };
    
    try {
      const oldBirthday = registeredInfo ? registeredInfo.birthday : '';
      await fetchAPI('updateUser', p);
      registeredInfo = p;
      showToast("更新成功");

      if (p.birthday !== oldBirthday && p.birthday) {
          const contacts = await fetchAPI('getCardContacts', {});
          const myCard = contacts.find(c => c.userId === userProfile.userId || c['LINE ID'] === userProfile.userId || c['Line ID'] === userProfile.userId);
          if (myCard) {
              showToast("啟動命理精算中...");
              const newTags = await fetchAPI('calculateFateTags', { Name: p.name, Mobile: p.phone, Birthday: p.birthday });
              await fetchAPI('updateCard', { rowId: myCard.rowId, ...newTags });
              showToast("✅ 五大命理標籤已同步！");
          }
      }
    } catch(e) { showToast("更新失敗", true); } 
    finally { isProcessing = false; btn.innerText = '儲存變更'; btn.disabled = false; }
  }

  // 其他 UI 載入函式 (loadUserActivities, loadAdminActivities 等) 保持原本完整邏輯
  async function loadUserActivities() {
    const container = document.getElementById('user-activities-container');
    container.innerHTML = '<div class="col-span-2 py-10 text-center text-slate-400">載入中...</div>';
    try {
      const data = await fetchAPI('getPublicActivities', {}); 
      globalPublicActivities = data || [];
      if (!globalPublicActivities.length) {
        container.innerHTML = '<div class="col-span-2 py-16 text-center text-slate-400">目前無開放的活動</div>'; return;
      }
      renderActivityList(globalPublicActivities, 'user');
    } catch(e) {}
  }

  function renderActivityList(data, mode) {
    const list = document.getElementById(mode === 'user' ? 'user-activities-container' : 'admin-activity-list-container');
    let html = '';
    data.forEach(a => {
      if (mode === 'user') {
        html += `<div onclick="openActivityDetailByName('${a.name}')" class="bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm flex flex-col active:scale-95 transition-all"><div class="aspect-[4/3] bg-slate-50 relative"><img src="${a.imageUrl || 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=400&q=80'}" class="w-full h-full object-cover"></div><div class="p-3"><h3 class="text-[14px] font-normal text-slate-800 line-clamp-2">${a.name}</h3><p class="text-[11px] text-primary mt-1">${a.startTime ? a.startTime.substring(5,16) : '時間未定'}</p></div></div>`;
      } else {
        html += `<div class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm flex justify-between items-center"><div><h3 class="text-[15px] font-normal text-slate-800">${a.name}</h3><p class="text-[12px] text-slate-400">人數: ${a.total} | 簽到: ${a.attended}</p></div><button onclick="openAdminRegistrants('${a.name}')" class="px-4 py-2 bg-slate-900 text-white rounded-lg text-[13px]">核銷</button></div>`;
      }
    });
    list.innerHTML = html;
  }
</script>
